description: Santa Clara County exempts one vehicle valued up to this amount under the General Assistance program.
# The $4,650 value is verified against the current (undated) handbook Motor
# Vehicle chapter and the GA-62 program information sheet (rev. 11/25). The
# effective date follows the sibling personal property limit era; the county
# publishes no dated history for the vehicle rule, so earlier values are
# unverified.
values:
  2016-04-01: 4_650

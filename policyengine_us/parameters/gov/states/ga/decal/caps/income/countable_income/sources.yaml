description: Georgia counts these income sources under the Childcare and Parent Services program.
values:
  2026-03-02:
    - employment_income
    - self_employment_income
    - unemployment_compensation
    - workers_compensation
    - alimony_income
    - child_support_received
    - veterans_benefits
    - capital_gains
    - rental_income
    - dividend_income
    - pension_income
    - military_retirement_pay
    # The following are counted per CAPS Policy Manual Ch.8 but have
    # no matching variables:
    # - lottery_payments
    # - commissions (included in employment_income)
    # - cash_bonuses (included in employment_income)

metadata:
  unit: list
  period: year
  label: Georgia CAPS countable income sources
  reference:
    - title: Georgia CAPS Policy Manual, Chapter 8 (Income)
      href: https://caps.decal.ga.gov/assets/downloads/CAPS/04-CAPS_Policy-Chapter_8.pdf#page=3

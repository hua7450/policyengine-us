description: Georgia provides these refundable income tax credits.
values:
  # The HB 162 surplus tax rebate is capped at Form 500 Line 16 (tax before
  # credits) and pays out past a zero balance due, so it is treated as
  # refundable. Its amount parameter is nonzero only for tax year 2021.
  2021-01-01:
    - ga_surplus_tax_rebate
metadata:
  unit: list
  period: year
  label: Georgia refundable income tax credits
  reference:

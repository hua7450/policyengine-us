description: Georgia provides a surplus tax rebate of up to this amount, based on filing status, for the 2021 tax year.
metadata:
  unit: currency-USD
  period: year
  breakdown:
    - filing_status
  label: Georgia surplus tax rebate amount
  reference:
    - title: 2024 CODE OF GEORGIA, Title 48, Article 2, Section 48-7-20.2 (b)(1)(B)
      href: https://law.justia.com/codes/georgia/title-48/chapter-7/article-2/section-48-7-20-2/
    - title: HB 162 (2023), one-time refund of 2021 income taxes
      href: https://www.legis.ga.gov/api/legislation/document/20232024/217823

# The HB 162 refund is keyed to tax year 2021 liability only (paid out in
# 2023); the amount is zero in all other years.

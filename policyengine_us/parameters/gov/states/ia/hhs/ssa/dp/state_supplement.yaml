BLIND_WITH_AGED_OR_DISABLED_SPOUSE_AND_DEPENDENT:
  # 2011 Iowa HHS total $1,377 minus individual FBR $674 = state portion $703.
  # (SSA 2011 Table 1 shows both-blind couple total $1,399; footnote a reduces
  # the total by $22 when only one spouse is blind, giving $1,377.)
  2011-01-01: 703
  2017-01-01: 769
  2018-01-01: 784
  2025-01-01: 1_008
  # 2026 Iowa HHS published total is $3,031; state portion = $3,031 − $994 FBR
  # = $2,037. This is a +91.8% jump vs the 2025 state portion ($1,008), out of
  # step with the ~2.85% COLA that every other DP configuration tracks. An
  # expected state-portion of ~$1,037 (total ~$2,031) would match that COLA,
  # so $3,031 may reflect an Iowa HHS publication error. Encoded as published;
  # pending confirmation from Iowa HHS.
  2026-01-01: 2_037

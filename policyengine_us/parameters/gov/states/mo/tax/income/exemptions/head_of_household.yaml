description: Missouri additional exemption for head of household or qualifying surviving spouse filers (MO-1040 Line 15). Per RSMo 143.161(2), effective for taxable years beginning on or after January 1, 1999. Unlike the dependent exemption in 143.161(1), this provision does not require the federal exemption amount under 26 USC 151 to be non-zero, so it applies during TCJA years. The MO-1040 form added a dedicated Line 15 starting in tax year 2022.

description: New Hampshire counts these income sources as countable income under the Child Care Scholarship Program.
values:
  2024-07-01:
    # Earned income
    - employment_income
    - self_employment_income
    - farm_income
    # Unearned income
    - social_security
    - pension_income
    - retirement_distributions
    - unemployment_compensation
    - workers_compensation
    - child_support_received
    - alimony_income
    - interest_income
    - dividend_income
    - rental_income
    - veterans_benefits
    - disability_benefits
    - capital_gains

metadata:
  unit: list
  period: year
  label: New Hampshire CCAP countable income sources
  reference:
    - title: He-C 6910.06(b), He-C 6910.06(e)
      href: https://www.gencourt.state.nh.us/rules/filing_history/sourcehe-c6910.html

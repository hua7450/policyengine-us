description: New Jersey limits the Stay NJ Property Tax Credit program to filers with gross income below this amount.
values:
  2026-01-01: 500_000
  2027-01-01: 200_000.01

metadata:
  unit: currency-USD
  period: year
  label: New Jersey Stay NJ income limit
  reference:
    - title: P.L. 2023, c.75, Section 3(b) - Stay NJ Act
      href: https://pub.njleg.state.nj.us/Bills/2022/PL23/75_.PDF#page=3
    - title: P.L. 2024, c.88 - Stay NJ Amendment
      href: https://pub.njleg.state.nj.us/Bills/2024/PL24/88_.PDF
    - title: P.L.2026, c.27 (A-5327), FY2027 Appropriations Act - claimants with income over $200,000 (tax year 2025) are ineligible for the calendar-year 2027 benefit
      href: https://pub.njleg.state.nj.us/Bills/2026/AL26/27_.PDF#page=261
    - title: NJ Division of Taxation - Stay NJ Program
      href: https://www.nj.gov/treasury/taxation/staynj/index.shtml
# The calendar-year 2026 Stay NJ benefit (a single quarter, paid in Q3-Q4 2026)
# is provided under the original P.L.2023 c.75 rules ($500,000 "less than" limit).
# The FY2027 Appropriations Act lowered the limit to "not in excess of $200,000"
# for the calendar-year 2027 benefit, modeled here from tax year 2027 onward.
# nj_staynj_eligible uses a strict "less than" test, so the 2027 value carries a
# one-cent offset ($200,000.01) to keep income of exactly $200,000 eligible.

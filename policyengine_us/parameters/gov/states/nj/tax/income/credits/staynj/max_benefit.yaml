description: New Jersey limits the Stay NJ Property Tax Credit program benefit to this maximum amount, which varies by gross income from tax year 2027.
metadata:
  type: single_amount
  threshold_unit: currency-USD
  amount_unit: currency-USD
  period: year
  label: New Jersey Stay NJ maximum benefit
  reference:
    - title: P.L. 2023, c.75, Section 3(c) - Stay NJ Act
      href: https://pub.njleg.state.nj.us/Bills/2022/PL23/75_.PDF#page=3
    - title: P.L. 2024, c.88 - Stay NJ Amendment
      href: https://pub.njleg.state.nj.us/Bills/2024/PL24/88_.PDF
    - title: FY2027 Appropriations Act (A-5327), Stay NJ language - income-tiered benefit caps
      href: https://pub.njleg.state.nj.us/Bills/2026/A5500/5327_I1.PDF
    - title: NJ Division of Taxation - Stay NJ Program
      href: https://www.nj.gov/treasury/taxation/staynj/index.shtml
# The calendar-year 2026 benefit (a single quarter under original P.L.2023 c.75
# rules) uses the flat $6,500 cap at all income levels. The FY2027 Appropriations
# Act replaced the flat cap with an income-tiered schedule for the calendar-year
# 2027 benefit. The statute states the caps as half-year (two-quarter) amounts
# ($3,250 / $2,500 / $2,000); the annualized maximums below ($6,500 / $5,000 /
# $4,000) are the durable annual entitlement PolicyEngine models. Claimants with
# income over $200,000 are ineligible (enforced by nj_staynj_eligible).

brackets:
  - threshold:
      2026-01-01: 0
    amount:
      2026-01-01: 6_500
      2027-01-01: 6_500
  - threshold:
      2026-01-01: 100_000
    amount:
      2026-01-01: 6_500
      2027-01-01: 5_000
  - threshold:
      2026-01-01: 150_000
    amount:
      2026-01-01: 6_500
      2027-01-01: 4_000

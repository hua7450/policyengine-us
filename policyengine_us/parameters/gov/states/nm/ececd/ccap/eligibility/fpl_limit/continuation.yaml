description: New Mexico limits continuing income eligibility to this percentage of the federal poverty guideline under the Child Care Assistance Program.
# Codified vs. operative layering. The NMAC rule (8.15.2.12) codifies a 250% FPG
# recertification/exit ceiling. Since May 1, 2022, however, ECECD has operated
# CCAP under broader expansion policies: the Legislative Finance Committee's
# December 2025 policy brief documents an operative continuation/exit ceiling of
# 425% FPG from May 1, 2022 (held at 425% through the July 1, 2023 copay-waiver
# expiration), and no income limit at all once Universal Child Care took effect
# November 1, 2025. We encode the operative ceilings (which is what actually
# determined continued eligibility) rather than the superseded codified 250%,
# and set the limit to infinity from 2025-11-01 (income_limit_in_effect also
# turns off then). Earlier operative expansions (200%/400% before May 2022)
# predate CCAP coverage in PolicyEngine and are not encoded.
values:
  2016-10-01: 2.5
  2022-05-01: 4.25
  2025-11-01: .inf

metadata:
  unit: /1
  period: year
  label: New Mexico CCAP continuing income limit

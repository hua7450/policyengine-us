    - title: 26 U.S. Code § 68 - Overall limitation on itemized deductions (a)(1)
      href: https://www.law.cornell.edu/uscode/text/26/68#a_1
    - title: 2025 NY Form IT-196 Instructions, Line 40 Total itemized deductions worksheet (line 8, multiply by 3%)

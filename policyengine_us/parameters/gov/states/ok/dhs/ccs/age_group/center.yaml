description: Oklahoma assigns children to these child care center rate age groups, by age in months, under the Child Care Subsidy Program.
# The amount is the OKCCSCenterAgeGroup enum index: 0 = MONTHS_0_TO_12,
# 1 = MONTHS_13_TO_24, 2 = MONTHS_25_TO_48, 3 = MONTHS_49_TO_72,
# 4 = MONTHS_73_PLUS.
metadata:

description: Oklahoma assigns children to these child care home rate age groups, by age in months, under the Child Care Subsidy Program.
# The amount is the OKCCSHomeAgeGroup enum index: 0 = MONTHS_0_TO_24,
# 1 = MONTHS_25_TO_48, 2 = MONTHS_49_TO_72, 3 = MONTHS_73_PLUS.
metadata:
  type: single_amount
  threshold_unit: month
  amount_unit: /1
  period: year
  label: Oklahoma Child Care Subsidy home age group
  reference:
    - title: OKDHS Appendix C-4-B, Child Care Provider Rate Schedule, pp. 3-5
      href: https://oklahoma.gov/content/dam/ok/en/okdhs/documents/searchcenter/okdhsformresults/c-4-b.pdf#page=3

brackets:
  - threshold:
      2023-01-01: 0
    amount:
      2023-01-01: 0
  - threshold:
      2023-01-01: 25
    amount:
      2023-01-01: 1
  - threshold:
      2023-01-01: 49
    amount:
      2023-01-01: 2
  - threshold:
      2023-01-01: 73
    amount:
      2023-01-01: 3

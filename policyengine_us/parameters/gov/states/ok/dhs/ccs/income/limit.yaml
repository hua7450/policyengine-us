description: Oklahoma limits adjusted monthly income to this amount, by household size, under the Child Care Subsidy Program.
# The limit is the top of the highest family share copayment band in
# Appendix C-4 for each family size; income above it closes the case.
# Households larger than ten use the ten-person threshold.

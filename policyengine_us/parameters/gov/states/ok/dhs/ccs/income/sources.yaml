description: Oklahoma counts these income sources as countable income under the Child Care Subsidy Program.
values:
  2023-01-01:
    # Earned income (OAC 340:40-7-11(b)): wages, including armed forces pay,
    # commissions, tips, piece-rate payments, longevity payments, and cash
    # bonuses, and self-employment income. Self-employment income is floored
    # at zero per person because a business loss is not deducted from other
    # household income (OAC 340:40-7-11(b)(3)(B)). The 50 percent
    # business-expense standard deduction in the same subsection is not
    # applied: self_employment_income is already net of actual expenses, and
    # gross self-employment receipts are not tracked at the moment.
    - employment_income
    - ok_ccs_countable_self_employment_income
    # Unearned income (OAC 340:40-7-11(c)).
    # social_security already includes the disability, retirement, survivors,
    # and dependents components.
    - social_security
    - unemployment_compensation
    - workers_compensation
    - child_support_received
    - alimony_income
    - dividend_income
    - interest_income
    # Annuities, pensions, retirement benefits, and disability benefits from
    # government or private sources are unearned income (OAC
    # 340:40-7-11(c)(2)). disability_benefits excludes Social Security
    # disability (inside social_security) and workers' compensation, so the
    # sources do not double-count.
    - pension_income
    - disability_benefits
    # Veterans' compensation, pensions, and military allotments
    # (OAC 340:40-7-11(c)(6)).
    - veterans_benefits
    # Rental property income is considered self-employment income
    # (OAC 340:40-7-11(b)(3)).
    - rental_income
    # S corporation, limited partnership, and LLC profit shares are unearned
    # income (OAC 340:40-7-11(c)(11)).
    - partnership_s_corp_income
    # Temporary Assistance for Needy Families cash assistance is countable per
    # OAC 340:40-7-11(c)(1) but is omitted here: TANF recipients are
    # predetermined eligible with no family share copayment (OAC 340:40-7-1),
    # so counting the TANF dollars has no effect on their eligibility, and
    # including them would create a circular dependency with the TANF
    # dependent care deduction. Oklahoma State Supplemental Payments and
    # Refugee Resettlement Program cash assistance are not tracked at the
    # moment. Supplemental Security Income is likewise countable unearned
    # income (OAC 340:40-7-11(c)(3)) but omitted for the same reason: SSI
    # recipients are predetermined eligible with no family share copayment,
    # so the SSI dollars can never reach the income test or copayment lookup.
    # Mineral and royalty payments (OAC 340:40-7-11(c)(8)), cash contributions
    # over $30 per quarter (c)(7), and recurring lump sum or irregular income
    # (c)(9)-(10) have no corresponding tracked income source at the moment.


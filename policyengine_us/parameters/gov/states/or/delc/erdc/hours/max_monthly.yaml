description: Oregon limits standard monthly payable child care to this number of hours under the Employment Related Day Care program.
values:
  2024-01-01: 215

# OAR 414-175-0075(9)-(10) allow payment above 215 hours (up to 1.5 times the
# monthly rate, about 323 hours) when the Department approves special
# circumstances, such as a caretaker who consistently works more than 40
# hours a week. That case-by-case determination is not modeled, so all
# authorized hours are conservatively capped at this standard maximum; the
# 75-hour weekly bracket in hours/authorized/weekly.yaml therefore only
# produces the full-time outcome.
metadata:
  unit: hour
  period: month
  label: Oregon ERDC maximum standard monthly hours

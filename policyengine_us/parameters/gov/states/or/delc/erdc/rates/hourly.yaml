# For enhanced and licensed providers (QFM/QEC/RFM/CFM/CNT) the insert applies
# these hourly rates to the 1-62 hour tier and publishes a separate part-time
# monthly tier for 63-135 hours (75% of the full-time monthly rate). The
# part-time tier is not modeled (see rates/monthly.yaml); hourly billing is
# applied to all sub-full-time care, capped at the full-time monthly rate.

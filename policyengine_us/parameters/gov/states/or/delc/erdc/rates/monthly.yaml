description: Oregon provides these monthly maximum provider reimbursement rates under the Employment Related Day Care program.
metadata:
  period: month
  unit: currency-USD
  label: Oregon ERDC monthly maximum provider rates
  breakdown:
    - or_erdc_provider_area
    - or_erdc_provider_type
    - or_erdc_age_group
  reference:
    - title: Oregon DELC ERDC Child Care Maximum Rates, Group Areas A-C
      href: https://www.oregon.gov/delc/providers/Documents/Provider%20Rate%20Increase%20For%20Jan%202026_Phase%202_ENG.pdf#page=2
    - title: Oregon DELC ERDC Maximum Rates, Provider Guide Insert DELC 7492i (01/24), effective January 1, 2024
      href: http://web.archive.org/web/20251012133829id_/https://www.oregon.gov/delc/programs/ERDC%20Fliers/Provider%20Guide%20Insert%20Final%20EN.pdf#page=3

# The insert also publishes a part-time monthly rate tier (63-135 hours) for
# enhanced and licensed providers (QFM/QEC/RFM/CFM/CNT), equal to 75% of the
# full-time monthly rate rounded to the dollar. Under OAR 414-175-0075(3)(c)
# that tier applies only when the provider customarily bills all families at
# a part-time monthly rate, a billing practice the model does not observe,
# so it is not encoded; or_erdc_maximum_monthly_rate prices sub-full-time
# care hourly, capped at these full-time monthly rates.

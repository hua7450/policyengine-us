description: Oregon reduces its Child Tax Credit for filers with Oregon adjusted gross income exceeding this amount.
values:
  2023-01-01: 25_000
  2024-01-01: 25_750
  2025-01-01: 26_550
metadata:
  # Values after the last Department of Revenue publication are computed in
  # parameters/uprating_extensions.py per ORS 315.273(5): unchained U.S.
  # City Average CPI-U for the 12 months ending August 31 of the prior year,
  # over the 2022 Q2 average, applied to the $25,000 base with each increase
  # rounded down to the next lower multiple of $50.
  unit: currency-USD
  period: year
  label: Oregon Child Tax Credit phase-out start

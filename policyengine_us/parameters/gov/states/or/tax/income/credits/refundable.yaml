  - or_working_family_household_and_dependent_care_credit
  # The Child Tax Credit sunsets after tax year 2028 (HB 3235 Section 11).
  # The sunset is encoded in gov.states.or.tax.income.credits.ctc.in_effect,
  # which zeroes or_ctc from 2029, so the credit stays listed here and a
  # single in_effect switch models renewal scenarios.
  2023-01-01:

description: Rhode Island counts these income sources as countable income under the Child Care Assistance Program.
values:
  2022-01-01:
    # Earned income
    - employment_income
    - self_employment_income
    # Unearned income
    - social_security
    - ssi
    - dividend_income
    - interest_income
    - rental_income
    - pension_income
    - unemployment_compensation
    - workers_compensation
    - child_support_received
    - alimony_income
    - veterans_benefits
    - disability_benefits
    - capital_gains

metadata:
  unit: list
  period: year
  label: Rhode Island CCAP countable income sources
  reference:
    - title: 218-RICR-20-00-4 Section 4.2 Definition 30
      href: https://dhs.ri.gov/media/9236/download?language=en#page=10

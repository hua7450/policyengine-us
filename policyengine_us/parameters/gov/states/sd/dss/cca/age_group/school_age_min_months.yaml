      href: https://dss.sd.gov/docs/childcare/assistance/CCA_Weekly_Reimbursement_Rates.pdf
    - title: South Dakota BEES Child Care Assistance Policy Manual, Section 10.2.4 School Aged Children
      href: https://dss.sd.gov/docs/childcare/assistance/BEES_CCA_Policy_Manual.pdf#page=45

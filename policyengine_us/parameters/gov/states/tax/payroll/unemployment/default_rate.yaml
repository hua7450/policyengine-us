description: Default employer-side state unemployment insurance tax rate. Uses the state's published new-employer rate when a single statewide rate exists; for states whose rule is industry-average or otherwise employer-specific, uses the DOL-reported average tax rate on taxable wages as the model default. Override with employer_state_unemployment_tax_rate_override for employer-specific calculations.

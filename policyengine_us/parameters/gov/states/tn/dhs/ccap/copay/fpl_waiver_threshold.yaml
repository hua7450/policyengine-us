description: Tennessee waives the parent copay for families with countable income at or below this share of the federal poverty guideline under the Child Care Certificate Program.
# Before October 1, 2025 the copay was waived at or below 150% FPL. That waiver ended
# September 30, 2025, so from October 1, 2025 all families pay the 5% copay (a
# threshold of 0 leaves only zero-income families with no copay, which is already
# implied by 5% of zero income).
values:
  2024-06-01: 1.5
  2025-10-01: 0


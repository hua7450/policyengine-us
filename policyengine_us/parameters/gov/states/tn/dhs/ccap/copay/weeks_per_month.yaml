description: Tennessee divides the monthly copay by this factor to establish the weekly copay under the Child Care Certificate Program.
# The copay charts specify dividing 5% of monthly countable gross income by 4.3 to
# convert it to a weekly payment. This exact regulatory factor is used instead of
# WEEKS_IN_YEAR / MONTHS_IN_YEAR (4.333...).
values:
  2024-06-01: 4.3

metadata:
  unit: /1
  period: year
  label: Tennessee CCAP copay weeks per month factor

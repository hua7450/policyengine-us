description: Tennessee designates these counties as Top Tier for reimbursement rate purposes under the Child Care Certificate Program.
# Top Tier counties are enumerated directly in the footnote of each reimbursement
# rate chart, which is the operational source of truth. All other counties default to
# Lower Tier. The two eras differ only by Dyer County, which was Top Tier on the
# October 1, 2024 chart and dropped to Lower Tier on the January 1, 2026 chart. Gibson
# County appears on both chart footnotes even though it is absent from the Market Rate
# Survey ranking table (too small for either top-20 list); it is a petition county
# added to the top tier under MRS footnote 3 (employer creating 50+ child-care slots).

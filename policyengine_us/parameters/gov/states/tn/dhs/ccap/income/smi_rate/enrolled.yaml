description: Tennessee limits countable monthly gross income to this share of the state median income for enrolled families at redetermination under the Child Care Certificate Program.
# The Smart Steps Plus extension (effective October 1, 2025) lets families already
# receiving Smart Steps remain eligible at redetermination with income up to the
# 100th percentile SMI. Before then, enrolled families used the same 85% limit as
# new applicants.
values:
  2024-06-01: 0.85
  2025-10-01: 1


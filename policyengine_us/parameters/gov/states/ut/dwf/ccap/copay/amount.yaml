description: Utah sets these monthly child care copayment amounts under the Child Care Assistance program.

# Table 4, effective April 1, 2026. The 2020 entry is placed at
# PolicyEngine's backdating floor; earlier editions of Table 4 are not
# encoded, so prior periods use this table as an approximation.
#
# The copayment is a sliding scale by household size (2 through 12 or
# more), countable income group (1 through 16, classified with
# copay/income_limits), and the number of children receiving the subsidy
# (one, two, or more than two). Group 1 (income at or below 100% of the
# federal poverty level) has no copayment (R986-700-707(5)(a)). The
# published table marks child-count columns that exceed the possible
# number of children in the household size as n/a (household size 2: two
# or more children; size 3: more than two); these cells repeat the
# largest published column for that row so every lookup is defined, and
# they never bind in practice.
metadata:
  unit: currency-USD
  period: month
  label: Utah CCAP monthly copayment amount
  breakdown:
    - range(2, 13)
    - range(1, 17)
    - ut_ccap_child_count_group
  breakdown_labels:
    - Household size
    - Income group
    - Children receiving subsidy
  reference:
    - title: Utah DWS Table 4 - Child Care Income Eligibility and Co-Payment (effective April 1, 2026)
      href: https://jobs.utah.gov/Infosource/eligibilitymanual/Tables,_Appendicies,_and_Charts/Tables,_Appendicies,_and_Charts/Table_4_-_Child_Care_Income_Eligibility_and_Co-Payment.htm
    - title: Utah Admin. Code R986-700-707(1)
      href: https://www.law.cornell.edu/regulations/utah/Utah-Admin-Code-R986-700-707


description: Utah sets these monthly countable income upper limits for each copayment income group under the Child Care Assistance program.

# Table 4, effective April 1, 2026. The 2020 entry is placed at
# PolicyEngine's backdating floor; earlier editions of Table 4 are not
# encoded, so prior periods use this table as an approximation.
#
# Each value is the inclusive upper bound of a countable income group;
# income above a group's upper bound falls in the next group. Household
# sizes run from 2 (the smallest possible unit, one parent and one child)
# through 12, where the size 12 column covers households of 12 or more.
# Group 16 is the maximum income range to qualify for child care
# assistance (85% of the state median income). The published lower bound
# of household size 5 group 3 reads 3,644.01, an apparent typo for
# 3,664.01, since the size 5 group 2 upper bound is 3,664; only upper
# bounds are encoded here.
metadata:
  unit: currency-USD
  period: month
  label: Utah CCAP copayment income group upper limits
  breakdown:
    - range(2, 13)
    - range(1, 17)
  breakdown_labels:
    - Household size
    - Income group
  reference:
    - title: Utah DWS Table 4 - Child Care Income Eligibility and Co-Payment (effective April 1, 2026)
      href: https://jobs.utah.gov/Infosource/eligibilitymanual/Tables,_Appendicies,_and_Charts/Tables,_Appendicies,_and_Charts/Table_4_-_Child_Care_Income_Eligibility_and_Co-Payment.htm
    - title: Utah Admin. Code R986-700-710(4)
      href: https://utrules.elaws.us/uac/r986-700-710


description: Utah limits eligibility for children with special needs to those below this age under the Child Care Assistance program.

# Children up to the age of 18 are eligible if they meet the special needs
# requirements of R986-700-717 or are under court supervision
# (R986-700-702(4)(b)). The 2020 entry is placed at PolicyEngine's
# backdating floor; the provision was in effect well before this date.
values:
  2020-01-01: 18


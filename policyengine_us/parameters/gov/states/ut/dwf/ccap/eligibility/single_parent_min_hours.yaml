description: Utah requires a single parent to be employed at least this many hours per week under the Child Care Assistance program.

# R986-700-709(2): "If the household has only one parent, the parent must
# be employed at least an average of 15 hours per week." The 2020 entry is
# placed at PolicyEngine's backdating floor; the provision was in effect
# well before this date.
values:
  2020-01-01: 15


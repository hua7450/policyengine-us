description: Utah requires one parent in a two-parent household to be employed at least this many hours per week under the Child Care Assistance program.

# R986-700-709(3)(a): one parent must be employed at least an average of 30
# hours per week and the other parent at least an average of 15 hours per
# week. This parameter holds the lower of the two thresholds. The 2020
# entry is placed at PolicyEngine's backdating floor; the provision was in
# effect well before this date.
values:
  2020-01-01: 15

metadata:
  unit: hour
  period: week
  label: Utah CCAP two-parent household first parent minimum weekly work hours
  reference:
    - title: Utah Admin. Code R986-700-709(3)(a)
      href: https://utrules.elaws.us/uac/r986-700-709
    - title: Utah DWS Office of Child Care subsidy fact sheet (OCC_2_09/24/25)
      href: https://jobs.utah.gov/customereducation/services/childcare/occsubsidyfact.pdf#page=1

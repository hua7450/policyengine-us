description: Utah requires the other parent in a two-parent household to be employed at least this many hours per week under the Child Care Assistance program.

# R986-700-709(2)(b)(i)(A): one parent must be employed an average of at
# least 30 hours per week and the second parent an average of at least 15
# hours per week. This parameter holds the higher of the two thresholds.
# The 2020 entry is placed at PolicyEngine's backdating floor; the
# provision was in effect well before this date.
values:
  2020-01-01: 30

metadata:
  unit: hour
  period: week
  label: Utah CCAP two-parent household second parent minimum weekly work hours
  reference:
    - title: Utah Admin. Code R986-700-709(2)(b)(i)(A)
      href: https://www.law.cornell.edu/regulations/utah/Utah-Admin-Code-R986-700-709
    - title: Utah DWS Office of Child Care subsidy fact sheet (OCC_2_09/24/25)
      href: https://jobs.utah.gov/customereducation/services/childcare/occsubsidyfact.pdf#page=1

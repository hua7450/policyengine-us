description: Utah excludes the earned income of children below this age who are not parents from countable income under the Child Care Assistance program.

# R986-700-710(1)(b)(i) excludes the earned income of a "minor child who is
# not a parent". Utah Code 15-2-1 sets the period of minority at ages below
# 18. The 2020 entry is placed at PolicyEngine's backdating floor; the
# provision was in effect well before this date.
values:
  2020-01-01: 18

metadata:
  unit: year
  period: year
  label: Utah CCAP child earned income exclusion age
  reference:

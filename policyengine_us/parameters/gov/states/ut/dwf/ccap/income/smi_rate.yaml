description: Utah limits countable income to this share of the state median income under the Child Care Assistance program.

# R986-700-710(3) requires countable income, less applicable deductions, to
# be at or below a percentage of the state median income determined by the
# Department. The Department's published percentage is 85% (fact sheet,
# effective October 1, 2025; the Table 4 Group 16 upper bounds equal 85% of
# the state median income by household size). The 2020 entry is placed at
# PolicyEngine's backdating floor; 85% was in use before this date.
values:
  2020-01-01: 0.85


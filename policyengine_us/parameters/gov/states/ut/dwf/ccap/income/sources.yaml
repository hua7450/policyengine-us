description: Utah counts income from these sources as countable income under the Child Care Assistance program.

# R986-700-710(1) counts the earned and unearned income of the
# parent(s)/client, determined under rule R986-200; if both parents live in
# the household, the income of both parents is counted. Child support paid
# directly to the client is counted as unearned income
# (R986-700-710(1)(b)(ii)).
#
# Exclusions handled outside this list:
#   - The SSI benefit of an SSI recipient is not counted
#     (R986-700-710(1)(b)(iii)), so ssi is omitted here.
#   - The earned income of a minor child who is not a parent is not counted
#     (R986-700-710(1)(b)(i)); this is subtracted in the countable income
#     formula since employment income variables cover all members.
#   - Independent living grants paid by DHS to a minor parent are not
#     counted (R986-700-710(5)); no PolicyEngine income variable exists.
#   - Family Employment Program (FEP) cash assistance is omitted to avoid
#     the child care to Temporary Assistance for Needy Families circular
#     dependency through the dependent care deduction; FEP recipients
#     receive FEP CC rather than Employment Support CC (R986-700-708).
values:
  2020-01-01:
    # Earned income
    - employment_income
    - self_employment_income
    # Unearned income
    - social_security
    - pension_income
    - unemployment_compensation
    - workers_compensation
    - veterans_benefits
    - rental_income
    - alimony_income
    - child_support_received


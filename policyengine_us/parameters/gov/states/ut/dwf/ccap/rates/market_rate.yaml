description: Utah caps the monthly child care payment at these local market rates under the Child Care Assistance program.

# Table 3, "Maximum Monthly Child Care Payments Based on Monthly Local
# Market Rates", effective October 1, 2024. The 2020 entry is placed at
# PolicyEngine's backdating floor; earlier editions of Table 3 are not
# encoded, so prior periods use this table as an approximation.
#
# Statewide full-time monthly maximums per child, by provider type and
# child age (R986-700-713(1)). The License Exempt home (family, friend,
# and neighbor) and Licensed Commercial Preschool rows publish identical
# rates but are distinct provider categories in the table.
metadata:
  unit: currency-USD
  period: month
  label: Utah CCAP maximum monthly local market rates
  breakdown:
    - ut_ccap_provider_type
    - ut_ccap_age_group
  breakdown_labels:
    - Provider type
    - Child age group
  reference:
    - title: Utah DWS Table 3 - Maximum Monthly Child Care Payments (effective October 1, 2024)
      href: https://jobs.utah.gov/occ/provider/table30824.pdf
    - title: Utah Admin. Code R986-700-713(1)
      href: https://www.law.cornell.edu/regulations/utah/Utah-Admin-Code-R986-700-713


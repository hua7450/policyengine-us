description: Washington counts these income sources when determining family income for the Early Childhood Education and Assistance Program. The list applies to both ECEAP and Early ECEAP because both pathways use the same DCYF income verification rules under WAC 110-425-0080.

values:
  2021-07-25:
    - market_income
    - tanf
    - ssi
    - social_security
    - child_support_received
    - unemployment_compensation
    - alimony_income
    - veterans_benefits
    - workers_compensation

metadata:
  unit: list
  period: year
  label: Washington ECEAP family income sources
  reference:

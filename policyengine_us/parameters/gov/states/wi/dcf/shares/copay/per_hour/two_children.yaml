description: Wisconsin charges assistance groups with two authorized children this hourly copayment, based on income as a share of the federal poverty guideline, under the Wisconsin Shares Child Care Subsidy Program.

# Copay per hour by the assistance group's income as a share of the federal
# poverty guideline. The schedule floors income to the lower 5% FPL line ("If
# the assistance group's income is between two lines, it uses the lower
# amount"); the 65% to 100% FPL rows are all $0.00 and collapse into the first
# bracket. Thresholds are shifted down by 0.0001 (e.g., 1.05 -> 1.0499) so
# float32 income ratios landing marginally below an exact band edge still map
# into that band. The 200% FPL row equals the 195% row, so income at or above
# 195% FPL keeps the top rate; the exit period adds a separate copayment on
# top (see exit/phase_out_rate.yaml).
brackets:
  - threshold:
      2026-02-01: 0
    amount:
      2026-02-01: 0 # At or below 100% FPL
  - threshold:
      2026-02-01: 1.0499
    amount:
      2026-02-01: 0.57 # 105% FPL band

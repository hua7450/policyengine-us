description: Wisconsin limits the liquid assets of an assistance group to this amount under the Wisconsin Shares Child Care Subsidy Program.

# Only liquid assets (cash, checking, savings, money market accounts, and
# credit union share accounts) are included in the asset test; the amount is
# self-declared. The statutory home value (200% of the statewide median,
# § 49.155(1m)(cr)1.) and vehicle equity ($20,000, § 49.155(1m)(cr)2.) limits
# are not part of the handbook's operational asset test.
values:
  2025-10-01: 25_000


description: Wisconsin limits eligibility to disabled children below this age under the Wisconsin Shares Child Care Subsidy Program.

# Children under age 19 are eligible if they have a verified disability and are
# not physically or mentally capable of caring for themselves.
values:
  2025-10-01: 19


description: Wisconsin caps the weekly hours covered by the above-full-time add-on at this amount under the Wisconsin Shares Child Care Subsidy Program.

# The above-full-time add-on covers average weekly hours above 50 and up to
# 75 per week.
values:
  2025-10-01: 75


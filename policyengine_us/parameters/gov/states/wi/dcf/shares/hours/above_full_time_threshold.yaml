description: Wisconsin provides an above-full-time weekly add-on for child care need exceeding this many weekly hours under the Wisconsin Shares Child Care Subsidy Program.

# Parents with a child care need of more than 50 weekly hours receive the
# full-time subsidy plus a weekly add-on for the hours above 50 (up to 75),
# converted to a monthly amount and added after the capped-subsidy comparison.
values:
  2025-10-01: 50

metadata:
  unit: hour
  period: week
  label: Wisconsin Shares above-full-time weekly hours threshold

description: Wisconsin converts full-time authorizations to this many weekly hours when calculating the monthly subsidy under the Wisconsin Shares Child Care Subsidy Program.

# The benefit calculation uses 35 weekly hours (the full-time cap) whenever
# the authorization is full time: 35 x 4.348125 weeks per month = 152.18,
# rounded up to 153 monthly subsidized hours.
values:
  2025-10-01: 35

metadata:
  unit: hour
  period: week
  label: Wisconsin Shares full-time weekly hours conversion

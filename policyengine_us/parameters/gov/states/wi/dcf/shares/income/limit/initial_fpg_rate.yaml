description: Wisconsin limits initial eligibility to assistance groups with gross income at or below this share of the federal poverty guideline under the Wisconsin Shares Child Care Subsidy Program.

# Applies at application and to assistance groups that have been closed for
# more than one calendar month. The handbook publishes the corresponding
# dollar table (effective 2/1/2026); the underlying limit is 200% of the
# federal poverty level.
values:
  2025-10-01: 2


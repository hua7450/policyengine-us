description: Wisconsin limits ongoing eligibility to assistance groups with gross income at or below this share of the state median income under the Wisconsin Shares Child Care Subsidy Program.

# Enrolled assistance groups above 200% of the federal poverty level remain
# eligible until income exceeds 85% of the state median income for the
# assistance group size (or the copayment reduces the subsidy to zero). The
# handbook publishes the corresponding dollar table (effective 3/1/2026).
values:
  2025-10-01: 0.85


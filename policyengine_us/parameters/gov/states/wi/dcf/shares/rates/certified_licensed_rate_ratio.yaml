description: Wisconsin sets the hourly maximum rate for certified child care providers at this share of the licensed family hourly maximum under the Wisconsin Shares Child Care Subsidy Program.

# "Hourly maximums for regularly and provisionally certified providers are set
# at 90% of the licensed family hourly maximum." The result is rounded up to
# the cent (verified against every certified cell of the statewide table,
# e.g., 0.9 x $7.86 = $7.074, published as $7.08). Certified providers have no
# monthly maximum of their own; monthly subsidy payments are capped at the
# licensed family monthly maximum. The statewide table's Certified column
# merges regularly and provisionally certified providers. The statute caps
# certified rates at 90% of the licensed rates; the published tables apply
# exactly 90%.
values:
  2025-10-01: 0.9


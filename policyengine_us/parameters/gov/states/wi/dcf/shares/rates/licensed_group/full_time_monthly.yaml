description: Wisconsin caps the monthly subsidy for full-time licensed group child care at these amounts by county and child age group under the Wisconsin Shares Child Care Subsidy Program.

# Statewide table effective 10/1/2025. Full-time monthly maximums are
# independent table cells (a weekly rate x 4.348125 weeks per month), not a
# fixed multiple of the hourly maximum, so they are transcribed per cell.
# Tribal-agency rows of the table are not transcribed (PolicyEngine has no
# tribal geography).
metadata:
  unit: currency-USD
  period: month
  label: Wisconsin Shares licensed group full-time monthly maximum rate
  breakdown:
    - county
    - wi_shares_age_group
  reference:
    - title: 2025 Wisconsin Shares Child Care Subsidy County and Tribal Maximum Rates - Statewide, effective 10/1/2025 (pp. 26-40)
      href: https://dcf.wisconsin.gov/files/wishares/pdf/max-rates-statewide.pdf#page=26
    - title: Wisconsin Shares Handbook (July 2026), Section 18.5.1 Subsidy Maximum Rates
      href: https://dcf.wisconsin.gov/wisconsin-shares/wisconsin-shares-handbook-july-2026#page=156
    - title: Wis. Stat. § 49.155(6)
      href: https://docs.legis.wisconsin.gov/statutes/statutes/49/III/155


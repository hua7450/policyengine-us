description: Wisconsin caps the hourly subsidy rate for licensed group child care at these amounts by county and child age group under the Wisconsin Shares Child Care Subsidy Program.

# Statewide table effective 10/1/2025 (table spans pp. 26-40; the reference
# anchors its first page). The published part-time monthly
# maximum equals the hourly maximum x 131 part-time monthly hours exactly
# (verified for every county), so it is derived in the formula rather than
# transcribed.
# Tribal-agency rows of the table are not transcribed (PolicyEngine has no
# tribal geography).
metadata:
  unit: currency-USD
  period: hour
  label: Wisconsin Shares licensed group hourly maximum rate
  breakdown:
    - wi_shares_age_group
  reference:
    - title: 2025 Wisconsin Shares Child Care Subsidy County and Tribal Maximum Rates - Statewide, effective 10/1/2025
      href: https://dcf.wisconsin.gov/files/wishares/pdf/max-rates-statewide.pdf#page=26
    - title: Wisconsin Shares Handbook (July 2026), Section 18.5.1 Subsidy Maximum Rates
      href: https://dcf.wisconsin.gov/wisconsin-shares/wisconsin-shares-handbook-july-2026#page=156
    - title: Wis. Stat. § 49.155(6)
      href: https://docs.legis.wisconsin.gov/statutes/statutes/49/III/155/6


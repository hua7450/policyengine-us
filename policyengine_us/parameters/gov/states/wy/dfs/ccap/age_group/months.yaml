description: Wyoming maps a child's age in months to a child care rate age band under the Child Care, Purchase of Service program, where 0 is 0-11 months, 1 is 12-23 months, 2 is 2-3 years, 3 is 4-5 years, and 4 is 6-13 years.
# Table I rate columns: 0-11 months, 12-23 months, 2-3 years (24-47 months),
# 4-5 years (48-71 months), and 6-13 years (72+ months). Rates are based on the
# child's age on the first day of the month. Amounts are enum indices:
# 0 = AGE_0_TO_11_MONTHS, 1 = AGE_12_TO_23_MONTHS, 2 = AGE_2_TO_3_YEARS,
# 3 = AGE_4_TO_5_YEARS, 4 = AGE_6_TO_13_YEARS.

description: Wyoming caps the total family copayment at this share of gross family income under the Child Care, Purchase of Service program.
# CCDF Plan 3.1.1: family copayments do not exceed 7% of gross family income;
# 3.2.1: the per-child daily fee is charged per child up to a maximum per
# family.
values:
  2024-04-01: 0.07


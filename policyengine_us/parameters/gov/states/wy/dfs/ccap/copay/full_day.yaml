      href: https://dfs.wyo.gov/services/family-services/child-care/
    - title: Wyoming DFS Table I - Child Care Sliding Fee Scale, eff. 04/01/26-03/31/27 (single page)
      href: https://dfs.wyo.gov/services/family-services/child-care/
    - title: W.S. 42-2-103(f)(i) (enabling authority for the sliding fee scale copayments)
      href: https://wyoleg.gov/statutes/compress/title42.pdf#page=13


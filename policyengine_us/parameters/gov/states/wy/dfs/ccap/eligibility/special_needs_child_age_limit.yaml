description: Wyoming extends child eligibility to children with special needs under this age under the Child Care, Purchase of Service program.
# Rules §8(e)(i)(A): a child aged 13 through under 18 remains eligible if the
# child has special needs, is developmentally delayed, or is physically or
# mentally incapable of self-care (medical verification), or is under court
# supervision. The CCDF Plan reports the extended upper age as 18.00. Only the
# special-needs/developmental-delay pathway is modeled; the court-supervision
# pathway has no input.
values:
  2024-04-01: 18


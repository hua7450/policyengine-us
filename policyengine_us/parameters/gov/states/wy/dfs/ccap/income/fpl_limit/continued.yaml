description: Wyoming limits countable income to this share of the federal poverty guideline for continued assistance under the Child Care, Purchase of Service program.
# Rules §8(e)(i)(N) / Manual §1201: a unit already receiving assistance may
# continue through Sliding Fee Scale Steps 5-6 (the transitional/graduated
# phaseout, Step 6 = 225% of the federal poverty guideline) when gross income
# increased due to employment and there is no 30-or-more-day break in aid.
# Proxied by the wy_ccap_enrolled input; first-time applicants use the initial
# Step 4 share (see initial.yaml).
values:
  2024-04-01: 2.25


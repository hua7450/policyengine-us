description: Wyoming limits countable income to this share of the federal poverty guideline at initial application under the Child Care, Purchase of Service program.
# Rules §8(e)(i)(N) / Manual §1101.A: an initial application must be at
# Sliding Fee Scale Step 4 or below. Steps are federal-poverty-guideline
# multiples (Step 4 = 175%), so the limit self-uprates with the guideline.
# Continuing recipients use the higher Step 6 share (see continued.yaml),
# selected via the wy_ccap_enrolled input.
values:
  2024-04-01: 1.75


description: Wyoming pays up to these maximum daily rates for child care center care under the Child Care, Purchase of Service program.
# DFS maximum daily reimbursement rates, identical on the 04/01/24, 04/01/25,
# and 04/01/26 Table I charts. The part-day rate peaking at 12-23 months is as
# printed on the charts. University, community-college, and Wind River
# Reservation centers also receive the center rate (Manual §1203.G).

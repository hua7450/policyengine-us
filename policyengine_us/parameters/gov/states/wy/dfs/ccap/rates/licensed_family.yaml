description: Wyoming pays up to these maximum daily rates for licensed-family-setting child care under the Child Care, Purchase of Service program.
# DFS maximum daily reimbursement rates, identical on the 04/01/24, 04/01/25,
# and 04/01/26 Table I charts. The Licensed-Family Setting column covers Family
# Child Care Homes and Family Child Care Centers. The part-day rate for
# 6-13 years (20.00) exceeding 4-5 years (18.64) is as printed on the charts.
metadata:
  period: day
  unit: currency-USD
  label: Wyoming CCAP licensed family setting daily maximum rates
  breakdown:

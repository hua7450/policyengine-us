description: Person-level income sources that count as unearned income for SNAP

values:
  2009-01-01:
    # (i)
    - ssi
    - general_assistance
    # (ii)
    - pension_income # Includes annuities.
    - veterans_benefits
    - unemployment_compensation
    - disability_benefits
    - workers_compensation
    - social_security
    - survivor_benefits
    - retirement_distributions
    # Assume all rental income meets this criteria (rest is earned):
    # "gross income minus the cost of doing business derived from rental
    #  property in which a household member is not actively engaged in the
    #  management of the property at least 20 hours a week."
    - rental_income
    # (iii)
    - child_support_received
    - alimony_income
    # (iv) educational assistance is countable only after educational
    # exclusions. Keep it out until the excluded share is modeled.
    # (v)
    - dividend_income
    - interest_income
    - financial_assistance
    - miscellaneous_income

metadata:
  reference:
    - title: 7 CFR 273.9(b)(2)
      href: https://www.law.cornell.edu/cfr/text/7/273.9#b_2

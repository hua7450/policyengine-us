description: The US sets SNAP benefits at the Thrifty Food Plan each year, updating in October. This approximates that uprating via CPI-U.
values:
  # Actuals from June of each year.
  2020-10-01: 257.797 # 2020-06.
  2021-10-01: 271.696 # 2021-06.
  2022-10-01: 296.311 # 2022-06.
  2023-10-01: 305.109 # 2023-06.
  2024-10-01: 314.175 # 2024-06.
  2025-10-01: 322.561 # 2025-06.
  2026-10-01: 333.952 # 2026-06.
  # Forecasts from CBO's Q2 forecasts.
  2027-10-01: 335.5 # 2027Q2
  2028-10-01: 342.7 # 2028Q2
  2029-10-01: 350.3 # 2029Q2
  2030-10-01: 358.1 # 2030Q2
  2031-10-01: 366.1 # 2031Q2
  2032-10-01: 374.3 # 2032Q2
  2033-10-01: 382.7 # 2033Q2
  2034-10-01: 391.3 # 2034Q2
  # Values for 2035-2100 are set programmatically in uprating.py
metadata:
  unit: currency-USD
  label: SNAP uprating
  economy: false
  reference:

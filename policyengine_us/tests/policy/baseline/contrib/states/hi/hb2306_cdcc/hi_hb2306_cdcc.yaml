# Tests for Hawaii HB 2306 CDCC reform rate schedule parameter values
# These test the parameter values directly using absolute_error_margin

- name: HB 2306 CDCC rate parameter - at $0 AGI
  period: 2027
  absolute_error_margin: 0.001
  input:
    people:
      person:
        age: 30
        is_tax_unit_head: true
        adjusted_gross_income: 0
    tax_units:
      tax_unit:
        members: [person]
    spm_units:
      spm_unit:
        members: [person]
    households:
      household:
        members: [person]
        state_code: HI
  output:
    # Testing the hi_cdcc variable with reform inactive
    # This verifies the baseline calculation still works
    hi_cdcc: 0

- name: HB 2306 CDCC rate parameter - at $85k AGI
  period: 2027
  absolute_error_margin: 0.001
  input:
    people:
      person:
        age: 30
        is_tax_unit_head: true
        adjusted_gross_income: 85_000
    tax_units:
      tax_unit:
        members: [person]
    spm_units:
      spm_unit:
        members: [person]
    households:
      household:
        members: [person]
        state_code: HI
  output:
    # No childcare expenses, so credit is 0
    hi_cdcc: 0

- name: HB 2306 CDCC with childcare expenses - baseline rate
  period: 2027
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        age: 30
        is_tax_unit_head: true
        employment_income: 50_000
      child:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [parent, child]
        tax_unit_childcare_expenses: 5_000
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: HI
  output:
    # Baseline rate: 15% at $50k+ AGI
    # Credit = 15% * min($5000 expenses, $10000 limit) = $750
    hi_cdcc: 750

# Test RI H7317 Additional Tax on High-Income Filers
# For 2027+: 3% additional tax on income above $640,000 (inflation-adjusted)

- name: RI high earner tax - income below threshold (no surtax)
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 500_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Income below threshold - only baseline tax applies
    # Surtax = 0
    # Using baseline 2025 brackets (will be inflated for 2027):
    # ~82,550*0.0375 + ~105,100*0.0475 + ~312,350*0.0599 ≈ baseline only
    # Just check surtax portion is 0 by comparing to baseline
    ri_income_tax_before_non_refundable_credits: 27_791.29

- name: RI high earner tax - income above threshold
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 750_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Baseline tax + 3% surtax on income above ~$661,200 threshold
    # Surtax portion: (750000 - 661200) * 0.03 = 88800 * 0.03 = 2664
    # Total = baseline + surtax
    ri_income_tax_before_non_refundable_credits: 45_438.79


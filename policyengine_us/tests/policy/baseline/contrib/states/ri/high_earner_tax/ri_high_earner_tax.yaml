# Test RI H7317 Additional Tax on High-Income Filers
# For 2027+: 3% additional tax on income above $640,000 (inflation-adjusted).
# The $640,000 threshold has an explicit value only for 2026-01-01; #8905
# unfroze its `uprating:` block (previously a silently-ignored sibling of
# `values:`), so 2027 is now gov.irs.uprating(2027)/gov.irs.uprating(2026) *
# 640,000, rounded down to the nearest 50 -- not yet an officially published
# 2027 figure (none exists for this proposed reform).
#
# The baseline tax below these tests also moved: gov/states/ri/tax/income/
# rate.yaml's bracket thresholds ($79,900 @ bracket[1] / $181,650 @ bracket[2]
# in 2025) were frozen by the same #8905 bug and are now gov.irs.uprating
# projections ($83,850 / $190,650 for 2027) -- RI's own rate-schedule
# references only cover through 2025, so this is also a projection pending
# RI's 2027 publication, not yet a published figure.

- name: RI high earner tax - income below threshold (no surtax)
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 500_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Income below the 2027 threshold - only baseline tax applies, surtax = 0.
    # Baseline: .0375*83,850 + .0475*(190,650-83,850) + .0599*(500,000-190,650) = 26,747.44
    ri_income_tax_before_non_refundable_credits: 26_747.44

- name: RI high earner tax - income above threshold
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 750_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Baseline tax (41,722.44) + 3% surtax on income above the 2027 threshold
    # (gov.irs.uprating-projected from $640,000 @ 2026 to $656,850 @ 2027)
    # Baseline: .0375*83,850 + .0475*(190,650-83,850) + .0599*(750,000-190,650) = 41,722.44
    # Surtax: (750,000 - 656,850) * 0.03 = 93,150 * 0.03 = 2,794.5
    # Total: 41,722.44 + 2,794.5 = 44,516.94
    ri_income_tax_before_non_refundable_credits: 44_516.94

- name: RI high earner tax - income well above threshold
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: true
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 1_000_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Baseline tax (56,697.44) + 3% surtax on income above the 2027 threshold
    # (gov.irs.uprating-projected from $640,000 @ 2026 to $656,850 @ 2027)
    # Baseline: .0375*83,850 + .0475*(190,650-83,850) + .0599*(1,000,000-190,650) = 56,697.44
    # Surtax: (1,000,000 - 656,850) * 0.03 = 343,150 * 0.03 = 10,294.5
    # Total: 56,697.44 + 10,294.5 = 66,991.94
    ri_income_tax_before_non_refundable_credits: 66_991.94

- name: RI high earner tax - reform not in effect
  period: 2027
  reforms: policyengine_us.reforms.states.ri.high_earner_tax.ri_high_earner_tax_reform.ri_high_earner_tax
  input:
    gov.contrib.states.ri.high_earner_tax.in_effect: false
    people:
      person1:
        age: 45
    tax_units:
      tax_unit:
        members: [person1]
        filing_status: SINGLE
        ri_taxable_income: 750_000
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Reform not in effect - only baseline tax applies (no surtax)
    # Baseline: .0375*83,850 + .0475*(190,650-83,850) + .0599*(750,000-190,650) = 41,722.44
    ri_income_tax_before_non_refundable_credits: 41_722.44

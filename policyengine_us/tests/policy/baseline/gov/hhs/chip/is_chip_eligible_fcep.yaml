- name: Pregnant woman eligible for CHIP through FCEP
  period: 2023
  input:
    people:
      head:
        is_pregnant: True
        immigration_status: CITIZEN
        is_medicaid_eligible: False
        medicaid_income_level: 3.00   # Within CA's limit of 3.22
    tax_units:

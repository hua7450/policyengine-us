- name: Case 13, foster care child does not make sibling eligible.
  period: 2024
  input:
    people:
      person1:
        was_in_foster_care: true
        ssi: 0
      person2:
        was_in_foster_care: false
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
        tanf: 0
        snap: 0
    households:
      household:
        members: [person1, person2]
        is_homeless: false
  output:
    is_head_start_categorically_eligible: [true, false]

- name: Case 14, toggle true with foster care child does not make sibling eligible.
  period: 2024
  input:
    people:
      person1:
        head_start_use_reported_programs: true
        was_in_foster_care: true
      person2:
        head_start_use_reported_programs: true
        was_in_foster_care: false
    spm_units:
      spm_unit:
        members: [person1, person2]
        receives_snap: false
    households:
      household:
        members: [person1, person2]
        is_homeless: false
  output:
    is_head_start_categorically_eligible: [true, false]

- name: Case 15, parent SSI makes child eligible via family aggregation.
  period: 2024
  input:
    people:
      person1:
        ssi: 10_000
      person2:
        ssi: 0
        was_in_foster_care: false
    spm_units:
      spm_unit:
        members: [person1, person2]
        tanf: 0
        snap: 0
    households:
      household:
        members: [person1, person2]
        is_homeless: false
  output:
    # Parent's SSI aggregated at spm_unit, both members eligible
    is_head_start_categorically_eligible: [true, true]

- name: Case 16, toggle false preserves existing behavior with computed snap positive.
  period: 2024
  input:
    head_start_use_reported_programs: false
    snap: 200
    is_homeless: false
    was_in_foster_care: false
  output:
    is_head_start_categorically_eligible: true

- name: Case 17, TX household at 140% FPL eligible via computed snap.
  period: 2024
  input:
    people:
      person1:
        age: 30
        employment_income: 28_616
      person2:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # 140% FPL for 2-person household in 2024
    # Computed SNAP > 0 at this income, making family categorically eligible
    is_head_start_categorically_eligible: [true, true]

- name: Case 18, TX household at 140% FPL not eligible with toggle true and no reported programs.
  period: 2024
  input:
    people:
      person1:
        age: 30
        employment_income: 28_616
        head_start_use_reported_programs: true
      person2:
        age: 4
        head_start_use_reported_programs: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        receives_snap: false
    households:
      household:
        members: [person1, person2]
        state_code: TX
        is_homeless: false
  output:
    # Same household, but toggle=true and not actually receiving SNAP
    # Computed SNAP is ignored, family is NOT categorically eligible
    is_head_start_categorically_eligible: [false, false]
    # Age 30 fails age check, age 4 passes but fails both income and categorical
    is_head_start_eligible: [false, false]

- name: Case 1, California uses the national parent Medicaid income limit table.
  period: 2026
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    medicaid_parent_income_limit: 1.14
  absolute_error_margin: 0.0001


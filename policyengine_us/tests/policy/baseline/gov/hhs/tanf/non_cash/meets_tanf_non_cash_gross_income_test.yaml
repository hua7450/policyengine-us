- name: NC full-count alien income flips the BBCE gross screen where the prorated income would pass
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 48_000
        employment_income_before_lsr: 48_000
        immigration_status: UNDOCUMENTED
      person2:
        age: 33
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NC
  output:
    # North Carolina fully counts the alien's income under gross screens
    # (7 CFR 273.11(c)(3)(i)) while prorating it on the net side. The
    # full $4,000 monthly income exceeds NC's 200% FPL BBCE limit for the
    # 2-person unit, though the prorated $2,666.67 would have passed.
    snap_gross_income: 2_666.67
    snap_gross_test_income: 4_000
    meets_tanf_non_cash_gross_income_test: false

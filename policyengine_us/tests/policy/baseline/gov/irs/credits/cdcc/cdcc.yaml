- name: Two parents, three children with $8k childcare expenses
  absolute_error_margin: 0.01
  period: 2018
  input:
    people:
      person1:
        age: 38
        employment_income: 172_000
        social_security: 47000
      person2:
        age: 32
        employment_income: 114_000
      person3:
        age: 12
      person4:
        age: 12
      person5:
        age: 17
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5]
        tax_unit_childcare_expenses: 8_000
        cdcc_credit_limit: 10_000
  output:
    cdcc: 1_200

- name: Potential credit capped at limit
  period: 2018
  input:
    cdcc_credit_limit: 0
    cdcc_potential: 1_000
  output:
    cdcc: 0

# IRC 21(e)(2): a married taxpayer may only claim the credit on a joint
# return. The exclusion applies in cdcc_potential, so the pre-liability-cap
# amount is zero as well.
- name: Married filing separately with a qualifying child but not separated gets zero
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
        is_tax_unit_head: true
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 3_000
  output:
    cdcc_filing_status_eligible: false
    cdcc_potential: 0
    cdcc: 0

# The 2021 ARPA refundability did not lift the 21(e)(2) joint-return
# requirement.
- name: Married filing separately gets no credit in the refundable year
  absolute_error_margin: 0.01
  period: 2021
  input:
    people:
      person1:
        age: 35
        employment_income: 40_000
        is_tax_unit_head: true
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 3_000
  output:
    cdcc_potential: 0
    cdcc: 0

- name: Head of household receives the credit
  period: 2024
  input:
    cdcc_credit_limit: 1_000
    cdcc_potential: 1_000
    filing_status: HEAD_OF_HOUSEHOLD
  output:
    cdcc: 1_000

# IRC 21(e)(4): a separated taxpayer who maintains a home for a qualifying
# individual is treated as unmarried, so 21(e)(2)'s joint-return requirement
# does not exclude them. Unlike the general "considered unmarried" test for
# head-of-household (7703(b), qualifying child only), 21(e)(4) uses 21(b)(1)'s
# own broader qualifying-individual definition, which also covers a disabled
# dependent who is not a qualifying child.
- name: Married filing separately maintaining a home for a qualifying child keeps the credit
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        is_tax_unit_head: true
        is_separated: true
        employment_income: 50_000
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 3_000
        cdcc_rate: 0.2
        cdcc_credit_limit: 1_000
  output:
    cdcc_filing_status_eligible: true
    # min($3,000 childcare, $3,000 one-individual cap, $50,000 earnings) x 20%
    cdcc_potential: 600
    cdcc: 600

- name: Married filing separately caring for a disabled adult dependent keeps the credit
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        is_tax_unit_head: true
        is_separated: true
        employment_income: 50_000
      person2:
        age: 70
        is_incapable_of_self_care: true
        care_expenses: 3_000
        is_tax_unit_head: false
        is_tax_unit_spouse: false
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: SEPARATE
        cdcc_rate: 0.2
        cdcc_credit_limit: 1_000
  output:
    cdcc_filing_status_eligible: true
    cdcc_potential: 600
    cdcc: 600

# IRC section 21(c) / Form 2441 Part III: employer-provided dependent care
# benefits excluded under section 129 reduce the CDCC dollar limit, preventing
# a credit on the same dollars already excluded from income (issue #8737).
- name: Section 129 employer benefits reduce the CDCC (no double-dipping)
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      parent1:
        age: 40
        employment_income: 80_000
        dependent_care_employer_benefits: 5_000
      parent2:
        age: 38
        employment_income: 60_000
      child1:
        age: 5
      child2:
        age: 7
    tax_units:
      tax_unit:
        members: [parent1, parent2, child1, child2]
        filing_status: JOINT
        tax_unit_childcare_expenses: 6_000
  output:
    # Form 2441 Part III: $5,000 excluded under section 129.
    dependent_care_assistance_exclusion: 5_000
    # Section 21(c): $6,000 two-child limit reduced by $5,000 exclusion.
    cdcc_limit: 1_000
    cdcc_relevant_expenses: 1_000
    # $1,000 x 20% applicable percentage.
    cdcc: 200

- name: Section 129 benefits at the cap fully eliminate a one-child CDCC
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      parent1:
        age: 40
        employment_income: 80_000
        dependent_care_employer_benefits: 5_000
      child1:
        age: 5
    tax_units:
      tax_unit:
        members: [parent1, child1]
        filing_status: HEAD_OF_HOUSEHOLD
        tax_unit_childcare_expenses: 6_000
  output:
    dependent_care_assistance_exclusion: 5_000
    # max($3,000 one-child limit - $5,000 exclusion, 0) = $0.
    cdcc_limit: 0
    cdcc_relevant_expenses: 0
    cdcc: 0

- name: Without section 129 benefits the CDCC is unchanged
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      parent1:
        age: 40
        employment_income: 80_000
      parent2:
        age: 38
        employment_income: 60_000
      child1:
        age: 5
      child2:
        age: 7
    tax_units:
      tax_unit:
        members: [parent1, parent2, child1, child2]
        filing_status: JOINT
        tax_unit_childcare_expenses: 6_000
  output:
    dependent_care_assistance_exclusion: 0
    cdcc_limit: 6_000
    cdcc_relevant_expenses: 6_000
    # $6,000 x 20% = $1,200.
    cdcc: 1_200

# Tests for SSN identification requirements in Recovery Rebate Credits
# References:
# - 26 USC 6428(g) - CARES
# - 26 USC 6428A(d) - CAA
# - 26 USC 6428B(e)(2) - ARPA

# =============================================================================
# ARPA (2021) - Single Filer Tests
# =============================================================================

- name: ARPA - Single filer with SSN gets full credit
  period: 2021
  input:
    people:
      person:
        age: 30
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person]
  output:
    rrc_arpa: 1_400

- name: ARPA - Single filer without SSN (ITIN) gets no credit
  period: 2021
  input:
    people:
      person:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [person]
  output:
    rrc_arpa: 0

- name: ARPA - Single filer with no identification gets no credit
  period: 2021
  input:
    people:
      person:
        age: 30
        ssn_card_type: NONE
    tax_units:
      tax_unit:
        members: [person]
  output:
    rrc_arpa: 0

# =============================================================================
# ARPA (2021) - Joint Filer Tests
# =============================================================================

- name: ARPA - Joint filers both with SSN get full credit
  period: 2021
  input:
    people:
      spouse1:
        age: 30
        ssn_card_type: CITIZEN
      spouse2:
        age: 30
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [spouse1, spouse2]
        filing_status: JOINT
  output:
    rrc_arpa: 2_800

- name: ARPA - Joint filers with one SSN get half credit
  period: 2021
  input:
    people:
      spouse1:
        age: 30
        ssn_card_type: CITIZEN
      spouse2:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [spouse1, spouse2]
        filing_status: JOINT
  output:
    rrc_arpa: 1_400

- name: ARPA - Joint filers neither with SSN get no credit
  period: 2021
  input:
    people:
      spouse1:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
      spouse2:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [spouse1, spouse2]
        filing_status: JOINT
  output:
    rrc_arpa: 0

# =============================================================================
# ARPA (2021) - Armed Forces Exception Tests
# =============================================================================

- name: ARPA - Armed Forces exception allows full credit with one SSN
  period: 2021
  input:
    people:
      military_spouse:
        age: 30
        ssn_card_type: CITIZEN
        is_military: true
      civilian_spouse:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [military_spouse, civilian_spouse]
        filing_status: JOINT
  output:
    rrc_arpa: 2_800

- name: ARPA - Armed Forces exception applies when military and SSN are different spouses
  period: 2021
  input:
    people:
      military_spouse:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
        is_military: true
      civilian_spouse:
        age: 30
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [military_spouse, civilian_spouse]
        filing_status: JOINT
  output:
    # Armed Forces exception: at least 1 spouse is military AND at least 1 spouse has SSN
    # These can be different people per 26 USC 6428B(e)(2)(E)
    rrc_arpa: 2_800

- name: ARPA - Armed Forces exception does not apply when no spouse has SSN
  period: 2021
  input:
    people:
      military_spouse:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
        is_military: true
      civilian_spouse:
        age: 30
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [military_spouse, civilian_spouse]
        filing_status: JOINT
  output:
    # Military spouse exists but no spouse has SSN - exception does not apply
    rrc_arpa: 0

# =============================================================================
# ARPA (2021) - Dependent SSN Tests
# =============================================================================

- name: ARPA - Dependents with SSN are counted
  period: 2021
  input:
    people:
      parent:
        age: 30
        ssn_card_type: CITIZEN
      child1:
        age: 10
        ssn_card_type: CITIZEN
      child2:
        age: 8
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
  output:
    rrc_arpa: 4_200  # 1*1400 + 2*1400

- name: ARPA - Dependents without SSN are not counted
  period: 2021
  input:
    people:
      parent:
        age: 30
        ssn_card_type: CITIZEN
      child1:
        age: 10
        ssn_card_type: OTHER_NON_CITIZEN
      child2:
        age: 8
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child1, child2]
  output:
    rrc_arpa: 1_400  # Only parent, no children counted

- name: ARPA - Mixed SSN status among dependents
  period: 2021
  input:
    people:
      parent:
        age: 30
        ssn_card_type: CITIZEN
      child_with_ssn:
        age: 10
        ssn_card_type: CITIZEN
      child_without_ssn:
        age: 8
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child_with_ssn, child_without_ssn]
  output:
    rrc_arpa: 2_800  # 1*1400 + 1*1400 (only child with SSN)


- name: Test with two structural reforms, tips, overtime and the SD are added
  period: 2025
  input:
    people: 
      person1:
        age: 65
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
        tip_income: 1_000
        treasury_tipped_occupation_code: 102
        fsla_overtime_premium: 2_000
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 90_000
        salt_deduction: 0
        standard_deduction: 0
  output:
    additional_senior_deduction: 5_100
    overtime_income_deduction: 2_000
    tip_income_deduction: 1_000
    taxable_income_deductions_if_itemizing: 8_100
    taxable_income_deductions_if_not_itemizing: 8_100

- name: Issue 8110 - per-senior phase-out at AGI $246,188
  period: 2025
  input:
    people:
      person1:
        age: 65
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
      person2:
        age: 65
        is_tax_unit_head_or_spouse: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
        filing_status: JOINT
        adjusted_gross_income: 246_188
        salt_deduction: 0
        standard_deduction: 0
  output:
    # Excess MAGI: $246,188 - $150,000 = $96,188
    # Phase-out: 6% * $96,188 = $5,771.28
    # Per senior: max($6,000 - $5,771.28, 0) = $228.72
    # Total: $228.72 * 2 = $457.44
    additional_senior_deduction: 457.44


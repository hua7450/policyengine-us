- name: Case 4, Status A with PMV shelter support.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_receives_outside_shelter_support: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    ssi_amount_if_eligible: 967
    # PMV gross = (1/3 x 967) + 20 = 342.33/month
    ssi_pmv_amount: 342.33
    ssi_in_kind_support_and_maintenance: 342.33
    # After $20 general exclusion: 342.33 - 20 = 322.33 countable
    # Per POMS SI 00835.901: net countable ISM = 1/3 FBR = 322.33
    ssi_countable_income: 322.33
    # uncapped = 967 - 322.33 = 644.67 (same as VTR)
    uncapped_ssi: 644.67
    ssi: 644.67

- name: Case 5, B should not apply when PMV should apply instead.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        # In another's household with shelter but NOT all meals
        ssi_lives_in_another_persons_household: true
        ssi_receives_shelter_from_others_in_household: true
        ssi_others_pay_all_meals: false
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    # Not B (meals condition fails), so A with PMV
    ssi_federal_living_arrangement: A
    ssi_amount_if_eligible: 967
    ssi_pmv_applies: true
    # PMV gross = 342.33, after $20 exclusion: 322.33 countable
    ssi_in_kind_support_and_maintenance: 342.33
    ssi_countable_income: 322.33
    uncapped_ssi: 644.67
    ssi: 644.67

- name: Case 6, neither B nor PMV applies.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        # In another's household but no shelter and no meals
        ssi_lives_in_another_persons_household: true
        ssi_receives_shelter_from_others_in_household: false
        ssi_others_pay_all_meals: false
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    ssi_amount_if_eligible: 967
    ssi_pmv_applies: false
    ssi_in_kind_support_and_maintenance: 0
    ssi_countable_income: 0
    uncapped_ssi: 967
    ssi: 967

- name: Case 7, Status C child with parental deeming.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 36_000
      person2:
        age: 10
        is_disabled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
  output:
    ssi_federal_living_arrangement: [A, C]
    # Child gets individual FBR (967/month)
    ssi_amount_if_eligible: [967, 967]
    # Child ISM = 0 (deeming replaces ISM for Status C)
    ssi_in_kind_support_and_maintenance: [0, 0]

- name: Case 8, PMV rebuttal with actual shelter value below PMV.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_receives_outside_shelter_support: true
        # Actual annual shelter value $1,200 ($100/month electric bill)
        ssi_shelter_support_value: 1_200
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    ssi_pmv_applies: true
    # PMV annual = 342.33 * 12 = 4,108
    # Actual = 1,200 < PMV → use actual
    # ISM monthly = 1,200 / 12 = 100
    ssi_in_kind_support_and_maintenance: 100
    # Countable = (100 - 20) = 80 (after $20 general exclusion)
    ssi_countable_income: 80
    # uncapped = 967 - 80 = 887
    uncapped_ssi: 887
    ssi: 887

- name: Case 9, food-only support before 9/30/2024 triggers PMV.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_receives_food_from_others: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    # food_counts = true in 2024-01 → PMV applies
    ssi_pmv_applies: true
    # PMV monthly = (1/3 x 943) + 20 = 334.33
    ssi_in_kind_support_and_maintenance: 334.33
    # Countable = 334.33 - 20 = 314.33
    ssi_countable_income: 314.33
    # uncapped = 943 - 314.33 = 628.67
    uncapped_ssi: 628.67
    ssi: 628.67

- name: Case 10, food-only support after 9/30/2024 does not trigger PMV.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_receives_food_from_others: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    # food_counts = false in 2025-01 → PMV does not apply
    ssi_pmv_applies: false
    ssi_in_kind_support_and_maintenance: 0
    ssi_countable_income: 0
    uncapped_ssi: 967
    ssi: 967

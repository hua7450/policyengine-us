- name: Case 1, Status A single adult with no income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: A
    ssi_amount_if_eligible: 967
    ssi_countable_income: 0
    uncapped_ssi: 967
    ssi: 967

- name: Case 2, Status B adult with one-third reduction and no income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_disabled: true
        ssi_lives_in_another_persons_household: true
        ssi_receives_shelter_from_others_in_household: true
        ssi_others_pay_all_meals: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
  output:
    ssi_federal_living_arrangement: B
    # VTR reduces FBR: 967 * (1 - 1/3) = 644.67
    ssi_amount_if_eligible: 644.67
    ssi_in_kind_support_and_maintenance: 0
    ssi_countable_income: 0
    uncapped_ssi: 644.67
    ssi: 644.67


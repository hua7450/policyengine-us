- name: Case 1, SSI-eligible person in IHC Level A.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        al_ssp_living_arrangement: IHC_LEVEL_A
        ssi_claim_is_joint: false
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    # Eligible: SSI-eligible AND qualifying arrangement (IHC_LEVEL_A != NONE)
    al_ssp_eligible: [true]
    # Benefit: Level A = $60, individual (not joint) = $60 * (1 + 0) = $60
    al_ssp: [60]

- name: Case 2, SSI-eligible couple in Foster Care with joint claim.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        is_ssi_eligible: true
        al_ssp_living_arrangement: FOSTER_CARE
        ssi_claim_is_joint: true
      person2:
        age: 65
        is_ssi_eligible: true
        al_ssp_living_arrangement: FOSTER_CARE
        ssi_claim_is_joint: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Both eligible: SSI-eligible AND qualifying arrangement
    al_ssp_eligible: [true, true]
    # Foster Care = $110, joint claim = $110 * (1 + 1) = $220 each
    al_ssp: [220, 220]

- name: Case 3, person not SSI-eligible receives zero.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: false
        al_ssp_living_arrangement: IHC_LEVEL_A
        ssi_claim_is_joint: false
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: AL
  output:
    # Not eligible: not SSI-eligible
    al_ssp_eligible: [false]
    al_ssp: [0]


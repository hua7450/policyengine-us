# Unit tests for Alabama TANF countable earned income
# Reference: Ala. Admin. Code r. 660-2-2-.30(2) (effective 05/15/2022)
# https://admincode.legislature.state.al.us/api/chapter/660-2-2
# Countable earned = max(gross_earned - work_expense - childcare, 0)
# Work expense = gross_earned * 0.30 (the first 30% of gross earnings)
# (The 12-month new-employment full disregard is not modeled; established
# employment is assumed.)

- name: Case 1, no earned income.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 0
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    al_tanf_countable_earned_income: 0

- name: Case 2, employment income only.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 12_000  # $1,000/month
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly employment income: $1,000
    # Work expense deduction: $1,000 * 0.30 = $300
    # Countable earned: $1,000 - $300 = $700
    al_tanf_countable_earned_income: 700

- name: Case 3, self-employment income only.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        self_employment_income_before_lsr: 12_000  # $1,000/month
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly self-employment income: $1,000
    # Work expense deduction: $1,000 * 0.30 = $300
    # Countable earned: $1,000 - $300 = $700
    al_tanf_countable_earned_income: 700

- name: Case 4, combined employment and self-employment.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
        self_employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly earned: $500 + $500 = $1,000
    # Work expense deduction: $1,000 * 0.30 = $300
    # Countable earned: $1,000 - $300 = $700
    al_tanf_countable_earned_income: 700

- name: Case 5, low income.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 600  # $50/month
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly employment income: $50
    # Work expense deduction: $50 * 0.30 = $15
    # Countable earned: $50 - $15 = $35
    al_tanf_countable_earned_income: 35

- name: Case 6, two earners in household.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        employment_income_before_lsr: 12_000  # $1,000/month
      person2:
        age: 32
        employment_income_before_lsr: 6_000  # $500/month
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
  output:
    # Person1: $1,000/month, Person2: $500/month
    # Total earned: $1,500
    # Work expense deduction: $1,500 * 0.30 = $450
    # Countable earned: $1,500 - $450 = $1,050
    al_tanf_countable_earned_income: 1_050

- name: Case 7, with childcare expenses.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        childcare_expenses: 3_600  # $300/month
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly employment: $500
    # Work expense deduction: $500 * 0.30 = $150
    # After work expense: $500 - $150 = $350
    # Childcare: $300/month
    # Countable earned: max($350 - $300, 0) = $50
    al_tanf_countable_earned_income: 50

- name: Case 8, childcare exceeds earnings after work expense.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 2_400  # $200/month
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        childcare_expenses: 3_600  # $300/month
    households:
      household:
        members: [person1, person2]
        state_code: AL
  output:
    # Monthly employment: $200
    # Work expense deduction: $200 * 0.30 = $60
    # After work expense: $200 - $60 = $140
    # Childcare: $300/month
    # Countable earned: max($140 - $300, 0) = max(-$160, 0) = $0
    al_tanf_countable_earned_income: 0

# ============================================================================
# Edge Case Tests
# ============================================================================

- name: Edge Case 1, two earners with childcare expenses.
  period: 2024-01
  input:
    people:
      person1:
        age: 35
        employment_income_before_lsr: 3_000  # $250/month
      person2:
        age: 32
        employment_income_before_lsr: 2_400  # $200/month
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        childcare_expenses: 2_400  # $200/month
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
  output:
    # Person1: $250/month, Person2: $200/month
    # Total gross earned: $450
    # Work expense deduction: $450 * 0.30 = $135
    # After work expense: $450 - $135 = $315
    # Childcare: $200/month
    # Countable earned: max($315 - $200, 0) = $115
    al_tanf_countable_earned_income: 115

- name: Edge Case 2, incapacitated adult care costs are deducted.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 12_000  # $1,000/month
      person2:
        age: 35
        # Describes the legal scenario (r. 660-2-2-.30(2)(c) covers an
        # incapacitated adult); the formula pools care_expenses without an
        # incapacity filter, symmetric with the childcare side.
        is_incapable_of_self_care: true
        care_expenses: 1_200  # $100/month
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: AL
  output:
    # Gross earned = $1,000/month; work expense = 30% = $300
    # Incapacitated adult care = 1,200 / 12 = $100/month (no cap)
    # Countable = 1,000 - 300 - 100 = $600
    al_tanf_countable_earned_income: 600

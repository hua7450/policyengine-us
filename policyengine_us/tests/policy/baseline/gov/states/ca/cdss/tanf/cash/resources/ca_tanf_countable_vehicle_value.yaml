- name: Case 1, zero vehicle value has no countable vehicle value.
  period: 2025
  absolute_error_margin: 0.01
  input:
    state_code: CA
    household_vehicles_value: 0
  output:
    ca_tanf_countable_vehicle_value: 0

- name: Case 2, 2023 vehicle value at the $32,045 limit is fully exempt.
  period: 2023
  absolute_error_margin: 0.01
  input:
    state_code: CA
    household_vehicles_value: 32_045
  output:
    ca_tanf_countable_vehicle_value: 0

- name: Case 3, 2023 vehicle value one dollar over the $32,045 limit counts $1.
  period: 2023
  absolute_error_margin: 0.01
  input:
    state_code: CA
    household_vehicles_value: 32_046
  output:
    ca_tanf_countable_vehicle_value: 1


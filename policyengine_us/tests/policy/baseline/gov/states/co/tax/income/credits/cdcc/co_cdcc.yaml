  period: 2021
  input:
    people:
      person1:
        is_tax_unit_head: true
        age: 41
        employment_income: 60_001
      person2:
        age: 11
    tax_units:
      tax_unit:
        members: [person1, person2]
        capped_cdcc: 1_000
    households:
      household:
        members: [person1, person2]
        state_code: CO
  output:
    co_cdcc: 0


# End-to-end with the eligibility gate COMPUTED (not supplied as input): the unit
# would only "earn" via a DEPENDENT's wages. The head is under 18 with no
# earnings/tax and the dependent (not head/spouse) has employment income. Only
# head/spouse can be qualified individuals, so the dependent's earnings do NOT
# create a filer refund: eligible count 0 -> co_sales_tax_refund 0.
- name: Dependent earnings only -> gate computed false -> no refund
  period: 2022
  input:
    people:
      head:
        age: 10
        is_tax_unit_head: true
        irs_employment_income: 0
      dependent:
        age: 16
        is_tax_unit_dependent: true
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        irs_employment_income: 8_000
    tax_units:
      tax_unit:
        members: [head, dependent]
        co_income_tax_before_non_refundable_credits: 0
        co_modified_agi: 30_000
    households:
      household:
        members: [head, dependent]
        state_code: CO
  output:
    co_sales_tax_refund_person_eligible: [false, false]
    co_sales_tax_refund_eligible: false
    co_sales_tax_refund: 0

# 2023 flat-amount year, JOINT unit with only ONE qualified filer: the head is
# eligible while the under-18, non-earning spouse with zero unit tax is not. The
# flat amount is claimed once per qualified filer, so the refund is the single
# flat amount (800), NOT double (1,600).
- name: 2023 flat-year - partially eligible joint couple -> single flat amount
  period: 2023
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        irs_employment_income: 50_000
      spouse:
        age: 16
        is_tax_unit_spouse: true
        irs_employment_income: 0
    tax_units:
      tax_unit:
        members: [head, spouse]
        co_income_tax_before_non_refundable_credits: 0
        co_modified_agi: 60_001
        filing_status: JOINT
    households:
      household:
        members: [head, spouse]
        state_code: CO
  output:
    co_sales_tax_refund_person_eligible: [true, false]
    co_sales_tax_refund: 800

# Filing-status sanity: a HEAD_OF_HOUSEHOLD filer with one eligible filer gets the
# single (1x) per-person amount. 2022 first bracket (AGI <= 48,000) -> 153.
- name: Head of household - single eligible filer -> 1x amount
  period: 2022
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        irs_employment_income: 30_000
      child:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
        co_modified_agi: 44_000
        filing_status: HEAD_OF_HOUSEHOLD
    households:
      household:
        members: [head, child]
        state_code: CO
  output:
    co_sales_tax_refund: 153

# Filing-status sanity: a SURVIVING_SPOUSE filer with one eligible filer likewise
# gets the single (1x) per-person amount (153 in the 2022 first bracket).

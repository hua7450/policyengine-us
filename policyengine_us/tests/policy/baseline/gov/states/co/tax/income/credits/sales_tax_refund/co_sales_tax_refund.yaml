- name: Issue 2922 - joint both eligible (2x per-person amount)
  period: 2022
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
      spouse:
        age: 40
        is_tax_unit_spouse: true
    tax_units:
      tax_unit:
        members: [head, spouse]
        co_modified_agi: 44_000
        co_sales_tax_refund_eligible: true
        co_income_tax_before_non_refundable_credits: 0
        filing_status: JOINT
    households:
      household:
        members: [head, spouse]
        state_code: CO
  output:
    # Both spouses qualify (age >= 18): 153 * 2 = 306.
    co_sales_tax_refund: 306


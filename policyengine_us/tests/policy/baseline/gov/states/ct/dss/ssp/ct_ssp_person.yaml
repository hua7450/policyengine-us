- name: Case 5, benefit exactly zero when countable equals need.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ct_ssp_has_therapeutic_diet: false
        # Engineer countable = need ($598.55)
        # Countable unearned = max(0, 994 - 562) = $432
        # Need countable earned = 598.55 - 432 = $166.55
        # Disregard = $65 + 0.5 * (earned - 65)
        # earned - disregard = earned - 65 - 0.5*(earned - 65) = 0.5*(earned - 65) = 166.55
        # earned - 65 = 333.10 -> earned = $398.10
        ssi: 11_928  # $994/mo
        employment_income: 4_777.20  # $398.10/mo
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Need = $598.55
    # Countable = $432 + $166.55 = $598.55
    # Benefit = max(0, 598.55 - 598.55) = $0
    ct_ssp_person: 0


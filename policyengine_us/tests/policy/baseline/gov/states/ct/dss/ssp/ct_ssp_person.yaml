- name: Case 1, need exceeds countable income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ct_ssp_has_therapeutic_diet: false
        ssi: 11_928  # $994/mo
        employment_income: 0
        rent: 12_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Need = $598.55, Countable = $432
    # Benefit = max(0, 598.55 - 432) = $166.55
    ct_ssp_person: 166.55


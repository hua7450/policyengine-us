- name: Case 8, maximum income scenario just under cap.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ssi: 11_928  # $994/mo
        ssi_unearned_income: 23_856  # $1,988/mo other unearned
        employment_income: 0
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Total unearned = $994 (SSI) + $1,988 (other) = $2,982/mo
    # Gross = $2,982 = exactly 300% FBR ($994 * 3) = at cap
    # Unearned: max(0, 2982 - 562) = $2,420
    # Countable = $2,420
    ct_ssp_countable_income: 2_420

- name: Case 1, SSI-only income in community.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ssi: 11_928  # $994/mo SSI
        employment_income: 0
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Unearned gross = $994 (SSI is counted as unearned)
    # Unearned after disregard = max(0, 994 - 562) = $432
    # Earned disregard = $0 (no earnings)
    # Countable = $432 + $0 = $432
    ct_ssp_countable_income: 432

- name: Case 2, SSI plus earnings in community.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ssi: 11_928  # $994/mo
        employment_income: 6_000  # $500/mo
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Unearned gross = $994 (SSI)
    # Unearned after disregard = max(0, 994 - 562) = $432
    # Earned disregard (aged) = $65 + 0.5 * (500 - 65) = $282.50
    # Countable earned = max(0, 500 - 282.50) = $217.50
    # Countable = $432 + $217.50 = $649.50
    ct_ssp_countable_income: 649.50

- name: Case 3, unearned income below disregard.
  period: 2026-01
  absolute_error_margin: 0.01
  input:

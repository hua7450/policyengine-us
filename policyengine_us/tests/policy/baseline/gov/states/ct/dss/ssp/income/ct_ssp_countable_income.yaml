- name: Case 6, zero unearned income with disregard exceeding it.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        ct_ssp_living_arrangement: COMMUNITY_ALONE
        ssi: 0  # No SSI
        ssi_unearned_income: 0  # No other unearned
        employment_income: 6_000  # $500/mo earned only
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # Unearned: max(0, 0 - 562) = $0 (disregard exceeds income, floored at 0)
    # Earned disregard (aged): $65 + 0.5 * (500 - 65) = $282.50
    # Countable earned: max(0, 500 - 282.50) = $217.50
    # Countable = $0 + $217.50 = $217.50
    ct_ssp_countable_income: 217.50


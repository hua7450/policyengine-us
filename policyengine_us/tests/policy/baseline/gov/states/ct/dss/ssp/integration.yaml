- name: Case 3, blind individual shared living with therapeutic diet.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        immigration_status: CITIZEN
        ssi_countable_resources: 500
        ct_ssp_lives_with_others: true
        ct_ssp_has_therapeutic_diet: true
        ssi: 11_928  # $994/mo
        employment_income: 2_400  # $200/mo
        rent: 6_000  # $500/mo -> capped at $200
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # --- Need Standard ---
    ct_ssp_shelter_allowance: 200
    # Shared: min(500, 200) = $200
    ct_ssp_personal_needs_allowance: 197.35
    ct_ssp_special_needs: 36.20
    ct_ssp_need_standard: 433.55
    # Need = $200 + $197.35 + $36.20 = $433.55

    # --- Income ---
    ct_ssp_unearned_income_disregard: 629.90
    # Shared living disregard = $629.90
    ct_ssp_earned_income_disregard: 142.50
    # Blind: $85 + 0.5 * (200 - 85) = $85 + $57.50 = $142.50
    ct_ssp_countable_income: 421.60
    # Unearned: max(0, 994 - 629.90) = $364.10
    # Earned: max(0, 200 - 142.50) = $57.50
    # Countable = $364.10 + $57.50 = $421.60

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    ct_ssp_income_eligible: true
    # Countable $421.60 <= Need $433.55, Gross $1,194 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 433.55 - 421.60) = $11.95
    ct_ssp_person: 11.95
    ct_ssp: 11.95


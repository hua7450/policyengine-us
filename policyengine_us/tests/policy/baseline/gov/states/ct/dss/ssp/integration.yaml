- name: Case 1, aged individual community alone with SSI only.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_disabled: false
        immigration_status: CITIZEN
        ssi_countable_resources: 1_000

        ct_ssp_has_therapeutic_diet: false
        ssi: 11_928  # $994/mo
        employment_income: 0
        rent: 12_000  # $1,000/mo
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    # --- Need Standard ---
    ct_ssp_shelter_allowance: 400
    # Shelter: min(1000, 400) = $400
    ct_ssp_personal_needs_allowance: 197.35
    ct_ssp_special_needs: 0
    ct_ssp_need_standard: 597.35
    # Need = $400 + $197.35 + $0 = $597.35

    # --- Income ---
    ct_ssp_unearned_income_disregard: 562
    ct_ssp_earned_income_disregard: 0
    ct_ssp_countable_income: 432
    # Unearned: max(0, 994 - 562) = $432
    # Earned: $0 (no earnings)
    # Countable = $432 + $0 = $432

    # --- Eligibility ---
    ct_ssp_resource_eligible: true
    # Resources: $1,000 <= $1,600
    ct_ssp_income_eligible: true
    # Countable $432 <= Need $597.35, Gross $994 <= Cap $2,982
    ct_ssp_eligible_person: true

    # --- Benefit ---
    # Benefit = max(0, 597.35 - 432) = $165.35
    ct_ssp_person: 165.35
    ct_ssp: 165.35


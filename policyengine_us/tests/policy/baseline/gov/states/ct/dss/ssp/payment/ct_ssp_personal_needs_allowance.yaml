- name: Case 1, community individual.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        ct_ssp_living_arrangement: COMMUNITY_ALONE
    marital_units:
      marital_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CT
  output:
    ct_ssp_personal_needs_allowance: 197.35


- name: Case 6, expenses lower than approved cost, capped at expenses minus fee.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 1_000
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Annual approved cost: 300 * 52 = 15,600
    # Capped cost: min(15,600, 10,000) = 10,000
    # Subsidy: max(10,000 - 1,000, 0) = 9,000
    ct_c4k: 9_000

- name: Case 7, zero fee, full subsidy equals capped cost.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 200
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 0
        spm_unit_pre_subsidy_childcare_expenses: 50_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Annual approved cost: 200 * 52 = 10,400
    # Capped cost: min(10,400, 50,000) = 10,400
    # Subsidy: max(10,400 - 0, 0) = 10,400
    ct_c4k: 10_400

- name: Case 1, basic eligible family, subsidy equals rate minus fee.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 228
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 900
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
        county_str: NEW_LONDON_COUNTY_CT
  output:
    # Annual approved cost: 228 * 52 = 11,856
    # Capped: min(11,856, 20,000) = 11,856
    # Subsidy: max(11,856 - 900, 0) = 10,956
    ct_c4k: 10_956


- name: Case 3, expenses less than fee, subsidy is zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        ct_c4k_eligible_child: true
        ct_c4k_payment_rate: 300
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_eligible: true
        ct_c4k_family_fee: 15_000
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Capped: min(300*52=15,600, 10,000) = 10,000
    # max(10,000 - 15,000, 0) = 0
    ct_c4k: 0


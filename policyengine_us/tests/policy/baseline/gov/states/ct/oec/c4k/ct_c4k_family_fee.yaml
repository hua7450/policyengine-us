- name: Case 7, income at exactly 20% SMI boundary, post-2025, transitions to 3%.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 19_836
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Income ratio: 19,836/99,180 = 0.2000 (exactly at 20% boundary)
    # Post-2025 bracket: 20%-40% => 3%
    # Fee = 19,836 * 0.03 = 595.08
    ct_c4k_family_fee: 595.08


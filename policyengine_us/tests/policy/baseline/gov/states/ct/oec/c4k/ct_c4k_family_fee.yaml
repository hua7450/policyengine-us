- name: Case 11, mixed earned and unearned income, fee applies.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_000
        social_security: 10_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Has earned income => fee applies
    # Countable: 10,000 + 10,000 = 20,000
    # Income ratio: 20,000/99,180 = 0.2016 (20%-40% bracket)
    # Fee = 20,000 * 0.03 = 600
    ct_c4k_family_fee: 600


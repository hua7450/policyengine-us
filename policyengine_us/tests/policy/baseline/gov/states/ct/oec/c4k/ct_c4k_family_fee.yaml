- name: Case 1, income below 20% SMI, post-2025, fee waived.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_countable_income: 15_000
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Income ratio: 15,000/99,180 = 0.1512 (< 0.20 SMI)
    # Post-2025 fee rate for <20% SMI = 0%
    ct_c4k_family_fee: 0

- name: Case 2, income 25% SMI, post-2025, 3% fee.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 25_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_countable_income: 25_000
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Income ratio: 25,000/99,180 = 0.2520 (20%-40% SMI bracket)
    # Post-2025 fee rate = 3%
    # Fee = 25,000 * 0.03 = 750
    ct_c4k_family_fee: 750


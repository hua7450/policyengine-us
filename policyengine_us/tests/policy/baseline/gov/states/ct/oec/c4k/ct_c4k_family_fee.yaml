- name: Case 13, zero SMI, fee is zero.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        hhs_smi: 0
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # Division by zero protection: smi_ratio = 0 when smi = 0
    # Fee rate for 0 ratio = 0% (first bracket)
    # Fee = 30,000 * 0 = 0
    ct_c4k_family_fee: 0

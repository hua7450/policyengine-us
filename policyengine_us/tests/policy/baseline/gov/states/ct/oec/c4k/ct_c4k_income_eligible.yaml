- name: Case 5, new applicant, income at boundary of 60% SMI.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_enrolled_in_ccdf: false
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ct_c4k_countable_income: 73_509
        hhs_smi: 122_516
    households:
      household:
        members: [person1, person2, person3]
        state_code: CT
  output:
    # Family of 3: 100% SMI = 122,516; 60% = 73,509.60
    # 73,509 < 73,509.60 => eligible (just below)
    ct_c4k_income_eligible: true


- name: Case 1, new applicant, income below 60% SMI, eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_enrolled_in_ccdf: false
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ct_c4k_countable_income: 50_000
        hhs_smi: 99_180
    households:
      household:
        members: [person1, person2]
        state_code: CT
  output:
    # 60% of 99,180 = 59,508; 50,000 < 59,508 => eligible
    ct_c4k_income_eligible: true


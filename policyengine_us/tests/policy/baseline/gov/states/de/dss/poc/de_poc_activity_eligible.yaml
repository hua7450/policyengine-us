# de_poc_activity_eligible: SPMUnit, bool, MONTH
# At least one parent/caretaker must be in an approved activity:
#   employment (employment_income > 0) OR full-time student
# DE does not specify minimum work hours - any employment qualifies

- name: Case 1, employed parent is activity eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_activity_eligible: true

- name: Case 2, full-time student parent is activity eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 25
        is_full_time_student: true
      person2:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_activity_eligible: true

- name: Case 3, unemployed non-student parent is not activity eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 0
        is_full_time_student: false
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_activity_eligible: false

- name: Case 4, two-parent family where one parent works.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
        is_full_time_student: false
      person2:
        age: 33
        employment_income: 0
        is_full_time_student: false
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: DE
  output:
    # At least one parent has employment_income > 0
    de_poc_activity_eligible: true

- name: Case 5, self-employed parent counts as activity eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        self_employment_income: 18_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_activity_eligible: true

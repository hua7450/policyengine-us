# de_poc_age_group: Person, Enum, MONTH
# Maps child age and hours to age group for rate lookup:
#   age < 1 -> INFANT
#   age < 2 -> TODDLER
#   age < 6 -> PRESCHOOL
#   age >= 6, hours/day >= 4 -> SCHOOL_AGE_FULL_TIME
#   age >= 6, hours/day < 4 -> SCHOOL_AGE_PART_TIME

- name: Case 1, infant age 0.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        childcare_hours_per_day: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: DE
  output:
    de_poc_age_group: [SCHOOL_AGE_PART_TIME, INFANT]

- name: Case 2, toddler age 1.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        childcare_hours_per_day: 8
    spm_units:

# Florida TCA Integration Tests
# Comprehensive end-to-end tests for Temporary Cash Assistance program
# Sources: Florida Statutes 414.095, FAC 65A-4

# 2024 FPL values (Contiguous US):
# 1 person: $15,060/year = $1,255/month; 185% = $2,321.75/month
# 2 people: $20,440/year; 185% = $3,151.17/month
# 3 people: $25,820/year; 185% = $3,980.58/month

# Payment Standard Table (>$50 shelter tier):
# Size 2: $241, Size 3: $303, Size 4: $364

- name: Case 1, single parent with one child, zero income, full benefit.
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 0
        pre_subsidy_rent: 12_000  # $1,000/month (>$50 shelter tier)
      person2:
        age: 10
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    # Income calculations
    fl_tca_countable_earned_income: 0
    # No earned income
    fl_tca_countable_income: 0
    # Total: 0 + 0 = 0

    # Eligibility tests
    fl_tca_gross_income_eligible: true
    # Adjusted gross: 0 < 185% FPL ($3,151) -> Pass
    fl_tca_net_income_eligible: true
    # Countable: 0 < payment standard ($241) -> Pass
    fl_tca_eligible: true

    # Benefit calculation
    fl_tca_payment_standard: 241
    # Size 2, >$50 shelter
    fl_tca: 241
    # Benefit: 241 - 0 = $241

- name: Case 2, single parent with earnings and child ineligible (disregard denied).
  period: 2024-01
  input:
    people:
      person1:
        age: 30
        employment_income_before_lsr: 6_000  # $500/month
        pre_subsidy_rent: 12_000
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: FL
  output:
    # Income calculations
    fl_tca_countable_earned_income: 410
    # Earned $500/month. Income after the $90 disregard = $410 >= payment
    # standard $241, so the $200 and 1/2 disregard is denied (2420.0315); only
    # the $90 is deducted.
    fl_tca_countable_income: 410

    # Eligibility tests
    fl_tca_gross_income_eligible: true
    # Gross: $500 < $3,151 -> Pass
    fl_tca_net_income_eligible: false
    # Countable: 410 > 241 -> Fail
    fl_tca_eligible: false

    # Benefit calculation
    fl_tca_payment_standard: 241
    fl_tca: 0
    # Over-income for TCA (income after $90 exceeds the payment standard).


# GA CAPS family fee (co-payment)
# Tiers by FPL ratio:
#   <= 10% FPL: 0% (no fee)
#   > 10% to 50% FPL: 3% of income
#   > 50% to 100% FPL: 5% of income
#   > 100% FPL: 7% of income
# Weekly fee = floor(annual_income * rate / 52)
# Monthly fee = weekly_fee * 52 / 12
# Fee waived for minor parents (age <= 17)
#
# 2026 FPG family of 3: 15,960 + 5,680 * 2 = $27,320
# 2026 FPG family of 2: 15,960 + 5,680 = $21,640

- name: Case 1, income over 100 percent FPL pays 7 percent.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # FPL ratio = 30,000 / 27,320 = 1.098 -> 7% rate
    # weekly fee = floor(30,000 * 0.07 / 52) = floor(40.38) = $40
    # monthly fee = 40 * 52 / 12 = $173.33
    ga_caps_family_fee: 173.33

- name: Case 2, income at or below 10 percent FPL pays zero.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 2_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # FPL ratio = 2,000 / 27,320 = 0.0732 -> 0% rate
    # fee = 0
    ga_caps_family_fee: 0

- name: Case 3, income in 3 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 10_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # FPL ratio = 10,000 / 27,320 = 0.3660 -> 3% rate
    # weekly fee = floor(10,000 * 0.03 / 52) = floor(5.77) = $5
    # monthly fee = 5 * 52 / 12 = $21.67
    ga_caps_family_fee: 21.67

- name: Case 4, income in 5 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # FPL ratio = 20,000 / 27,320 = 0.7320 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33

- name: Case 5, zero income family has zero fee.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # $0 income -> FPL ratio = 0 -> 0% rate -> $0 fee
    ga_caps_family_fee: 0

- name: Case 6, minor parent fee waiver.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 17
        employment_income: 30_000
        is_tax_unit_head: true
      person2:
        age: 1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # Parent age 17 <= 17 -> minor parent fee waiver -> $0
    ga_caps_family_fee: 0

- name: Case 7, income exactly at 10 percent FPL boundary.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 2_732
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # FPL ratio = 2,732 / 27,320 = 0.10 -> 0% rate (at or below 10%)
    # fee = 0
    ga_caps_family_fee: 0

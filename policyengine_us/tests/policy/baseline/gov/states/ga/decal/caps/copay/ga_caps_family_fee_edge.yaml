# GA CAPS family fee - edge cases
# Tiers by FPL ratio:
#   <= 10% FPL: 0% (no fee)
#   > 10% to 50% FPL: 3% of income
#   > 50% to 100% FPL: 5% of income
#   > 100% FPL: 7% of income
# Weekly fee = floor(annual_income * rate / 52)
# Monthly fee = weekly_fee * 52 / 12
# Fee waived for minor parents (age <= 17)
#
# 2026 FPG family of 2: $21,640
# 2026 FPG family of 3: $27,320

- name: Case 1, FPL ratio just above 10 percent boundary.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 10% of FPG for family of 2 = 21,640 * 0.10 = $2,164
        # Just above: $2,165
        employment_income: 2_165
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 2,165 / 21,640 = 0.10005 -> > 0.1001? No, 0.10005 < 0.1001
    # Still in 0% tier
    ga_caps_family_fee: 0

- name: Case 2, FPL ratio just crossing into 3 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Threshold is 0.1001 of FPG
        # 0.1001 * 21,640 = $2,166.16. So income $2,167 crosses.
        employment_income: 2_167
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 2,167 / 21,640 = 0.10014 -> >= 0.1001 -> 3% rate
    # weekly fee = floor(2,167 * 0.03 / 52) = floor(1.25) = $1
    # monthly fee = 1 * 52 / 12 = $4.33
    ga_caps_family_fee: 4.33

- name: Case 3, FPL ratio exactly at 50 percent boundary.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 50% of FPG for family of 2 = 21,640 * 0.50 = $10,820
        employment_income: 10_820
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 10,820 / 21,640 = 0.5000 -> < 0.5001 -> 3% rate
    # weekly fee = floor(10,820 * 0.03 / 52) = floor(6.24) = $6
    # monthly fee = 6 * 52 / 12 = $26.00
    ga_caps_family_fee: 26.00

- name: Case 4, FPL ratio just crossing into 5 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 0.5001 * 21,640 = $10,822.16. So income $10,823 crosses.
        employment_income: 10_823
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 10,823 / 21,640 = 0.50014 -> >= 0.5001 -> 5% rate
    # weekly fee = floor(10,823 * 0.05 / 52) = floor(10.41) = $10
    # monthly fee = 10 * 52 / 12 = $43.33
    ga_caps_family_fee: 43.33

- name: Case 5, FPL ratio exactly at 100 percent boundary.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 100% of FPG for family of 2 = $21,640
        employment_income: 21_640
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 21,640 / 21,640 = 1.0000 -> < 1.0001 -> 5% rate
    # weekly fee = floor(21,640 * 0.05 / 52) = floor(20.81) = $20
    # monthly fee = 20 * 52 / 12 = $86.67
    ga_caps_family_fee: 86.67

- name: Case 6, FPL ratio just crossing into 7 percent tier.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 1.0001 * 21,640 = $21,642.16. So income $21,643 crosses.
        employment_income: 21_643
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # FPL ratio = 21,643 / 21,640 = 1.00014 -> >= 1.0001 -> 7% rate
    # weekly fee = floor(21,643 * 0.07 / 52) = floor(29.12) = $29
    # monthly fee = 29 * 52 / 12 = $125.67
    ga_caps_family_fee: 125.67

- name: Case 7, minor parent age 18 does not get fee waiver.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 18
        employment_income: 30_000
      person2:
        age: 1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # Parent age 18 > 17 -> no fee waiver
    # FPG family of 2: $21,640
    # FPL ratio = 30,000 / 21,640 = 1.387 -> 7% rate
    # weekly fee = floor(30,000 * 0.07 / 52) = floor(40.38) = $40
    # monthly fee = 40 * 52 / 12 = $173.33
    ga_caps_family_fee: 173.33

- name: Case 8, larger family of 5 with lower FPG threshold.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
      person2:
        age: 30
      person3:
        age: 10
      person4:
        age: 7
      person5:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: GA
  output:
    # FPG family of 5: 15,960 + 5,680 * 4 = $38,680
    # FPL ratio = 20,000 / 38,680 = 0.5171 -> >= 0.5001 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33

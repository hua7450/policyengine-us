# GA CAPS activity eligibility - edge cases
# Parent must average 24 hours/week in approved activities
# (employment or full-time student)
# Existing tests cover: 24, 23, student, two-parent both pass/one fail

- name: Case 1, single parent working exactly 25 hours just above threshold.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 25
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # 25 >= 24 -> eligible
    ga_caps_activity_eligible: true

- name: Case 2, single parent working zero hours and not a student.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 0
        is_full_time_student: false
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # 0 < 24 and not a student -> ineligible
    ga_caps_activity_eligible: false

- name: Case 3, two parents both full-time students.
  period: 2026-01
  input:
    people:
      person1:
        age: 22
        weekly_hours_worked: 0
        is_full_time_student: true
      person2:
        age: 21
        weekly_hours_worked: 0
        is_full_time_student: true
      person3:
        age: 2
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # Both are students -> both individually eligible
    ga_caps_activity_eligible: true

- name: Case 4, two parents both below 24 hours and not students.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 20
        is_full_time_student: false
      person2:
        age: 28
        weekly_hours_worked: 15
        is_full_time_student: false
      person3:
        age: 4
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # Both below 24 hrs and not students -> ineligible
    ga_caps_activity_eligible: false

- name: Case 5, single parent working 40 hours per week.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 40
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # 40 >= 24 -> eligible
    ga_caps_activity_eligible: true

- name: Case 6, child hours do not matter for activity requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 24
      person2:
        age: 10
        weekly_hours_worked: 0
        is_full_time_student: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # Only heads/spouses checked; child's hours irrelevant
    ga_caps_activity_eligible: true

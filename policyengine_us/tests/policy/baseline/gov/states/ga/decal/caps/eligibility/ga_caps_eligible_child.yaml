- name: Case 7, undocumented child ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        immigration_status: UNDOCUMENTED
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_eligible_child: [false, false]

- name: Case 8, adult is never an eligible child.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    ga_caps_eligible_child: [false]

# GA CAPS child eligibility
# Standard: age < 13 (12 or younger)
# Disabled: age <= 17
# Must be immigration eligible (CCDF)

- name: Case 1, child under 13 who is a citizen.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_caps_eligible_child: [false, true]

- name: Case 2, child age 12 is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 12
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # age 12 < 13 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 3, child age 13 ineligible without disability.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 13
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # age 13 not < 13 -> ineligible
    ga_caps_eligible_child: [false, false]

- name: Case 4, disabled child age 15 eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 15
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # disabled, age 15 <= 17 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 5, disabled child age 17 eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 17
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # disabled, age 17 <= 17 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 6, disabled child age 18 ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 45
      person2:
        age: 18
        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:

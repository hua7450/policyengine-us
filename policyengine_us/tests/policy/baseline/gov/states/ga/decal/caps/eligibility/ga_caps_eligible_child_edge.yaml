- name: Case 5, disabled child age 13 eligible with disability.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13

        is_disabled: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # disabled, age 13 <= 17 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 6, non-disabled child age 13 ineligible contrasted with disabled.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 13

        is_disabled: false
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # not disabled, age 13 >= 13 -> ineligible
    ga_caps_eligible_child: [false, false]

- name: Case 7, two children one eligible and one over age limit.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 10

        immigration_status: CITIZEN
      person3:
        age: 14

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
  output:
    # person2: age 10 < 13 -> eligible
    # person3: age 14 >= 13, not disabled -> ineligible
    ga_caps_eligible_child: [false, true, false]

- name: Case 8, legal permanent resident child is eligible.
  period: 2026-01

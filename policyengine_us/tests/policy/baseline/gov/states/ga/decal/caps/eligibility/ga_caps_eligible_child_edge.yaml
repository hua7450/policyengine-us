# GA CAPS eligible child - edge cases
# Standard: age < 13 (12 or younger)
# Disabled: age <= 17
# Tests focus on age boundaries not already covered in ga_caps_eligible_child.yaml

- name: Case 1, infant age 0 is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 25
      person2:
        age: 0

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # age 0 < 13 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 2, toddler age 1 is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 25
      person2:
        age: 1

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    # age 1 < 13 -> eligible
    ga_caps_eligible_child: [false, true]

- name: Case 3, preschool age 3 at boundary.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA

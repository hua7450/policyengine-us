- name: Case 4, school-age 6 at boundary.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 6

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA

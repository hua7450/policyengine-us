        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible: true
    # Same income/fee as Case 2
    ga_caps_family_fee: 82.33
    # base_max_monthly = 221 * 52 / 12 = $957.67
    # base_subsidy = min(max(10,000 - 988, 0), 957.67 * 12) / 12
    #             = min(9,012, 11,492) / 12 = $751.00
    # quality_enhanced_weekly = 221 * 1.05 = $232.05
    # quality_max_monthly = 232.05 * 52 / 12 = $1,005.55
    # quality_bonus = 1,005.55 - 957.67 = $47.88
    # total = 751.00 + 47.88 = $798.88
    ga_caps: 798.88


- name: Case 5, expenses capped at max rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 5_000
        immigration_status: CITIZEN
      person2:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        # Very high expenses, well above max rate
        spm_unit_pre_subsidy_childcare_expenses: 25_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible: true
    # FPL ratio = 5,000 / 21,640 = 0.231 -> 3% rate
    # weekly fee = floor(5,000 * 0.03 / 52) = floor(2.88) = $2
    # monthly fee = 2 * 52 / 12 = $8.67
    ga_caps_family_fee: 8.67
    # base_max annual = 221 * 52 = $11,492
    # annual fee = 2 * 52 = $104
    # uncapped = max(25,000 - 104, 0) = $24,896
    # base_subsidy = min(24,896, 11,492) = $11,492 (capped at max)
    # monthly = 11,492 / 12 = $957.67
    ga_caps: 957.67

- name: Case 6, minor parent with zero fee and quality bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 17
        employment_income: 15_000
        immigration_status: CITIZEN
        is_tax_unit_head: true
      person2:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: THREE_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible: true
    # Minor parent -> $0 fee
    ga_caps_family_fee: 0
    # Zone 1, Center, Infant, FT = $260/week
    # base_max annual = 260 * 52 = $13,520
    # uncapped = max(10,000 - 0, 0) = $10,000
    # base_subsidy = min(10,000, 13,520) = $10,000
    # base_max_monthly = 260 * 52 / 12 = $1,126.67
    # quality_enhanced_weekly = 260 * 1.10 = $286
    # quality_max_monthly = 286 * 52 / 12 = $1,239.33
    # quality_bonus = 1,239.33 - 1,126.67 = $112.67
    # monthly = 10,000/12 + 112.67 = $833.33 + $112.67 = $946.00
    ga_caps: 946.00

- name: Case 7, two children different age groups and care types.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 15_000
        immigration_status: CITIZEN
      person2:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: FAMILY
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
      person3:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: BEFORE_AFTER_SCHOOL
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
        county_str: CHATHAM_COUNTY_GA
  output:
    ga_caps_eligible_child: [false, true, true]
    ga_caps_eligible: true
    # Zone 2 (Chatham County)
    # Child1 (age 0, Infant): Zone 2, Family, FT = $145/week
    # Child2 (age 7, School Age): Zone 2, Center, B/A School = $68/week
    ga_caps_maximum_weekly_benefit: [0, 145, 68]
    # FPG family of 3 = $27,320
    # FPL ratio = 15,000 / 27,320 = 0.549 -> >= 0.5001 -> 5% rate
    # weekly fee = floor(15,000 * 0.05 / 52) = floor(14.42) = $14
    # monthly fee = 14 * 52 / 12 = $60.67
    ga_caps_family_fee: 60.67
    # base_max annual = (145 + 68) * 52 = 213 * 52 = $11,076
    # annual fee = 14 * 52 = $728
    # uncapped = max(12,000 - 728, 0) = $11,272
    # base_subsidy = min(11,272, 11,076) = $11,076
    # quality bonus = 0 (NONE rating)
    # monthly = 11,076 / 12 = $923.00
    ga_caps: 923.00


  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 28
        employment_income: 2_000
        immigration_status: CITIZEN
      person2:
        age: 0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: FAMILY
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 8_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    # === Eligibility ===
    ga_caps_eligible_child: [false, true]
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rate ===
    # Zone 1, Family, Infant, Full-time = $199/week
    ga_caps_zone: ZONE_1
    ga_caps_age_group: [PRESCHOOL, INFANT]
    ga_caps_maximum_weekly_benefit: [0, 199]

    # === Family fee ===
    # FPL ratio = 2,000 / 21,640 = 0.0924 -> 0% rate (<=10% FPL)
    ga_caps_family_fee: 0

    # === Benefit ===
    # max annual = 199 * 52 = $10,348
    # annual fee = $0
    # uncapped = max(8,000 - 0, 0) = $8,000
    # annual benefit = min(8,000, 10,348) = $8,000
    # monthly = 8,000 / 12 = $666.67
    ga_caps: 666.67

- name: Case 3, enrolled family at ongoing threshold with quality bonus.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 32
        employment_income: 60_000
        immigration_status: CITIZEN
      person2:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: THREE_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        ga_caps_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: CHATHAM_COUNTY_GA
  output:
    # === Eligibility ===
    ga_caps_eligible_child: [false, true]

    # enrolled: 60,000 <= 67,494.90 (85% SMI for family of 2) -> eligible
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rate ===
    # Chatham County -> Zone 2
    ga_caps_zone: ZONE_2
    # Age 2 -> TODDLER
    ga_caps_age_group: [PRESCHOOL, TODDLER]
    # Zone 2, Center, Toddler, Full-time = $160/week
    ga_caps_maximum_weekly_benefit: [0, 160]

    # === Family fee ===
    # FPG family of 2: $21,640
    # FPL ratio = 60,000 / 21,640 = 2.773 -> 7% rate
    # weekly fee = floor(60,000 * 0.07 / 52) = floor(80.77) = $80
    # monthly fee = 80 * 52 / 12 = $346.67
    ga_caps_family_fee: 346.67

    # === Benefit ===
    # Monthly expenses = 12,000 / 12 = $1,000
    # Monthly fee = $346.67
    # base_max_monthly = 160 * 52 / 12 = $693.33
    # base_subsidy = min(1,000 - 346.67, 693.33) = $653.33
    # quality_enhanced_weekly = 160 * 1.10 = $176
    # quality_max_monthly = 176 * 52 / 12 = $762.67
    # quality_bonus = 762.67 - 693.33 = $69.33
    # total = 653.33 + 69.33 = $722.67
    ga_caps: 722.67


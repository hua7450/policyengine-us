- name: Case 5, two children with different ages in Zone 3.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 0

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: TWO_STAR
      person3:
        age: 8

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: BEFORE_AFTER_SCHOOL
        ga_caps_quality_rating: TWO_STAR
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
        county_str: APPLING_COUNTY_GA
  output:
    # === Eligibility ===
    ga_caps_eligible_child: [false, true, true]

    # FPG family of 3: $27,320
    # 50% SMI family of 3 = $49,044.74
    # income 20,000 <= 49,044.74 -> eligible
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rate ===
    # Appling County -> Zone 3
    ga_caps_zone: ZONE_3
    # child1: age 0 -> INFANT, Zone 3 Center FT = $130/week
    # child2: age 8 -> SCHOOL_AGE, Zone 3 Center B/A School = $53/week
    ga_caps_age_group: [PRESCHOOL, INFANT, SCHOOL_AGE]
    ga_caps_maximum_weekly_benefit: [0, 130, 53]

    # === Family fee ===
    # FPL ratio = 20,000 / 27,320 = 0.732 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33

    # === Benefit ===
    # base_max_monthly = (130 + 53) * 52 / 12 = 183 * 52 / 12 = $793.00
    # pre_subsidy_monthly = 10,000 / 12 = $833.33
    # base_payment = min(833.33, 793.00) = $793.00
    # net_base = max(793.00 - 82.33, 0) = $710.67
    # effective_bonus = (130*0.05 + 53*0.05) / 183 = 9.15 / 183 = 0.05
    # subsidy = 710.67 * 1.05 = $746.20
    ga_caps: 746.20

- name: Case 6, disabled teenager with family care in Zone 2.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        employment_income: 35_000
        immigration_status: CITIZEN
      person2:
        age: 15

        is_disabled: true
        immigration_status: CITIZEN
        ga_caps_provider_type: FAMILY
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 7_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: BIBB_COUNTY_GA
  output:
    # === Eligibility ===
    # disabled, age 15 <= 17 -> eligible child
    ga_caps_eligible_child: [false, true]

    # income 35,000 <= 39,702.88 (50% SMI for family of 2) -> eligible
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rate ===
    # Bibb County -> Zone 2
    ga_caps_zone: ZONE_2
    # Age 15 -> SCHOOL_AGE
    ga_caps_age_group: [PRESCHOOL, SCHOOL_AGE]
    # Zone 2, Family, School Age, Full-time = $135/week
    ga_caps_maximum_weekly_benefit: [0, 135]

    # === Family fee ===
    # FPG family of 2: $21,640
    # FPL ratio = 35,000 / 21,640 = 1.618 -> 7% rate
    # weekly fee = floor(35,000 * 0.07 / 52) = floor(47.12) = $47
    # monthly fee = 47 * 52 / 12 = $203.67
    ga_caps_family_fee: 203.67

    # === Benefit ===
    # base_max_monthly = 135 * 52 / 12 = $585.00
    # pre_subsidy_monthly = 7,000 / 12 = $583.33
    # base_payment = min(583.33, 585.00) = $583.33
    # net_base = max(583.33 - 203.67, 0) = $379.67
    # no quality bonus (NONE rating)
    # subsidy = $379.67
    ga_caps: 379.67


# GA CAPS Integration Edge Cases
#
# 2026 FPG (Contiguous US):
#   first_person = 15,960, additional = 5,680
#   Family of 2: 21,640
#   Family of 3: 27,320
#   Family of 4: 33,000
#   Family of 5: 38,680
#   Family of 6: 44,360
#
# GA SMI 4-person at 2026-01: $116,773.19 (uprated)
#   Family of 2: 116,773.19 * 0.68 = $79,405.77 -> 50% = $39,702.88
#   Family of 3: 116,773.19 * 0.84 = $98,089.48 -> 50% = $49,044.74
#   Family of 5: 116,773.19 * 1.16 = $135,456.90 -> 50% = $67,728.45
#   Family of 6: 116,773.19 * 1.32 = $154,140.61 -> 50% = $77,070.30

- name: Case 1, large family of 6 at income threshold boundary.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        employment_income: 73_085
        immigration_status: CITIZEN
      person2:
        age: 38
        immigration_status: CITIZEN
      person3:
        age: 10

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: BEFORE_AFTER_SCHOOL
        ga_caps_quality_rating: NONE
      person4:
        age: 3

        immigration_status: CITIZEN
        ga_caps_provider_type: FAMILY
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: TWO_STAR
      person5:
        age: 0

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: TWO_STAR
      person6:
        age: 14

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5, person6]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6]
        spm_unit_pre_subsidy_childcare_expenses: 20_000
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6]
        state_code: GA
        county_str: COBB_COUNTY_GA
  output:
    # === Eligibility ===
    # person3 (10): age < 13 -> eligible
    # person4 (3): age < 13 -> eligible
    # person5 (0): age < 13 -> eligible
    # person6 (14): age >= 13, not disabled -> ineligible
    ga_caps_eligible_child: [false, false, true, true, true, false]

    # 50% SMI family of 6 = $77,070.30
    # income 73,085 <= 77,070.30 -> eligible
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rates ===
    # Cobb County -> Zone 1
    ga_caps_zone: ZONE_1
    # person3 (10): SCHOOL_AGE, Zone 1 Center B/A School = $84/week
    # person4 (3): PRESCHOOL, Zone 1 Family FT = $180/week
    # person5 (0): INFANT, Zone 1 Center FT = $260/week
    ga_caps_age_group: [PRESCHOOL, PRESCHOOL, SCHOOL_AGE, PRESCHOOL, INFANT, PRESCHOOL]
    ga_caps_maximum_weekly_benefit: [0, 0, 84, 180, 260, 0]

    # === Family fee ===
    # FPG family of 6: $44,360
    # FPL ratio = 73,085 / 44,360 = 1.648 -> 7% rate
    # weekly fee = floor(73,085 * 0.07 / 52) = floor(98.38) = $98
    # monthly fee = 98 * 52 / 12 = $424.67
    ga_caps_family_fee: 424.67

    # === Benefit ===
    # base_max_weekly = 84 + 180 + 260 = $524
    # base_max_monthly = 524 * 52 / 12 = $2,270.67
    # pre_subsidy_monthly = 20,000 / 12 = $1,666.67
    # base_payment = min(1,666.67, 2,270.67) = $1,666.67
    # net_base = max(1,666.67 - 424.67, 0) = $1,242.00
    #
    # quality: person3 NONE (0%), person4 TWO_STAR (5%), person5 TWO_STAR (5%)
    # weighted_bonus = 84*0 + 180*0.05 + 260*0.05 = 0 + 9 + 13 = 22
    # effective_bonus = 22 / 524 = 0.04198
    # subsidy = 1,242.00 * 1.04198 = $1,294.15
    ga_caps: 1_294.15

- name: Case 2, enrolled family between 50 and 85 percent SMI.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 50_000
        immigration_status: CITIZEN
      person2:
        age: 1

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: THREE_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        ga_caps_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 15_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: DEKALB_COUNTY_GA
  output:
    # === Eligibility ===
    ga_caps_eligible_child: [false, true]
    # enrolled: 50,000 <= 67,494.90 (85% SMI) -> eligible
    # NOT eligible as new applicant: 50,000 > 39,702.88 (50% SMI)
    ga_caps_income_eligible: true
    ga_caps_eligible: true

    # === Zone and rates ===
    # DeKalb County -> Zone 1
    ga_caps_zone: ZONE_1
    # Age 1 -> TODDLER, Zone 1 Center FT = $248/week
    ga_caps_age_group: [PRESCHOOL, TODDLER]
    ga_caps_maximum_weekly_benefit: [0, 248]

    # === Family fee ===
    # FPG family of 2: $21,640
    # FPL ratio = 50,000 / 21,640 = 2.311 -> 7% rate
    # weekly fee = floor(50,000 * 0.07 / 52) = floor(67.31) = $67
    # monthly fee = 67 * 52 / 12 = $290.33
    ga_caps_family_fee: 290.33

    # === Benefit ===
    # base_max_monthly = 248 * 52 / 12 = $1,074.67
    # pre_subsidy_monthly = 15,000 / 12 = $1,250.00
    # base_payment = min(1,250.00, 1,074.67) = $1,074.67
    # net_base = max(1,074.67 - 290.33, 0) = $784.33
    # effective_bonus = (248 * 0.10) / 248 = 0.10
    # subsidy = 784.33 * 1.10 = $862.77
    ga_caps: 862.77

- name: Case 3, non-enrolled family at 50 percent SMI plus 1 dollar is ineligible.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 39_703
        immigration_status: CITIZEN
      person2:
        age: 4

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: THREE_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible_child: [false, true]
    # 39,703 > 39,702.88 (50% SMI for family of 2) -> ineligible
    ga_caps_income_eligible: false
    ga_caps_eligible: false
    ga_caps: 0

- name: Case 4, mixed eligible and ineligible children in family.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        employment_income: 30_000
        immigration_status: CITIZEN
      person2:
        age: 5

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
      person3:
        age: 14

        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
        county_str: BIBB_COUNTY_GA
  output:
    # person2 (5): eligible, person3 (14): ineligible (not disabled)
    ga_caps_eligible_child: [false, true, false]
    # Family has at least one eligible child -> eligible
    ga_caps_eligible: true
    # Bibb -> Zone 2
    ga_caps_zone: ZONE_2
    # Only person2 gets a rate: Zone 2 Center Preschool FT = $150/week
    # person3 is not an eligible child -> 0 rate
    ga_caps_maximum_weekly_benefit: [0, 150, 0]
    # FPG family of 3 = $27,320
    # FPL ratio = 30,000 / 27,320 = 1.098 -> 7% rate
    # weekly fee = floor(30,000 * 0.07 / 52) = floor(40.38) = $40
    # monthly fee = 40 * 52 / 12 = $173.33
    ga_caps_family_fee: 173.33
    # base_max_monthly = 150 * 52 / 12 = $650.00
    # pre_subsidy_monthly = 10,000 / 12 = $833.33
    # base_payment = min(833.33, 650.00) = $650.00
    # net_base = max(650.00 - 173.33, 0) = $476.67
    # no quality bonus (NONE rating)
    # subsidy = $476.67
    ga_caps: 476.67

- name: Case 5, disabled child age 16 with family provider in Zone 3.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 16

        is_disabled: true
        immigration_status: CITIZEN
        ga_caps_provider_type: FAMILY
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: TWO_STAR
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 5_000
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: APPLING_COUNTY_GA
  output:
    # disabled child age 16 <= 17 -> eligible
    ga_caps_eligible_child: [false, true]
    ga_caps_eligible: true
    # Appling -> Zone 3
    ga_caps_zone: ZONE_3
    # Age 16 -> SCHOOL_AGE, Zone 3 Family FT = $94/week
    ga_caps_maximum_weekly_benefit: [0, 94]
    # FPG family of 2 = $21,640
    # FPL ratio = 20,000 / 21,640 = 0.924 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33
    # base_max_monthly = 94 * 52 / 12 = $407.33
    # pre_subsidy_monthly = 5,000 / 12 = $416.67
    # base_payment = min(416.67, 407.33) = $407.33
    # net_base = max(407.33 - 82.33, 0) = $325.00
    # effective_bonus = (94 * 0.05) / 94 = 0.05
    # subsidy = 325.00 * 1.05 = $341.25
    ga_caps: 341.25

- name: Case 6, two-parent family where one is a student.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
        weekly_hours_worked: 24
      person2:
        age: 28
        immigration_status: CITIZEN
        weekly_hours_worked: 0
        is_full_time_student: true
      person3:
        age: 4

        immigration_status: CITIZEN
        ga_caps_provider_type: CENTER
        ga_caps_care_type: FULL_TIME
        ga_caps_quality_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    ga_caps_eligible_child: [false, false, true]
    # parent1: 24 hrs >= 24 -> ok
    # parent2: student -> ok
    ga_caps_activity_eligible: true
    ga_caps_eligible: true
    # Zone 1, Center, Preschool, FT = $221/week
    ga_caps_maximum_weekly_benefit: [0, 0, 221]
    # FPG family of 3 = $27,320
    # FPL ratio = 20,000 / 27,320 = 0.732 -> 5% rate
    # weekly fee = floor(20,000 * 0.05 / 52) = floor(19.23) = $19
    # monthly fee = 19 * 52 / 12 = $82.33
    ga_caps_family_fee: 82.33
    # base_max_monthly = 221 * 52 / 12 = $957.67
    # pre_subsidy_monthly = 10,000 / 12 = $833.33
    # base_payment = min(833.33, 957.67) = $833.33
    # net_base = max(833.33 - 82.33, 0) = $751.00
    # no quality bonus (NONE rating)
    # subsidy = $751.00
    ga_caps: 751.00

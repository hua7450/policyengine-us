# GA CAPS maximum weekly benefit - edge cases
# Part-time rates are daily; weekly = daily * childcare_days_per_week
# Tests for part-time day conversion and provider type coverage

- name: Case 1, Zone 1 center part-time infant 3 days per week.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 0
        ga_caps_provider_type: CENTER
        ga_caps_care_type: PART_TIME
        childcare_days_per_week: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
        county_str: FULTON_COUNTY_GA
  output:
    # Zone 1, Center, Infant, Part-time = $65/day
    # Weekly = 65 * 3 = $195
    ga_caps_maximum_weekly_benefit: [0, 195]


- name: Case 1, single eligible individual in current period.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_medicaid_facility: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: GA
  output:
    ga_ssp_eligible_person: [true]
    # $40/month per eligible individual (effective 2019-07-01)
    ga_ssp_person: [40]
    # SPM unit total = $40
    ga_ssp: 40

- name: Case 2, couple both eligible in current period.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_medicaid_facility: true
      person2:
        is_ssi_eligible: true
        ga_ssp_in_medicaid_facility: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_ssp_eligible_person: [true, true]
    # Each person gets $40/month
    ga_ssp_person: [40, 40]
    # SPM unit total = $40 + $40 = $80
    ga_ssp: 80

- name: Case 3, one eligible and one not SSI-eligible in couple.
  absolute_error_margin: 0.01
  period: 2024-01
  input:
    people:
      person1:
        is_ssi_eligible: true
        ga_ssp_in_medicaid_facility: true
      person2:
        is_ssi_eligible: false
        ga_ssp_in_medicaid_facility: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: GA
  output:
    ga_ssp_eligible_person: [true, false]
    ga_ssp_person: [40, 0]
    # SPM unit total = $40 + $0 = $40
    ga_ssp: 40


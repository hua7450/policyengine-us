- name: Case 8, couple both SSI-eligible in community care receives couple rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 360
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        hi_oss_care_facility_type: COMMUNITY_CARE
      person2:
        ssi: 360
        is_ssi_eligible: true
        ssi_claim_is_joint: true
        hi_oss_care_facility_type: COMMUNITY_CARE
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    families:
      family:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_oss_couple_rate_applies: [true, true]
    hi_oss: [952.50, 952.50]
    # Couple rate $1,905/month / 2 = $952.50 each


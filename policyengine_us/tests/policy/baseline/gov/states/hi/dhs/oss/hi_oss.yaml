- name: Case 10, asymmetric couple, one not SSI-eligible gets individual rate.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        ssi: 360
        is_ssi_eligible: true
        ssi_claim_is_joint: false
        hi_oss_care_facility_type: COMMUNITY_CARE
      person2:
        ssi: 0
        is_ssi_eligible: false
        ssi_claim_is_joint: false
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    families:
      family:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: HI
  output:
    hi_oss_couple_rate_applies: [false, false]
    hi_oss:
      - 9_408
      - 0
    # Person1: Individual rate $784/month x 12 = $9,408
    # Person2: Not SSI eligible, $0


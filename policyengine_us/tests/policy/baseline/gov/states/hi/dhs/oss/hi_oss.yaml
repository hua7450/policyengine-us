- name: Case 1, individual in community care receives 2025 rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    state_code: HI
    ssi: 360
    hi_oss_care_facility_type: COMMUNITY_CARE
  output:
    hi_oss: 784
    # $784/month


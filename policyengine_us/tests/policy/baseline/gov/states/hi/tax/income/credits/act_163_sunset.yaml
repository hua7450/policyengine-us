# Tests for Act 163 (SLH 2023) sunset on December 31, 2027
# Act 163 enhanced CDCC expense limits, EITC match rate, and Food/Excise credit amounts

- name: Hawaii CDCC expense floor - during Act 163 period (2027)
  period: 2027
  input:
    state_code: HI
    count_cdcc_eligible: 1
  output:
    gov.states.hi.tax.income.credits.cdcc.dependent_care_benefits.expense_floor: 10_000

- name: Hawaii CDCC expense floor - after Act 163 sunset (2028)
  period: 2028
  input:
    state_code: HI
    count_cdcc_eligible: 1
  output:
    gov.states.hi.tax.income.credits.cdcc.dependent_care_benefits.expense_floor: 2_400

- name: Hawaii CDCC expense floor for 2+ children - during Act 163 period (2027)
  period: 2027
  input:
    state_code: HI
    count_cdcc_eligible: 2
  output:
    gov.states.hi.tax.income.credits.cdcc.dependent_care_benefits.expense_floor: 20_000

- name: Hawaii CDCC expense floor for 2+ children - after Act 163 sunset (2028)
  period: 2028
  input:
    state_code: HI
    count_cdcc_eligible: 2
  output:
    gov.states.hi.tax.income.credits.cdcc.dependent_care_benefits.expense_floor: 4_800

- name: Hawaii EITC match rate - during Act 163 period (2027)
  period: 2027
  input:
    state_code: HI
  output:
    gov.states.hi.tax.income.credits.eitc.match: 0.4

- name: Hawaii EITC match rate - after Act 163 sunset (2028)
  period: 2028
  input:
    state_code: HI
  output:
    gov.states.hi.tax.income.credits.eitc.match: 0.2

- name: Hawaii Food/Excise credit - joint filer low income during Act 163 (2027)
  period: 2027
  input:
    state_code: HI
    filing_status: JOINT
    adjusted_gross_income: 10_000
  output:
    # $220 for AGI < $15k threshold during Act 163
    gov.states.hi.tax.income.credits.food_excise_tax.amount.joint: 220

- name: Hawaii Food/Excise credit - joint filer low income after sunset (2028)
  period: 2028
  input:
    state_code: HI
    filing_status: JOINT
    adjusted_gross_income: 4_000
  output:
    # $110 for AGI < $5k threshold after sunset
    gov.states.hi.tax.income.credits.food_excise_tax.amount.joint: 110

- name: Hawaii Food/Excise credit - single filer during Act 163 (2027)
  period: 2027
  input:
    state_code: HI
    filing_status: SINGLE
    adjusted_gross_income: 10_000
  output:
    # $220 for AGI < $15k threshold during Act 163
    gov.states.hi.tax.income.credits.food_excise_tax.amount.single: 220

- name: Hawaii Food/Excise credit - single filer after sunset (2028)
  period: 2028
  input:
    state_code: HI
    filing_status: SINGLE
    adjusted_gross_income: 4_000
  output:
    # $110 for AGI < $5k threshold after sunset
    gov.states.hi.tax.income.credits.food_excise_tax.amount.single: 110

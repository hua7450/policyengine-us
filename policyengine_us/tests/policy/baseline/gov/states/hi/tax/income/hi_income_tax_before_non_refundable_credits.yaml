    # + 6.40% * ($72,000 - $48,000)          [$1,536.00]
    # + 6.80% * ($96,000 - $72,000)          [$1,632.00]
    # + 7.20% * ($250,000 - $96,000)         [$11,088.00]
    # + 7.60% * ($350,000 - $250,000)        [$7,600.00]
    # + 8.25% * ($450,000 - $350,000)        [$8,250.00]

- name: Case 1, blind SSI-eligible adult receives flat 22 dollar supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_blind_supplement: [22]

- name: Case 2, non-blind person receives no blind supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_blind: false
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_blind_supplement: [0]

- name: Case 3, blind person with excess resources receives no supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi_countable_resources: 5_000
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_resources_eligible: [false]
    ia_ssa_eligible: [false]
    ia_ssa_blind_supplement: [0]

- name: Case 4, blind RCF resident receives zero blind supplement (IAC 441-52.1(4) exclusivity).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 37.60
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Per IAC 441-52.1(4), blind supplement only paid if not receiving
    # another type of SSA. RCF category wins -> blind supplement is $0.
    ia_ssa_category: [RCF]
    ia_ssa_blind_supplement: [0]

- name: Case 5, single blind Iowan integration (federal SSI plus state blind supplement).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_category: [BLIND]
    ssi: [967]
    ia_ssa_blind_supplement: [22]
    ia_ssa: [22]

- name: Case 6, blind person at 2026 still receives frozen 22 dollar supplement.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_blind_supplement: [22]

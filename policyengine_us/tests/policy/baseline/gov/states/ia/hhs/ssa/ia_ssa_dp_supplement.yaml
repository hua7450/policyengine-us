# IAC 441—52.1(2): DP is federally-administered per POMS SI 01415.050.F.
# Federally-administered SSP formula:
#   supplement = max(0, payment_standard - max(countable, FBR))
# capped at max_per_person_cap ($503 in 2025, $518 in 2026).
# Also requires dependent's countable income < dependent_income_limit.

- name: Case 1, person with no DP configuration gets zero supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: NONE
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_dp_supplement: [0]

- name: Case 2, person with excess resources gets zero DP supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ssi_countable_resources: 5_000
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_dp_supplement: [0]

- name: Case 3, DP supplement capped at per-person maximum 503 dollars.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: BLIND_WITH_BLIND_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Standard $1,997 minus federal SSI and income; well above $503 cap
    ia_ssa_dp_supplement: [503]

- name: Case 4, DP supplement cap rises to 518 dollars in 2026.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: BLIND_WITH_BLIND_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_dp_supplement: [518]

- name: Case 5, aged client with aged spouse and dependent child integration.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
      person2:
        age: 68
        employment_income: 0
        ia_ssa_dp_configuration: NONE
      person3:
        age: 10
        employment_income: 0
    marital_units:
      first_marital_unit:
        members: [person1, person2]
      second_marital_unit:
        members: [person3]
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: IA
  output:
    # person1: DP capped at $503.
    # person2: income above 120% FPL for household of 3 would be required
    # for SMME ($26,650 × 1.2 / 12 = $2,665/mo); but income is $0, so not
    # SMME-eligible -> NONE.
    # person3: child -> NONE.
    ia_ssa_category: [DP, NONE, NONE]
    ia_ssa_dp_supplement: [503, 0, 0]

- name: Case 6, dependent income above limit disqualifies DP supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 600  # > $503 limit
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Dependent income exceeds the limit -> DP category gate fails. Person
    # is 70 with no other qualifying category -> NONE -> supplement 0.
    ia_ssa_category: [NONE]
    ia_ssa_dp_supplement: [0]

- name: Case 7, 2017 DP aged-or-disabled-with-dependent uses 1114 dollar standard and 379 dollar cap.
  period: 2017-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_dp_configuration: AGED_OR_DISABLED_WITH_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # 2017 AGED_OR_DISABLED_WITH_DEPENDENT payment standard $1,114; FBR $735;
    # max_per_person_cap $379. Federally-administered formula:
    # max(0, 1114 - max(0, 735)) = $379 -> capped at $379.
    ia_ssa_category: [DP]
    ia_ssa_dp_supplement: [379]

- name: Case 8, DP supplement phases down when countable income exceeds FBR.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 20_640  # $1,720/mo
        ia_ssa_dp_configuration: BLIND_WITH_BLIND_SPOUSE_AND_DEPENDENT
        ia_ssa_dp_has_eligible_dependent: true
        ia_ssa_dp_dependent_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $1,720/mo SS gross -> $1,700/mo countable. Payment standard $1,997,
    # FBR $967. Federally-administered formula:
    # max(0, 1997 - max(1700, 967)) = $297 (under the $503 cap).
    ia_ssa_dp_supplement: [297]

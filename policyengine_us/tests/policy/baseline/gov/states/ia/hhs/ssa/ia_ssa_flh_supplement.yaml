- name: Case 1, FLH resident with zero income receives capped 142 dollar supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # standard $1,129 - federal SSI $967 - $20 disregard = $142
    # capped at $142 maximum
    ia_ssa_flh_supplement: [142]

- name: Case 2, person not in FLH receives zero FLH supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: false
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_flh_supplement: [0]

- name: Case 3, FLH resident not SSI-eligible receives zero.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        meets_ssi_resource_test: false
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_flh_supplement: [0]

- name: Case 4, FLH resident 2026 still capped at 142 dollars.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cap is frozen at $142 even though standard and PNA rise in 2026
    ia_ssa_flh_supplement: [142]

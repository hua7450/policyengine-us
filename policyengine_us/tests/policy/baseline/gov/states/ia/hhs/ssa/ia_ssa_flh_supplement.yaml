- name: Case 1, FLH resident with zero income receives capped 142 dollar supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # standard $1,129 - federal SSI $967 - $20 disregard = $142
    # capped at $142 maximum
    ia_ssa_flh_supplement: [142]

- name: Case 2, person not in FLH receives zero FLH supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: false
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_flh_supplement: [0]

- name: Case 3, FLH resident with excess resources receives zero.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi_countable_resources: 5_000
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_flh_supplement: [0]

- name: Case 4, aged FLH resident integration (federal SSI plus state SSA).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_resides_in_family_life_home: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Federal SSI fills to FBR; FLH supplement capped at $142
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_category: [FLH]
    ssi: [967]
    ia_ssa_flh_supplement: [142]
    ia_ssa: [142]

- name: Case 5, FLH resident 2026 still capped at 142 dollars.
  period: 2026-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_family_life_home: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cap is frozen at $142 even though standard and PNA rise in 2026
    ia_ssa_flh_supplement: [142]

# IAC 441—177.10(2)(a): payment = max(0, min(cost, per-person cap) -
#   client participation), where client participation is marital-unit
#   countable income minus the basic SSI standard disregard (the applicable
#   FBR for a single or joint claim), split evenly across the marital unit.
# IAC 441—177.10(3): IHHRC max benefit payable is $480.55 per person, inclusive
#   of all services for all providers. The $961.10 in 441—177.4(1)(f) is the
#   combined couple income cap, NOT a per-person payment cap.
# IAC 441—177.4(1)(c): recipient must live in own home (not in RCF or FLH).
# IAC 441—177.4(1)(f): income cap on countable income after the basic SSI
#   standard disregard — individual <= $480.55, or combined couple <= $961.10
#   when both spouses need care.

- name: Case 1, individual IHHRC cost below max pays actual cost.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 450
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost $450 below max $480.55 -> pays actual $450
    ia_ssa_ihhrc_supplement: [450]

- name: Case 2, individual IHHRC cost above max is capped at 480.55 dollars.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 600
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost $600 > max $480.55 -> capped
    ia_ssa_ihhrc_supplement: [480.55]


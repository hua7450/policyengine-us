      person2:
        age: 68
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 1_500
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Both need care -> combined income cap $961.10 (combined countable = 0).
    # Payment max is $480.55 per person (441—177.10(3)).
    # Each cost $1,500 > per-person max $480.55 -> capped at $480.55 each.
    ia_ssa_ihhrc_supplement: [480.55, 480.55]


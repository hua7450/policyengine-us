- name: Case 8, person with countable income above single cap is ineligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 20_000  # $1,667/mo gross
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Countable $1,647/mo minus individual FBR disregard $967 = $680, which
    # exceeds the single cap $480.55 -> not in IHHRC category -> no supplement.
    ia_ssa_ihhrc_supplement: [0]

- name: Case 9, single person with countable income below FBR gets full supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 9_600  # $800/mo gross
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $800/mo SS gross, countable $780/mo. Individual FBR disregard $967 makes
    # income after disregard 0 -> passes single cap. Client participation is
    # 0 -> supplement equals cost $400.
    ia_ssa_ihhrc_supplement: [400]


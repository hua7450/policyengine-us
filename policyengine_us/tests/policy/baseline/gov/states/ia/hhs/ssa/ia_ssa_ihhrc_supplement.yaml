- name: Case 7, couple with only one spouse needing IHHRC uses single cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 800
      person2:
        age: 68
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: false
        ia_ssa_ihhrc_cost_of_care: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Only person1 needs care -> both_need_care false -> single cap $480.55
    ia_ssa_ihhrc_both_need_care: [false, false]
    ia_ssa_ihhrc_supplement: [480.55, 0]

- name: Case 8, person with countable income above 480.55 single limit is ineligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        social_security_retirement: 20_000
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # SS $1,667/mo after SSI disregards exceeds single income cap $480.55
    # -> not in IHHRC category -> no supplement
    ia_ssa_ihhrc_supplement: [0]

- name: Case 9, IHHRC income cap enforced against countable income even when below FBR.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        social_security_retirement: 9_600
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $800/mo SS, countable $780/mo; below FBR $967 so the prior
    # broken formula incorrectly made them IHHRC-eligible (it compared
    # excess-over-FBR, which is 0 here). Correct check compares countable
    # $780 against cap $480.55 -> ineligible for IHHRC.
    ia_ssa_ihhrc_supplement: [0]

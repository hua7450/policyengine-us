- name: Case 1, individual IHHRC cost below max pays actual cost.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 450
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost $450 is below max $480.55 -> pays actual $450
    ia_ssa_ihhrc_supplement: [450]

- name: Case 2, individual IHHRC cost above max is capped at 480.55 dollars.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 600
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost $600 > max $480.55 -> capped
    ia_ssa_ihhrc_supplement: [480.55]

- name: Case 3, person does not need IHHRC receives zero supplement.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: false
        ia_ssa_ihhrc_cost_of_care: 400
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_ihhrc_supplement: [0]

- name: Case 4, person needing IHHRC with excess resources receives zero.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi_countable_resources: 5_000
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_ihhrc_supplement: [0]

- name: Case 5, couple both needing IHHRC use couple cap 961.10 dollars.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 900
      person2:
        age: 68
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 900
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Both need care -> couple cap $961.10; each cost $900 < cap -> $900 each
    ia_ssa_ihhrc_both_need_care: [true, true]
    ia_ssa_ihhrc_supplement: [900, 900]


        social_security_retirement: 7_200  # $600/mo gross
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
      person2:
        age: 68
        social_security_retirement: 7_200  # $600/mo gross
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Each spouse's countable unearned is about $580/mo after the $20 general

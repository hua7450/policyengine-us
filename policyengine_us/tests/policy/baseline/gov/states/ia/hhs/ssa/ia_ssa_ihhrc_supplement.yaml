  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: false
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_ihhrc_supplement: [0]

- name: Case 4, person needing IHHRC with excess resources receives zero.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ssi_countable_resources: 5_000
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 400
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_ihhrc_supplement: [0]

- name: Case 5, couple both needing IHHRC use couple cap.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 900
      person2:
        age: 68
        employment_income: 0
        ia_ssa_needs_in_home_health_related_care: true
        ia_ssa_ihhrc_cost_of_care: 900
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: IA
  output:
    # Both need care -> combined income cap $961.10 (combined countable = 0).
    # Payment max is $480.55 per person (441—177.10(3)).
    # Each cost $900 > per-person max $480.55 -> capped at $480.55 each.
    ia_ssa_ihhrc_both_need_care: [true, true]
    ia_ssa_ihhrc_supplement: [480.55, 480.55]

- name: Case 6, couple both needing IHHRC with high cost capped at 480.55 dollars per person.
  period: 2025-01
  absolute_error_margin: 0.01

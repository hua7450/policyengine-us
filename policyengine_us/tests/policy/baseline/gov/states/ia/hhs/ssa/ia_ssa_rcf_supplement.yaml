- name: Case 6, aged RCF resident in 2025 integration (federal SSI plus state SSA).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 37.60
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Federal SSI fills to 2025 FBR $967; RCF supplement = 31 * $37.60 - ($967 - $126) = $324.60
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_category: [RCF]
    ssi: [967]
    ia_ssa_rcf_supplement: [324.60]
    ia_ssa: [324.60]


- name: Case 1, RCF resident at 2025 max per diem net of client participation.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 37.60
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost of care = 31 * $37.60 = $1,165.60
    # Client participation = federal SSI $967 - PNA $126 = $841
    # Supplement = $1,165.60 - $841 = $324.60
    ia_ssa_rcf_supplement: [324.60]

- name: Case 2, RCF per diem above max is capped at 37.60 dollars per day.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 50
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Capped cost = 31 * $37.60 = $1,165.60; CP $841; supplement $324.60
    ia_ssa_rcf_supplement: [324.60]


- name: Case 8b, RCF resident with 12000 dollar Social Security has participation that reflects total monthly income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        social_security_retirement: 12_000
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 37.60
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $1,000/mo SS, countable $980; no SSI (uncapped negative); total monthly
    # income $980; client participation $980 - $126 = $854; supplement =
    # $1,165.60 - $854 = $311.60.
    ia_ssa_rcf_supplement: [311.60]

- name: Case 9, RCF resident with 18000 dollar Social Security is ineligible because total income exceeds threshold.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        social_security_retirement: 18_000
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 37.60
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # $1,500/mo SS, countable $1,480; client participation $1,354 > threshold
    # $1,165.60 -> RCF ineligible; no RCF supplement. Prior broken formula kept
    # this person in the RCF category because it understated income.
    ia_ssa_rcf_supplement: [0]


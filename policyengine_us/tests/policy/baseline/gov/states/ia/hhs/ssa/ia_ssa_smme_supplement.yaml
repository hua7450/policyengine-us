      person1:
        age: 70
        social_security_retirement: 24_000
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: false
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_category: [NONE]

- name: Case 5, person with excess resources receives zero SMME.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        social_security_retirement: 24_000
        ssi_countable_resources: 5_000
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_smme_supplement: [0]

- name: Case 6, income exactly at 120% FPL boundary is not SMME-eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # $18,780/year gross = $1,565/month; countable = $1,545 after $20
        # exclusion, which is below the $1,565 threshold. Boundary check.
        social_security_retirement: 18_780
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Statute requires income to EXCEED 120% FPL (>, not >=).
    ia_ssa_category: [NONE]
    ia_ssa_smme_supplement: [0]

- name: Case 7, aged Iowan at 2026 rates with income above 120% FPL.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        # 2026 FPL (1 person, contiguous) = $15,960; 120% = $19,152/year.
        social_security_retirement: 30_000  # $2,500/month, well above threshold
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_category: [SMME]
    ia_ssa_smme_supplement: [1]
    ia_ssa: [1]

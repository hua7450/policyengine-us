- name: Case 1, aged person with Medicaid and Medicare Part B receives 1 dollar SMME.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_smme_supplement: [1]

- name: Case 2, person without full Medicaid receives zero SMME.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_has_full_medicaid: false
        ia_ssa_has_medicare_part_b: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_smme_supplement: [0]

- name: Case 3, person without Medicare Part B receives zero SMME.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: false
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    ia_ssa_smme_supplement: [0]

- name: Case 4, aged Iowan with Medicaid and Part B integration (federal SSI plus SMME).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_category: [SMME]
    ssi: [967]
    ia_ssa_smme_supplement: [1]
    ia_ssa: [1]

- name: Case 5, person with excess resources receives zero SMME.
  period: 2025-01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        ssi_countable_resources: 5_000
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Resources $5,000 > single limit $2,000 -> ia_ssa_resources_eligible false
    ia_ssa_eligible: [false]
    ia_ssa_smme_supplement: [0]

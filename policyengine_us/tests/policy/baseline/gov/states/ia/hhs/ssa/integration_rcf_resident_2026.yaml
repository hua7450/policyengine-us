- name: Case 1, aged RCF resident in 2026 at new max per diem 38.47 dollars.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_resides_in_residential_care_facility: true
        ia_ssa_rcf_cost_per_diem: 38.47
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Cost of care = 31 * $38.47 = $1,192.57
    # Client participation = federal SSI $994 - PNA $130 = $864
    # Supplement = $1,192.57 - $864 = $328.57
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_rcf_supplement: [328.57]
    ia_ssa_category: [RCF]
    ia_ssa: [328.57]

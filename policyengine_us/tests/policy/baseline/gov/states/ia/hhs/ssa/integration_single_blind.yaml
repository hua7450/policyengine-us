- name: Case 1, single blind Iowa adult receiving SSI gets 22 dollar blind supplement.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        employment_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    is_ssi_eligible: [true]
    ia_ssa_eligible: [true]
    ia_ssa_category: [BLIND]
    ia_ssa_blind_supplement: [22]
    # Blind is the only active category for this household
    ia_ssa: [22]

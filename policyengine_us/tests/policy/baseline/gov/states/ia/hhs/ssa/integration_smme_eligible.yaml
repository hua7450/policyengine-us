- name: Case 1, aged Iowan with Medicaid and Part B receives 1 dollar SMME.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        employment_income: 0
        ia_ssa_has_full_medicaid: true
        ia_ssa_has_medicare_part_b: true
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: IA
  output:
    # Aged + full Medicaid + Part B + Iowa resident -> SMME $1/month
    # SMME has lowest priority; applies only if no other category
    is_ssi_eligible: [true]
    ia_ssa_smme_supplement: [1]
    ia_ssa_category: [SMME]
    ia_ssa: [1]

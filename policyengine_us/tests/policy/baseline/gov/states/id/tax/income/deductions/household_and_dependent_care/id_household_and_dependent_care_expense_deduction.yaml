- name: Federal cdcc calculation with a cap at earned income
  period: 2022
  input:
    tax_unit_childcare_expenses: 13_000
    id_cdcc_limit: 6_000
    min_head_spouse_earned: 4_000
    state_code: ID
  output:
    id_household_and_dependent_care_expense_deduction: 4_000

- name: Capped after 2023
  period: 2023
  input:

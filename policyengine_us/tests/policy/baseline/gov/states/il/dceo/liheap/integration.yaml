- name: Case 1, low income senior with nat gas.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 65
        is_disabled: true
        social_security: 12_000
        irs_gross_income: 12_000
        rent: 6_000
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: false
        il_liheap_fuel_type: NAT_GAS_OTHER
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    il_liheap_income_eligible: true
    il_liheap_eligible: true
    # 12,000 / ~15,060 FPG ≈ 80% → bracket 2, size 1, nat gas → $610
    il_liheap_base_payment: 610
    il_liheap: 610

- name: Case 2, family of 4 with nat gas bracket 3.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 25_000
        irs_gross_income: 25_000
      person2:
        age: 28
        employment_income: 20_000
        irs_gross_income: 20_000
      person3:
        age: 4
      person4:
        age: 2
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        heat_expense_included_in_rent: false
        il_liheap_fuel_type: NAT_GAS_OTHER
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: IL
  output:
    il_liheap_income_eligible: true
    il_liheap_eligible: true
    # 45,000 / ~31,800 FPG ≈ 142% → bracket 3, size 4, nat gas → $520
    il_liheap_base_payment: 520
    il_liheap: 520

- name: Case 3, renter with heat in rent meets rent threshold.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        irs_gross_income: 24_000
        rent: 8_000
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: true
        il_liheap_fuel_type: CASH
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    il_liheap_income_eligible: true
    il_liheap_eligible: true  # Rent (8k) > 30% of income (7.2k)
    # 24,000 / ~15,060 FPG ≈ 159% → bracket 4, size 1, cash → $170
    il_liheap_base_payment: 170
    il_liheap: 170

- name: Case 4, renter with heat in rent fails rent threshold.
  period: 2024
  input:
    people:
      person1:
        age: 40
        employment_income: 28_000
        irs_gross_income: 28_000
        rent: 7_000
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: true
        il_liheap_fuel_type: CASH
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    il_liheap_income_eligible: true
    il_liheap_eligible: false  # Rent (7k) <= 30% of income (8.4k)
    il_liheap: 0

- name: Case 5, high income household not eligible.
  period: 2024
  input:

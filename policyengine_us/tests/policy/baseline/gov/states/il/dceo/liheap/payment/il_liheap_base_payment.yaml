- name: Case 1, single person nat gas bracket 1.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 0
    spm_units:
      spm_unit:
        members: [person1]
        il_liheap_fuel_type: NAT_GAS_OTHER
        gas_expense: 1_500
        electricity_expense: 500
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # Bracket 1 (0-50% FPL), size 1, nat gas → $1,260
    # Expenses: gas 1,500 + electric 500 = 2,000
    # min(1,260, 2,000) = 1,260
    il_liheap_base_payment: 1_260

- name: Case 2, single person all electric bracket 2.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 10_000
    spm_units:
      spm_unit:
        members: [person1]
        il_liheap_fuel_type: ALL_ELECTRIC
        electricity_expense: 1_000
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # 10,000 / ~15,060 FPG ≈ 66% → bracket 2, size 1, all electric → $530
    # min(530, 1,000) = 530
    il_liheap_base_payment: 530

- name: Case 3, family of 4 propane bracket 3 capped at expenses.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        irs_gross_income: 40_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        il_liheap_fuel_type: PROPANE_FUEL_OIL
        fuel_oil_expense: 400
        electricity_expense: 100
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: IL
  output:
    # 40,000 / ~31,800 FPG ≈ 126% → bracket 3, size 4, propane → $630
    # Expenses: fuel oil 400 + electric 100 = 500
    # min(630, 500) = 500 (capped at actual expenses)
    il_liheap_base_payment: 500


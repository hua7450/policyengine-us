- name: Case 1, gas expense infers nat gas fuel type.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 0
    spm_units:
      spm_unit:
        members: [person1]
        gas_expense: 1_500
        electricity_expense: 500
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # gas_expense > 0 → inferred NAT_GAS_OTHER
    # Bracket 1 (0-50% FPL), size 1, nat gas → $1,260
    # min(1,260, 2,000) = 1,260
    il_liheap_fuel_type: NAT_GAS_OTHER
    il_liheap_base_payment: 1_260

- name: Case 2, electricity only infers all electric.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 10_000
    spm_units:
      spm_unit:
        members: [person1]
        electricity_expense: 1_000
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # No gas or fuel oil → inferred ALL_ELECTRIC
    # Bracket 2, size 1, all electric → $530
    # min(530, 1,000) = 530
    il_liheap_fuel_type: ALL_ELECTRIC
    il_liheap_base_payment: 530

- name: Case 3, fuel oil expense infers propane.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        irs_gross_income: 40_000
      person2:
        age: 33
      person3:
        age: 8
      person4:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        fuel_oil_expense: 400
        electricity_expense: 100
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: IL
  output:
    # fuel_oil_expense > 0 → inferred PROPANE_FUEL_OIL
    # Bracket 3, size 4, propane → $630
    # Expenses: 400 + 100 = 500
    # min(630, 500) = 500 (capped)
    il_liheap_fuel_type: PROPANE_FUEL_OIL
    il_liheap_base_payment: 500

- name: Case 4, heat in rent infers cash.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        irs_gross_income: 25_000
        rent: 8_000
    spm_units:
      spm_unit:
        members: [person1]
        heat_expense_included_in_rent: true
        gas_expense: 200
        electricity_expense: 100
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # heat_in_rent → inferred CASH
    # Bracket 4, size 1, cash → $170 (no expense cap for cash)
    il_liheap_fuel_type: CASH
    il_liheap_base_payment: 170


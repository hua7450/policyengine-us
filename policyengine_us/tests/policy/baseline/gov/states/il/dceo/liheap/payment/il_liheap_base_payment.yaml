- name: Case 1, single person nat gas bracket 1.
  period: 2024
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        irs_gross_income: 0
    spm_units:
      spm_unit:
        members: [person1]
        il_liheap_fuel_type: NAT_GAS_OTHER
    households:
      household:
        members: [person1]
        state_code: IL
  output:
    # Bracket 1 (0-50% FPL), size 1, nat gas → $1,260
    il_liheap_base_payment: 1_260


- name: Case 1, SSI-eligible adult in licensed residential facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
    households:
      household:
        members: [person1]
        state_code: IN
        in_ssp_living_arrangement: LICENSED_RESIDENTIAL
  output:
    in_ssp_rcap_eligible: true


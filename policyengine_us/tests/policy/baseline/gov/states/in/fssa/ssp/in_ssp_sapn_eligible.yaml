- name: Case 1, SSI-eligible Medicaid-eligible adult in Medicaid facility.
  period: 2025-01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
        is_medicaid_eligible: true
    households:
      household:
        members: [person1]
        state_code: IN
        in_ssp_living_arrangement: MEDICAID_FACILITY
  output:
    in_ssp_sapn_eligible: true


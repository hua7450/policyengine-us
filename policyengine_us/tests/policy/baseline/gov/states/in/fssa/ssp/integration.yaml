        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: IN
        in_ssp_living_arrangement: MEDICAID_FACILITY
  output:
    # Age 16 < 18: ineligible for both SAPN and RCAP
    in_ssp_sapn_eligible: false
    in_ssp_rcap_eligible: false
    in_ssp_eligible: false
    in_ssp_sapn: 0
    in_ssp_rcap: 0
    in_ssp: 0


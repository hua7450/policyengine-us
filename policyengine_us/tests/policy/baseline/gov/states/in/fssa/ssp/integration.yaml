- name: Case 7, independent living and non-Indiana combined ineligibility.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        is_ssi_eligible: true
        is_medicaid_eligible: true
        ssi_claim_is_joint: false
        uncapped_ssi: 0
    households:
      household:
        members: [person1]
        state_code: OH
        in_ssp_living_arrangement: NONE
  output:
    # Not in Indiana AND not in any facility: doubly ineligible
    in_ssp_sapn_eligible: false
    in_ssp_rcap_eligible: false
    in_ssp_eligible: false
    in_ssp_sapn: 0
    in_ssp_rcap: 0
    in_ssp: 0

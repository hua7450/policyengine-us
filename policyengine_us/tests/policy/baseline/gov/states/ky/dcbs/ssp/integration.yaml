- name: Case 1, single aged individual in PCH with only SSI receives full supplement.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # Eligibility: is_ssi_eligible=true, category=PCH (not NONE) => eligible
    ky_ssp_eligible: [true]
    # Not joint, no deeming => INDIVIDUAL
    ky_ssp_claim_type: [INDIVIDUAL]
    # Payment standard: PCH.INDIVIDUAL.ONE = $1,610/mo * 12 = $19,320/yr
    ky_ssp_payment_standard: [19_320]
    # 2026 individual FBR = $994/mo * 12 = $11,928/yr
    # uncapped_ssi = 11_928 - 0 = 11_928 (positive, no reduction)
    # ky_ssp = max(0, 19_320 - 0) * eligible(1) = $19,320/yr
    ky_ssp: [19_320]
    ssi: [11_928]

- name: Case 2, single blind individual in CIS with other unearned income.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        is_ssi_aged_blind_disabled: true
        is_blind: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # $500/mo unearned => $6,000/yr. After general $20/mo ($240/yr)
        # exclusion, countable unearned = $5,760/yr.
        ssi_countable_income: 5_760
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: CIS
  output:
    ky_ssp_eligible: [true]
    ky_ssp_claim_type: [INDIVIDUAL]
    # CIS.INDIVIDUAL.ONE = $1,514/mo * 12 = $18,168/yr
    ky_ssp_payment_standard: [18_168]
    # ssi_amount_if_eligible = $11,928/yr
    # uncapped_ssi = 11_928 - 5_760 = 6_168 (positive, no reduction)
    # income_excess = max(0, -6_168) = 0
    # ky_ssp = max(0, 18_168 - 0) * 1 = $18,168/yr
    ky_ssp: [18_168]


- name: Case 5, couple both eligible in Caretaker, both receive care.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
        ssi_countable_income: 0
      person2:
        age: 67
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_claim_is_joint: true
        ssi_countable_income: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
        ky_ssp_category: CARETAKER
        ky_ssp_care_receivers: BOTH
  output:
    ky_ssp_eligible: [true, true]
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]
    # CARETAKER.COUPLE_BOTH_ELIGIBLE.BOTH parameter = $1,606/mo couple total
    # Per-person standard = $1,606 / 2 = $803/mo * 12 = $9,636/yr
    ky_ssp_payment_standard: [9_636, 9_636]
    # Each person: supplement = max(0, 9_636 - 0) * 1 = 9_636
    # Joint path: marital_unit.sum(9_636 + 9_636) / 2 = 9_636 per person
    # Combined: 9_636 + 9_636 = $19,272/yr = $1,606/mo (matches CHFS standard)
    ky_ssp: [9_636, 9_636]


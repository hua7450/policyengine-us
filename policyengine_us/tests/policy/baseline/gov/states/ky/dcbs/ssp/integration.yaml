- name: Case 11, income exactly at payment standard boundary leaves zero supplement.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # For income_excess = 19_320 (the PCH standard):
        # countable_income = 11_928 + 19_320 = 31_248
        # uncapped_ssi = 11_928 - 31_248 = -19_320
        ssi_countable_income: 31_248
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # uncapped_ssi < 0 => receives_ssi = false => not eligible
    ky_ssp_eligible: [false]
    ky_ssp_payment_standard: [19_320]
    ky_ssp: [0]

- name: Case 12, asymmetric couple in Caretaker, one eligible, one not.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 68
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
        ssi_claim_is_joint: false
      person2:
        age: 66
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        ssi_claim_is_joint: false
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
        ky_ssp_category: CARETAKER
  output:
    # person1: ABD + not joint + marital_unit size 2 => COUPLE_ONE_ELIGIBLE
    # person2: not ABD => INDIVIDUAL
    ky_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]
    # person1: eligible; person2: not SSI-eligible => not SSP-eligible
    ky_ssp_eligible: [true, false]
    # person1 uses COUPLE_ONE_ELIGIBLE row (individual rate, no split)
    # CARETAKER.COUPLE_ONE_ELIGIBLE.ONE = $1,056/mo * 12 = $12,672/yr
    # person2 (INDIVIDUAL): CARETAKER.INDIVIDUAL.ONE = $12,672/yr
    ky_ssp_payment_standard: [12_672, 12_672]
    # Not joint => individual path (no marital_unit sum/2 halving)
    # person1: max(0, 12_672 - 0) * eligible(1) = 12_672
    # person2: max(0, 12_672 - 0) * eligible(0) = 0
    ky_ssp: [12_672, 0]

- name: Case 13, large family in Caretaker — only SSI-eligible member gets supplement.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 45
        is_ssi_aged_blind_disabled: true
        is_ssi_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
      person2:
        age: 44
        is_ssi_eligible: false
      person3:
        age: 12
        is_ssi_eligible: false
      person4:
        age: 8
        is_ssi_eligible: false
      person5:
        age: 4
        is_ssi_eligible: false
    marital_units:
      marital_unit:
        members: [person1, person2]
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5]
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: KY
        ky_ssp_category: CARETAKER
  output:
    # Only person1 is SSI-eligible => only person1 gets SSP
    ky_ssp_eligible: [true, false, false, false, false]
    # person1: COUPLE_ONE_ELIGIBLE (ABD, not joint, marital_unit size 2)
    # => individual rate $1,056/mo * 12 = $12,672/yr
    ky_ssp: [12_672, 0, 0, 0, 0]

- name: Case 8, PCH individual with large income excess floors benefit at zero.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_aged: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # ssi_amount_if_eligible = $11,928/yr
        # For supplement=0: need income_excess >= 19_320
        # => countable_income >= 11_928 + 19_320 = 31_248
        ssi_countable_income: 35_000
    marital_units:
      marital_unit:
        members: [person1]
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # NOTE: uncapped_ssi = 11_928 - 35_000 = -23_072 (< 0)
    # receives_ssi (uncapped_ssi > 0) = false => not eligible (income too high)
    ky_ssp_eligible: [false]
    ky_ssp_claim_type: [INDIVIDUAL]
    ky_ssp_payment_standard: [19_320]
    # supplement = max(0, 19_320 - 23_072) * eligible(0) = 0
    ky_ssp: [0]


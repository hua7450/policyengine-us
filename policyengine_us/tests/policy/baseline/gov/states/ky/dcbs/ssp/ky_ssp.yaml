- name: Case 1, eligible PCH individual with zero income receives full standard.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 0
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 0) * eligible(1) = 19_320
    ky_ssp: 19_320

- name: Case 2, small countable income reduces the supplement.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 5_000
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 5_000) = 14_320
    ky_ssp: 14_320

- name: Case 3, moderate countable income reduces the supplement further.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 12_000
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 12_000) = 7_320
    ky_ssp: 7_320

- name: Case 4, countable income above the standard floors benefit at zero.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 25_000
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 25_000) = 0
    ky_ssp: 0

- name: Case 5, ineligible individual gets zero benefit.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: false
    ssi_countable_income: 0
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # Not eligible => supplement * 0 = 0
    ky_ssp: 0

- name: Case 6, extreme countable income does not inflate benefit.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 60_000_000
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 60_000_000) = 0
    ky_ssp: 0

- name: Case 7, countable income exactly equals the payment standard.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 19_320
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 19_320) = 0
    ky_ssp: 0

- name: Case 8, both-eligible couple splits Caretaker couple-both-care supplement evenly.
  period: 2026
  input:
    people:
      person1:
        ky_ssp_eligible: true
        # §9(2): couple split requires both SSI-eligible.
        is_ssi_eligible: true
        ssi_countable_income: 0
        # Couple-both-care: $1,606/mo; per-person standard = $803/mo * 12 = $9,636/yr
        ky_ssp_payment_standard: 9_636
      person2:
        ky_ssp_eligible: true
        is_ssi_eligible: true
        ssi_countable_income: 0
        ky_ssp_payment_standard: 9_636
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # Each person: supplement = max(0, 9_636 - 0) * 1 = 9_636
    # both SSI-eligible => marital_unit.sum / 2 = 19_272 / 2 = 9_636 per person
    ky_ssp: [9_636, 9_636]

- name: Case 9, both-eligible couple Caretaker couple-one-care splits evenly.
  period: 2026
  input:
    people:
      person1:
        ky_ssp_eligible: true
        is_ssi_eligible: true
        ssi_countable_income: 0
        # Couple-one-care: $1,552/mo; per-person standard = $776/mo * 12 = $9,312/yr
        ky_ssp_payment_standard: 9_312
      person2:
        ky_ssp_eligible: true
        is_ssi_eligible: true
        ssi_countable_income: 0
        ky_ssp_payment_standard: 9_312
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # Each person: supplement = max(0, 9_312 - 0) * 1 = 9_312
    # both SSI-eligible => marital_unit.sum / 2 = 18_624 / 2 = 9_312 per person
    ky_ssp: [9_312, 9_312]

- name: Case 10, countable income one dollar below standard leaves one dollar supplement.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 19_319
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 19_319) = 1
    ky_ssp: 1

- name: Case 11, countable income one dollar above standard floors benefit at zero.
  period: 2026
  input:
    state_code: KY
    ky_ssp_eligible: true
    ssi_countable_income: 19_321
    ky_ssp_payment_standard: 19_320
    ssi_claim_is_joint: false
  output:
    # supplement = max(0, 19_320 - 19_321) = 0
    ky_ssp: 0

- name: Case 12, one SSI-eligible + one ineligible spouse does not trigger couple split.
  period: 2026
  input:
    people:
      person1:
        ky_ssp_eligible: true
        is_ssi_eligible: true
        ssi_countable_income: 0
        ky_ssp_payment_standard: 19_320
      person2:
        # Spouse is ABD but fails resource test => not SSI-eligible.
        ky_ssp_eligible: false
        is_ssi_eligible: false
        ssi_countable_income: 0
        ky_ssp_payment_standard: 19_320
    marital_units:
      marital_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: KY
  output:
    # §9(2) couple split requires both SSI-eligible. With only one eligible
    # spouse, the eligible spouse receives the full individual-rate benefit
    # and the ineligible spouse receives nothing.
    ky_ssp: [19_320, 0]

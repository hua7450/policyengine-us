- name: Case 1, single SSI-eligible individual.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
    marital_units:
      marital_unit:
        members: [person1]
  output:
    # Solo marital unit => INDIVIDUAL
    ky_ssp_claim_type: [INDIVIDUAL]

- name: Case 2, couple with both SSI-eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
      person2:
        age: 68
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1, person2]
        state_code: KY
    marital_units:
      marital_unit:
        members: [person1, person2]
  output:
    # Both SSI-eligible => COUPLE_BOTH_ELIGIBLE for each.
    ky_ssp_claim_type: [COUPLE_BOTH_ELIGIBLE, COUPLE_BOTH_ELIGIBLE]

- name: Case 3, eligible spouse with ABD but resource-ineligible spouse uses individual rate.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
      person2:
        age: 68
        is_ssi_aged_blind_disabled: true
        # Spouse is ABD but fails resource test => not SSI-eligible.
        meets_ssi_resource_test: false
    households:
      household:
        members: [person1, person2]
        state_code: KY
    marital_units:
      marital_unit:
        members: [person1, person2]
  output:
    # §9(1)(c)1 — couple rates require both SSI-eligible. With only one
    # SSI-eligible spouse, eligible spouse uses COUPLE_ONE_ELIGIBLE (individual
    # rate); ineligible spouse falls through to default INDIVIDUAL.
    ky_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]

- name: Case 4, eligible individual with non-ABD spouse uses one-eligible-couple.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
      person2:
        age: 68
        is_ssi_aged_blind_disabled: false
    households:
      household:
        members: [person1, person2]
        state_code: KY
    marital_units:
      marital_unit:
        members: [person1, person2]
  output:
    # person1 eligible, person2 non-ABD ineligible => COUPLE_ONE_ELIGIBLE / INDIVIDUAL.
    ky_ssp_claim_type: [COUPLE_ONE_ELIGIBLE, INDIVIDUAL]

- name: Case 5, unmarried solo person is INDIVIDUAL.
  period: 2026
  input:
    people:
      person1:
        age: 45
        is_ssi_aged_blind_disabled: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
    marital_units:
      marital_unit:
        members: [person1]
  output:
    ky_ssp_claim_type: [INDIVIDUAL]

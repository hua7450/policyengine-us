- name: Case 1, SSI-eligible aged adult in PCH is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [true]

- name: Case 2, SSI-eligible adult with NONE category is not eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: NONE
  output:
    # Category NONE => not in a qualifying category => not eligible
    ky_ssp_eligible: [false]

- name: Case 3, not SSI-eligible with PCH category is not eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # Fails is_ssi_eligible => not eligible
    ky_ssp_eligible: [false]

- name: Case 4, SSI-eligible child in CARETAKER category is eligible (no age floor).
  period: 2026
  input:
    people:
      person1:
        age: 8
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: CARETAKER
  output:
    # KY has no universal age floor; Caretaker supplement available to children
    ky_ssp_eligible: [true]

- name: Case 5, SSI-eligible adult in FCH is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 55
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: FCH
  output:
    ky_ssp_eligible: [true]

- name: Case 6, SSI-eligible adult in CIS is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 50
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: CIS
  output:
    ky_ssp_eligible: [true]

- name: Case 7, fails resource test so not SSI-eligible and not SSP-eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: false
        meets_ssi_resource_test: false
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [false]

- name: Case 8, SSI eligible but uncapped_ssi zero is not eligible (requires > 0).
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income exactly equals FBR => uncapped_ssi = 0
        ssi_countable_income: 11_928
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # receives_ssi = uncapped_ssi > 0 fails when uncapped_ssi == 0
    ky_ssp_eligible: [false]

- name: Case 9, SSI eligible but very high income zeroes uncapped_ssi (not eligible).
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income well above FBR => uncapped_ssi < 0
        ssi_countable_income: 50_000
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # uncapped_ssi = 11_928 - 50_000 = -38_072 => not > 0 => not eligible
    ky_ssp_eligible: [false]

- name: Case 10, SSI-eligible child in PCH is eligible (no age floor).
  period: 2026
  input:
    people:
      person1:
        age: 10
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [true]

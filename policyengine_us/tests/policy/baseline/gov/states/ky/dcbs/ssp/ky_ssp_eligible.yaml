- name: Case 1, SSI-eligible aged adult in PCH is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [true]

- name: Case 2, SSI-eligible adult with NONE category is not eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: NONE
  output:
    # Category NONE => not in a qualifying category => not eligible
    ky_ssp_eligible: [false]

- name: Case 3, not SSI-eligible with PCH category is not eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: false
        is_ssi_eligible: false
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # Fails is_ssi_eligible => not eligible
    ky_ssp_eligible: [false]

- name: Case 4, SSI-eligible minor in CARETAKER fails §4(1)(c)3 age ≥ 18 requirement.
  period: 2026
  input:
    people:
      person1:
        age: 8
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: CARETAKER
  output:
    # 921 KAR 2:015 §4(1)(c)3 requires caretaker recipients to be at least 18.
    ky_ssp_eligible: [false]

- name: Case 5, SSI-eligible adult in FCH is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 55
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: FCH
  output:
    ky_ssp_eligible: [true]

- name: Case 6, SSI-eligible adult in CIS is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 50
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: CIS
  output:
    ky_ssp_eligible: [true]

- name: Case 7, fails resource test so not SSI-eligible and not SSP-eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: false
        meets_ssi_resource_test: false
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [false]

- name: Case 8, countable income below PCH standard is eligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income ($11,928/yr) is below the PCH annual standard
        # ($19,320) so §4(1)(b) is satisfied.
        ssi_countable_income: 11_928
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [true]

- name: Case 9, countable income above the PCH standard fails §4(1)(b).
  period: 2026
  input:
    people:
      person1:
        age: 70
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        # Countable income ($50,000) exceeds PCH standard ($19,320) — not eligible.
        ssi_countable_income: 50_000
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    ky_ssp_eligible: [false]

- name: Case 10, SSI-eligible minor in PCH fails §4(1)(c)1 age ≥ 18 requirement.
  period: 2026
  input:
    people:
      person1:
        age: 10
        is_ssi_aged_blind_disabled: true
        is_ssi_eligible: true
        meets_ssi_resource_test: true
        ssi_countable_income: 0
    households:
      household:
        members: [person1]
        state_code: KY
        ky_ssp_category: PCH
  output:
    # 921 KAR 2:015 §4(1)(c)1 requires PCH residents to be at least 18.
    ky_ssp_eligible: [false]

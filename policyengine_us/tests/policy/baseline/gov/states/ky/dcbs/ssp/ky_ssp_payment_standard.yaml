- name: Case 1, PCH individual.
  period: 2026
  input:
    state_code: KY
    ky_ssp_category: PCH
    ky_ssp_claim_type: INDIVIDUAL
    ky_ssp_care_receivers: ONE
  output:
    # PCH.INDIVIDUAL.ONE = $1,610/mo * 12 = $19,320/yr
    ky_ssp_payment_standard: 19_320


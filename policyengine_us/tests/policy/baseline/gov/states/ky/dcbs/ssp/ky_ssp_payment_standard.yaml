- name: Case 14, PCH care_receivers=BOTH individual (dimension unused for non-Caretaker).
  period: 2026
  input:
    state_code: KY
    ky_ssp_category: PCH
    ky_ssp_claim_type: INDIVIDUAL
    ky_ssp_care_receivers: BOTH
  output:

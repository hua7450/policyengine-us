- name: Case 1, older dependent, 10 hours/week.
  period: 2023-01
  input:
    ma_tafdc_eligible_dependent: true
    state_code: MA
    weekly_hours_worked_before_lsr: 10
    monthly_age: 2
    pre_subsidy_childcare_expenses: 3_000
  output:
    ma_tafdc_dependent_care_deduction_person: 44

- name: Case 2, younger dependent, 10 hours/week.
  period: 2023-01
  input:
    ma_tafdc_eligible_dependent: true
    state_code: MA
    weekly_hours_worked_before_lsr: 10
    monthly_age: 1
    pre_subsidy_childcare_expenses: 3_000
  output:
    ma_tafdc_dependent_care_deduction_person: 50

- name: Case 3, capped at care expenses.
  period: 2023-01
  input:
    ma_tafdc_eligible_dependent: true
    state_code: MA
    weekly_hours_worked_before_lsr: 10
    monthly_age: 2
    pre_subsidy_childcare_expenses: 30
  output:
    ma_tafdc_dependent_care_deduction_person: 2.5

- name: Case 4, older dependent, 60 hours/week.
  period: 2023-01
  input:
    ma_tafdc_eligible_dependent: true
    state_code: MA
    weekly_hours_worked_before_lsr: 60
    monthly_age: 2
    pre_subsidy_childcare_expenses: 3_000
  output:
    ma_tafdc_dependent_care_deduction_person: 175

- name: Integration test, one dependent, 60 hours/week, older dependent.
  period: 2023
  input:
    people:
      person1:
        weekly_hours_worked_before_lsr: 60
      person2:
        ma_tafdc_eligible_dependent: true
        age: 12
        pre_subsidy_childcare_expenses: 3_000
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    ma_tafdc_dependent_care_deduction_person: [0, 2_100]

- name: Incapacitated adult care expenses count toward the deduction.
  period: 2023-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 25
        is_incapable_of_self_care: true
        care_expenses: 1_200
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    # Per 106 CMR 704.275(A): incapacitated individual at the older tier,
    # $175/month at 40 weekly hours. Expenses = 1,200 / 12 = 100/month.
    ma_tafdc_dependent_care_deduction_person: [0, 100]

- name: Adult care expenses without incapacity are not deducted.
  period: 2023-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 25
        care_expenses: 1_200
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    # Person2 is neither an eligible dependent nor incapacitated, so the
    # per-person cap is $0: min(0, 100) = 0.
    ma_tafdc_dependent_care_deduction_person: [0, 0]

- name: Case 1, assets at limit, eligible.
  period: 2025-01
  input:
    spm_unit_assets: 1_000_000
    state_code: ME
  output:
    me_ccap_asset_eligible: true

- name: Case 2, assets above limit, ineligible.
  period: 2025-01
  input:
    spm_unit_assets: 1_000_001
    state_code: ME
  output:
    me_ccap_asset_eligible: false

- name: Case 3, no assets, eligible.
  period: 2025-01
  input:
    spm_unit_assets: 0
    state_code: ME
  output:
    me_ccap_asset_eligible: true

- name: Case 4, assets well below limit, eligible.
  period: 2025-01
  input:
    spm_unit_assets: 500_000
    state_code: ME
  output:
    me_ccap_asset_eligible: true

# === Edge cases ===

- name: Case 5, assets one dollar below limit, eligible.
  period: 2025-01
  input:
    spm_unit_assets: 999_999
    state_code: ME
  output:
    me_ccap_asset_eligible: true

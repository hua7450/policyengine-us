# === Edge cases ===

- name: Case 6, 1 hour per week, minimum part time.
  period: 2026-01
  input:
    childcare_hours_per_day: 1
    childcare_days_per_week: 1
    state_code: ME
  output:
    # 1 hour < 30 => PART_TIME.
    me_ccap_time_category: PART_TIME

- name: Case 7, zero hours per week.
  period: 2026-01
  input:
    childcare_hours_per_day: 0
    childcare_days_per_week: 0
    state_code: ME
  output:
    # 0 hours < 30 => PART_TIME.
    me_ccap_time_category: PART_TIME

- name: Case 8, 50 hours per week, maximum full time.
  period: 2026-01
  input:
    childcare_hours_per_day: 10
    childcare_days_per_week: 5
    state_code: ME
  output:
    # 50 hours >= 30 => FULL_TIME.
    me_ccap_time_category: FULL_TIME

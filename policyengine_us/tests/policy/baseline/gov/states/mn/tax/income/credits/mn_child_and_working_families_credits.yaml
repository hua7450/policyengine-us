# 2025 test case to verify updated parameter values
# Per 2025 Schedule M1CWFC:
# - Earned income max for WFC: $9,480 (Line 3)
# - WFC phase-in rate: 4% (Line 4)
# - CTC amount per child: $1,750 (Line 8)
# - Joint phaseout threshold: $37,910 (Line 11)
# - Non-joint phaseout threshold: $31,950 (Line 11)
# - Phase-out rate: 12% for CTC eligible (Line 13)
# - Qualifying older child amounts:
#   - 1 child: $1,000
#   - 2 children: $2,270
#   - 3+ children: $2,710
- name: 2025 Joint filers with one CTC-eligible child, eligible for WFC, no phase-out
  # Calculation:
  # WFC: min($10,000, $9,480) * 0.04 = $9,480 * 0.04 = $379.20
  # CTC: 1 child * $1,750 = $1,750
  # Total before phaseout: $379.20 + $1,750 = $2,129.20
  # No phaseout since AGI ($10,000) < joint threshold ($37,910)
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 48
        is_child_dependent: false
      person2:
        age: 40
        is_child_dependent: false
      person3:
        age: 5
        is_child_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        ctc_qualifying_children: 1
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 2_129.2

- name: 2025 Joint filers with one CTC-eligible child and one qualifying older child, no phase-out
  # Calculation:
  # WFC base: min($10,000, $9,480) * 0.04 = $379.20
  # WFC older child (1 child): $1,000
  # WFC total: $379.20 + $1,000 = $1,379.20
  # CTC: 1 child * $1,750 = $1,750
  # Total before phaseout: $1,379.20 + $1,750 = $3,129.20
  # No phaseout since AGI ($10,000) < joint threshold ($37,910)
  period: 2025
  input:
    people:
      person1:
        age: 48
        is_child_dependent: false
        is_full_time_student: false
      person2:
        age: 40
        is_child_dependent: false
        is_full_time_student: false
      person3:
        age: 5
        is_child_dependent: true
        is_full_time_student: false
      person4:
        age: 19
        is_child_dependent: true
        is_full_time_student: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
        ctc_qualifying_children: 1
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 3_129.2

- name: 2025 Joint filers with high investment income should get zero credit
  # Per M1CWFC form: "Do not complete Schedule M1CWFC if you are
  # otherwise restricted from claiming the federal Earned Income Credit."
  # Investment income ($53K) exceeds EIC limit ($11,950 in 2025),
  # so the entire credit (CTC + WFC) should be zero.
  # Matches TaxAct and TAXSIM (policyengine-taxsim#766).
  period: 2025
  input:
    people:
      person1:
        age: 40
        employment_income: 10_000
        tax_exempt_interest_income: 53_000
      person2:
        age: 38
      person3:
        age: 4
      person4:
        age: 10
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 0

- name: 2025 Single filer with one CTC-eligible child, partial phase-out
  # Calculation:
  # WFC base: min($40,000, $9,480) * 0.04 = $379.20
  # CTC: 1 child * $1,750 = $1,750
  # Total before phaseout: $379.20 + $1,750 = $2,129.20
  # Phaseout: max(AGI, earned_income) - threshold = $40,000 - $31,950 = $8,050
  # Phaseout amount: $8,050 * 0.12 = $966
  # Final credit: $2,129.20 - $966 = $1,163.20
  period: 2025
  input:
    people:
      person1:
        age: 48
        is_child_dependent: false
      person2:
        age: 5
        is_child_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        ctc_qualifying_children: 1
        mn_wfc_eligible: true
        filer_adjusted_earnings: 40_000
        adjusted_gross_income: 40_000
        filing_status: SINGLE
    households:
      household:
        members: [person1, person2]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 1_163.2

- name: MN qualifying older child bonus counts a disabled adult dependent (M1DQC step 4 / IRC 152(c)(3)(B))
  # Schedule M1DQC steps 3-4: a dependent who is permanently and totally
  # disabled and aged 18 or older is checked as a qualifying older child
  # (row 11) without the full-time-student test that non-disabled 18+ children
  # must meet. This adds the 1-qualifying-older-child WFC bonus ($1,000 in 2025).
  period: 2025
  input:
    people:
      person1:
        age: 45
        is_full_time_student: false
      disabled_adult:
        age: 29
        is_tax_unit_dependent: true
        is_full_time_student: false
        is_permanently_and_totally_disabled: true
    tax_units:
      tax_unit:
        members: [person1, disabled_adult]
        ctc_qualifying_children: 0
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, disabled_adult]
        state_code: MN
  output:
    # WFC base: min($10,000, $9,480) * 0.04 = $379.20
    # Qualifying older child bonus (1 child): $1,000
    # No CTC (the disabled adult is over the CTC age limit), no phase-out
    # below the $37,910 joint threshold: $379.20 + $1,000 = $1,379.20.
    mn_child_and_working_families_credits: 1_379.2

- name: MN qualifying older child bonus excludes a non-disabled 18+ dependent who is not a full-time student
  # The same 29-year-old dependent without the disability flag and not a
  # full-time student is not a qualifying older child (M1DQC step 6-8), so
  # only the WFC base applies with no bonus.
  period: 2025
  input:
    people:
      person1:
        age: 45
        is_full_time_student: false
      adult:
        age: 29
        is_tax_unit_dependent: true
        is_full_time_student: false
        is_permanently_and_totally_disabled: false
    tax_units:
      tax_unit:
        members: [person1, adult]
        ctc_qualifying_children: 0
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, adult]
        state_code: MN
  output:
    # WFC base only: min($10,000, $9,480) * 0.04 = $379.20, no older-child bonus.
    mn_child_and_working_families_credits: 379.2

# Minnesota decouples from IRC 32(m) (Minn. Stat. 290.0661/290.0671), so an
# ITIN child (ssn_card_type OTHER_NON_CITIZEN, no SSN valid for employment)
# receives the same MN CTC as a citizen child. This mirrors the "2025 Joint
# filers with one CTC-eligible child" case above (which yields $2,129.20) but
# makes the child an ITIN child; the amount must be identical. This case FAILS
# if the 32(m) SSN gate is restored to the eligible-child formula.
- name: 2025 Joint filers with one ITIN CTC-eligible child receive the same MN CTC as a citizen child
  # WFC: min($10,000, $9,480) * 0.04 = $379.20; CTC: 1 child * $1,750 = $1,750
  # Total = $2,129.20, no phaseout (AGI $10,000 < $37,910 joint threshold).
  period: 2025
  input:
    people:
      person1:
        age: 48
        is_child_dependent: false
      person2:
        age: 40
        is_child_dependent: false
      person3:
        age: 5
        is_child_dependent: true
        ssn_card_type: OTHER_NON_CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        ctc_qualifying_children: 1
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 2_129.2

# Minnesota decouples from IRC 32(m) (Minn. Stat. 290.0661/290.0671), so an
# ITIN filer (head with ssn_card_type OTHER_NON_CITIZEN, no SSN valid for
# employment) with an SSN qualifying child is still allowed the MN CTC/WFC. The
# per-child credit must equal that of a citizen filer ($2,129.20, matching the
# "2025 Joint filers with one CTC-eligible child" case above). This case FAILS
# if the 32(m) filer-SSN gate is restored.
- name: 2025 Joint ITIN filer with an SSN CTC-eligible child receives the same MN CTC as a citizen filer
  # WFC: min($10,000, $9,480) * 0.04 = $379.20; CTC: 1 child * $1,750 = $1,750
  # Total = $2,129.20, no phaseout (AGI $10,000 < $37,910 joint threshold).
  period: 2025
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 48
        is_child_dependent: false
        ssn_card_type: OTHER_NON_CITIZEN
      person2:
        age: 40
        is_child_dependent: false
        ssn_card_type: OTHER_NON_CITIZEN
      person3:
        age: 5
        is_child_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
        ctc_qualifying_children: 1
        mn_wfc_eligible: true
        filer_adjusted_earnings: 10_000
        adjusted_gross_income: 10_000
        filing_status: JOINT
    households:
      household:
        members: [person1, person2, person3]
        state_code: MN
  output:
    mn_child_and_working_families_credits: 2_129.2

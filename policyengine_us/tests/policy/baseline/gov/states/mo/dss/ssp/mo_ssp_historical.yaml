- name: 2017 Missouri SAB top-up is zero because the $510 max is below federal SSI.
  period: 2017-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 50
        is_blind: true
        mo_ssp_living_arrangement: SAB
    households:
      household:
        members: [person1]
        state_code: MO
  output:
    # Federal SSI (2017) = $735 > $510 SAB maximum, so max(510 - 735, 0) = 0.
    ssi: 735
    mo_ssp: 0

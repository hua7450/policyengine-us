    itemized_taxable_income_deductions: 0
    employee_social_security_tax: 0
    employee_medicare_tax: 0
    misc_deduction: 0
    mo_net_state_income_taxes: 0
    state_code: MO
  output:
    mo_itemized_deductions: 0.0


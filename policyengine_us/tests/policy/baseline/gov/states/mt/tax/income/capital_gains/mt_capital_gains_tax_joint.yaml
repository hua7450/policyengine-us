- name: Higher rate applied to all gains
  period: 2024
  input:
    long_term_capital_gains: 1_000
    mt_taxable_income_joint: 1_000
    mt_capital_gains_tax_applicable_threshold_joint: 0
    filing_status: SINGLE
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 41 

- name: Lower rate applies only
  period: 2024
  input:
    long_term_capital_gains: 1_000
    mt_taxable_income_joint: 1_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: SEPARATE
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 30 


- name: Lower and higher rate applies
  period: 2024
  input:
    long_term_capital_gains: 3_000
    mt_taxable_income_joint: 3_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: SEPARATE
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 101 

- name: No tax in 2023
  period: 2023
  input:
    long_term_capital_gains: 3_000
    mt_taxable_income_joint: 3_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: JOINT
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 0 

- name: Taxable income below LTCG and below higher rate threshold
  period: 2024
  input:
    long_term_capital_gains: 3_000
    mt_taxable_income_joint: 1_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: JOINT
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 30

- name: Taxable income below LTCG and above higher rate threshold
  period: 2024
  input:
    long_term_capital_gains: 10_000
    mt_taxable_income_joint: 3_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: JOINT
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 101

- name: Taxable above above LTCG and above higher rate threshold
  period: 2024
  input:
    long_term_capital_gains: 10_000
    mt_taxable_income_joint: 12_000
    mt_capital_gains_tax_applicable_threshold_joint: 2_000
    filing_status: JOINT
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 410

- name: No CG tax when net capital gains are negative
  # LTCG=50K but STCG=-80K → net=-30K → no preferential treatment
  period: 2024
  input:
    long_term_capital_gains: 50_000
    short_term_capital_gains: -80_000
    mt_taxable_income_joint: 100_000
    filing_status: JOINT
    state_code: MT
  output:
    mt_capital_gains_tax_joint: 0

- name: CG tax applies when net capital gains are positive despite STCG losses
  # LTCG=50K, STCG=-20K → net=+30K → preferential rates apply to full LTCG
  period: 2024
  input:
    long_term_capital_gains: 50_000
    short_term_capital_gains: -20_000
    mt_taxable_income_joint: 100_000
    mt_capital_gains_tax_applicable_threshold_joint: 41_000
    filing_status: JOINT
    state_code: MT
  output:
    # lesser_of_cg_and_taxable = min(50K, 100K) = 50K
    # excess_over_taxable = max(100K - 50K, 0) = 50K
    # excess_over_threshold = max(41K - 50K, 0) = 0
    # All 50K taxed at higher rate: 50K * 0.041 = 2050
    mt_capital_gains_tax_joint: 2_050

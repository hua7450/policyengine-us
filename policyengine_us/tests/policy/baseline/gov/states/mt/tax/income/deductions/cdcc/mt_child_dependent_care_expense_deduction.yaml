- name: Care expense greater than maximum amount with low AGI and 1 child
  period: 2021
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        is_tax_unit_head_or_spouse: true
        mt_agi_indiv: 18_000 #No reduction needed
      person2:
        age: 10
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
        tax_unit_childcare_expenses: 2_401
    households:
      household:
        members: [person1, person2]
        state_code: MT
  output:
    # One qualifying individual caps expenses at 2_400.
    # Head receives half: 2_400 * 0.5 = 1_200.
    mt_child_dependent_care_expense_deduction: [1_200, 0]


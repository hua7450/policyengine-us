    people:
      person1:
        age: 35
        employment_income: 55_000
        immigration_status: CITIZEN
      person2:
        age: 32
        immigration_status: CITIZEN
      person3:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 40
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
      person4:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: NJ
  output:
    # FPG family of 4: 33_000; FPL ratio = 55_000/33_000 = 1.667
    # 2 children both FT at 101-200% -> first child 4% + second child 2% = 6%
    # Uncapped: 55_000 * 0.06 / 12 = 275
    # Cap: 55_000 * 0.05 / 12 = 229.17
    # copay = min(275, 229.17) = 229.17
    nj_ccap_copay: 229.17


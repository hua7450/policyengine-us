        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        childcare_hours_per_week: 35
        nj_ccap_provider_type: LICENSED_CENTER
        nj_ccap_grow_nj_kids_rating: NONE
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # FPG family of 2: 21_640; FPL ratio = 31_000/21_640 = 1.4326
    # 1 child FT at 101-200% FPL -> 4%
    # monthly copay = 31_000 * 0.04 / 12 = 103.33
    nj_ccap_copay: 103.33


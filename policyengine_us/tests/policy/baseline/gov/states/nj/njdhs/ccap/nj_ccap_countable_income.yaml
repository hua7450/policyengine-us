# nj_ccap_countable_income: SPMUnit, float, MONTH
# Sums income sources via adds parameter list.
# Excludes TANF cash benefits.
# Sources: employment_income, self_employment_income, social_security_retirement,
#   social_security_disability, social_security_survivors, ssi, dividend_income,
#   interest_income, rental_income, pension_income, unemployment_compensation,
#   workers_compensation, alimony_income, child_support_received.
# All are YEAR-defined; in MONTH test, input annual, output monthly (annual/12).

- name: Case 1, employment income only.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    # 36_000 / 12 = 3_000/month
    nj_ccap_countable_income: 3_000

- name: Case 2, multiple income sources.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        child_support_received: 6_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # (24_000 + 6_000) / 12 = 2_500/month
    nj_ccap_countable_income: 2_500

- name: Case 3, TANF excluded from countable income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 12_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        nj_wfnj: 4_800
    households:
      household:
        members: [person1, person2]
        state_code: NJ
  output:
    # Only employment counts: 12_000 / 12 = 1_000/month
    # TANF (nj_wfnj) not in sources list -> excluded
    nj_ccap_countable_income: 1_000

- name: Case 4, zero income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: NJ
  output:
    nj_ccap_countable_income: 0

- name: Case 5, two earners in household.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
      person2:
        age: 32
        employment_income: 18_000
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NJ
  output:
    # (30_000 + 18_000) / 12 = 4_000/month
    nj_ccap_countable_income: 4_000

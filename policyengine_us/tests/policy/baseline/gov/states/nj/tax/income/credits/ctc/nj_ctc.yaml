- name: Filer with 2 dependents under 6 and taxable income under $30,000 gets $1,000 credit
  period: 2022
  input:
    people:
      person1:
        age: 21
        is_tax_unit_dependent: false
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        nj_ctc_eligible: true
        nj_taxable_income: 20_000
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: NJ
  output:
    nj_ctc: 1_000


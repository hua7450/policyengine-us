# Unit tests for nj_staynj variable.
# Formula: Stay NJ = max(min(property_taxes * 50%, max_benefit) - ANCHOR
#                        - capped Senior Freeze, 0)
# 2026: original P.L.2023 c.75 rules - flat $6,500 cap, $500,000 income limit.
# 2027+: FY2027 Appropriations Act (A-5327) - income-tiered cap
#        (<=$100K -> $6,500; $100K-$150K -> $5,000; $150K-$200K -> $4,000),
#        $200,000 income limit.
# ANCHOR and capped Senior Freeze are set directly as inputs to isolate the
# Stay NJ formula (their own derivations are tested separately).

# --- 2026: flat $6,500 cap, $500,000 income limit ---

- name: 2026 flat cap, benefit capped at $6,500.
  period: 2026
  input:
    people:
      person1:
        age: 70
        employment_income: 100_000
        real_estate_taxes: 20_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        nj_anchor: 0
        nj_capped_senior_freeze: 0
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_fips: 34
  output:
    # min($20,000 * 50%, $6,500) = $6,500
    nj_staynj: 6_500

- name: 2026 higher income still gets the flat $6,500 cap (no tiering).
  period: 2026
  input:
    people:
      person1:
        age: 70
        employment_income: 300_000
        real_estate_taxes: 20_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        nj_anchor: 0
        nj_capped_senior_freeze: 0
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_fips: 34
  output:
    # income $300K < $500K limit, flat $6,500 cap applies
    nj_staynj: 6_500

- name: 2026 property tax binds below the flat cap.
  period: 2026
  input:
    people:
      person1:
        age: 70
        employment_income: 100_000
        real_estate_taxes: 8_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        nj_anchor: 0
        nj_capped_senior_freeze: 0
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_fips: 34
  output:
    # min($8,000 * 50%, $6,500) = $4,000
    nj_staynj: 4_000

- name: 2026 income at the old $500,000 limit is ineligible.
  period: 2026
  input:
    people:
      person1:
        age: 70
        employment_income: 500_000
        real_estate_taxes: 20_000
        is_tax_unit_head: true
    tax_units:
      tax_unit:
        members: [person1]
        nj_anchor: 0
        nj_capped_senior_freeze: 0
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_tenure_type: OWNER_WITH_MORTGAGE
    households:
      household:
        members: [person1]
        state_fips: 34
  output:
    nj_staynj: 0

# --- 2027: income-tiered cap, $200,000 income limit ---


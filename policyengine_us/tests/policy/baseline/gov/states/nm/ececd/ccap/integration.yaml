        childcare_hours_per_week: 40  # FULL_TIME
        nm_ccap_provider_type: REGISTERED_HOME
    spm_units:
      spm_unit:
        members: [person1, person2]
        nm_ccap_enrolled: false
        spm_unit_assets: 2_000
        # Charge 12_000/yr -> 1_000/month, above the rate.
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    households:
      household:
        members: [person1, person2]
        state_code: NM
  output:
    nm_ccap_eligible: true
    nm_ccap_copay: 0
    # Registered Home Infant = 750 on the 2025-11-04 schedule (up from 425).
    nm_ccap_monthly_rate: [0, 750]
    # Monthly charge = 1_000 > 750. Subsidy = min(750, 1_000) - 0 = 750.
    nm_ccap: 750

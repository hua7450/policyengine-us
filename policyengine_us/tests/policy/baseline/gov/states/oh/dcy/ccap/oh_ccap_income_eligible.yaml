        state_code: OH
  output:
    oh_ccap_income_eligible: true

# Transitional child care (5180:6-1-02(F)): a family in the 12 months after
# Ohio Works First ends qualifies at intake up to 150% FPG (3,332 for size 3).
- name: Case 16, transitional family between 145% and 150% FPG is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_600  # 3,300/month, above 3,221 and below 3,332
        oh_ccap_owf_transitional: true
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 17, transitional family above 150% FPG fails at intake.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_080  # 3,340/month, above 3,332
        oh_ccap_owf_transitional: true
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

- name: Case 18, transitional 150% limit requires employment, not full-time study.
  # 5180:6-1-02(F)(1)(a): transitional child care is employment-based; a
  # non-working student caretaker keeps the ordinary 145% intake limit.
  period: 2026-01
  input:
    people:
      person1:
        age: 22
        is_full_time_student: true
        weekly_hours_worked_before_lsr: 0
        unemployment_compensation: 39_600  # 3,300/month, above 3,221
        oh_ccap_owf_transitional: true
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

- name: Case 19, a second caretaker may meet the activity rule through education.
  # 5180:6-1-02(F)(1)(a) requires employment of the former OWF caretaker;
  # it does not require every caretaker in the family to be employed.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 39_600  # 3,300/month, above 3,221 and below 3,332
        oh_ccap_owf_transitional: true
      person2:
        age: 28
        is_tax_unit_spouse: true
        is_full_time_student: true
        weekly_hours_worked_before_lsr: 0
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

# Minimum family size: a single parent with one child (size 2).
# Annual 100% FPG = 21,150; monthly = 1,762.50; 145% standard = 2,556.
- name: Case 13, smallest family (single parent, one child) just below 145%.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000  # 2,500/month, below 2,556
      person2:
        age: 3
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 14, smallest family above the 145% intake limit fails.
  period: 2026-01
  input:
    people:
      person1:
        age: 30

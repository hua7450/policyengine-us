# Tests for oh_ccap_income_eligible (SPMUnit, MONTH).
# DCY Procedure Letter 21: initial (intake) eligibility caps income at 145% FPG;
# a special-needs child raises the initial limit to 150% FPG; a family in the
# post-Ohio Works First transitional period (5180:6-1-02(F)) also uses 150%;
# once enrolled, a family remains eligible until income exceeds 300% FPG.
#
# PL 21 uses the FPG in effect each October 1, so 2026-01 cases use the 2025
# guidelines. Family of 3: annual 100% FPG = 26,650; monthly = 2,220.83.
# Monthly standards round up to the next dollar (PL 21 table):
#   145% = 3,221; 150% = 3,332; 300% = 6,663.
# Income parameters start 2025-10-01, so cases use 2026.
- name: Case 1, income below 145% FPG is income-eligible at intake.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3,000/month, below 3,221
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 2, income above 145% FPG fails intake when not enrolled.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_600  # 3,300/month, above 3,221 and below 3,332
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

- name: Case 3, special-needs child raises the intake limit to 150% FPG.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 39_600  # 3,300/month, between 145% (3,221) and 150% (3,332)
      person2:
        age: 28
      person3:
        age: 3
        has_developmental_delay: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 4, enrolled family stays eligible up to 300% FPG.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 42_000  # 3,500/month, above 145% but below 300%
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        oh_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true

- name: Case 5, enrolled family above 300% FPG loses eligibility.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7,000/month, above 6,663
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        oh_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

# 5180:6-1-02(B)(1) makes income eligibility purely FPL-based, and
# 5180:2-16-03(H)(3)(j) counts OWF cash assistance as unearned income, so
# TANF enrollment confers no categorical income eligibility.
- name: Case 6, TANF enrollment does not bypass the income test.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 84_000  # 7,000/month, far above 300%
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: false

# Edge cases.
# 145% intake boundary (size 3): monthly standard = 3,221. Income is offset
# from the exact boundary to avoid float32 drift flipping the comparison.
- name: Case 7, income just below the 145% intake limit is eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 38_400  # 3,200/month, just below 3,221
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OH
  output:
    oh_ccap_income_eligible: true


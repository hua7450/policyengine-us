# Tests for oh_ccap_rate_with_addons (Person, MONTH, defined_for oh_ccap_eligible_child).
# 5180:6-1-10(B)(1)-(2): the base for all add-ons is the LOWER of the Appendix
# A rate and the provider's customary charge (pre_subsidy_childcare_expenses).
# (C)/(D): the higher of the Step Up To Quality and accredited bonuses is then
# added on top and may exceed the customary charge. (F)/(G): non-traditional
# hours (+5%) and special-needs (+5%) percentages apply to the (B)(1)-or-(C)
# rate and may not exceed the customary charge; approved accommodations
# double the (B)(1)-or-(C) rate with no charge cap.
# All cases use a Category 2 center, preschool, full-time child:
#   base = 190/week * 52 / 12 = 823.333...; customary charge is set high so the
# (B)(1) cap does not bind except in the dedicated cap cases. Rates start
# 2025-11-01, so cases use period 2026.
- name: Case 1, Gold quality adds 25 percent.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        oh_ccap_provider_type: CENTER
        oh_ccap_quality_tier: GOLD
        childcare_hours_per_week: 40
        pre_subsidy_childcare_expenses: 60_000  # 5,000/month, no cap
    households:
      household:
        members: [person1, person2]
        state_code: OH
        county_str: STARK_COUNTY_OH
  output:
    # 823.333 * 1.25 = 1,029.167
    oh_ccap_rate_with_addons: [0, 1_029.17]


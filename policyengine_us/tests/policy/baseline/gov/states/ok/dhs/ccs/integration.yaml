- name: Case 4, benefit is capped at the family's child care expenses.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000  # $2,500/month.
      person2:
        age: 3
        ok_ccs_star_level: STAR_3
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 2_400  # $200/month.
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_copay: 169
    # min(630 rate, 200 expenses) - 169 copay = 31.

- name: Case 1, single working parent with one child in a three-star center.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000  # $2,500/month.
      person2:
        age: 3
        ok_ccs_star_level: STAR_3
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # $1,000/month.
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_countable_income: 2_500
    ok_ccs_income_eligible: true
    ok_ccs_eligible: true
    # Household of two, $2,320-$2,512 band.
    ok_ccs_copay: 169
    # Daily rate 31.50 (25-48 months, full-time) * 20 days = 630.
    # min(630, 1,000 expenses) - 169 copay = 461.
    ok_ccs: 461

- name: Case 2, TANF household pays no copayment.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1
        ok_ccs_provider_setting: CHILD_CARE_HOME
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 15
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_pre_subsidy_childcare_expenses: 6_000  # $500/month.
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_predetermined_eligible: true
    ok_ccs_eligible: true
    ok_ccs_copay: 0
    # One-star home rate 20.00 (0-24 months, full-time) * 15 days = 300.
    # min(300, 500 expenses) - 0 copay = 300.
    ok_ccs: 300


- name: Case 5, a self-employment loss does not inflate the benefit.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -60_000  # -$5,000/month.
      person2:
        age: 3
        childcare_hours_per_day: 8
        childcare_attending_days_per_month: 20
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 6_000  # $500/month.
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_countable_income: 0
    ok_ccs_copay: 0
    ok_ccs_eligible: true
    # One-star center rate 17.20 (25-48 months, full-time) * 20 days = 344.
    # min(344, 500 expenses) - 0 copay = 344, not inflated by negative income.
    ok_ccs: 344


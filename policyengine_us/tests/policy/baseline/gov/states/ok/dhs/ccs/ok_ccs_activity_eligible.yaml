# Need factor per OAC 340:40-7-8: each parent or caretaker must be employed
# or attending an education or training program, with TANF, protective or
# preventive child care, and CCDF activity-test pathways.
- name: Case 1, single working parent meets the need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: true

- name: Case 2, two-parent household where one parent is not in an activity.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 24_000  # $2,000/month.
      person2:
        age: 28
        is_tax_unit_spouse: true
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 3, working parent and full-time student spouse both meet the need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        employment_income: 24_000  # $2,000/month.
      person2:
        age: 28
        is_tax_unit_spouse: true
        is_full_time_student: true
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OK
  output:
    ok_ccs_activity_eligible: true

- name: Case 4, a self-employment loss does not establish employment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -6_000  # -$500/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 5, TANF enrollment without an approved activity does not meet the need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 6, non-working parent receiving protective services meets the need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        receives_or_needs_protective_services: true
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: true

- name: Case 7, non-working household meeting the CCDF activity test meets the need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: true

- name: Case 8, non-working single parent with no qualifying pathway.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 9, employment at the hours and minimum-wage boundaries qualifies.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 7_540  # 20 hours/week * 52 weeks * $7.25/hour.
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: true

- name: Case 10, employment below 20 hours per week does not qualify.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 19
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 11, earnings below minimum wage do not establish employment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 7_280  # 20 hours/week * 52 weeks * $7/hour.
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 12, two non-working college-student parents do not qualify.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_full_time_college_student: true
      person2:
        age: 28
        is_tax_unit_spouse: true
        is_full_time_college_student: true
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 13, an inactive dependent minor parent must meet a need factor.
  period: 2026-01
  input:
    people:
      person1:
        age: 45
        is_tax_unit_head: true
        employment_income: 24_000
      person2:
        age: 16
        is_parent: true
        is_in_k12_school: false
        is_full_time_student: false
      person3:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: OK
  output:
    ok_ccs_activity_eligible: false

- name: Case 14, qualifying farm earnings establish employment.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        farm_operations_income: 7_540
        weekly_hours_worked_before_lsr: 20
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:

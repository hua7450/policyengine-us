- name: Case 1, child support paid is deducted from gross income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month.
        child_support_expense: 2_400  # $200/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    # 2,000 - 200 = 1,800.
    ok_ccs_countable_income: 1_800

- name: Case 2, earnings of a minor child are excluded.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # $2,000/month.
      person2:
        age: 16
        employment_income: 12_000  # $1,000/month, excluded.
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    # 3,000 - 1,000 = 2,000.
    ok_ccs_countable_income: 2_000

- name: Case 3, a self-employment loss cannot produce negative income.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        self_employment_income: -12_000  # -$1,000/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_countable_income: 0

- name: Case 4, unearned income counts.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        social_security: 12_000  # $1,000/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_countable_income: 1_000

- name: Case 5, pension, veterans, and rental income count.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        pension_income: 6_000  # $500/month.
        veterans_benefits: 3_600  # $300/month.
        rental_income: 2_400  # $200/month.
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    # 500 + 300 + 200 = 1,000.
    ok_ccs_countable_income: 1_000


# Predetermined eligibility per OAC 340:40-7-1(b)(1): households receiving
# TANF or Supplemental Security Income.
- name: Case 1, TANF-enrolled household is predetermined eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_predetermined_eligible: true

- name: Case 2, SSI recipient household is predetermined eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        ssi: 500
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_predetermined_eligible: true

- name: Case 3, household with neither TANF nor SSI is not predetermined eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: OK
  output:
    ok_ccs_predetermined_eligible: false

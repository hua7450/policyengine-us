        pre_subsidy_childcare_expenses: 24_000
    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: OR
  output:
    or_erdc_eligible_child: [false, true]
    or_erdc_age_group: [SCHOOL, SPECIAL_NEEDS]
    or_erdc_maximum_monthly_rate: [0, 1_831]
    or_erdc_copay: 5
    or_erdc: 1_826


    spm_units:
      spm_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: OR
  output:
    or_erdc_countable_income: 1_000
    or_erdc_copay: 0
    or_erdc_maximum_monthly_rate: [0, 308.97]
    or_erdc: 308.97


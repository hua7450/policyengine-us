- name: Household sizes above eight use the size-eight copay schedule.
  period: 2027-01
  input:
    or_erdc_countable_income: 5_000
    spm_unit_size: 9
    state_code: OR
  output:
    or_erdc_copay: 5

- name: Categorically eligible families have no copay.
  period: 2027-01
  input:
    or_erdc_countable_income: 10_000
    or_erdc_categorically_eligible: true
    spm_unit_size: 2
    state_code: OR
  output:
    or_erdc_copay: 0

- name: Group size 2 copay just below the second bracket boundary.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_countable_income: 2_704
    spm_unit_size: 2
    state_code: OR
  output:
    or_erdc_copay: 5

- name: Group size 2 copay at the second bracket boundary.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_countable_income: 2_705
    spm_unit_size: 2
    state_code: OR
  output:
    or_erdc_copay: 10

- name: Group size 4 copay in the twenty-dollar bracket.
  period: 2027-01

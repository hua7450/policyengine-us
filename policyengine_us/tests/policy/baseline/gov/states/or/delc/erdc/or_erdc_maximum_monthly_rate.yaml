    or_erdc_high_needs_rate_eligible: true
    or_erdc_high_needs_factors: 1
    state_code: OR
  output:
    # Part-time rate 1562 + 1 factor * $840 = 2402.
    or_erdc_maximum_monthly_rate: 2_402

- name: High needs supplement requires the high needs rate eligibility flag.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_eligible_child: true

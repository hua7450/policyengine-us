- name: Enhanced provider part-time band bills hourly when it does not bill part-time.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_eligible_child: true
    or_erdc_provider_area: AREA_A
    or_erdc_provider_type: ENHANCED_FAMILY
    or_erdc_age_group: PRESCHOOL
    or_erdc_monthly_care_hours: 100
    or_erdc_provider_bills_part_time: false
    state_code: OR
  output:
    # 100 hours falls in the enhanced part-time band, but the provider does not
    # bill part-time, so the tier collapses to hourly: min(5.7 * 100, 982) = 570.
    or_erdc_maximum_monthly_rate: 570

- name: High needs adds five dollars per factor per hour on hourly billing.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_eligible_child: true
    or_erdc_provider_area: AREA_A
    or_erdc_provider_type: CERTIFIED_CENTER
    or_erdc_age_group: INFANT
    or_erdc_monthly_care_hours: 10
    or_erdc_high_needs_rate_eligible: true
    or_erdc_high_needs_factors: 2
    state_code: OR
  output:
    # min(12 * 10, 2083) + 2 factors * $5 * 10 hours = 120 + 100 = 220.
    or_erdc_maximum_monthly_rate: 220

- name: High needs adds eight hundred forty dollars per factor on monthly billing.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_eligible_child: true
    or_erdc_provider_area: AREA_A
    or_erdc_provider_type: CERTIFIED_CENTER
    or_erdc_age_group: INFANT
    or_erdc_monthly_care_hours: 200
    or_erdc_high_needs_rate_eligible: true
    or_erdc_high_needs_factors: 2
    state_code: OR
  output:
    # Monthly rate 2083 + 2 factors * $840 = 2083 + 1680 = 3763.
    or_erdc_maximum_monthly_rate: 3_763

- name: High needs adds the monthly supplement on part-time billing.
  period: 2027-01

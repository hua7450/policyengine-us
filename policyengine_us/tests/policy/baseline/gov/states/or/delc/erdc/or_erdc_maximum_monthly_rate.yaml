    or_erdc_high_needs_rate_eligible: false
    or_erdc_high_needs_factors: 2
    state_code: OR
  output:
    # Factors present but not high-needs eligible, so no supplement: 12 * 10 = 120.
    or_erdc_maximum_monthly_rate: 120

- name: Hourly billing is capped at the monthly rate near the monthly threshold.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    or_erdc_eligible_child: true
    or_erdc_provider_area: AREA_B
    or_erdc_provider_type: STANDARD_CENTER
    or_erdc_age_group: PRESCHOOL
    or_erdc_monthly_care_hours: 157
    state_code: OR
  output:
    # 7.13 * 157 = 1119.41 exceeds the 782 monthly rate, so hourly billing is
    # capped at 782, keeping reimbursement monotonic across the 158-hour tier.
    or_erdc_maximum_monthly_rate: 782

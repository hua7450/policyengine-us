# 2025 FPG family of 3: 15_650 + 5_500 * 2 = 26_650

- name: Case 1, income at 200 percent FPL with 7 percent copay.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 53_300
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPL ratio = 53,300 / 26,650 = 2.0 -> 7% rate
    # copay = 53,300 * 0.07 = 3,731
    ri_ccap_copay: 3_731

- name: Case 2, TANF enrolled family pays zero copay.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # TANF enrolled -> exempt from copay -> $0
    ri_ccap_copay: 0


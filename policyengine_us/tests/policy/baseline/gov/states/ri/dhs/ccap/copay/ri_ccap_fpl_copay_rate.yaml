# 2025 FPG family of 3: 15_650 + 5_500 * 2 = 26_650
# Copay rate brackets by FPL ratio:
#   0 to 1.0 -> 0%
#   1.0001 to 1.25 -> 2%
#   1.2501 to 1.5 -> 5%
#   1.5001+ -> 7%

- name: Case 1, income at 0 percent FPL.
  period: 2025
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPL ratio = 0 / 26,650 = 0 -> 0%
    ri_ccap_fpl_copay_rate: 0

- name: Case 2, income at 100 percent FPL.
  period: 2025
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 30
        employment_income: 26_650
      person2:
        age: 5
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # FPL ratio = 26,650 / 26,650 = 1.0 -> 0% (at or below 100%)
    ri_ccap_fpl_copay_rate: 0


# Edge cases for ri_ccap_asset_eligible
# Asset limit: $1,000,000

- name: Case 1, assets one cent below limit.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 999_999.99
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 999_999.99 <= 1_000_000 -> eligible
    ri_ccap_asset_eligible: true

- name: Case 2, assets above limit.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 1_000_001
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 1_000_001 > 1_000_000 -> ineligible
    ri_ccap_asset_eligible: false

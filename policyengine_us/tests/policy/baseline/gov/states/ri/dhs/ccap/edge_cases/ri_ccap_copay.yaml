# Edge cases for ri_ccap_copay
# 2025 FPG family of 2: 21_150
# Tests homeless exemption, zero income

- name: Case 1, housing insecure family with moderate income gets zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
        is_homeless: true
  output:
    # Housing insecure -> $0 copay regardless of income
    ri_ccap_copay: 0

- name: Case 2, zero income gives zero copay.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # income 0 -> FPL ratio 0 -> 0% rate -> copay = 0 * 0 = 0
    ri_ccap_copay: 0

- name: Case 3, very high income at 7 percent rate.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 55_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = 55_000 / 21_150 = 2.6005 -> 7% rate
    # annual copay = 55_000 * 0.07 = 3_850
    # monthly copay = 3_850 / 12 = 320.83
    ri_ccap_copay: 320.83

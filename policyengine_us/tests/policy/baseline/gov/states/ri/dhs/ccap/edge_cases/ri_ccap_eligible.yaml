# Edge cases for ri_ccap_eligible
# Tests categorical eligibility, TANF + homeless overlap, degenerate cases

- name: Case 1, TANF enrolled bypasses income and asset tests.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
        spm_unit_cash_assets: 2_000_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Income 100k > 261% FPL and assets 2M > 1M limit
    # But TANF enrolled -> categorically eligible (bypasses both tests)
    ri_ccap_eligible: true

- name: Case 2, TANF enrolled still needs eligible child.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # TANF enrolled but no child -> has_eligible_child = false -> ineligible
    ri_ccap_eligible: false

- name: Case 3, single adult without child is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 10_000
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1]
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    ri_ccap_eligible: false

- name: Case 4, income eligible but assets ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 1_500_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # income ok, but assets 1.5M > 1M -> ineligible
    ri_ccap_eligible: false

- name: Case 5, assets eligible but income ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPG family of 2: 21_150
    # 261% FPL = 55_201.50
    # income 60_000 > 55_201.50 -> ineligible
    ri_ccap_eligible: false

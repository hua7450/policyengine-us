- name: Case 1, assets below limit.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 500_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 500,000 <= 1,000,000 -> eligible
    ri_ccap_asset_eligible: true

- name: Case 2, assets exactly at limit.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 1_000_000
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 1,000,000 <= 1,000,000 -> eligible
    ri_ccap_asset_eligible: true

- name: Case 3, assets above limit.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_cash_assets: 1_000_001
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 1,000,001 > 1,000,000 -> ineligible
    ri_ccap_asset_eligible: false

- name: Case 4, zero assets.
  period: 2025
  input:
    people:
      person1:
        age: 30
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_asset_eligible: true

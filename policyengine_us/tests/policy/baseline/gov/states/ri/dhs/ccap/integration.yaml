- name: Case 1, single parent one child income below 100 percent FPL zero co-pay.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        employment_income: 18_000
      person2:
        age: 4
        is_tax_unit_dependent: true
        childcare_hours_per_week: 35
        ri_ccap_provider_type: EXEMPT
        ri_ccap_quality_rating: 1
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_works_eligible: false
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2, FPL 2025 = $21,150
    # FPL ratio = 18,000 / 21,150 = 0.8511 -> Level 0 -> 0% rate

    ri_ccap_eligible_child: [false, true]
    ri_ccap_income_eligible: true
    ri_ccap_activity_eligible: true
    ri_ccap_asset_eligible: true
    ri_ccap_eligible: true

    # Weekly family share = 0% * (18,000 / 52) = $0
    ri_ccap_family_share: 0

    # Exempt preschool FT star 1 = $59.91/week
    # YEAR = 12 * $59.91 = $718.92
    ri_ccap_max_weekly_rate: [0, 718.92]

    # Child: rate ($59.91) - copay ($0) = $59.91/week
    # YEAR = [0, 12 * 59.91] = [0, 718.92]
    ri_ccap_weekly_benefit: [0, 718.92]

    # Monthly = 59.91 * 52 / 12 = $259.61
    # YEAR = 12 * 259.61 = $3,115.32
    ri_ccap: 3_115.32

- name: Case 2, single parent two children income at 130 percent FPL copay on youngest.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        employment_income: 34_645
      person2:
        age: 7
        is_tax_unit_dependent: true
        childcare_hours_per_week: 35
        ri_ccap_provider_type: EXEMPT
        ri_ccap_quality_rating: 1
      person3:
        age: 4
        is_tax_unit_dependent: true
        childcare_hours_per_week: 35
        ri_ccap_provider_type: EXEMPT
        ri_ccap_quality_rating: 1
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ri_works_eligible: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # Family of 3, FPL 2025 = $26,650
    # FPL ratio = 34,645 / 26,650 = 1.3 -> bracket >= 1.2501 -> 5% rate
    # Weekly income = 34,645 / 52 = $666.25
    # Weekly share = 666.25 * 0.05 = $33.3125
    # YEAR = 12 * 33.3125 = $399.75

    ri_ccap_eligible_child: [false, true, true]
    ri_ccap_income_eligible: true
    ri_ccap_eligible: true
    ri_ccap_family_share: 399.75

    # Person2 (age 7): exempt school_age FT star 1 = $58.80/week
    # Person3 (age 4): exempt preschool FT star 1 = $59.91/week
    # YEAR = [0, 12*58.80, 12*59.91]
    ri_ccap_max_weekly_rate: [0, 705.60, 718.92]

    # Youngest eligible child = person3 (age 4) gets copay
    # Person3: 59.91 - 33.3125 = $26.5975/week -> 12 * 26.5975 = 319.17
    # Person2: 58.80/week -> 12 * 58.80 = 705.60
    ri_ccap_weekly_benefit: [0, 705.60, 319.17]

    # Monthly = (58.80 + 26.5975) * 52 / 12 = 85.3975 * 4.3333 = $370.06
    # YEAR = 12 * 370.06 = $4,440.67
    ri_ccap: 4_440.67


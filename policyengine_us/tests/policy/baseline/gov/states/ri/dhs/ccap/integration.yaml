    # Child: 239.54 - 78.08 = $161.46/week
    # YEAR = 12 * 161.46 = $1,937.56
    ri_ccap_weekly_benefit: [0, 1_937.56]

    # Monthly = 161.46 * 52 / 12 = $699.67

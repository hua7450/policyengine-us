- name: Eligible family with childcare expenses - benefit capped at provider rate
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      parent:
        age: 30
        employment_income: 40_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      child:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_size: 2
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: RI
  output:
    # FPG 2026 family of 2 = 15,960 + 5,680 = 21,640/yr
    # Monthly income = 40,000/12 = 3,333.33; FPL ratio = 3,333.33 / 1,803.33 = 1.849
    # Copay rate = 7%; weekly copay = 40,000 * 0.07 / 52 = 53.85
    # Provider rate STAR_1/PRESCHOOL/FULL_TIME = 236/wk
    # Weekly expense per child = 12,000/52 = 230.77
    # Per-child payment = min(236, 230.77) = 230.77
    # Weekly subsidy = 230.77 - 53.85 = 176.92
    # Monthly = 176.92 * 52/12 = 767
    ri_ccap_eligible: true
    ri_ccap: 767


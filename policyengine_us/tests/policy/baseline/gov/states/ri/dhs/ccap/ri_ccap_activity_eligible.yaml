- name: Case 1, single working parent is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 30_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_activity_eligible: true

- name: Case 2, single parent not working and not a student is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_activity_eligible: false

- name: Case 3, single parent who is a full-time student is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 25
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        is_full_time_student: true
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_activity_eligible: true

- name: Case 4, two working parents are eligible.
  period: 2025
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        employment_income: 30_000
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        employment_income: 20_000
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    ri_ccap_activity_eligible: true

- name: Case 5, two parents where one is not working is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        employment_income: 40_000
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # Each parent must meet activity requirement independently
    ri_ccap_activity_eligible: false

- name: Case 6, self-employed parent is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 25_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_activity_eligible: true

- name: Case 7, two parents one working one student is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
        employment_income: 30_000
      person2:
        age: 33
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: true
      person3:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    # Each parent meets requirement: one works, one is student
    ri_ccap_activity_eligible: true

# Edge case tests for ri_ccap_child_eligible
# Age boundaries: child < 13, disabled child < 19
# monthly_age = age * 12, so age input maps directly

# --- Age boundary: regular child at 12/13 ---

- name: Case 1, child at age 12 is eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 12
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_child_eligible:
      - false
      - true

- name: Case 2, child at age 13 is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 13
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_child_eligible:
      - false
      - false


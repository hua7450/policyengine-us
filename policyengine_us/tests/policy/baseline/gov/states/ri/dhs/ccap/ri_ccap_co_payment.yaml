- name: Family below 100% FPL - $0 copayment
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      parent:
        employment_income: 15_000
      child:
        age: 3
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: RI
  output:
    ri_ccap_co_payment: 0


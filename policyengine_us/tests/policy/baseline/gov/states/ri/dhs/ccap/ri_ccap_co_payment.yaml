- name: Family at 110% FPL - 2% copayment
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      parent:
        employment_income: 23_265
      child:
        age: 3
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: RI
  output:
    # Monthly income = 23,265 / 12 = 1,938.75
    # FPG (family of 2) = 21,150 / 12 = 1,762.50
    # FPL ratio = 1,938.75 / 1,762.50 = 1.10
    # Rate = 2%
    # Weekly copay = 23,265 * 0.02 / 52 = 8.95
    ri_ccap_co_payment: 8.95


# Unit tests for ri_ccap_co_payment
# 218-RICR-20-00-4.6.1(C)(1)(c): Family share as percentage of gross
# countable income, based on income as % of FPL.
# https://www.law.cornell.edu/regulations/rhode-island/218-RICR-20-00-4.3
#
# Co-payment schedule:
#   Level 0: at or below 100% FPL -> 0%
#   Level 1: above 100% to 125% FPL -> 2%
#   Level 2: above 125% to 150% FPL -> 5%
#   Level 3: above 150% to 261% FPL -> 7%
#   Level 4: above 261% to 300% FPL -> 7% (transitional only)
#
# Family of 2 (2025 FPL):
#   FPL = $15,650 + $5,500 = $21,150/yr
#   100% = $21,150; 125% = $26,437.50; 150% = $31,725; 261% = $55,201.50

- name: Case 1, income at 80 pct FPL has zero co-payment.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 16_920
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $16,920/yr = 80% of $21,150 FPL -> Level 0 -> 0% co-payment
    # Monthly income = $16,920 / 12 = $1,410
    # Co-payment = $1,410 * 0.00 = $0
    ri_ccap_co_payment: 0

- name: Case 2, income at 110 pct FPL has 2 pct co-payment.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 23_265
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $23,265/yr = 110% of $21,150 FPL -> Level 1 -> 2% co-payment
    # Monthly income = $23,265 / 12 = $1,938.75
    # Co-payment = $1,938.75 * 0.02 = $38.775
    ri_ccap_co_payment: 38.775

- name: Case 3, income at 140 pct FPL has 5 pct co-payment.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 29_610
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $29,610/yr = 140% of $21,150 FPL -> Level 2 -> 5% co-payment
    # Monthly income = $29,610 / 12 = $2,467.50
    # Co-payment = $2,467.50 * 0.05 = $123.375
    ri_ccap_co_payment: 123.375

- name: Case 4, income at 200 pct FPL has 7 pct co-payment.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 42_300
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # $42,300/yr = 200% of $21,150 FPL -> Level 3 -> 7% co-payment
    # Monthly income = $42,300 / 12 = $3,525.00
    # Co-payment = $3,525.00 * 0.07 = $246.75
    ri_ccap_co_payment: 246.75

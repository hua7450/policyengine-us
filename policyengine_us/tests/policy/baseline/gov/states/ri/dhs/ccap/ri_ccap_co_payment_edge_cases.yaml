# Edge case tests for ri_ccap_co_payment
# FPG 2025 family of 2: $21,150/year
# Copay = annual_income * copay_rate / 52
# Brackets: <100% FPL -> 0%, >=100% -> 2%, >=125% -> 5%, >=150% -> 7%

# --- Just below 100% FPL: $0 copayment ---

- name: Case 1, income $1 below 100% FPL.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 21_149
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = 21,149/21,150 < 1.0 -> rate = 0%
    ri_ccap_co_payment: 0

# --- At exactly 100% FPL: 2% copayment ---

- name: Case 2, income at exactly 100% FPL.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 21_150
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = 1.0 -> rate = 2%
    # Weekly copay = 21,150 * 0.02 / 52 = 8.13
    ri_ccap_co_payment: 8.13

# --- Just below 125% FPL: 2% rate ---

- name: Case 3, income $1 below 125% FPL.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 26_437
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = 26,437/21,150 = 1.24998 < 1.25 -> rate = 2%
    # Weekly copay = 26,437 * 0.02 / 52 = 10.17
    ri_ccap_co_payment: 10.17

# --- At 125% FPL: 5% rate ---

- name: Case 4, income at 125% FPL.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        # 125% of $21,150 = $26,437.50; use $26,438 to be just above
        employment_income: 26_438
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = 26,438/21,150 = 1.25002 >= 1.25 -> rate = 5%
    # Weekly copay = 26,438 * 0.05 / 52 = 25.42
    ri_ccap_co_payment: 25.42


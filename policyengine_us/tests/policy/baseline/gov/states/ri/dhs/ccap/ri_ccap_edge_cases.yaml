# --- Below 100% FPL: $0 copay ---

- name: Case 5, income below 100% FPL gets $0 copay.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        spm_unit_pre_subsidy_childcare_expenses: 12_000
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = (18,000/12) / (21,640/12) = 0.832 < 1.0 -> rate = 0%
    # Copay = $0
    # Provider rate STAR_1/PRESCHOOL/FT = 236/wk
    # Weekly expense = 12,000/52 = 230.77
    # min(236, 230.77) = 230.77
    # Monthly = 230.77 * 52/12 = 1,000
    ri_ccap: 1_000


# --- Benefit with 7% copay bracket ---

- name: Case 7, family at 200% FPL with 7% copay rate.
  period: 2026-01
  absolute_error_margin: 1
  input:
    people:
      person1:
        age: 30
        # 200% of FPG 2026 family of 2 = 21,640 * 2 = 43,280
        employment_income: 43_280
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        spm_unit_pre_subsidy_childcare_expenses: 18_000
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # FPL ratio = (43,280/12) / (21,640/12) = 2.0 -> rate = 7%
    # Weekly copay = 43,280 * 0.07 / 52 = 58.26
    # Provider rate STAR_1/PRESCHOOL/FT = 236/wk
    # Weekly expense = 18,000/52 = 346.15
    # min(236, 346.15) = 236 (capped at provider rate)
    # Weekly subsidy = 236 - 58.26 = 177.74
    # Monthly = 177.74 * 52/12 = 770
    ri_ccap: 770

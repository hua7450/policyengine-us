- name: Case 1, working single parent with eligible child and income below threshold.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 30_000
        is_tax_unit_dependent: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: true

- name: Case 2, no eligible child.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 30_000
        is_tax_unit_dependent: false
      person2:
        age: 15
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Child age 15 without disability -> no eligible child
    ri_ccap_eligible: false

- name: Case 3, income above entry threshold for new applicant.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 60_000
        is_tax_unit_dependent: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_works_eligible: false
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2, 261% FPL = $55,201.50
    # Income $60,000 > threshold -> ineligible
    ri_ccap_eligible: false


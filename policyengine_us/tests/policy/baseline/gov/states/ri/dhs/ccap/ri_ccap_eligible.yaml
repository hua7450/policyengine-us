- name: Case 7, RI Works non-working parent bypasses activity test.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 0
        self_employment_income: 0
        is_full_time_student: false
        is_tax_unit_dependent: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_works_eligible: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Non-working, non-student parent normally fails activity test
    # But RI Works recipients bypass income AND activity tests
    ri_ccap_eligible: true

- name: Case 8, enrolled family between 261 and 300 percent FPL remains eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        employment_income: 60_000
        is_tax_unit_dependent: false
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2: 261% FPL = $55,201.50, 300% FPL = $63,450
    # $60,000 > 261% but enrolled -> exit threshold 300% applies
    # $60,000 < $63,450 -> eligible
    ri_ccap_eligible: true


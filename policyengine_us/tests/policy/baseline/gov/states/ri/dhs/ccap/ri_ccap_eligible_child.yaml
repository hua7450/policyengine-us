- name: Case 1, child age 5 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
      person2:
        age: 5
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false, true]


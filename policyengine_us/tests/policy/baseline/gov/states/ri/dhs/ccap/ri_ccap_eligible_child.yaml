- name: Case 9, newborn under 6 weeks is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
      person2:
        # monthly_age returns true age in years; age 0 = newborn
        # min_age_weeks = 6, min_age_years = 6/52 = 0.1154
        # age 0 < 0.1154 -> ineligible
        age: 0
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false, false]

- name: Case 10, child age 1 is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
      person2:
        # age 1 >= 6/52 = 0.1154 and < 13 -> eligible
        age: 1
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false, true]

- name: Case 11, disabled child age 18 at upper boundary is eligible.
  period: 2025
  input:
    people:
      person1:
        age: 45
        is_tax_unit_head_or_spouse: true
      person2:
        # disabled_child limit = 19, age 18 < 19 -> eligible
        age: 18
        is_tax_unit_dependent: true
        is_disabled: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false, true]

- name: Case 12, non-disabled child age 13 is ineligible.
  period: 2025
  input:
    people:
      person1:
        age: 35
        is_tax_unit_head_or_spouse: true
      person2:
        # child limit = 13, age 13 is NOT < 13 -> ineligible
        age: 13
        is_tax_unit_dependent: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false, false]

- name: Case 13, adult is never an eligible child.
  period: 2025
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    ri_ccap_eligible_child: [false]

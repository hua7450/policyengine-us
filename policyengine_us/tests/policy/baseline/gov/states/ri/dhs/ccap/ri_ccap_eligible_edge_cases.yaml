# Edge case tests for ri_ccap_eligible
# Tests: has_eligible_child & (is_tanf_enrolled | (income_eligible & asset_eligible))

# --- TANF bypass with assets over limit ---

- name: Case 1, TANF enrolled bypasses both income and asset tests.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 200_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_tanf_enrolled: true
        spm_unit_cash_assets: 2_000_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: true

# --- No eligible child: adult-only household ---

- name: Case 2, no children in household is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_size: 1
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    ri_ccap_eligible: false

# --- Income eligible but assets over limit ---

- name: Case 3, income eligible but assets over limit is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 30_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_ri_ccap_enrolled: false
        spm_unit_cash_assets: 1_500_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: false

# --- Asset eligible but income over limit ---

- name: Case 4, asset eligible but income over 261% FPL is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_ri_ccap_enrolled: false
        spm_unit_cash_assets: 500_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: false

# --- Eligible child (undocumented) makes family ineligible ---

- name: Case 5, only child is undocumented so no eligible children.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: UNDOCUMENTED
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: false

# --- TANF bypass but no eligible child ---

- name: Case 6, TANF enrolled but child too old is ineligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 14
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_tanf_enrolled: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    ri_ccap_eligible: false

# --- Mixed children: one eligible, one not ---

- name: Case 7, one eligible and one ineligible child still qualifies.
  period: 2025-01
  input:
    people:
      person1:
        age: 35
        employment_income: 30_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person3:
        age: 14
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_size: 3
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: RI
  output:
    ri_ccap_eligible: true

# --- Enrolled family at exactly assets = $1,000,000 ---

- name: Case 8, enrolled family at exact asset limit with income below 300% FPL.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
        is_tax_unit_head_or_spouse: true
        is_tax_unit_dependent: false
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_ri_ccap_enrolled: true
        spm_unit_cash_assets: 1_000_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Income: 60,000 <= 63,450 (300% FPL) -> true
    # Assets: 1,000,000 <= 1,000,000 -> true
    # Has child age 3 -> true
    ri_ccap_eligible: true

- name: Case 1, income below 100 percent FPL has zero co-pay.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 18_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2 FPL 2025 = $21,150
    # FPL ratio = 18,000 / 21,150 = 0.8511 -> Level 0 -> 0% share
    # Weekly share = 0
    # YEAR = 12 * 0 = $0
    ri_ccap_family_share: 0

- name: Case 2, income between 100 and 125 percent FPL has 2 percent co-pay.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_works_eligible: false
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2 FPL 2025 = $21,150
    # FPL ratio = 24,000 / 21,150 = 1.1348 -> bracket >= 1.0001 -> 2% rate
    # Weekly income = 24,000 / 52 = $461.54
    # Weekly share = 461.54 * 0.02 = $9.23
    # YEAR = 12 * $9.23 = $110.77
    ri_ccap_family_share: 110.77


- name: Case 1, US citizen is eligible.
  period: 2025
  input:
    people:
      person1:
        immigration_status: CITIZEN
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    ri_ccap_immigration_eligible: [true]


- name: New applicant - income below 261% FPL (family of 3)
  period: 2025-01
  absolute_error_margin: 1
  input:
    people:
      parent:
        employment_income: 50_000
      child:
        age: 5
    spm_units:
      spm_unit:
        members: [parent, child]
        spm_unit_size: 3
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: RI
  output:
    ri_ccap_income_eligible: true


- name: Case 1, new applicant with income below 261 percent FPL.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 40_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2 FPL 2025 = $21,150
    # 261% FPL = $55,201.50
    # Income $40,000 < $55,201.50 -> eligible
    ri_ccap_income_eligible: true

- name: Case 2, new applicant with income above 261 percent FPL.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2 FPL 2025 = $21,150
    # 261% FPL = $55,201.50
    # Income $60,000 > $55,201.50 -> ineligible (new applicant)
    ri_ccap_income_eligible: false

- name: Case 3, enrolled family with income between 261 and 300 percent FPL.
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        ri_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # Family of 2 FPL 2025 = $21,150
    # 300% FPL = $63,450
    # Income $60,000 < $63,450 -> eligible (enrolled, transitional)
    ri_ccap_income_eligible: true

- name: Case 4, enrolled family with income above 300 percent FPL.
  period: 2025
  input:

        members: [person1]
        state_code: RI
  output:
    # 40,847 > 40,846.50 -> false
    ri_ccap_income_eligible: false

# --- New applicant above 261% but below 300% uses entry threshold ---

- name: Case 10, new applicant above 261% but below 300% is ineligible.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 60_000
      person2:
        age: 5
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_size: 2
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: RI
  output:
    # 60,000 > 55,201.50 -> false (uses 261% entry)
    ri_ccap_income_eligible: false

# --- Family of 1: single-person unit ---
# FPG family of 1: $15,650
# Entry: 2.61 * 15,650 = 40,846.50

- name: Case 8, single person at 261% FPL threshold.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 40_846
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_size: 1
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # 40,846 <= 40,846.50 -> true
    ri_ccap_income_eligible: true

- name: Case 9, single person $1 above 261% FPL threshold.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        employment_income: 40_847
    spm_units:
      spm_unit:
        members: [person1]
        spm_unit_size: 1
        is_ri_ccap_enrolled: false
    tax_units:
      tax_unit:
        members: [person1]

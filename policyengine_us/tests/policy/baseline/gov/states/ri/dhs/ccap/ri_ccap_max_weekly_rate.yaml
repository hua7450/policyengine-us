- name: Case 1, exempt provider infant full-time star 1.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        childcare_hours_per_week: 35
        ri_ccap_provider_type: EXEMPT
        ri_ccap_quality_rating: 1
    households:
      household:
        members: [person1]
        state_code: RI
  output:
    # Exempt, infant/toddler (age < 3), FT (35 hrs -> tier 1), star 1
    # Rate = $100.96/week
    # YEAR output = 12 * $100.96 = $1,211.52

- name: Rhode Island high-income surtax is unavailable before 2027
  period: 2026
  absolute_error_margin: 0.01
  input:
    state_code: RI
    ri_taxable_income: 1_250_000
  output:
    ri_high_earner_tax: 0

- name: Rhode Island high-income surtax applies at 1 percent in 2027
  period: 2027
  absolute_error_margin: 0.01
  input:
    state_code: RI
    ri_taxable_income: 1_250_000
  output:
    ri_high_earner_tax: 2_500

- name: Rhode Island high-income surtax applies at 2 percent in 2028
  period: 2028

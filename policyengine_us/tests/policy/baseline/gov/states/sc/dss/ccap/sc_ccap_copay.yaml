- name: Case 10, copay capped at 2 percent of family income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    # Monthly income = 24,000 / 12 = 2,000
    # Family size 2 fee scale: look up bracket for $2,000/mo
    # 2% cap: 2,000 * 0.02 = $40/mo -> $40 / 4.33 = ~$9.24/wk cap
    # If fee from scale > $9.24/wk, cap applies
    # Fee from scale at this income for family size 2:
    # Fee scale family size 2: $0-$2,643->$0, $2,644-$3,073->$6
    # $2,000 < $2,644 -> $0/wk from scale
    # min($0, cap) = $0
    # $0/wk * 1 eligible child * (52/12) = $0/mo
    sc_ccap_copay: 0


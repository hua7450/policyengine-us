# SC CCAP Head Start wraparound category tests
# sc_ccap_head_start_category is SPMUnit, MONTH
# True when any child in the unit is enrolled in Head Start (Section 2.15, p.91)
# Uses is_enrolled_in_head_start input variable

- name: Case 1, child enrolled in Head Start.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        is_enrolled_in_head_start: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    sc_ccap_head_start_category: true

- name: Case 2, no child enrolled in Head Start.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SC
  output:
    sc_ccap_head_start_category: false

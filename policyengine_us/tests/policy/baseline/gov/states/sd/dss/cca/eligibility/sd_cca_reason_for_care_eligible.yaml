# Tests for sd_cca_reason_for_care_eligible (Person, MONTH, bool).
# A child has a reason for care when every caretaker is in an approved
# activity (sd_cca_activity_eligible) or when the child receives or needs
# protective services (ARSD 67:47:01:03). This mirrors the federal
# is_ccdf_reason_for_care_eligible pattern.

- name: Case 1, caretaker activity met, every member has a reason for care.
  period: 2027-01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # The unit-level activity result projects to every member.
    sd_cca_reason_for_care_eligible: [true, true]

- name: Case 2, inactive caretaker, only the protective-services child qualifies.
  period: 2027-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked: 0  # not in any activity
      person2:
        age: 4
        receives_or_needs_protective_services: true
      person3:
        age: 2  # sibling without protective services
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        meets_ccdf_activity_test: false
    households:
      household:
        members: [person1, person2, person3]
        state_code: SD
  output:
    # Protective services is an independent, per-child reason for care: the
    # non-protective sibling does not qualify through the protected child.
    sd_cca_reason_for_care_eligible: [false, true, false]

- name: Case 3, employed caretaker via the modeled activity path, child qualifies.
  period: 2027-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2,000/mo
        weekly_hours_worked: 40  # 173.33 hrs/mo, above the 80-hour minimum
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: false
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    sd_cca_reason_for_care_eligible: [true, true]

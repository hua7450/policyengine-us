# Tests for sd_cca_countable_income (SPMUnit, MONTH, USD).
# Countable income is gross countable income, reduced by a 4% disregard on
# earned income, minus child support paid and minus the earned income of
# children under 18 who are not the tax-unit head or spouse, floored at zero
# (ARSD 67:47:01:05, :05.01; BEES Section 8.3.1). Annual person-level income
# inputs are read with the bare monthly period, so Core auto-divides them to
# monthly amounts.

- name: Case 1, single earner, 4% earned income disregard.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5,000/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # 5,000 - 4% x 5,000 (200) = 4,800
    sd_cca_countable_income: 4_800

- name: Case 2, unearned income gets no disregard.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        social_security: 24_000  # 2,000/mo, unearned
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # The 4% disregard applies only to earned income, so Social Security is
    # counted in full: 2,000.
    sd_cca_countable_income: 2_000

- name: Case 3, child support paid is deducted.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5,000/mo
        child_support_expense: 12_000  # 1,000/mo paid out
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # 5,000 - 200 (4% disregard) - 1,000 (child support paid) = 3,800
    sd_cca_countable_income: 3_800

- name: Case 4, a young child's earned income is excluded.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 40
        social_security: 36_000  # 3,000/mo, unearned (no disregard)
      person2:
        age: 10
        employment_income: 12_000  # 1,000/mo, excluded as a child under 18
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # 3,000 (parent Social Security) + 1,000 (child earnings) - 1,000
    # (child earnings excluded) = 3,000. No earned income is counted, so the
    # 4% disregard does not apply.
    sd_cca_countable_income: 3_000

- name: Case 5, an 18-year-old's earned income is counted.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 45
        social_security: 36_000  # 3,000/mo, unearned
      person2:
        age: 18
        employment_income: 12_000  # 1,000/mo, counted at age 18 and over
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # 3,000 + 1,000 - 4% x 1,000 (40, disregard on the counted earnings) = 3,960
    sd_cca_countable_income: 3_960

- name: Case 6, negative self-employment income is floored at zero.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        self_employment_income: -120_000  # -10,000/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    sd_cca_countable_income: 0

- name: Case 7, capital gains and interest are counted.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        capital_gains: 12_000  # 1,000/mo
        interest_income: 6_000  # 500/mo
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # South Dakota counts capital gains and interest as unearned income (no
    # disregard): 1,000 + 500 = 1,500.
    sd_cca_countable_income: 1_500

- name: Case 8, no income, zero countable income.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    sd_cca_countable_income: 0

- name: Case 9, self-employment loss does not offset unearned income.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        self_employment_income: -36_000  # -3,000/mo loss
        social_security: 24_000  # 2,000/mo unearned
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # Per Subsidy Manual Section 6, a self-employment loss is counted as $0 per
    # person and may not offset other income, so it does not reduce the 2,000
    # Social Security. gross = 0 (loss floored) + 2,000 = 2,000. Earned income
    # (the floored self-employment) is 0, so the 4% disregard is 0.
    sd_cca_countable_income: 2_000

- name: Case 10, child support paid exceeds income, floored at zero.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2,000/mo
        child_support_expense: 36_000  # 3,000/mo paid out
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # 2,000 - 80 (4% disregard) - 3,000 (child support) = -1,080; floored at 0.
    sd_cca_countable_income: 0

- name: Case 11, two children's earned income both excluded.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 40
        social_security: 36_000  # 3,000/mo unearned
      person2:
        age: 10
        employment_income: 12_000  # 1,000/mo, excluded as a child under 18
      person3:
        age: 8
        employment_income: 6_000  # 500/mo, excluded as a child under 18
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: SD
  output:
    # 3,000 (parent Social Security) + 1,500 (children's earnings) - 1,500
    # (both children's earnings excluded) = 3,000. No adult earned income, so
    # the 4% disregard does not apply.
    sd_cca_countable_income: 3_000

- name: Case 12, a minor tax-unit head's earned income is counted.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 17
        employment_income: 12_000  # 1,000/mo
        is_tax_unit_head: true
      person2:
        age: 1
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    # The minor applicant's 1,000 earnings count, less the 4% disregard.
    sd_cca_countable_income: 960

- name: Case 13, a minor who is not a tax-unit head or spouse has earnings excluded.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        social_security: 36_000  # 3,000/mo unearned
        is_tax_unit_head: true
      person2:
        age: 17
        employment_income: 12_000  # 1,000/mo excluded
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: SD
  output:
    sd_cca_countable_income: 3_000

    sd_cca: 780

- name: Case 8, enrolled family in the phase-out band, benefit net of co-payment.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000  # 5,000/mo gross; countable 4,800
      person2:
        age: 0.5  # infant
        sd_cca_provider_type: FAMILY_DAY_CARE
        childcare_hours_per_week: 40  # full time
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000  # 209% FPL = 4,180/mo; 170% FPL = 3,400/mo
        hhs_smi: 84_000  # 7,000/mo; 85% = 5,950/mo continuing ceiling
        is_sd_cca_enrolled: true  # continuing recipient
        meets_ccdf_activity_test: true
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/mo, above the rate
    households:
      household:
        members: [person1, person2]
        state_code: SD
        county_str: MINNEHAHA_COUNTY_SD  # urban
  output:
    # countable 4,800 exceeds the 4,180 applicant ceiling but is below the
    # 5,950 continuing ceiling, so the enrolled family stays eligible.
    sd_cca_income_eligible: true
    sd_cca_eligible: true
    # copay = (4,800 - 3,400) x 5% = 70.
    sd_cca_copay: 70
    # urban family day care full-time infant 180/wk x 52/12 = 780 monthly cap;
    # expenses 2,000 higher, capped at 780; benefit = 780 - 70 = 710.
    sd_cca: 710
    sd_child_care_subsidies: 710

- name: Case 9, zero-income family, full rate benefit, no co-payment.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30  # activity met through the CCDF activity test (e.g., training)
      person2:
        age: 0.5  # infant
        sd_cca_provider_type: FAMILY_DAY_CARE
        childcare_hours_per_week: 40  # full time
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/mo, above the rate
    households:
      household:
        members: [person1, person2]
        state_code: SD
        county_str: MINNEHAHA_COUNTY_SD  # urban
  output:
    sd_cca_income_eligible: true
    sd_cca_eligible: true
    sd_cca_copay: 0  # countable income 0 is below the 170% FPL threshold
    # urban family day care full-time infant 180/wk x 52/12 = 780; copay 0.
    sd_cca: 780

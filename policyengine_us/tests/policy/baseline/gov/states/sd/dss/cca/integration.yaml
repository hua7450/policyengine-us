        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000
        meets_ccdf_activity_test: true
        spm_unit_pre_subsidy_childcare_expenses: 24_000

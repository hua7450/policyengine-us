# Tests for sd_cca_region (Household, MONTH, Enum).
# The provider rate region is Urban (4 counties: Lincoln, Meade, Minnehaha,
# Pennington), Suburban (15 named counties), or Rural (all remaining counties,
# the default), effective 2026-08-03. Tests run in 2027 (fully inside the
# weekly rate era). county_str is a YEAR string read in the monthly formula.

- name: Case 1, Minnehaha County is urban.
  period: 2027-01
  input:
    people:
      person1:
        age: 30
    households:
      household:
        members: [person1]
        state_code: SD
        county_str: MINNEHAHA_COUNTY_SD
  output:
    sd_cca_region: URBAN


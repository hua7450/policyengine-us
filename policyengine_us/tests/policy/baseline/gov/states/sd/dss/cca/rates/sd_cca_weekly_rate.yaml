# Tests for sd_cca_weekly_rate (Person, MONTH, USD per week), effective
# 2026-08-03 (tested in 2027, inside the weekly rate era). The weekly maximum
# is keyed on region x provider category x age band x level of service, with
# informal/in-home/relative rates flat statewide (region and age moot). A child
# with special needs receives the base rate plus an additional 75% (x 1.75).
# Each case establishes an approved activity and sets county_str (region),
# sd_cca_provider_type, age (age band), and childcare_hours_per_week (level of
# service). Values are transcribed from the CCA Weekly Reimbursement Rates
# schedule. The final case keeps activity eligibility true to isolate the
# child-age guard.

# ---- Family day care ----
- name: Case 1, urban family day care, full time infant.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 0.5  # infant
        sd_cca_provider_type: FAMILY_DAY_CARE
        childcare_hours_per_week: 40  # full time
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1]
        state_code: SD
        county_str: MINNEHAHA_COUNTY_SD  # urban
  output:
    sd_cca_weekly_rate: 180


- name: Case 15, adult with an approved activity is age-ineligible and receives no rate.
  period: 2027-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        sd_cca_provider_type: LICENSED_CENTER
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1]
        state_code: SD
        county_str: MINNEHAHA_COUNTY_SD
  output:
    # The activity test is met, but sd_cca_weekly_rate is defined_for
    # sd_cca_eligible_child, so an adult receives no rate.
    sd_cca_reason_for_care_eligible: true
    sd_cca_eligible_child: false
    sd_cca_weekly_rate: 0

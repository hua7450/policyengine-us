# tn_ccap_eligible: SPMUnit, bool, MONTH
# Requires an eligible child AND either an approved protective-services
# waiver for a protective-services child (waives income, activity, and
# asset tests per State Plan §2.2.6(b)) or asset eligibility combined with
# (income eligible AND activity eligible) or Families First (TANF) enrollment.
# All cases use a family of 2 (parent + one child); 2026-01 85% SMI for size 2
# is 4_948.40/mo. Boolean output, so no error margin.

- name: Case 1, working parent with eligible child and low income qualifies.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 2_000/mo <= 4_948.40; parent hours default 40; assets 0; child eligible
    tn_ccap_eligible: true

- name: Case 2, no eligible child (only a non-disabled teenager) is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        employment_income: 24_000
      person2:
        age: 15
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 15-year-old (not disabled) is not an eligible child -> ineligible
    tn_ccap_eligible: false

- name: Case 3, income above 85% SMI without TANF is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 8_333.33/mo > 4_948.40 (85% SMI); not enrolled, not TANF -> ineligible
    tn_ccap_eligible: false

- name: Case 4, Families First (TANF) family bypasses the income and activity tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # TANF categorical eligibility overrides the failed income test
    tn_ccap_eligible: true

- name: Case 5, parent failing the activity test without TANF is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 10
        is_full_time_student: false
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Income eligible but parent works only 10 hours and is not a student
    tn_ccap_eligible: false

- name: Case 6, family over the asset limit is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 2_000_000
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Assets 2,000,000 > 1,000,000 CCDF limit -> ineligible
    tn_ccap_eligible: false

# ---- Edge cases ----

- name: Case 7, unit with only adults and no children is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 32
        employment_income: 24_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # No child in the unit -> no eligible child -> ineligible even though income,
    # activity, and assets all pass (degenerate zero-eligible-children unit)
    tn_ccap_eligible: false

- name: Case 8, Families First (TANF) family failing the activity test is still eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 10
        is_full_time_student: false
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Same failing activity test as Case 5 (parent works 10 hrs, not a student),
    # but TANF enrollment sits on the activity side of the OR
    # (income_activity_eligible | tanf_enrolled), so the family is still eligible.
    # Guards against a regression that drops tanf_enrolled from the activity bypass.
    tn_ccap_eligible: true

- name: Case 9, approved protective-services case waives income and activity tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        receives_or_needs_protective_services: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        tn_ccap_protective_services_waiver: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    tn_ccap_eligible: true

- name: Case 10, protective-services status without an approved waiver does not bypass tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        receives_or_needs_protective_services: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    tn_ccap_eligible: false

- name: Case 11, waiver input without a protective-services child does not bypass tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        tn_ccap_protective_services_waiver: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    tn_ccap_eligible: false

- name: Case 12, approved protective-services case also waives the asset test.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
        receives_or_needs_protective_services: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 2_000_000
        tn_ccap_protective_services_waiver: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Assets exceed the $1,000,000 CCDF limit (Case 6 is ineligible on this
    # alone), but protective-services cases are not evaluated for income or
    # assets (State Plan §2.2.6(b)).
    tn_ccap_eligible: true

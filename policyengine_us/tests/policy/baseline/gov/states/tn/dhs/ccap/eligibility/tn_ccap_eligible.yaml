# tn_ccap_eligible: SPMUnit, bool, MONTH
# Requires an eligible child AND asset eligibility AND either
# (income eligible AND activity eligible) OR Families First (TANF) enrollment.
# All cases use a family of 2 (parent + one child); 2026-01 85% SMI for size 2
# is 4_948.40/mo. Boolean output, so no error margin.

- name: Case 1, working parent with eligible child and low income qualifies.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 2_000/mo <= 4_948.40; parent hours default 40; assets 0; child eligible
    tn_ccap_eligible: true

- name: Case 2, no eligible child (only a non-disabled teenager) is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 40
        employment_income: 24_000
      person2:
        age: 15
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 15-year-old (not disabled) is not an eligible child -> ineligible
    tn_ccap_eligible: false

- name: Case 3, income above 85% SMI without TANF is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # 8_333.33/mo > 4_948.40 (85% SMI); not enrolled, not TANF -> ineligible
    tn_ccap_eligible: false

- name: Case 4, Families First (TANF) family bypasses the income and activity tests.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 100_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # TANF categorical eligibility overrides the failed income test
    tn_ccap_eligible: true

- name: Case 5, parent failing the activity test without TANF is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        weekly_hours_worked_before_lsr: 10
        is_full_time_student: false
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Income eligible but parent works only 10 hours and is not a student
    tn_ccap_eligible: false

- name: Case 6, family over the asset limit is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 4
        immigration_status: CITIZEN
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_assets: 2_000_000
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # Assets 2,000,000 > 1,000,000 CCDF limit -> ineligible
    tn_ccap_eligible: false

# ---- Edge cases ----

- name: Case 7, unit with only adults and no children is ineligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 32
        employment_income: 24_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
  output:
    # No child in the unit -> no eligible child -> ineligible even though income,
    # activity, and assets all pass (degenerate zero-eligible-children unit)
    tn_ccap_eligible: false

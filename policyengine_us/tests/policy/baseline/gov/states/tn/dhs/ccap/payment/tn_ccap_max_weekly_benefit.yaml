# tn_ccap_max_weekly_benefit: Person, float (USD), MONTH
# Per-child weekly rate = charted whole-dollar licensed-provider QRIS rate
#   * (1 + infant/toddler differential) * (1 + disability differential),
# halved and rounded up for part-time care; $0 if not in care (hours == 0).
# Only eligible children get a rate (defined_for tn_ccap_eligible_child), so the
# parent's value is 0. Base State Rates are unchanged across both eras.
# Era differences (all verified against the rate charts):
#   QRIS bonus: +15%/+20% before 2026-01-01, then +5%/+10%.
#   Toddler differential: +15% before 2025-10-01, then 0.
# Currency output, margin 0.01. Output arrays are [parent, child].

# ---- Current era (2026-01): QRIS +5%/+10%, no toddler differential ----

- name: Case 1, center Top Tier preschool state rate full-time.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 4
        immigration_status: CITIZEN
        is_in_k12_school: false
        childcare_hours_per_week: 35
        tn_ccap_provider_type: CHILD_CARE_CENTER
        tn_ccap_qris_tier: STATE_RATE
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TN
        county_str: DAVIDSON_COUNTY_TN
  output:
    # Center Top Tier preschool = 208
    tn_ccap_max_weekly_benefit: [0, 208]


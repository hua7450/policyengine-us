    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # min(1,200, 175 x 12) = 1,200
    tx_fpp_dependent_care_deduction: 1_200

- name: Case 4, non-disabled adult with care expenses receives no deduction.
  period: 2025
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 25
        care_expenses: 1_200
    spm_units:
      spm_unit:
        members: [person1, person2]

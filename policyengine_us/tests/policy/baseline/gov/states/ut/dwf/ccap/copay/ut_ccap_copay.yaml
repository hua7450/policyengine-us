        age: 9
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        ut_ccap_countable_income: 3_000  # group 2 (2,679.01-3,137)
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: UT
  output:
    ut_ccap_copay: 40

- name: Case 6, size 4 in income group 9 with two children.
  period: 2026-01

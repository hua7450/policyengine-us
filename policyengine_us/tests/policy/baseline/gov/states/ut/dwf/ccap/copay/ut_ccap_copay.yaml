- name: Case 8, size 12 in income group 16 with three or more children.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
      person2:
        age: 38
      person3:
        age: 12
      person4:
        age: 11
      person5:
        age: 10
      person6:
        age: 9
      person7:
        age: 8
      person8:
        age: 7
      person9:
        age: 6
      person10:
        age: 5
      person11:
        age: 4
      person12:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11, person12]
        ut_ccap_countable_income: 12_000  # group 16 (11,951.01-12,502)
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11, person12]
        state_code: UT
  output:
    ut_ccap_copay: 837

- name: Case 9, income above the group 16 bound uses the group 16 copayment.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        ut_ccap_countable_income: 6_000  # above the size 2 group 16 bound of 5,668
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    # The copayment lookup stays defined above the schedule's top bound
    # (income eligibility is enforced separately): size 2, group 16, one
    # child -> 352.
    ut_ccap_copay: 352

- name: Case 10, single adult clamps to the size 2 schedule.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
    spm_units:
      spm_unit:
        members: [person1]
        ut_ccap_countable_income: 2_000  # size 2 column group 2 (1,763.01-2,082)
    households:
      household:
        members: [person1]
        state_code: UT
  output:
    # A one-person unit (no eligible child, so never actually eligible)
    # floors to the size 2 row and the one-child column without erroring:
    # size 2, group 2, one child -> 18.
    ut_ccap_copay: 18

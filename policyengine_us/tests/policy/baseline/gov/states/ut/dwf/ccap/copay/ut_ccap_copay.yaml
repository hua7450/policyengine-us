# Tests for ut_ccap_copay (SPMUnit, MONTH, USD).
# Table 4 (effective April 1, 2026): the monthly copayment is a sliding
# scale by household size (2-12+), countable income group (1-16), and the
# number of children receiving the subsidy (one, two, or more than two).
# Group 1 has no copayment (R986-700-707(5)(a)). Countable income is set
# directly to pin the income group.

- name: Case 1, size 2 in income group 1 pays no copayment.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        ut_ccap_countable_income: 1_500  # group 1 (at or below 1,763)
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_ccap_copay: 0

- name: Case 2, size 2 in income group 2 with one child.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        ut_ccap_countable_income: 2_000  # group 2 (1,763.01-2,082)
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_ccap_copay: 18

- name: Case 3, size 3 in income group 2 with one child.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 28
      person3:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ut_ccap_countable_income: 2_500  # group 2 (2,221.01-2,610)
    households:
      household:
        members: [person1, person2, person3]
        state_code: UT
  output:
    ut_ccap_copay: 22

- name: Case 4, size 3 in income group 2 with two children.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
      person3:
        age: 6
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        ut_ccap_countable_income: 2_500  # group 2 (2,221.01-2,610)
    households:
      household:
        members: [person1, person2, person3]
        state_code: UT
  output:
    # Same household size and income group as Case 3, but the two-child
    # column applies: 28 instead of 22.
    ut_ccap_copay: 28

- name: Case 5, size 4 in income group 2 with three children.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 1

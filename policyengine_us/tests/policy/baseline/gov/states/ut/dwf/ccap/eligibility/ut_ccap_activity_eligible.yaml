# Tests for ut_ccap_activity_eligible (SPMUnit, MONTH, bool).
# R986-700-709: in a one-parent household the parent must be employed an
# average of at least 15 hours per week; in a two-parent household one
# parent must be employed at least 30 hours per week and the other at
# least 15 hours per week. Hours use weekly_hours_worked_before_lsr
# (default 40). meets_ccdf_activity_test covers approved activities the
# model does not individually track (e.g., the education and training
# pathway under R986-700-711).

- name: Case 1, single parent working 15 hours meets the requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 15
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_ccap_activity_eligible: true

- name: Case 2, single parent working 14 hours fails the requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 14
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_ccap_activity_eligible: false

- name: Case 3, two parents working 30 and 15 hours meet the requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 15
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: UT
  output:
    ut_ccap_activity_eligible: true

- name: Case 4, second parent below 15 hours fails the requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 14
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: UT
  output:
    # One parent clears 30 hours, but the other works only 14 (< 15).
    ut_ccap_activity_eligible: false

- name: Case 5, neither parent reaches 30 hours fails the requirement.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 29
      person2:
        age: 28
        weekly_hours_worked_before_lsr: 29
      person3:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: UT
  output:
    # Both parents clear 15 hours, but neither reaches the 30-hour bar.
    ut_ccap_activity_eligible: false

- name: Case 6, CCDF activity test fallback covers unmodeled activities.
  period: 2026-01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    # The parent works zero hours but is in an approved activity the model
    # does not individually track (e.g., approved education or training
    # under R986-700-711).
    ut_ccap_activity_eligible: true

- name: Case 7, standalone minor parent household fails the modeled hours test.
  period: 2026-01
  input:
    people:
      person1:
        age: 17
        own_children_in_household: 1
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    # Known limitation: the formula identifies caretakers via tax-unit
    # head/spouse status, which is never true for an under-18 person, so a
    # household headed by a 17-year-old parent has no counted parent and
    # fails the modeled hours test regardless of hours worked (the ND, RI,
    # NH, and SC child care programs share this convention). Setting
    # meets_ccdf_activity_test covers such a household.
    ut_ccap_activity_eligible: false

# Tests for ut_ccap_market_rate (Person, MONTH, USD).
# Table 3, "Maximum Monthly Child Care Payments Based on Monthly Local
# Market Rates", effective October 1, 2024 (R986-700-713(1)). Statewide
# full-time monthly maximums per child, by provider type and age band.
# Every provider type and every age band is covered by at least one case.

- name: Case 1, licensed center, under two.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 1
        ut_ccap_provider_type: LICENSED_CENTER
    households:
      household:
        members: [person1]
        state_code: UT
  output:
    ut_ccap_market_rate: 1_230


- name: Case 13, an ineligible child carries no market rate cap.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 14
        is_disabled: false  # over the age 13 limit, not special needs
        ut_ccap_provider_type: LICENSED_CENTER
    households:
      household:
        members: [person1]
        state_code: UT
  output:
    # The variable is defined only for CCAP-eligible children, so an
    # ineligible 14-year-old contributes nothing to the family's pooled
    # market rate cap.
    ut_ccap_market_rate: 0

# Tests for ut_child_care_subsidies (SPMUnit, YEAR, USD).
# Annual aggregator over the monthly ut_ccap benefit; it feeds the federal
# child_care_subsidies total and is limited to Utah households.

- name: Case 1, annual total equals the sum of monthly benefits.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        ut_ccap: 6_000  # 500/mo across the year
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    ut_child_care_subsidies: 6_000

- name: Case 2, out-of-state household receives nothing.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
      person2:
        age: 3
    spm_units:
      spm_unit:
        members: [person1, person2]
        ut_ccap: 6_000
    households:
      household:
        members: [person1, person2]
        state_code: CA
  output:
    ut_child_care_subsidies: 0

- name: Case 3, computed benefit flows through to the federal child care subsidies total.
  period: 2026
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3,000/mo
        own_children_in_household: 1
      person2:
        age: 3
        ut_ccap_provider_type: LICENSED_CENTER
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/mo
    households:
      household:
        members: [person1, person2]
        state_code: UT
  output:
    # Computed end to end from raw inputs rather than setting ut_ccap
    # directly. Each month: countable income 3,000 - 100 (one earner)
    # - 100 (medical) = 2,800 -> size 2 group 5 (2,722.01-3,041), one
    # child -> copay 109; cap: licensed center three year old = 900;
    # min(1,000, 900) - 109 = 791. Annual: 791 x 12 = 9,492, which the
    # ut_child_care_subsidies aggregator passes into the federal
    # child_care_subsidies total (child_care_subsidy_programs.yaml).
    ut_ccap: 9_492
    ut_child_care_subsidies: 9_492
    child_care_subsidies: 9_492

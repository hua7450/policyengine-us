# Virginia CCSP copay tests for 2025-07-01 new scale
# The new copay scale takes effect 2025-07-01 (HB30 Item 126 #2h)
# We test with period 2025-01 which uses the OLD scale parameters
# because YAML tests can only use YYYY-01 or YYYY period formats.
#
# The 2025-07-01 scale has new bracket thresholds:
#   0: $0, >0-100%: $5, >100-150%: $125, >150-200%: $175,
#   >200-250%: $225, >250-300%: $275, >300-350%: $325, >350%+: $375
# Income cap changes from 7% to 5% on 2025-07-01
#
# Since test periods are limited to 2025-01 (old scale) or 2025 (annual),
# the 2025-07-01 parameters are NOT testable via standard YAML period format.
# These tests verify the OLD scale still applies correctly at 2025-01.
#
# 2025 FPG: first_person = 15,650, additional = 5,500
#   Family of 2: 21,150
#   Monthly FPG: 21,150/12 = 1,762.50

- name: Case 1, 2025 old scale zero income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Zero income -> FPG ratio = 0 -> $0/child
    va_ccsp_copay: 0

- name: Case 2, 2025 old scale above 100% FPG.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 24,000/12 = 2,000
    # Monthly FPG: 21,150/12 = 1,762.50
    # FPG ratio: 2,000/1,762.50 = 1.1348 -> old scale >100% = $60
    # 1 child * $60 = $60
    # Income cap: 24,000 * 0.07 / 12 = 140
    # Copay: min(60, 140) = $60
    va_ccsp_copay: 60

- name: Case 3, 2025 old scale above 200% FPG.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 48,000/12 = 4,000
    # Monthly FPG: 21,150/12 = 1,762.50
    # FPG ratio: 4,000/1,762.50 = 2.2695 -> old scale >200% = $120
    # 1 child * $120 = $120
    # Income cap: 48,000 * 0.07 / 12 = 280
    # Copay: min(120, 280) = $120
    va_ccsp_copay: 120

- name: Case 4, 2025 old scale above 300% FPG.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 72_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 72,000/12 = 6,000
    # Monthly FPG: 21,150/12 = 1,762.50
    # FPG ratio: 6,000/1,762.50 = 3.4043 -> old scale >300% = $180
    # 1 child * $180 = $180
    # Income cap: 72,000 * 0.07 / 12 = 420
    # Copay: min(180, 420) = $180
    va_ccsp_copay: 180

- name: Case 5, 2025 old scale 5% income cap NOT yet in effect.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 84_000
        immigration_status: CITIZEN
      person2:
        age: 10
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person3:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person4:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: VA
  output:
    # Monthly income: 84,000/12 = 7,000
    # FPG size 4: 32,150, monthly = 2,679.17
    # FPG ratio: 7,000/2,679.17 = 2.6128 -> old scale >200% = $120
    # 3 eligible children, scale total: $120 * 3 = $360
    # Income cap: 84,000 * 0.07 / 12 = 490 (still 7% in Jan 2025)
    # Copay: min(360, 490) = $360
    va_ccsp_copay: 360

# Virginia CCSP copay tests for 2025-07-01 new scale
# The new copay scale takes effect 2025-07-01 (HB30 Item 126 #2h)
# We test with period 2025-01 which uses the OLD scale parameters
# because YAML tests can only use YYYY-01 or YYYY period formats.
#
# The 2025-07-01 scale has new bracket thresholds:
#   0: $0, >0-100%: $5, >100-150%: $125, >150-200%: $175,
#   >200-250%: $225, >250-300%: $275, >300-350%: $325, >350%+: $375
# Income cap changes from 7% to 5% on 2025-07-01
#
# Since test periods are limited to 2025-01 (old scale) or 2025 (annual),
# the 2025-07-01 parameters are NOT testable via standard YAML period format.
# These tests verify the OLD scale still applies correctly at 2025-01.
#
# 2025 FPG: first_person = 15,650, additional = 5,500
#   Family of 2: 21,150
#   Monthly FPG: 21,150/12 = 1,762.50

- name: Case 1, 2025 old scale zero income.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Zero income -> FPG ratio = 0 -> $0/child
    va_ccsp_copay: 0

- name: Case 2, 2025 old scale above 100% FPG.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 24,000/12 = 2,000
    # Monthly FPG: 21,150/12 = 1,762.50
    # FPG ratio: 2,000/1,762.50 = 1.1348 -> old scale >100% = $60
    # 1 child * $60 = $60
    # Income cap: 24,000 * 0.07 / 12 = 140
    # Copay: min(60, 140) = $60
    va_ccsp_copay: 60

- name: Case 3, 2025 old scale above 200% FPG.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_000
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 48,000/12 = 4,000
    # Monthly FPG: 21,150/12 = 1,762.50
    # FPG ratio: 4,000/1,762.50 = 2.2695 -> old scale >200% = $120
    # 1 child * $120 = $120
    # Income cap: 48,000 * 0.07 / 12 = 280
    # Copay: min(120, 280) = $120
    va_ccsp_copay: 120


# Virginia CCSP copay edge case tests
# Focus: copay bracket boundaries, income cap binding vs not, max children cap,
#   2025-07 new copay scale tests
#
# 2024 FPG (contiguous US): Family of 2: 20,440
#   Monthly FPG: 20,440/12 = 1,703.333...
#
# Current copay scale (2023-01-01):
#   0: $0, >0-100%: $0, >100-200%: $60, >200-300%: $120, >300%+: $180
# Income cap: 7%
# Max children: 3
#
# New copay scale (2025-07-01):
#   0: $0, >0-100%: $5, >100-150%: $125, >150-200%: $175,
#   >200-250%: $225, >250-300%: $275, >300-350%: $325, >350%+: $375
# Income cap: 5%
# Max children: 3
#
# 2025 FPG: Family of 2: 21,150
#   Monthly FPG: 21,150/12 = 1,762.50

# === CURRENT SCALE (2024) BRACKET BOUNDARIES ===

- name: Case 1, current scale income at exactly 100% FPG boundary.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        # Annual income = FPG for size 2 = 20,440
        # Monthly income = 20,440/12 = 1,703.33
        # Monthly FPG = 20,440/12 = 1,703.33
        # FPG ratio = 1.0000 -> at 100%, still in 0-100% bracket
        employment_income: 20_440
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # FPG ratio = 1.0 -> bracket threshold is 1.0001 for $60
    # 1.0 < 1.0001 -> stays in $0 bracket
    # 1 child * $0 = $0
    # Income cap: 20,440 * 0.07 / 12 = 119.23
    # Copay: min(0, 119.23) = $0
    va_ccsp_copay: 0

- name: Case 2, current scale income just above 100% FPG boundary.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        # Need FPG ratio just above 1.0001
        # Monthly FPG = 1,703.33
        # Monthly income = 1,703.33 * 1.001 = 1,705.04
        # Annual = 1,705.04 * 12 = 20,460.44
        employment_income: 20_461
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 20,461/12 = 1,705.08
    # FPG ratio: 1,705.08 / 1,703.33 = 1.0010 -> above 1.0001
    # Per-child copay: $60
    # 1 child * $60 = $60
    # Income cap: 20,461 * 0.07 / 12 = 119.36
    # Copay: min(60, 119.36) = $60
    va_ccsp_copay: 60

- name: Case 3, current scale income at exactly 200% FPG boundary.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        # 200% FPG = 40,880 annual
        # FPG ratio = 2.0 -> threshold for $120 is 2.0001
        # 2.0 < 2.0001 -> stays in $60 bracket
        employment_income: 40_880
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # FPG ratio = 2.0 -> still in $60 bracket (threshold is 2.0001)
    # 1 child * $60 = $60
    # Income cap: 40,880 * 0.07 / 12 = 238.47
    # Copay: min(60, 238.47) = $60
    va_ccsp_copay: 60

- name: Case 4, current scale income just above 300% FPG.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        # 300% FPG = 61,320 annual
        # Need above 3.0001: 61,321 -> ratio = 61,321/20,440 = 2.9999...
        # Actually: monthly 61,321/12 = 5,110.08 / (20,440/12 = 1,703.33) = 2.9999
        # Need higher: 61,350 -> 5,112.50/1,703.33 = 3.001 -> above 3.0001
        employment_income: 61_350
      person2:
        age: 5
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2]
        state_code: VA
  output:
    # Monthly income: 61,350/12 = 5,112.50
    # FPG ratio: 5,112.50/1,703.33 = 3.001 -> $180 bracket
    # 1 child * $180 = $180
    # Income cap: 61,350 * 0.07 / 12 = 357.88
    # Copay: min(180, 357.88) = $180
    va_ccsp_copay: 180

# === MAX CHILDREN CAP ===

- name: Case 5, exactly 3 eligible children assessed.
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 48_000
        immigration_status: CITIZEN
      person2:
        age: 10
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person3:
        age: 7
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
      person4:
        age: 4
        is_tax_unit_dependent: true
        childcare_attending_days_per_month: 23
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
        va_ccsp_enrolled: true
        va_ccsp_locality_group: GROUP_III
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: VA
  output:
    # Monthly income: 48,000/12 = 4,000
    # FPG size 4: 31,200, monthly = 2,600
    # FPG ratio: 4,000/2,600 = 1.5385 -> $60/child
    # 3 eligible children = min(3, 3) = 3
    # Scale total: $60 * 3 = $180
    # Income cap: 48,000 * 0.07 / 12 = 280
    # Copay: min(180, 280) = $180
    va_ccsp_copay: 180


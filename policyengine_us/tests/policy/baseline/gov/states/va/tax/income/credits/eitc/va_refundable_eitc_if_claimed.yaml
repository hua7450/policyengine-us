# HB 30 (2026) extends the 20% refundable rate through TY2029. Under prior law
# the rate reverted after TY2026; these years now stay at 20%.
- name: VA 2027 Refundable EITC still at 20%
  period: 2027
  input:
    state_code: VA
    eitc: 5_000
  output:
    va_refundable_eitc_if_claimed: 1_000


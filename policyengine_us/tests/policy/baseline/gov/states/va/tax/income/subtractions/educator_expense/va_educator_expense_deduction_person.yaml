# Virginia eligible educator expense deduction (Va. Code 58.1-322.03),
# reinstated for TY2026+ by the 2026 Appropriation Act (HB 30). Modeled as an
# explicit input (defaults to $0) because the excess-over-federal amount is not
# identified in the baseline data.

- name: VA educator expense deduction defaults to zero
  period: 2026
  input:
    state_code: VA
  output:
    va_educator_expense_deduction_person: 0

- name: VA educator expense deduction input flows into Virginia subtractions
  period: 2026
  input:
    people:
      person1:
        age: 40
        va_educator_expense_deduction_person: 400
    tax_units:
      tax_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: VA
  output:
    va_educator_expense_deduction_person: 400
    va_subtractions: 400

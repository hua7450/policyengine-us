- name: Case 1, low income single parent with one infant in full time licensed center.
  absolute_error_margin: 0.01
  period: 2025
  input:
    people:
      person1:
        age: 28
        employment_income: 30_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        childcare_provider_type_group: DCC_SACC
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 25_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # Child eligibility
    vt_ccfap_eligible_child: [false, true]
    # person1: age 28, not a dependent => false
    # person2: age 1 < 13, dependent => true

    # Age group
    vt_ccfap_age_group: [SCHOOL_AGE, INFANT]
    # person2: age 1 => infant (< 24 months)

    # Care schedule
    vt_ccfap_care_schedule: [PART_TIME, FULL_TIME]
    # person2: 5 * 8 = 40 hours/week => full time (26-50)

    # Provider type
    vt_ccfap_provider_type: [LICENSED_CENTER, LICENSED_CENTER]
    # person2: DCC_SACC => licensed center

    # State rate (2024-06-30 rates apply at 2025-01-01)
    vt_ccfap_state_rate: [0, 471]
    # person2: licensed center, full time, infant = $471/wk

    # Income
    # FPG for family of 2 = 15,650 + 5,500 = 21,150
    # FPL ratio = 30,000 / 21,150 = 1.418
    vt_ccfap_income_eligible: true

    # Family share
    # FPL ratio 1.418 < 1.7501 => $0/wk
    # Annual: $0 * 52 = $0
    vt_ccfap_family_share: 0

    # Overall eligibility
    vt_ccfap_eligible: true

    # Benefit
    # Total annual rate = $471 * 52 = $24,492
    # Benefit = max(24,492 - 0, 0) = $24,492
    vt_ccfap: 24_492

- name: Case 2, moderate income two parent family with two children in different settings.
  absolute_error_margin: 0.01
  period: 2025
  input:
    people:
      person1:
        age: 35
        employment_income: 70_000
      person2:
        age: 33
        employment_income: 10_000
      person3:
        age: 3
        is_tax_unit_dependent: true
        childcare_provider_type_group: DCC_SACC
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 23_000
      person4:
        age: 7
        is_tax_unit_dependent: true
        childcare_provider_type_group: FDC_GFDC
        childcare_days_per_week: 5
        childcare_hours_per_day: 4
        pre_subsidy_childcare_expenses: 10_000
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: VT
  output:
    # Child eligibility
    vt_ccfap_eligible_child: [false, false, true, true]

    # Age groups
    vt_ccfap_age_group: [SCHOOL_AGE, SCHOOL_AGE, PRESCHOOL, SCHOOL_AGE]
    # person3: age 3 = preschool (36-59 months)
    # person4: age 7 = school age (60+ months)

    # Care schedules
    vt_ccfap_care_schedule: [PART_TIME, PART_TIME, FULL_TIME, PART_TIME]
    # person3: 5 * 8 = 40 hrs/wk = full time
    # person4: 5 * 4 = 20 hrs/wk = part time

    # Provider types
    vt_ccfap_provider_type: [LICENSED_CENTER, LICENSED_CENTER, LICENSED_CENTER, REGISTERED_HOME]

    # State rates
    vt_ccfap_state_rate: [0, 0, 439, 176]
    # person3: licensed center, full time, preschool = $439/wk
    # person4: registered home, part time, school age = $176/wk

    # Income
    # Countable income = 70,000 + 10,000 = 80,000
    # FPG for family of 4 = 15,650 + 3 * 5,500 = 32,150
    # FPL ratio = 80,000 / 32,150 = 2.488
    vt_ccfap_countable_income: 80_000
    vt_ccfap_income_eligible: true

    # Family share
    # FPL ratio 2.488 > 2.2501 => $100/wk
    # Annual: $100 * 52 = $5,200
    vt_ccfap_family_share: 5_200

    # Overall eligibility
    vt_ccfap_eligible: true

    # Benefit
    # Total annual rate = ($439 + $176) * 52 = $615 * 52 = $31,980
    # Benefit = max(31,980 - 5,200, 0) = $26,780
    vt_ccfap: 26_780


    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: VT
  output:
    # FPG for family of 3 = 26,650
    # FPL ratio = 150,000 / 26,650 = 5.631
    # Weekly family share at 5.631 > 5.5001 = $425/wk
    # Annual family share = $425 * 52 = $22,100
    # Child: age 7, school age, part time, registered home = $176/wk
    # Total annual rate = $176 * 52 = $9,152
    # Benefit = max(9,152 - 22,100, 0) = $0
    vt_ccfap: 0


- name: Case 3, Reach Up eligible family gets full subsidy with no copay.
  absolute_error_margin: 0.01
  period: 2025
  input:
    people:
      person1:
        age: 30
        employment_income: 20_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        childcare_provider_type_group: DCC_SACC
        childcare_days_per_week: 5
        childcare_hours_per_day: 8
        pre_subsidy_childcare_expenses: 25_000
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled:
          2025-01: true
    households:
      household:
        members: [person1, person2]
        state_code: VT
  output:
    # Reach Up = categorically eligible, $0 family share
    # Child: age 1, infant, full time, licensed center = $471/wk
    # Total annual rate = $471 * 52 = $24,492
    # Benefit = max(24,492 - 0, 0) = $24,492
    vt_ccfap: 24_492


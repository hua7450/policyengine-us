- name: Case 1, day care center maps to licensed center.
  period: 2025
  input:
    people:
      person1:
        childcare_provider_type_group: DCC_SACC
    households:
      household:
        members: [person1]
        state_code: VT
  output:
    vt_ccfap_provider_type: [LICENSED_CENTER]


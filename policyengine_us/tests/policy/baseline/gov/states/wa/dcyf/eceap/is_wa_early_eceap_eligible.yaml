        age: 30
        employment_income: 120_000
      child:
        age: 1
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child]
    tax_units:
      tax_unit:
        members: [parent, child]
    households:
      household:
        members: [parent, child]
        state_code: WA
        is_homeless: true
  output:
    is_wa_early_eceap_eligible: [false, true]


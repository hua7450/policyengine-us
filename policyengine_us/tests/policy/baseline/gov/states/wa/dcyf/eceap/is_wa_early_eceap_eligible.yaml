# ---- Edge cases ----

- name: Multi-child family with 2-year-old and 4-year-old, only 2-year-old is Early ECEAP-eligible.
  period: 2026
  input:
    people:
      parent:
        age: 30
        employment_income: 30_000
      child_early:
        age: 2
        employment_income: 0
      child_eceap:
        age: 4
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child_early, child_eceap]
    tax_units:
      tax_unit:
        members: [parent, child_early, child_eceap]
    households:
      household:
        members: [parent, child_early, child_eceap]
        state_code: WA
  output:
    # Only the 2-year-old qualifies for Early ECEAP (under age 3).
    is_wa_early_eceap_eligible: [false, true, false]


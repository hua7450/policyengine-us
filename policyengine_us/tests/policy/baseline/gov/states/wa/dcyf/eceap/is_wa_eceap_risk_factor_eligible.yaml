- name: 2026, income in 36-50% SMI band with developmental delay, eligible via risk pathway.
  period: 2026
  input:
    people:
      parent:
        age: 30
        employment_income: 50_000
      child:
        age: 4
        employment_income: 0
        has_developmental_delay: true
      sibling:
        age: 6
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
        filing_status: JOINT
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # 36% SMI family of 3 in 2026 = $44,425; 50% SMI = $61,701. $50,000 is in band.
    # Only child has the dev-delay risk factor.
    is_wa_eceap_risk_factor_eligible: [false, true, false]


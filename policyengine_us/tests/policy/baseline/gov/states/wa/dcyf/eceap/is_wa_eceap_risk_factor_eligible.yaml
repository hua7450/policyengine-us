- name: 2030 pre-expiration, income in 36-50% SMI band with dev delay, eligible via risk pathway.
  period: 2030
  input:
    people:
      parent:
        age: 30
        employment_income: 60_000
        is_english_proficient: true
        is_single_parent_household: false
      child:
        age: 4
        employment_income: 0
        has_developmental_delay: true
        is_english_proficient: true
        is_single_parent_household: false
      sibling:
        age: 6
        employment_income: 0
        is_english_proficient: true
        is_single_parent_household: false
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # Period 2030 reads 2030-01-01 params: risk_factor_pathway in_effect = True.
    # 36% SMI family of 3 in 2030 ~= $50,874; 50% SMI ~= $70,658. $60,000 in band.
    # Only child has the dev-delay risk factor.
    is_wa_eceap_risk_factor_eligible: [false, true, false]


- name: Family of 3 in 2026 at $45,000, not ECEAP eligible (above 36% SMI, no categorical).
  period: 2026
  input:
    people:
      parent:
        age: 30
        employment_income: 45_000
        is_single_parent_household: false
      child:
        age: 4
        employment_income: 0
        is_single_parent_household: false
      sibling:
        age: 6
        employment_income: 0
        is_single_parent_household: false
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
        filing_status: JOINT
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # $45,000 > 36% SMI ($42,128). No categorical path, no risk factor. Not eligible.
    wa_eceap_eligible: [false, false, false]


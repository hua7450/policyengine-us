# ---- Edge cases ----

- name: Multi-child family with 2-year-old and 4-year-old, only 4-year-old is ECEAP-eligible.
  period: 2026
  input:
    people:
      parent:
        age: 30
        employment_income: 30_000
      child_early:
        age: 2
        employment_income: 0
      child_eceap:
        age: 4
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child_early, child_eceap]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child_early, child_eceap]
    households:
      household:
        members: [parent, child_early, child_eceap]
        state_code: WA
  output:
    # Only the 4-year-old qualifies for ECEAP (age 3-4 range).
    wa_eceap_eligible: [false, false, true]


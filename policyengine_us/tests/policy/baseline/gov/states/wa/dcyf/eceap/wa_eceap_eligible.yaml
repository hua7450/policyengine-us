- name: Family of 3 in 2025 at $28,000, ECEAP eligible under 110% FPL era.
  period: 2025
  input:
    people:
      parent:
        age: 30
        employment_income: 28_000
      child:
        age: 4
        employment_income: 0
      sibling:
        age: 6
        employment_income: 0
    spm_units:
      spm_unit:
        members: [parent, child, sibling]
        tanf: 0
    tax_units:
      tax_unit:
        members: [parent, child, sibling]
    households:
      household:
        members: [parent, child, sibling]
        state_code: WA
  output:
    # Family of 3 at 110% FPL (2025) = $29,315 -> $28,000 < $29,315, income-eligible.
    # Child age 4 within ECEAP age range (3-4).
    wa_eceap_eligible: [false, true, false]


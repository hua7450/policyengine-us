- name: Case 1, age below threshold is not eligible.
  period: 2024-01
  input:
    age: 60
    state_code: WA
  output:
    wa_pte_age_eligible: false

- name: Case 2, age at threshold is eligible.
  period: 2024-01
  input:
    age: 61
    state_code: WA
  output:
    wa_pte_age_eligible: true

- name: Case 3, age above threshold is eligible.
  period: 2024-01
  input:
    age: 75
    state_code: WA
  output:
    wa_pte_age_eligible: true

- name: Case 4, age 60 with SSDI is not age-eligible (separate disability path).
  period: 2024-01
  input:
    age: 60
    social_security_disability: 12_000
    state_code: WA
  output:
    # Age path checks the age threshold only; the disability path is handled
    # separately by wa_pte_disability_eligible.
    wa_pte_age_eligible: false

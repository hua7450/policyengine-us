- name: Case 1, no SSDI is not disability eligible.
  period: 2024-01
  input:
    age: 50
    social_security_disability: 0
    state_code: WA
  output:
    wa_pte_disability_eligible: false

- name: Case 2, positive SSDI is disability eligible.
  period: 2024-01
  input:
    age: 50
    social_security_disability: 12_000
    state_code: WA
  output:
    wa_pte_disability_eligible: true

- name: Case 1, King County income at Tier 3 threshold is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 84_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King County 2024 Tier 3 threshold = $84,000; income = $84,000 -> eligible
    wa_pte_income_eligible: true

- name: Case 2, King County income above Tier 3 threshold is ineligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 85_000
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King County 2024 Tier 3 threshold = $84,000; income = $85,000 -> ineligible
    wa_pte_income_eligible: false


- name: Case 5, King County income $1 below Tier 3 threshold is eligible.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    tax_units:
      tax_unit:
        members: [person1]
        adjusted_gross_income: 83_999
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        county: KING_COUNTY_WA
  output:
    # King 2024 T3 = $84,000; 83,999 < 84,000 -> eligible
    wa_pte_income_eligible: true

- name: Case 6, King County income $1 above Tier 3 threshold is ineligible.
  period: 2024-01

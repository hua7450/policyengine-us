- name: Case 1, renter is not owner-occupant.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        tenure_type: RENTED
  output:
    wa_pte_owner_occupant: false

- name: Case 2, owner with mortgage is owner-occupant.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        tenure_type: OWNED_WITH_MORTGAGE
  output:
    wa_pte_owner_occupant: true

- name: Case 3, owner without mortgage is owner-occupant.
  period: 2024-01
  input:
    people:
      person1:
        age: 70
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
        tenure_type: OWNED_OUTRIGHT
  output:
    wa_pte_owner_occupant: true

# Cross-program integration tests for Washington cash assistance
# programs: TANF, SFA, and RCA. Exercises the mutually-exclusive
# immigration gates and the wa_show_all_cash_assistance_programs
# override used by consumers that want to display all three programs'
# benefit amounts alongside each other.

- name: Case 1, citizen family with child receives TANF only.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    wa_tanf_eligible: true
    wa_sfa_eligible: false
    wa_rca_eligible: false
    # Family size 2 payment standard Jan 2024: $570
    wa_tanf: 570
    wa_sfa: 0
    wa_rca: 0

- name: Case 2, LPR in 5-year bar with child receives SFA only.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: LEGAL_PERMANENT_RESIDENT
        years_since_us_entry: 2
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    wa_tanf_eligible: false
    wa_sfa_eligible: true
    wa_rca_eligible: false
    wa_tanf: 0
    wa_sfa: 570
    wa_rca: 0

- name: Case 3, refugee family with child receives TANF and RCA.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: REFUGEE
        years_since_us_entry: 0
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Refugees are bar-exempt (TANF) and RCA-eligible. Overlap persists
    # until the 12-month RCA window is tracked.
    wa_tanf_eligible: true
    wa_sfa_eligible: false
    wa_rca_eligible: true
    wa_tanf: 570
    wa_sfa: 0
    wa_rca: 570

- name: Case 4, single refugee adult without child receives RCA only.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: REFUGEE
        years_since_us_entry: 0
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # RCA does not require a dependent child; TANF and SFA do.
    wa_tanf_eligible: false
    wa_sfa_eligible: false
    wa_rca_eligible: true
    wa_tanf: 0
    wa_sfa: 0
    # Family size 1 payment standard Jan 2024: $450
    wa_rca: 450

- name: Case 5, override shows all 3 programs with benefit amounts.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        age: 5
        is_tax_unit_dependent: true
      person3:
        age: 3
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        wa_show_all_cash_assistance_programs: true
    households:
      household:
        members: [person1, person2, person3]
        state_code: WA
  output:
    # Override bypasses the immigration gate across all 3 programs;
    # other requirements (demographic, income, resources) still apply.
    wa_tanf_eligible: true
    wa_sfa_eligible: true
    wa_rca_eligible: true
    # Family size 3 payment standard Jan 2024: $706; no income.
    wa_tanf: 706
    wa_sfa: 706
    wa_rca: 706

- name: Case 6, override with single adult shows RCA only (TANF and SFA still require a child).
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
    spm_units:
      spm_unit:
        members: [person1]
        wa_show_all_cash_assistance_programs: true
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    wa_tanf_eligible: false
    wa_sfa_eligible: false
    wa_rca_eligible: true
    wa_tanf: 0
    wa_sfa: 0
    # Family size 1 payment standard Jan 2024: $450
    wa_rca: 450

- name: Case 7, override respects the income test (high unearned income disqualifies all).
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
        social_security: 24_000
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
        wa_show_all_cash_assistance_programs: true
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Monthly unearned = $2,000 > PS ($570) → income test fails for all
    wa_tanf_eligible: false
    wa_sfa_eligible: false
    wa_rca_eligible: false
    wa_tanf: 0
    wa_sfa: 0
    wa_rca: 0

- name: Case 8, undocumented immigrant with child is ineligible for all 3.
  period: 2024-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        immigration_status: UNDOCUMENTED
      person2:
        age: 5
        is_tax_unit_dependent: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    wa_tanf_eligible: false
    wa_sfa_eligible: false
    wa_rca_eligible: false
    wa_tanf: 0
    wa_sfa: 0
    wa_rca: 0

- name: Case 1, disabled-only person at 2023-01 ineligible (before WSR 23-24-009 effective date 2023-12-28).
  period: 2023-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_ssi_disabled: true
        is_ssi_eligible: true
        uncapped_ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Disabled-category in_effect=false until 2023-12-28.
    # 2023-01 -> NONE (not aged, not blind, no ineligible spouse).
    wa_ssp_payment_category: NONE
    wa_ssp: [0]

- name: Case 2, disabled-only person at 2024-01 receives STANDARD 38.25 (post-WSR 23-24-009).
  period: 2024-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_ssi_disabled: true
        is_ssi_eligible: true
        uncapped_ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Disabled-category in_effect flipped on 2023-12-28 -> STANDARD.
    # 2024-01 is before 2024-04-01 standard rate cut, so still 38.25 (2021-01-01 entry).
    wa_ssp_payment_category: STANDARD
    wa_ssp: [38.25]


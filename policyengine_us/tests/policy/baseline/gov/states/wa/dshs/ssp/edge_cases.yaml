- name: Case 7, person who is both aged and blind still receives a single STANDARD payment.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_blind: true
        is_ssi_eligible: true
        uncapped_ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Aged AND blind both flag the STANDARD category, but the formula uses OR (`|`)
    # so the person lands in STANDARD exactly once (no double payment).
    wa_ssp_payment_category: STANDARD
    wa_ssp: [35.50]

- name: Case 8, blind person also in a medical institution receives MEDICAL_INSTITUTION rate (priority over STANDARD).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 40
        is_blind: true
        is_ssi_eligible: true
        uncapped_ssi: 12
        ssi_lives_in_medical_treatment_facility: true
        ssi_medicaid_pays_majority_of_care: true
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # Both `in_medical_institution` and `in_standard_category` are true.
    # `select()` lists MEDICAL_INSTITUTION first, so it wins -> 70, not 35.50.
    wa_ssp_payment_category: MEDICAL_INSTITUTION
    wa_ssp: [70]

- name: Case 9, married couple both SSI-eligible aged each receives STANDARD individually (no has_ineligible_spouse path).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        uncapped_ssi: 12
      person2:
        age: 68
        is_ssi_eligible: true
        uncapped_ssi: 12
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # ssi_eligible_count == 2, so has_ineligible_spouse is FALSE for both spouses.
    # Both still qualify for STANDARD via the `aged` branch (no marriage add-on).
    wa_ssp_payment_category: [STANDARD, STANDARD]
    wa_ssp: [35.50, 35.50]

- name: Case 10, couple where eligible aged spouse also has ineligible spouse path - still STANDARD via `aged` branch.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        uncapped_ssi: 12
      person2:
        age: 50
        is_ssi_eligible: false
        uncapped_ssi: 0
    marital_units:
      marital_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WA
  output:
    # Branch verification: person1 qualifies for STANDARD via BOTH `aged` AND
    # `has_ineligible_spouse`. The `|` ensures STANDARD (not double-paid).
    # person2 is not SSI-eligible -> NONE.
    wa_ssp_payment_category: [STANDARD, NONE]
    wa_ssp: [35.50, 0]

- name: Case 11, categorically eligible aged person with zero SSI receipt receives NONE.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        uncapped_ssi: 0
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: WA
  output:
    # is_ssi_eligible=true but ssi==0 -> base_eligible = false -> NONE
    # (per ssp_pr_checklist: WA SSP requires actual SSI receipt, not categorical eligibility alone).
    wa_ssp_payment_category: NONE
    wa_ssp: [0]

- name: Case 12, non-Washington resident with otherwise full eligibility receives 0 (defined_for guard).
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 70
        is_ssi_eligible: true
        uncapped_ssi: 12
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: CA
  output:
    # defined_for = StateCode.WA on both wa_ssp and wa_ssp_payment_category.
    # Non-WA state -> formula not run -> default values.
    wa_ssp: [0]


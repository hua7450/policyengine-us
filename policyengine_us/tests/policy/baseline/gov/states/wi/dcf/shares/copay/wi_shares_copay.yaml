- name: Case 7, six full-time children hit the 760-hour assistance group cap.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000  # 3,000/month = 150% FPL.
      person2:
        age: 1
        childcare_hours_per_week: 40
      person3:
        age: 2
        childcare_hours_per_week: 40
      person4:
        age: 3
        childcare_hours_per_week: 40
      person5:
        age: 4
        childcare_hours_per_week: 40
      person6:
        age: 5
        childcare_hours_per_week: 40
      person7:
        age: 6
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7]
        state_code: WI
  output:
    # Uncapped copay hours 6 x 152 = 912, capped at 760; five-or-more-children
    # rate at 150% FPL is 0.63/hour: 0.63 x 760 = 478.80.
    wi_shares_copay: 478.80

- name: Case 8, a foster child is excluded from the copayment pool while the sibling still pays.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_600  # 2,300/month = 115% FPL.
      person2:
        age: 3
        childcare_hours_per_week: 40
        is_in_foster_care: true
      person3:
        age: 5
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
  output:
    # The foster child contributes no copayment hours, so only one child
    # counts toward the schedule column: 1.03/hour at 115% FPL.
    wi_shares_copay_per_hour: 1.03
    # 1.03 x 152 full-time copay hours for the non-foster sibling.
    wi_shares_copay: 156.56

- name: Case 9, an enrolled family less than $5 above 200% FPL pays no exit addition.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 48_048  # 4,004/month, $4 above 4,000 (200% FPL).
      person2:
        age: 4
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 24_000
        hhs_smi: 96_000  # 85% = 6,800/month, above the family's income.
    households:
      household:
        members: [person1, person2]
        state_code: WI
  output:
    # Top one-child rate 2.34 x 152 copay hours = 355.68; the exit addition
    # is $1 per FULL $5 above the limit: floor(4 / 5) = 0.
    wi_shares_copay: 355.68

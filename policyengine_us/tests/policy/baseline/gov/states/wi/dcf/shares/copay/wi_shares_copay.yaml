# Wisconsin Shares assistance group copayment: copay hours (131 part time /
# 152 full time per child, group total capped at 760) times the hourly
# copayment, plus the exit-period addition of $1 for every full $5 of income
# above 200% FPL for enrolled groups. Foster children and W-2 participant
# families have a $0 copayment type. Wisconsin Shares Handbook (July 2026)
# Sections 18.2-18.4 and Appendix II; Wis. Stat. s. 49.155(1m)(c)1d.a.
# Cases 1 and 2 reproduce Appendix II Example 1 (Juniper) and Case 4
# reproduces the Appendix II Exit-period example (Renee); incomes are derived
# from FPL ratios with spm_unit_fpg set explicitly.
- name: Case 1, two part-time children at 115% FPL owe $170.30 (Appendix II Example 1).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_600  # 2,300/month = 115% FPL.
      person2:
        age: 2
        childcare_hours_per_week: 20
      person3:
        age: 4
        childcare_hours_per_week: 20
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
  output:
    # 0.65/hour x (131 + 131) copay hours = 170.30.
    wi_shares_copay: 170.30

- name: Case 2, the same family full time owes $197.60 (Appendix II Example 1, summer).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_600  # 2,300/month = 115% FPL.
      person2:
        age: 2
        childcare_hours_per_week: 40
      person3:
        age: 4
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
  output:
    # 0.65/hour x (152 + 152) capped copay hours = 197.60.
    wi_shares_copay: 197.60

- name: Case 3, family at 100% FPL owes no copayment.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2,000/month = 100% FPL.
      person2:
        age: 4
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: WI
  output:
    wi_shares_copay: 0

- name: Case 4, enrolled family at 207% FPL owes the 200% rate plus a $31 exit copayment (Appendix II).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_511  # 4,709.25/month = 207% of the 27,300 FPG.
      person2:
        age: 1
        childcare_hours_per_week: 15
      person3:
        age: 3
        childcare_hours_per_week: 15
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 27_300  # 2,275/month; 200% = 4,550/month.
        hhs_smi: 120_000  # 85% = 8,500/month, above the family's income.
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
  output:
    # Initial copay: 1.46/hour x (131 + 131) = 382.52.
    # Exit addition: floor((4,709.25 - 4,550) / 5) = floor(31.85) = 31.
    # Total: 382.52 + 31 = 413.52.
    wi_shares_copay: 413.52


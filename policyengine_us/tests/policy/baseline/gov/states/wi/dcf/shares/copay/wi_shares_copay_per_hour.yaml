# Wisconsin Shares hourly copayment: looked up from the Copayment Schedule
# (effective 2/1/2026) by the assistance group's income as a share of the
# federal poverty guideline (floored to the lower 5% line, $0 at or below
# 100% FPL) and the number of children with authorizations (1 through 5 or
# more). Wisconsin Shares Handbook (July 2026) Section 18.2.
# spm_unit_fpg is set to 24,000/year (2,000/month) so the FPL ratios are
# exact; each child's positive care hours make them count toward the lookup.
- name: Case 1, one child at 115% of the poverty guideline.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_600  # 2,300/month = 115% FPL.
      person2:
        age: 4
        childcare_hours_per_week: 20
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: WI
  output:
    wi_shares_copay_per_hour: 1.03


# Integration tests for the Wisconsin Shares Child Care Subsidy Program.
# End-to-end scenarios verifying the eligibility chain, the two-tier income
# test, county maximum-rate lookups (statewide table effective 10/1/2025),
# the copayment schedule (effective 2/1/2026), the exit-period copayment
# addition, and the flow into the federal child_care_subsidies total.
#
# Cases 1-5 reproduce the worked examples in Wisconsin Shares Handbook
# (July 2026) Appendix II. The handbook computes copays from the family's
# FPL percentage, so each case sets spm_unit_fpg explicitly (three-person
# examples: 27,300/year = 2,275/month; two-person examples: 21,650/year =
# 1,804.17/month) and derives income as the example's FPL ratio. hhs_smi is
# set explicitly so the 85% SMI ongoing test is deterministic.
- name: Case 1, two part-time children at 115% FPL (Appendix II Example 1, Juniper).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 31_395  # 2,616.25/month = 115% of the 2,275 monthly FPG.
      person2:
        age: 3
        childcare_hours_per_week: 20
      person3:
        age: 5
        childcare_hours_per_week: 20
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_fpg: 27_300
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 48_000  # 2,000/month per child.
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
        county_str: MILWAUKEE_COUNTY_WI
  output:
    wi_shares_eligible_child: [false, true, true]
    wi_shares_income_eligible: true
    wi_shares_eligible: true
    # Copay schedule at 115% FPL with two authorized children: 0.65/hour.
    wi_shares_copay_per_hour: 0.65
    # 0.65 x (131 + 131) part-time copay hours = 170.30 (handbook figure).
    wi_shares_copay: 170.30
    # Milwaukee licensed group part-time subsidies (hourly x 131), each less
    # half the copay (85.15):
    # person2 (age 3): 9.72 x 131 = 1,273.32 - 85.15 = 1,188.17.
    # person3 (age 5): 8.72 x 131 = 1,142.32 - 85.15 = 1,057.17.
    wi_shares_child_subsidy: [0, 1_188.17, 1_057.17]
    wi_shares: 2_245.34
    # The YEAR aggregator reports the same monthly value.
    wi_child_care_subsidies: 2_245.34
    # The federal total sums the state programs registered in
    # gov/hhs/ccdf/child_care_subsidy_programs.yaml; for a Wisconsin
    # household only wi_child_care_subsidies contributes, so the federal
    # aggregator carries the full 2,245.34.
    child_care_subsidies: 2_245.34

- name: Case 2, two full-time children at 175% FPL (Appendix II Example 2, Monique).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        weekly_hours_worked_before_lsr: 30
        employment_income: 47_775  # 3,981.25/month = 175% of the 2,275 monthly FPG.
      person2:
        age: 4
        childcare_hours_per_week: 28
      person3:
        age: 2
        childcare_hours_per_week: 36  # 8 + 28 weekly hours across two providers.
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_fpg: 27_300
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 60_000  # 2,500/month per child.
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
        county_str: DANE_COUNTY_WI
  output:
    wi_shares_eligible: true
    # Copay schedule at 175% FPL with two authorized children: 1.24/hour.
    # Both children are full time: 1.24 x (152 + 152) = 376.96 (handbook
    # figure).
    wi_shares_copay: 376.96
    # Dane licensed group full-time subsidies, each less half the copay
    # (188.48):
    # person2 (age 4): min(10.24 x 153 = 1,566.72, 2,500, 1,558.03 full-time
    # cell) = 1,558.03 - 188.48 = 1,369.55.
    # person3 (age 2): min(11.49 x 153 = 1,757.97, 2,500, 1,747.95 full-time
    # cell) = 1,747.95 - 188.48 = 1,559.47.
    wi_shares_child_subsidy: [0, 1_369.55, 1_559.47]
    wi_shares: 2_929.02

- name: Case 3, enrolled family at 207% FPL pays the exit-period copayment (Appendix II, Renee).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 56_511  # 4,709.25/month = 207% of the 2,275 monthly FPG.
      person2:
        age: 1
        childcare_hours_per_week: 15
      person3:
        age: 3
        childcare_hours_per_week: 15
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 27_300  # 200% = 4,550/month.
        hhs_smi: 120_000  # 85% = 8,500/month, above the family's income.
        spm_unit_pre_subsidy_childcare_expenses: 60_000  # 2,500/month per child.
    households:
      household:
        members: [person1, person2, person3]
        state_code: WI
        county_str: MILWAUKEE_COUNTY_WI
  output:
    # Above 200% FPL but enrolled and below 85% SMI, so still eligible.
    wi_shares_income_eligible: true
    wi_shares_eligible: true
    # Initial copay 1.46 x (131 + 131) = 382.52, plus the exit addition of
    # $1 per full $5 above 200% FPL: floor((4,709.25 - 4,550) / 5) = 31.
    # Total 413.52 (handbook figure).
    wi_shares_copay: 413.52
    # Milwaukee licensed group part-time subsidies, each less half the copay
    # (206.76):
    # person2 (age 1): 11.15 x 131 = 1,460.65 - 206.76 = 1,253.89.
    # person3 (age 3): 9.72 x 131 = 1,273.32 - 206.76 = 1,066.56.
    wi_shares_child_subsidy: [0, 1_253.89, 1_066.56]
    wi_shares: 2_320.45

- name: Case 4, copayment exceeding the subsidy pays nothing but keeps eligibility (Appendix II, Ebony).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 57_372.50  # 4,781.04/month = 265% of the 1,804.17 monthly FPG.
      person2:
        age: 4
        childcare_hours_per_week: 10
        wi_shares_provider_type: CERTIFIED
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 21_650  # 200% = 3,608.33/month.
        hhs_smi: 96_000  # 85% = 6,800/month, above the family's income.
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/month provider price.
    households:
      household:
        members: [person1, person2]
        state_code: WI
        county_str: ASHLAND_COUNTY_WI
  output:
    wi_shares_income_eligible: true
    # Copay: 2.34 x 131 = 306.54, plus floor((4,781.04 - 3,608.33) / 5) = 234;
    # total 540.54 (handbook figure).
    wi_shares_copay: 540.54
    # Subsidy: Ashland certified hourly for a four-year-old 3.99 x 131 =
    # 522.69 (handbook figure), which the 540.54 copay fully consumes.
    wi_shares: 0
    # The family remains eligible even though no subsidy is paid.
    wi_shares_eligible: true

- name: Case 5, small subsidy remains above the exit-period copayment (Appendix II, Sarafina).
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 58_455  # 4,871.25/month = 270% of the 1,804.17 monthly FPG.
      person2:
        age: 6
        childcare_hours_per_week: 10
        wi_shares_provider_type: CERTIFIED
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 21_650  # 200% = 3,608.33/month.
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 12_000  # 1,000/month provider price.
    households:
      household:
        members: [person1, person2]
        state_code: WI
        county_str: WASHBURN_COUNTY_WI
  output:
    wi_shares_eligible: true
    # Copay: 2.34 x 131 = 306.54, plus floor((4,871.25 - 3,608.33) / 5) = 252;
    # total 558.54 (handbook figure).
    wi_shares_copay: 558.54
    # Subsidy: Washburn certified hourly for a six-year-old 4.38 x 131 =
    # 573.78 - 558.54 = 15.24 (the handbook prose says 13.25, but its own
    # arithmetic gives 15.24).
    wi_shares: 15.24

- name: Case 6, new applicant above 200% FPL is ineligible.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 45_465  # 3,788.75/month = 210% of the 1,804.17 monthly FPG.
      person2:
        age: 3
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 21_650  # 200% = 3,608.33/month.
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: WI
        county_str: MILWAUKEE_COUNTY_WI
  output:
    # Not enrolled, so the 200% FPL application limit applies.
    wi_shares_income_eligible: false
    wi_shares_eligible: false
    wi_shares: 0

- name: Case 7, otherwise-qualifying Minnesota family receives nothing.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 27_600  # 2,300/month = 115% FPL.
      person2:
        age: 3
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: MN
        county_str: HENNEPIN_COUNTY_MN
  output:
    wi_shares_eligible: false
    wi_shares: 0

- name: Case 8, enrolled family above 85% of the state median income loses eligibility.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 120_000  # 10,000/month > 6,800 (85% of the 8,000 monthly SMI).
      person2:
        age: 3
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_wi_shares_enrolled: true
        spm_unit_fpg: 24_000
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: [person1, person2]
        state_code: WI
        county_str: MILWAUKEE_COUNTY_WI
  output:
    # Enrollment extends the income limit to 85% SMI, but not beyond it.
    wi_shares_income_eligible: false
    wi_shares_eligible: false
    wi_shares: 0

- name: Case 9, disabled sixteen-year-old qualifies end to end at the 6 and older rate.
  period: 2027-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000  # 2,000/month = 100% FPL.
      person2:
        age: 16
        is_disabled: true
        childcare_hours_per_week: 40
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_fpg: 24_000
        hhs_smi: 96_000
        spm_unit_pre_subsidy_childcare_expenses: 24_000  # 2,000/month provider price.
    households:
      household:
        members: [person1, person2]
        state_code: WI
        county_str: MILWAUKEE_COUNTY_WI
  output:
    # The disability pathway keeps a child under 19 eligible.
    wi_shares_eligible_child: [false, true]
    wi_shares_eligible: true
    # $0 copayment at 100% FPL.
    wi_shares_copay: 0
    # Milwaukee licensed group 6 and older: min(7.86 x 153 = 1,202.58, 2,000,
    # 1,195.74 full-time cell) = 1,195.74.
    wi_shares: 1_195.74

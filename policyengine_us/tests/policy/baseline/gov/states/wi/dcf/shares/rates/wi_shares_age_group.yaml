# Wisconsin Shares rate-table age groups: "0 through 1" (under 2),
# "2 through 3", "4 through 5", and "6+".
# Wisconsin Shares Handbook (July 2026) Section 18.5.1; statewide maximum
# rate table effective 10/1/2025.
- name: Case 1, one-year-old is in the 0 through 1 group.
  period: 2027-01
  input:
    people:
      person1:
        age: 1
    households:
      household:
        members: [person1]
        state_code: WI
  output:
    wi_shares_age_group: AGE_0_THROUGH_1


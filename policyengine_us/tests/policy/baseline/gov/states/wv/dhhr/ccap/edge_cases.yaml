- name: Case 48, informal age under 2 group.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        # Age 1.5 = 18 months -> UNDER_2
        age: 1.5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 18 months < 24 -> UNDER_2
    wv_ccap_informal_age_group: [AGE_2_AND_OVER, UNDER_2]

- name: Case 49, informal age 2 and over group boundary.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        immigration_status: CITIZEN
      person2:
        # Age 2.0 = 24 months -> AGE_2_AND_OVER (threshold at 24)
        age: 2.0
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 24 months >= 24 -> AGE_2_AND_OVER
    wv_ccap_informal_age_group: [AGE_2_AND_OVER, AGE_2_AND_OVER]

# ============================================================
# Multiple children in one family
# ============================================================

- name: Case 50, two eligible children different ages and providers.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
        employment_income: 20_000
        immigration_status: CITIZEN
      person2:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: FAMILY_HOME
        wv_ccap_quality_tier: TIER_II
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 6_000
      person3:
        age: 6
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 3
        pre_subsidy_childcare_expenses: 4_000
    tax_units:
      tax_unit:
        members: [person1, person2, person3]
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2, person3]
        state_code: WV
  output:
    wv_ccap_eligible_child: [false, true, true]

    # Person2: Family Home Tier II Infant = $33/day
    # Person3: Center Tier I School Age = $32/day
    wv_ccap_daily_rate: [0, 33, 32]

    # Person2 age 1 = 12 months -> INFANT
    # Person3 age 6 = 72 months -> SCHOOL_AGE
    wv_ccap_child_age_category: [SCHOOL_AGE, INFANT, SCHOOL_AGE]

    # FPG family of 3: 26_650
    # FPL ratio = (20_000/12) / (26_650/12) = 1_666.67 / 2_220.83 = 0.7505
    # -> 3.0% bracket (>= 0.7001)
    # copay = 1_666.67 * 0.03 = 50
    wv_ccap_copay: 50

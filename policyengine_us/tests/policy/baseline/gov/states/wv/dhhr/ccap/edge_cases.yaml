# WV CCAP Edge Case Tests
# 2025 FPG (Contiguous US): first_person = 15_650, additional = 5_500
# Family of 2: FPG = 21_150/yr = 1_762.50/mo
# Family of 3: FPG = 26_650/yr = 2_220.83/mo
# Family of 11: FPG = 70_650/yr = 5_887.50/mo
# WV SMI 4-person base (2024-10-01): 90_661
# Size adjustments: first=0.52, 2nd-6th=0.16, additional=0.03

# ============================================================
# Income threshold boundaries (initial applicant)
# ============================================================

- name: Case 1, income at exactly 184% FPL initial applicant eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 184% FPL for family of 2 = 21_150 * 1.84 = 38_916/yr
        employment_income: 38_916
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # monthly income = 38_916 / 12 = 3_243
    # 185% FPL monthly = 21_150 * 1.85 / 12 = 3_260.63
    # 3_243 <= 3_260.63 -> eligible
    wv_ccap_income_eligible: true

- name: Case 2, income at exactly 185% FPL initial applicant eligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 185% FPL for family of 2 = 21_150 * 1.85 = 39_127.50/yr
        employment_income: 39_127
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # monthly income = 39_127 / 12 = 3_260.58
    # 185% FPL monthly = 39_127.50 / 12 = 3_260.63
    # 3_260.58 <= 3_260.63 -> eligible (at boundary)
    wv_ccap_income_eligible: true

- name: Case 3, income at 186% FPL initial applicant ineligible.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # 186% FPL for family of 2 = 21_150 * 1.86 = 39_339/yr
        employment_income: 39_339
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        childcare_days_per_week: 5
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        spm_unit_pre_subsidy_childcare_expenses: 10_000
    households:

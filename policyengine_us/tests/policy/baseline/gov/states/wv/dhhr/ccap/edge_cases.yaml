# ============================================================
# 85% SMI cap boundary
# ============================================================

- name: Case 7, income below 85% SMI but above 150% FPL for initial applicant.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # Above 185% FPL but under 85% SMI for family of 2
        # 185% FPL = 39_127.50; 85% SMI family of 2 = 90_661 * (0.52+0.16) * 0.85 = 52_402.06
        employment_income: 40_000
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # monthly income = 40_000 / 12 = 3_333.33
    # 185% FPL monthly = 3_260.63
    # 3_333.33 > 3_260.63 -> fails FPL test for initial applicant
    wv_ccap_income_eligible: false

- name: Case 8, enrolled income above 85% SMI ineligible despite passing FPL.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        # For family of 1 (single parent, no child income):
        # 85% SMI = 90_661 * 0.52 * 0.85 = 40_072.16/yr = 3_339.35/mo
        # 185% FPL family of 2 = 39_127.50/yr = 3_260.63/mo
        # Need income above 85% SMI but below 185% FPL
        # Actually for family of 2, 85% SMI = 52_402.06 >> 185% FPL = 39_127.50
        # So SMI is not the binding constraint for small families.
        # Use family of 1 (single person SPM unit with a child):
        # For family of 2: 85% SMI = 52_402.06 which is very high.
        # Let's test with a large family where SMI becomes binding.
        # Family of 11: 85% SMI = 90_661 * (0.52 + 0.16*5 + 0.03*5) * 0.85
        #             = 90_661 * 1.47 * 0.85 = 113_280.91/yr = 9_440.08/mo
        # 185% FPL family of 11 = 70_650 * 1.85 = 130_702.50/yr = 10_891.88/mo
        # So for large families, SMI < 185% FPL and SMI is binding.
        employment_income: 114_000
        immigration_status: CITIZEN
      person2:
        age: 3
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person3:
        age: 5
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person4:
        age: 7
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person5:
        age: 9
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person6:
        age: 11
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person7:
        age: 32
        immigration_status: CITIZEN
      person8:
        age: 1
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person9:
        age: 2
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person10:
        age: 4
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
      person11:
        age: 6
        is_tax_unit_dependent: true
        immigration_status: CITIZEN
    tax_units:
      tax_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
        wv_ccap_enrolled: true
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6, person7, person8, person9, person10, person11]
        state_code: WV
  output:
    # monthly income = 114_000 / 12 = 9_500
    # 185% FPL family of 11 = 70_650 * 1.85 / 12 = 10_891.88/mo -> passes
    # 85% SMI family of 11 = 90_661 * (0.52 + 0.16*5 + 0.03*5) * 0.85 / 12
    #   = 90_661 * 1.47 * 0.85 / 12 = 113_280.92 / 12 = 9_440.08/mo
    # 9_500 > 9_440.08 -> fails SMI cap
    wv_ccap_income_eligible: false


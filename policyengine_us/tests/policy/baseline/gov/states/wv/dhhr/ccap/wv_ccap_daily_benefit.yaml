# WV CCAP daily benefit tests
# Daily benefit per child = min(rate, actual daily charge)

- name: Case 1, rate minus copay share gives positive benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 3
        is_tax_unit_dependent: true
        childcare_days_per_week: 5
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        pre_subsidy_childcare_expenses: 8_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Center Tier I Preschool = $32/day
    # Daily rate for this child = $32
    wv_ccap_daily_rate: [0, 32]

- name: Case 2, zero copay means full rate as benefit.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 6_000
      person2:
        age: 1
        is_tax_unit_dependent: true
        childcare_days_per_week: 5
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_II
        pre_subsidy_childcare_expenses: 10_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Below 40% FPL -> $0 copay
    # Center Tier II Infant = $42/day
    # Full rate as daily benefit
    wv_ccap_daily_rate: [0, 42]

- name: Case 3, non-traditional hours supplement adds $6/day.
  period: 2025-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 30
        employment_income: 6_000
      person2:
        age: 3
        is_tax_unit_dependent: true
        childcare_days_per_week: 5
        wv_ccap_provider_type: CENTER
        wv_ccap_quality_tier: TIER_I
        wv_ccap_non_traditional_hours: true
        pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # Below 40% FPL -> $0 copay
    # Center Tier I Preschool = $32/day
    # Non-traditional hours supplement = $6/day
    # total_rate = 32 + 6 = $38/day
    # daily_charge = 12_000 / (5 * 52/12) = 12_000 / 21.6667 = $553.85/day
    # min(38, 553.85) = $38/day
    wv_ccap_daily_benefit: [0, 38]

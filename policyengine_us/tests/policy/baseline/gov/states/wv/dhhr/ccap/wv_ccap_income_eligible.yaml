# WV CCAP Income Eligibility Tests
# 2025 FPG (Contiguous US):
#   first_person = 15_650, additional = 5_500
#   Family of 2: 21_150

- name: Case 1, income below 150% FPL for initial applicant.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 24_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # FPG family of 2: 21_150
    # 150% FPL = 31_725
    # monthly income = 2_000; monthly limit = 2_643.75
    wv_ccap_income_eligible: true

- name: Case 2, income above 150% FPL for new applicant.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # monthly income = 3_000 > 150% FPL monthly = 2_643.75
    wv_ccap_income_eligible: false

- name: Case 3, enrolled family at 170% FPL eligible under ongoing threshold.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 36_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        wv_ccap_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    # 185% FPL = 39_127.50; monthly = 3_260.63
    # monthly income = 3_000 <= 3_260.63
    wv_ccap_income_eligible: true

- name: Case 4, TANF recipients categorically eligible.
  period: 2025-01
  input:
    people:
      person1:
        age: 30
        employment_income: 60_000
      person2:
        age: 5
    tax_units:
      tax_unit:
        members: [person1, person2]
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: WV
  output:
    wv_ccap_income_eligible: true

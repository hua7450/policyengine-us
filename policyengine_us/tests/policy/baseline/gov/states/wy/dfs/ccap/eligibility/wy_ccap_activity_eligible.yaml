# Unit tests for wy_ccap_activity_eligible (SPMUnit, MONTH, bool).
# Rules Ch. 1 §8(e)(i)(C), (D): every caretaker (a tax unit head or spouse,
# or a minor parent with their own child in the unit — §8(e)(i)(K), §6(f))
# must participate in an approved activity; Wyoming sets no minimum-hours
# floor, so any positive work hours qualify. §8(e)(i)(E): a disabled
# caretaker unable to care for the child is waived when the other caretaker
# works. POWER recipients (is_tanf_enrolled) meet the POWER work
# requirement; meets_ccdf_activity_test is the fallback input for approved
# activities not individually modeled (training, education, job search,
# SNAP E&T, sleep time). Work hours come from weekly_hours_worked_before_lsr,
# which DEFAULTS TO 40, so idle caretakers set it to 0 explicitly.
- name: Case 1, a single working parent is activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 30
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

- name: Case 2, a single non-working parent is not activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: false

- name: Case 3, two working parents are activity eligible.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 20
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

- name: Case 4, a two-parent unit with one idle able caretaker fails the activity test.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 0  # idle and not disabled
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_activity_eligible: false

- name: Case 5, a disabled caretaker is waived when the other parent works.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 0
        is_disabled: true  # §8(e)(i)(E) incapacitated-caretaker exception
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

- name: Case 6, two idle disabled caretakers fail because no caretaker works.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 0
        is_disabled: true
      person2:
        age: 33
        weekly_hours_worked_before_lsr: 0
        is_disabled: true
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_activity_eligible: false

- name: Case 7, a POWER recipient meets the activity requirement without work hours.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 0
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_enrolled: true
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

- name: Case 8, the CCDF activity-test fallback covers unmodeled approved activities.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 0  # e.g., in an education program
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
        meets_ccdf_activity_test: true
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

# Rules §8(e)(i)(I): self-employment outside the home is an approved work
# activity with no minimum-hours floor. Rules §9(g)(ii) / Manual §1101.E cap
# a self-employed caretaker's authorized care hours at monthly net
# self-employment income divided by the federal minimum wage (before the
# earned income disregard); the model does not compute authorized hours —
# care hours are supplied through the childcare_hours_per_day input.
- name: Case 9, a self-employed caretaker meets the activity test through work hours.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        self_employment_income: 24_000  # 2_000 net per month
        weekly_hours_worked_before_lsr: 25
      person2:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

# Rules §8(e)(i)(K) makes minor parents eligible and §6(f) lets a minor
# parent apply on their own behalf; their own child in the unit marks them
# as the caretaker (no injected tax-role inputs — a 17-year-old can never
# derive is_tax_unit_head), and their work activity gates the unit.
- name: Case 10, a working minor parent qualifies their own unit.
  period: 2026-01
  input:
    people:
      person1:
        age: 17
        weekly_hours_worked_before_lsr: 25
        own_children_in_household: 1
      person2:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

- name: Case 11, an idle minor parent fails the activity test.
  period: 2026-01
  input:
    people:
      person1:
        age: 17
        weekly_hours_worked_before_lsr: 0  # idle and not disabled
        own_children_in_household: 1
      person2:
        age: 1
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_activity_eligible: false

# A dependent teen without their own child is not a caretaker, so their
# idleness does not fail the working parent's unit.
- name: Case 12, an idle dependent teen who is not a parent does not fail the test.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        weekly_hours_worked_before_lsr: 40
      person2:
        age: 16
        weekly_hours_worked_before_lsr: 0  # not a caretaker
      person3:
        age: 4
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_activity_eligible: true

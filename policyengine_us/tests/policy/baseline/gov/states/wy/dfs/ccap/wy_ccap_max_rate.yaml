# Unit tests for wy_ccap_max_rate (Person, MONTH, USD/day).
# Table I DFS maximum daily reimbursement rates, identical on the 04/01/24,
# 04/01/25, and 04/01/26 charts: keyed by facility type x age band x
# part/full day; legally exempt providers use a flat rate with no age
# variation ($12.09 part / $24.19 full). The variable is defined_for
# wy_ccap_eligible_child, so adults and ineligible children return 0.
# person1 is always the parent (rate 0).
- name: Case 1, center full-day rates across all five age bands.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 0  # 0-11 months
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
      person3:
        age: 1  # 12-23 months
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
      person4:
        age: 3  # 2-3 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
      person5:
        age: 5  # 4-5 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
      person6:
        age: 10  # 6-13 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
    households:
      household:
        members: [person1, person2, person3, person4, person5, person6]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 36.36, 34.44, 32, 31.33, 29]

- name: Case 2, center part-day rates peak at the 12-23 month band as printed on the chart.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 0  # 0-11 months
        childcare_hours_per_day: 4
        wy_ccap_provider_type: CENTER
      person3:
        age: 1  # 12-23 months: 22.05 exceeds the infant rate as transcribed
        childcare_hours_per_day: 4
        wy_ccap_provider_type: CENTER
      person4:
        age: 3  # 2-3 years
        childcare_hours_per_day: 4
        wy_ccap_provider_type: CENTER
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 20.51, 22.05, 20.51]

- name: Case 3, licensed family setting full-day rates.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 0  # 0-11 months
        childcare_hours_per_day: 8
        wy_ccap_provider_type: LICENSED_FAMILY
      person3:
        age: 2  # 2-3 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: LICENSED_FAMILY
      person4:
        age: 4  # 4-5 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: LICENSED_FAMILY
      person5:
        age: 8  # 6-13 years
        childcare_hours_per_day: 8
        wy_ccap_provider_type: LICENSED_FAMILY
    households:
      household:
        members: [person1, person2, person3, person4, person5]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 31.57, 30, 29.42, 28]

- name: Case 4, licensed family part-day 6-13 year rate exceeds the 4-5 year rate as printed on the chart.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 4  # 4-5 years
        childcare_hours_per_day: 4
        wy_ccap_provider_type: LICENSED_FAMILY
      person3:
        age: 8  # 6-13 years: 20.00 exceeds 18.64 as transcribed
        childcare_hours_per_day: 4
        wy_ccap_provider_type: LICENSED_FAMILY
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 18.64, 20]

- name: Case 5, legally exempt providers receive a flat rate regardless of age.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 1  # part day, flat 12.09 despite the 12-23 month band
        childcare_hours_per_day: 4
        wy_ccap_provider_type: LEGALLY_EXEMPT
      person3:
        age: 9  # full day, flat 24.19 despite the 6-13 year band
        childcare_hours_per_day: 8
        wy_ccap_provider_type: LEGALLY_EXEMPT
    households:
      household:
        members: [person1, person2, person3]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 12.09, 24.19]

- name: Case 6, an ineligible fourteen-year-old without special needs has no rate.
  period: 2026-01
  absolute_error_margin: 0.01
  input:
    people:
      person1:
        age: 35
      person2:
        age: 14
        childcare_hours_per_day: 8
        wy_ccap_provider_type: CENTER
    households:
      household:
        members: [person1, person2]
        state_code: WY
  output:
    wy_ccap_max_rate: [0, 0]

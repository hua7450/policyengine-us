- name: Default is eligible because they meet California's BBCE income and asset limits.
  period: 2022
  output:
    meets_snap_categorical_eligibility: true

- name: Without TANF non-cash eligibility, not eligible.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
  output:
    meets_snap_categorical_eligibility: false

- name: SSI creates eligibility.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
    ssi: 1
  output:
    meets_snap_categorical_eligibility: true

- name: Single SSI recipient in multi-person SPM unit does not create eligibility.
  period: 2022
  input:
    people:
      person1:
        ssi: 1
      person2:
        ssi: 0
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_non_cash_eligible: false
  output:
    meets_snap_categorical_eligibility: false

- name: All SSI recipients in multi-person SPM unit create eligibility.
  period: 2022
  input:
    people:
      person1:
        ssi: 1
      person2:
        ssi: 1
    spm_units:
      spm_unit:
        members: [person1, person2]
        is_tanf_non_cash_eligible: false
  output:
    meets_snap_categorical_eligibility: true

- name: SSDI does not create eligibility.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
    social_security_disability: 1
  output:
    meets_snap_categorical_eligibility: false

- name: Cash TANF receipt creates eligibility without BBCE.
  period: 2022-01
  input:
    is_tanf_non_cash_eligible: false
    tanf: 3_000
  output:
    meets_snap_categorical_eligibility: true

- name: Reported SSI creates eligibility when use_reported_ssi is true.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
    use_reported_ssi: true
    ssi_reported: 1
  output:
    meets_snap_categorical_eligibility: true

- name: Reported TANF creates eligibility when use_reported_tanf is true.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
    use_reported_tanf: true
    is_tanf_enrolled: true
    reported_tanf_amount: 3_000
  output:
    meets_snap_categorical_eligibility: true

- name: With use_reported_tanf and no reported amount or enrollment, calculated TANF does not create eligibility.
  period: 2022
  input:
    is_tanf_non_cash_eligible: false
    use_reported_tanf: true
    tanf: 3_000
  output:
    meets_snap_categorical_eligibility: false

- name: With use_reported_tanf and is_tanf_enrolled, the enrollment flag creates eligibility.
  period: 2022-01
  input:
    is_tanf_non_cash_eligible: false
    use_reported_tanf: true
    is_tanf_enrolled: true
    tanf: 3_000
  output:
    meets_snap_categorical_eligibility: true

- name: The enrollment flag creates eligibility even when the calculated TANF amount is zero.
  period: 2022-01
  input:
    is_tanf_non_cash_eligible: false
    use_reported_tanf: true
    is_tanf_enrolled: true
    tanf: 0
  output:
    meets_snap_categorical_eligibility: true

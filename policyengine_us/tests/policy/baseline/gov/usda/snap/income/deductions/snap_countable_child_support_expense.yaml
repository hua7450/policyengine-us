- name: Case 1, prorated payer's child support counts at the income fraction and an eligible payer's in full.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
        child_support_expense: 3_600
      person2:
        age: 33
        child_support_expense: 1_200
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: TX
  output:
    # The prorated member's $300 monthly payment counts at 2 unit members
    # / 3 household members = 2/3, and the eligible member's $100 counts
    # in full: $200 + $100 = $300.
    snap_countable_child_support_expense: 300

- name: Case 2, ineligible student's child support payment is not the household's expense.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 40
        child_support_expense: 3_600
      person2:
        age: 20
        is_snap_ineligible_student: true
        child_support_expense: 1_200
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # Only the eligible parent's $300 monthly payment counts; the
    # nonhousehold member's payment is excluded (7 CFR 273.11(d)(1)).
    snap_countable_child_support_expense: 300

- name: Case 3, sanctioned member's child support expense continues to count in its entirety.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        meets_snap_general_work_requirements: false
        meets_snap_work_requirements_person: false
        child_support_expense: 3_600
      person2:
        age: 33
        meets_snap_general_work_requirements: true
        meets_snap_work_requirements_person: true
        child_support_expense: 1_200
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # 7 CFR 273.11(c)(1): the sanctioned member's $300 monthly payment
    # counts in full alongside the eligible member's $100.
    snap_countable_child_support_expense: 400

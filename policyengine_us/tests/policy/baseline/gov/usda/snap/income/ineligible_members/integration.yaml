      person4:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: TX
  output:
    snap_unit_size: 4
    has_snap_elderly_disabled_member: true
    meets_snap_gross_income_test: true

- name: Case 15, the standard utility allowance is not prorated.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        employment_income_before_lsr: 24_000
        immigration_status: UNDOCUMENTED
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
        housing_cost: 6_000
        snap_utility_allowance: 300
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    snap_expense_counted_share: 0.75
    # Only the $500 monthly housing cost is prorated; the $300 standard
    # utility allowance is not an expense paid by or billed to the
    # prorated member, so it counts in full (7 CFR 273.11(c)(2)(iii)):
    # (0.75 x $500 + $300) - 0.5 x $591 net income pre-shelter = $379.50.
    # Prorating the allowance as well would yield $304.50.
    snap_excess_shelter_expense_deduction: 379.5

- name: Case 16, prorated member's unearned income is prorated like earned income.
  period: 2026-01

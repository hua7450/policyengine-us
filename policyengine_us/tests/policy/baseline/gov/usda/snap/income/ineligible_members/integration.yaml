- name: Case 22, refugee earner counts fully before OBBBA.
  period: 2025-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        employment_income: 24_000
        employment_income_before_lsr: 24_000
        immigration_status: REFUGEE
      person2:
        age: 33
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: TX
  output:
    # Refugees remain SNAP-eligible until OBBBA takes effect in November
    # 2025, so the earner is a unit member with fully counted income.
    snap_unit_size: 3
    snap_income_counted_share: [1, 1, 1]
    snap_earned_income: 2_000

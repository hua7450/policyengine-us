        state_code: CA
  output:
    snap_unit_size: 3
    snap_income_counted_share: [1, 1, 1]
    snap_earned_income: 2_000
    snap: 225.2

- name: Case 9, household with no eligible members receives nothing.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
    spm_units:
      spm_unit:
        members: [person1]
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    is_snap_eligible: false
    snap: 0

- name: Case 10, excluded K-12 child earner's self-employment income is not counted.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        self_employment_income: 24_000
        self_employment_income_before_lsr: 24_000
      person2:
        age: 16
        is_in_k12_school: true
        self_employment_income: 18_000
        self_employment_income_before_lsr: 18_000
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # Texas takes no flat percentage deduction, so the parent's $2,000
    # monthly self-employment income is counted and the child's $1,500 is
    # excluded under 7 CFR 273.9(c)(7).
    snap_earned_income: 2_000
    # Net income: $2,000 - $400 earned income deduction - $209 standard
    # deduction = $1,391; benefit: $546 - 0.3 x $1,391 = $128.70.
    snap: 128.7

- name: Case 11, prorated member's self-employment income is prorated like employment income.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        self_employment_income: 24_000
        self_employment_income_before_lsr: 24_000
        immigration_status: UNDOCUMENTED
      person2:
        age: 33
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: TX
  output:
    snap_unit_size: 2
    # $2,000 monthly self-employment income x 2/3, mirroring Case 3.
    snap_earned_income: 1_333.33
    snap: 288.9

- name: Case 12, prorated member's self-employment loss offsets other income at the prorated share.
  period: 2026-01
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 35
        self_employment_income: 24_000
        self_employment_income_before_lsr: 24_000
      person2:
        age: 33
        self_employment_income: -12_000
        self_employment_income_before_lsr: -12_000
        immigration_status: UNDOCUMENTED
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: TX
  output:
    snap_unit_size: 2
    # The eligible member's $2,000 monthly income counts in full and the
    # prorated member's $1,000 loss offsets it at 2/3:
    # $2,000 - $1,000 x 2/3 = $1,333.33.
    snap_earned_income: 1_333.33
    snap: 288.9

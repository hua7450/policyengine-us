- name: Case 7, ineligible students are treated as nonhousehold members rather than under the ineligible-alien rules.
  period: 2026-01
  input:
    people:
      person1:
        age: 20
        immigration_status: UNDOCUMENTED
        is_snap_ineligible_student: true
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    is_snap_state_discretion_ineligible_alien: false

- name: Case 1, undocumented member is a state-discretion ineligible alien.
  period: 2026-01
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
    households:
      household:
        members: [person1]
        state_code: TX
  output:
    is_snap_state_discretion_ineligible_alien: true


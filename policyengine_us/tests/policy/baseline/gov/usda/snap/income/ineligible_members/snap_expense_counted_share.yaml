- name: Case 1, prorated member's per capita expense share is not deductible.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    # The eligible member's per capita half counts in full; the prorated
    # member's half is divided evenly between the two household members,
    # and only the eligible member's share counts:
    # 1/2 + 1/2 x 1/2 = 0.75.
    snap_expense_counted_share: 0.75

- name: Case 2, count-all states keep full deductible expenses.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    snap_expense_counted_share: 1

- name: Case 3, no ineligible members.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    snap_expense_counted_share: 1

- name: Case 4, sanctioned member's expenses count in full but their slice of the prorated member's payment does not.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
      person2:
        age: 30
        weekly_hours_worked_before_lsr: 0
      person3:
        age: 35
      person4:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3, person4]
    households:
      household:
        members: [person1, person2, person3, person4]
        state_code: TX
  output:
    snap_unit_size: 2
    # The prorated member's payment counts at the income fraction (2 unit
    # members / 4 household members = 1/2), which excludes the sanctioned
    # member's slice; the sanctioned member's own payments count in full
    # (7 CFR 273.11(c)(1)): (1/2 + 1 + 1 + 1) / 4 = 0.875.
    snap_income_counted_share: [0.5, 1, 1, 1]
    snap_expense_counted_share: 0.875

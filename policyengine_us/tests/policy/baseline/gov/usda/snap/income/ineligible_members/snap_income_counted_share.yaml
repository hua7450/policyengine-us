- name: Case 1, undocumented member's income share is prorated in a prorating state.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
      person2:
        age: 33
      person3:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2, person3]
    households:
      household:
        members: [person1, person2, person3]
        state_code: TX
  output:
    snap_income_counted_share: [0.6667, 1, 1]

- name: Case 2, ineligible student's income is not counted at all.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 40
      person2:
        age: 20
        is_snap_ineligible_student: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    snap_income_counted_share: [1, 0]

- name: Case 3, undocumented member's income is fully counted in a count-all state.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        immigration_status: UNDOCUMENTED
      person2:
        age: 8
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: MA
  output:
    snap_income_counted_share: [1, 1]

- name: Case 4, ABAWD time-limit-ineligible member's income share is prorated.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        meets_snap_general_work_requirements: true
        meets_snap_work_requirements_person: false
      person2:
        age: 33
        # Explicit inputs: providing these variables for person1 makes
        # them input arrays, so unspecified members would get the false
        # default instead of their computed values.
        meets_snap_general_work_requirements: true
        meets_snap_work_requirements_person: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    snap_income_counted_share: [0.5, 1]

- name: Case 5, income of a member sanctioned under the general work requirements is fully counted.
  period: 2026-01
  absolute_error_margin: 0.001
  input:
    people:
      person1:
        age: 35
        meets_snap_general_work_requirements: false
        meets_snap_work_requirements_person: false
      person2:
        age: 33
        meets_snap_general_work_requirements: true
        meets_snap_work_requirements_person: true
    spm_units:
      spm_unit:
        members: [person1, person2]
    households:
      household:
        members: [person1, person2]
        state_code: TX
  output:
    snap_income_counted_share: [1, 1]

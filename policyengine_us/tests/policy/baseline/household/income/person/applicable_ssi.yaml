- name: Case 1, calculated SSI is used by default.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        ssi_reported: 5_000
  output:
    ssi: 0
    applicable_ssi: 0

- name: Case 2, receives_ssi with a reported amount uses the reported amount.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        use_reported_ssi: true
        receives_ssi: true
        reported_ssi_amount: 6_000
  output:
    applicable_ssi: 6_000

- name: Case 3, the ssi_reported survey variable is not read by applicable_ssi.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        use_reported_ssi: true
        receives_ssi: true
        ssi_reported: 5_000
  output:
    # No reported_ssi_amount, so the flag falls back to calculated ssi (0).
    applicable_ssi: 0

- name: Case 4, a reported amount without the receives_ssi flag counts as zero.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        use_reported_ssi: true
        reported_ssi_amount: 6_000
  output:
    applicable_ssi: 0

- name: Case 5, receives_ssi without an amount falls back to calculated SSI.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        use_reported_ssi: true
        receives_ssi: true
        ssi: 9_000
  output:
    applicable_ssi: 9_000

- name: Case 6, reported inputs are ignored when the toggle is off.
  absolute_error_margin: 0.01
  period: 2024
  input:
    people:
      person1:
        age: 40
        receives_ssi: true
        reported_ssi_amount: 6_000
  output:
    applicable_ssi: 0

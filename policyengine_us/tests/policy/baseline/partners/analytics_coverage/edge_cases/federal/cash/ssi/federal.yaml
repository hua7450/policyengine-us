# SSI federal partner edge-case contract tests.
# All amounts derived from gov/ssa/ssi parameters for 2026:
#   individual FBR $994/mo (amount/individual.yaml), couple FBR $1,491/mo
#   (amount/couple.yaml), $20 general + $65 earned exclusions and 50%
#   earned share (income/exclusions/*), resource limits $2,000 / $3,000
#   (eligibility/resources/limit/*), non-blind SGA $1,690/mo (gov/ssa/sga).
- name: ssi_age_64_disabled_eligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 64
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: true
        meets_ssi_disability_criteria: true
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: [head]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Disabled route, no income: full individual FBR $994/mo x 12 = $11,928.
        ssi: 11_928
        is_ssi_eligible: true
        is_ssi_aged: false
        msp: 0
        msp_eligible: false
        # TX is a Section 1634 state: positive SSI confers Medicaid
        # (SSI_RECIPIENT category). $13,708.50 is the calibration-derived
        # TX adult per-capita cost (calibration/gov/hhs/medicaid/totals/
        # spending[TX] scaled by the person's cost index); the same value
        # recurs in every TX adult enrollee case below.
        medicaid: 13_708.50
        is_medicaid_eligible: true
        chip: 0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0
        premium_tax_credit: 0

        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 24_876
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: [head]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Earned break-even: wages 2 x FBR + $85 = $2,073/mo ($24,876/yr).
        # Countable = (2,073 - 85) x 50% = $994/mo = FBR, so payment is
        # exactly $0 while categorical/resource eligibility remains true
        # (is_ssi_eligible excludes the income test).
        ssi_countable_income: 11_928
        ssi: 0
        is_ssi_eligible: true
        is_ssi_aged: true
        msp: 0
        msp_eligible: false
        # Despite $0 SSI, still Medicaid-eligible via TX's optional
        # senior-or-disabled pathway: SSI-method countable income $11,928
        # <= 75% of FPG (0.75 x $15,960 = $11,970), so the calibration-
        # derived TX adult per-capita cost applies.
        medicaid: 13_708.50
        is_medicaid_eligible: true
        chip: 0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0
        premium_tax_credit: 0

- name: ssi_disabled_child_parental_deeming (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 48_000
        own_children_in_household: 1
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        own_children_in_household: 1
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child:
        age: 10
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: true
        meets_ssi_disability_criteria: true
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: [head, spouse, child]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, spouse, child]
    tax_units:
      tax_unit:
        members: [head, spouse, child]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse, child]
    marital_units:
      mu_head_spouse:
        members: [head, spouse]
      mu_child:
        members: [child]
  output:
    people:
      head:
        ssi: 0
        is_ssi_eligible: false
        msp: 0
        msp_eligible: false
        medicaid: 0
        is_medicaid_eligible: false
        chip: 0
      spouse:
        ssi: 0
        is_ssi_eligible: false
        msp: 0
        msp_eligible: false
        medicaid: 0
        is_medicaid_eligible: false
        chip: 0
      child:
        # Parental deeming (20 CFR 416.1165): parents' wages $4,000/mo.
        # Deemed earned after exclusions: (4,000 - 85) x 50% = $1,957.50/mo.
        # Less two-parent living allocation (couple FBR $1,491/mo):
        # 1,957.50 - 1,491 = $466.50/mo deemed to the child as unearned.
        # Child countable = 466.50 - $20 = $446.50/mo -> $5,358/yr.
        ssi_countable_income: 5_358
        # SSI = $994 - $446.50 = $547.50/mo x 12 = $6,570.
        ssi: 6_570
        is_ssi_eligible: true
        meets_ssi_disability_criteria: true
        msp: 0
        msp_eligible: false
        # TX is a Section 1634 state: the child's positive SSI confers
        # Medicaid (SSI_RECIPIENT category). Calibration-derived TX child
        # per-capita cost: spending[TX] $57,284,033,548 x cost index 414
        # / state denominator 2,400,882,400 = $9,877.86.
        medicaid: 9_877.86
        is_medicaid_eligible: true
        # Medicaid-eligible child is not CHIP-eligible.
        chip: 0
    tax_units:
      tax_unit:
        # Parents (TX non-expansion, not Medicaid-eligible at $48,000 MAGI
        # = 180% FPG) get marketplace PTC: benchmark SLCSP $15,715.77 less
        # required contribution $2,705.28 (5.64% of MAGI) = $13,010.49.
        aca_ptc: 13_010.49
        premium_tax_credit: 13_010.49

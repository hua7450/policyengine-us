# TANF partner edge cases (federal wrapper; all cases exercise tx_tanf, matching
# MyFriendBen TX traffic). All households: Dallas County, TX.
# 2026 TX TANF parameters (2025-10-01 entries, constant through CY2026):
#   Payment standard: with-2nd-parent size 3 = 418/mo; w/o-2nd-parent size 2 = 331,
#     size 3 = 382; non-caretaker size 1 = 130.
#   Budgetary needs (1994-03-01, frozen): with-2nd size 3 = 824; w/o-2nd size 2 = 650,
#     size 3 = 751; non-caretaker size 1 = 256. Recognizable needs = 25% of budgetary.
#   Deductions/disregards: $120/mo work expense; applicant disregard 33% of net earnings;
#     continuing-recipient disregard 90% (cap $1,400/mo); child support deduction $75/mo.
#   Resources: $1,000 countable limit; $4,650 vehicle exemption.
- name: tanf_two_parent_zero_income_max_grant_child_17 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        # Age 17 < minor-child threshold 18: eligible-side age boundary.
        age: 17
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: [head, spouse, child1]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    spm_units:
      spm_unit:
        # Max grant, caretaker-with-second-parent size 3: 418/mo x 12 = 5_016.
        tx_tanf: 5_016.0
        tanf: 5_016.0

- name: ccdf_income_and_assets_at_limits_eligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 62_588
        is_ccdf_reason_for_care_eligible: true
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: true
    households:
      household:
        members: &id004
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
        # Exactly at the $1,000,000 asset limit (<= comparison is inclusive).
        spm_unit_assets: 1_000_000
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # TX 2026 SMI, 2-person unit: 108,284 x (0.52 + 0.16) = 73,633.12.
        hhs_smi: 73_633.12
        # 62,588 / 73,633.12 = 0.849998 <= 0.85 -> income-eligible ($0.15 below the
        # 85% cutoff of $62,588.15).
        is_ccdf_income_eligible: true
        # 1,000,000 <= 1,000,000 -> asset-eligible (inclusive boundary).
        is_ccdf_asset_eligible: true
    people:
      head:
        is_ccdf_eligible: false
        is_ccdf_reason_for_care_eligible: true
      child1:
        # All four conjuncts pass at both inclusive boundaries -> eligible.
        is_ccdf_eligible: true
        is_ccdf_reason_for_care_eligible: true

# CCDF federal edge cases (gov/hhs/ccdf).
# Eligibility = asset & age & income & reason-for-care (is_ccdf_eligible.py).
# Parameters: age_limit = 13 (age < 13); asset_limit = $1,000,000 (assets <= limit);
# income_limit_smi = 0.85 (ccdf_income / hhs_smi <= 0.85).
# hhs_smi(TX, 2026) reads the 2025-10-01 entry (period start 2026-01-01):
#   4-person base $108,284; size-2 adjustment 0.52 + 0.16 = 0.68
#   -> SMI(2) = 108,284 x 0.68 = $73,633.12; 85% limit = $62,588.15.
# hhs_smi(TX, 2025) reads the 2024-10-01 entry:
#   4-person base $103,213 -> SMI(2) = 103,213 x 0.68 = $70,184.84; 85% limit = $59,657.11.
# Zero-output cases are deliberate ineligible-side boundary pins, one per route:
# age (13 age-out), categorical (no reason for care), income (just above 85% SMI),
# resource (assets just above $1M).
- name: ccdf_child_age_12_eligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
        is_ccdf_reason_for_care_eligible: true
      child1:
        age: 12
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: true
    households:
      household:
        members: &id001
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        # Adult: age 30 >= age_limit 13 -> age-ineligible even with reason for care.
        is_ccdf_eligible: false
        is_ccdf_reason_for_care_eligible: true
      child1:
        # Age 12 < 13 (last eligible year); income 20,000 / 73,633.12 = 0.272 <= 0.85;
        # assets 0 <= 1,000,000; reason true -> eligible.
        is_ccdf_eligible: true
        is_ccdf_reason_for_care_eligible: true

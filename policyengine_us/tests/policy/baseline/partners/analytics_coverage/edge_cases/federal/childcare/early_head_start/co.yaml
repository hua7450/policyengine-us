# Early Head Start CO variant: pins the state-specific per-slot amount
# (CO spending / enrollment differs from the federal.yaml TX baseline).
- name: early_head_start_infant_age_0 (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 0
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - child1
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        early_head_start: 0.0
      child1:
        # CO per-slot = spending x uprating / enrollment:
        # 41_655_058 (2023-09-01) x (328.4 / 304.7) / 2_135 = 21_028.13
        early_head_start: 21_028.13

- name: early_head_start_income_at_fpg_child_age_1 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        # AGI 21_640 == FPG(2) 21_640 exactly: inclusive (<=) boundary.
        employment_income_before_lsr: 21_640
      child1:
        age: 1
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id005
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: false
    families:
      family:
        members: *id005
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        early_head_start: 0.0
      child1:
        # AGI exactly at 100% FPG still income-eligible (AGI <= tax_unit_fpg).
        # 285_688_754 x (328.4 / 304.7) / 14_166 = 21_735.85
        early_head_start: 21_735.85
# AGI $1 above 100% FPG fails the income test, but the model computes SNAP
# receipt (TX BBCE gross limit = 165% FPG(2) = 35_706 > 21_641), and computed
# SNAP > 0 satisfies the categorical route — so the child stays eligible.
- name: early_head_start_income_just_above_fpg_snap_computed (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        # AGI 21_641 > FPG(2) 21_640; still SNAP-eligible (computed).
        employment_income_before_lsr: 21_641
      child1:
        age: 1
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id006
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id006
    tax_units:
      tax_unit:
        members: *id006
        tax_unit_is_joint: false
    families:
      family:
        members: *id006
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        early_head_start: 0.0
      child1:
        # Income test fails, but computed SNAP receipt (see header) keeps the
        # family categorically eligible.
        # 285_688_754 x (328.4 / 304.7) / 14_166 = 21_735.85
        early_head_start: 21_735.85
# Deliberate ineligible-side zero: income route. AGI must clear both 100%
# FPG(2) = 21_640 AND the TX SNAP BBCE gross limit (165% FPG(2) = 35_706) so
# no computed benefit re-opens the categorical route.
- name: early_head_start_income_above_fpg_no_snap_child_age_1 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        # AGI 40_000 > FPG(2) 21_640 and > 165% FPG(2) 35_706: SNAP = 0.
        employment_income_before_lsr: 40_000
      child1:
        age: 1
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id012x
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id012x
    tax_units:
      tax_unit:
        members: *id012x
        tax_unit_is_joint: false
    families:
      family:
        members: *id012x
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        early_head_start: 0.0
      child1:
        early_head_start: 0.0
- name: early_head_start_snap_categorical_over_income (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30

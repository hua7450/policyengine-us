# Early Head Start (gov.hhs.head_start.early_head_start) federal edge cases.
# Eligibility (45 CFR 1302.12): (age < 3 OR pregnant) AND (AGI <= 100% FPG
# OR categorical: family receives TANF/SSI/SNAP, homeless, or foster care).
# TX per-slot amount 2026 = spending / enrollment, uprated by gov.hhs.uprating:
#   285_688_754 (2023-09-01) x (328.4 / 304.7) / 14_166 = 21_735.85
# 2026 contiguous-US FPG = 15_960 (first person) + 5_680 (each additional):
#   size 1 = 15_960; size 2 = 21_640.
- name: early_head_start_pregnant_adult (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 28
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Pregnancy satisfies the age prong; AGI 0 <= FPG(1) 15_960.
        # 285_688_754 x (328.4 / 304.7) / 14_166 = 21_735.85
        early_head_start: 21_735.85

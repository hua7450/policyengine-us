      household:
        members: &id007
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id007
        # Family receives SNAP: categorical route despite AGI 40_000 > FPG(2).
        snap: 3_000
    tax_units:
      tax_unit:
        members: *id007
        tax_unit_is_joint: false
    families:
      family:
        members: *id007
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        early_head_start: 0.0
      child1:
        # SNAP receipt makes the family categorically eligible.
        # 285_688_754 x (328.4 / 304.7) / 14_166 = 21_735.85
        early_head_start: 21_735.85

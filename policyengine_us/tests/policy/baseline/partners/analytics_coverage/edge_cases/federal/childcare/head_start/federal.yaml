# Head Start (gov/hhs/head_start) federal edge cases — TX-shaped template.
# Per-slot amount = state spending (2023-09-01, uprated by gov.hhs.uprating) / state enrollment.
# TX 2026: 540_532_752 x (328.4 / 304.7) / 47_286 = 12_320.27
# TX 2025: 540_532_752 x (321.9 / 304.7) / 47_286 = 12_076.41
# Eligibility: age in [3, 6) AND (AGI <= tax_unit_fpg OR categorical via SNAP/TANF/SSI/homeless/foster).
# Model tax_unit_fpg (size 2): 21_640 in 2026; 21_150 in 2025.
- name: head_start_child_age_2_too_young (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: false
      child1:
        age: 2
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: false
    households:
      household:
        members: &id001
          - head
          - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
          - head
      mu_child1:
        members:
          - child1
  output:
    people:
      head:
        # Deliberate demographic (too-young) boundary zero: age 2 < age_range lower
        # threshold of 3, so head_start is 0 despite $0 income. The positive amount
        # this child would receive is early_head_start, pinned in the sibling
        # early_head_start suite.
        head_start: 0.0
      child1:
        head_start: 0.0

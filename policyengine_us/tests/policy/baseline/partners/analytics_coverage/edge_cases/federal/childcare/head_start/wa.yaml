# Head Start state variant: pins the WA-specific per-slot amount
# (state spending / state enrollment differs from the federal.yaml TX template).
# WA 2026: 120_059_507 x (328.4 / 304.7) / 5_719 = 22_625.97
- name: head_start_child_age_3_eligible (wa)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: false
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_ccdf_reason_for_care_eligible: false
    households:
      household:
        members: &id001
          - head
          - child1
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
          - head
      mu_child1:
        members:
          - child1
  output:
    people:
      head:
        head_start: 0.0
      child1:
        # WA per-slot amount, 2026: spending 120_059_507 (2023-09-01, uprated by
        # gov.hhs.uprating 328.4 / 304.7) / enrollment 5_719 = 22_625.97.
        head_start: 22_625.97

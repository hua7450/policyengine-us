        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        # TX separate-CHIP per-capita = spending / enrollment
        # = $522,954,572 / 359,047 (calibration.gov.hhs.cms.chip) = $1,456.51.
        chip: 1_456.51
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        # CHIP-eligible child is excluded from the PTC coverage unit, so SLCSP is the
        # parent-only Dallas age-30 premium = 7,371.02. Form 8962 FPL fraction rounds
        # to 1.79; 2026 applicable pct = 4.19% + (6.60% - 4.19%) x (1.79 - 1.50)/0.50
        # = 5.5878%; contribution = 38,000 x 0.055878 = 2,123.36.
        # PTC = 7,371.02 - 2,123.36 = 5,247.66.
        aca_ptc: 5_247.66

# Federal tax-credit composition edge cases (EITC / CTC / refundable CTC / CDCC).
# 2026 parameters used in derivations:
#   EITC max (0/1/2/3 children): 664 / 4_427 / 7_316 / 8_231
#   EITC phase-in rates: 7.65% / 34% / 40% / 45%
#   EITC phase-out rates: 7.65% / 15.98% / 21.06% / 21.06%
#   EITC phase-out start: 10_860 (childless) / 23_890 (with children); joint bonus 7_280 / 7_270
#   EITC age limits (childless): 25-64
#   CTC: 2_200 per child under 17; 500 other-dependent credit; refundable cap 1_700/child;
#     refundable phase-in 15% of earnings over 2_500; phase-out 50 per 1_000 over 200k/400k
#   CDCC 2026: 50% max rate, -1% per 2_000 AGI over 15_000 (floor 35%), second phase-out
#     -1% per 2_000 AGI over 75_000 single/HoH (floor 20%); expense cap 3_000 per qualifying child
#   Standard deduction: 16_100 single / 32_200 joint / 24_150 HoH
- name: fedtax_size_1_single_adult_age_30 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
        is_full_time_student: false
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        # Demographically eligible (age 30 is within 25-64) but income route zeroes
        # the amount: childless single phase-out ends at
        # 10_860 + 664 / 0.0765 = 19_539.93 < 20_000, so EITC = 0.
        eitc: 0.0
        eitc_eligible: true
        ctc: 0.0
        ctc_value: 0.0
        refundable_ctc: 0.0
        cdcc: 0.0
        adjusted_gross_income: 20_000.0
        # income_tax = 10% x (20_000 - 16_100 single standard deduction) = 390
        income_tax: 390.0

  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 22_000
        self_employment_income_before_lsr: -2_000
        is_full_time_student: false
      child1:
        age: 10
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
      child2:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
      child3:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: &id012
        - head
        - child1
        - child2
        - child3
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id012
    tax_units:
      tax_unit:
        members: *id012
        tax_unit_is_joint: false
    families:
      family:
        members: *id012
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
      mu_child3:
        members:
        - child3
  output:
    tax_units:
      tax_unit:
        # Net earned income = 22_000 wages - 2_000 self-employment loss = 20_000,
        # on the 3-child plateau (phase-in ends 8_231 / 0.45 = 18_291;
        # 20_000 < 23_890): eitc = 8_231 (3-child schedule maximum).
        eitc: 8_231.0
        eitc_eligible: true
        ctc: 6_600.0
        # Negative self-employment income must reduce the refundable-CTC earnings
        # base: phase-in = 15% x (20_000 - 2_500) = 2_625 (not 2_925 from gross
        # wages); ctc_value = min(6_600, 2_625) = 2_625.
        ctc_value: 2_625.0
        # refundable_ctc = min(1_700 x 3 = 5_100, 2_625, 6_600) = 2_625.
        refundable_ctc: 2_625.0
        cdcc: 0.0
        # AGI = 22_000 - 2_000 = 20_000 (no SE tax deduction on a loss).
        adjusted_gross_income: 20_000.0
        # income_tax = -(8_231 + 2_625) = -10_856.
        income_tax: -10_856.0

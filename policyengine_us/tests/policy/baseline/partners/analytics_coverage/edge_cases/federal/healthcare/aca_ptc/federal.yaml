- name: aca_ptc_medicare_eligible_ineligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 67
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
        # Pin 0 quarters so QMB covers the full Part A premium; the model
        # defaults to 40 (premium-free Part A) when quarters are not sent.
        medicare_quarters_of_coverage: 0
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id008
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id008
    tax_units:
      tax_unit:
        members: *id008
        tax_unit_is_joint: false
    families:
      family:
        members: *id008
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        # Aged 65+ with zero countable resources passes the SSI categorical
        # and resource tests (income is tested downstream, so ssi stays 0).
        is_ssi_eligible: true
        is_ssi_aged: true
        # MSP uses SSI income methodology: countable = (30,000 - 240 - 780)/2
        # = 14,490/yr = 1,207.50/mo < QMB limit (100% of 2026 FPG, 1,330/mo).
        # QMB value = 12 x (565.00 Part A + 202.90 Part B premiums) = 9,214.80.
        msp: 9_214.80
        msp_eligible: true
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        # Age 67 triggers Medicare eligibility, which is disqualifying
        # coverage for the PTC under 26 USC 36B(c)(2)(B).
        is_medicare_eligible: true
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

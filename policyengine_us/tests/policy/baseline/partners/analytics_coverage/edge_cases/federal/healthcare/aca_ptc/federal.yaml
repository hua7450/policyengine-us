# ACA PTC federal edge cases, anchored in TX (non-expansion) / Dallas County
# (rating area 8; 2026 age-0 SLCSP $414.00/month, 2025 $287.00/month).
# aca_magi_fraction uses PRIOR-year FPG (Form 8962 Line 4): 2026 cases divide
# by the 2025 FPG ($15,650 + $5,500/extra person); 2025 cases by the 2024 FPG
# ($15,060). Default federal age curve: age 30 -> 1.4837, 33 -> 1.566,
# 35 -> 1.5974, 40 -> 1.6706, 60 -> 3.5477.
- name: aca_ptc_single_at_99pct_fpl_below_floor_ineligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 15_500
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        # 15,500 / 15,650 (2025 FPG) = 0.99 < 1.00: below the IRC 36B(c)(1)(A)
        # floor; citizen, so no below-FPL immigration exception (repealed 2026
        # by OBBBA anyway). TX non-expansion: no Medicaid either (coverage gap).
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

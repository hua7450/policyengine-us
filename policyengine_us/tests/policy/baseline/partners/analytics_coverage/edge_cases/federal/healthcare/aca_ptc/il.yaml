# Illinois variant — differs from the federal.yaml TX baseline for
# state-policy reasons: the 5-year-old is IL Medicaid (All Kids) eligible at
# 183% of poverty (vs TX 144% child Medicaid limit / CHIP instead), so the
# child is covered by Medicaid and drops out of the marketplace SLCSP.
# Cook County is rating area 1 (2026 age-0 SLCSP $302.00/month).
- name: aca_ptc_family_no_employer_offer_child_on_medicaid (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 50_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # IL per-capita child Medicaid amount; Medicaid is disqualifying
        # coverage, so the child is excluded from the SLCSP.
        medicaid: 7_172.02
        is_medicaid_eligible: true
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        # Adults-only SLCSP = 302.00 x (1.5974 + 1.566) x 12 = 11,464.16.
        # MAGI fraction = floor(100 x 50,000 / 26,650) / 100 = 1.87; figure
        # = 0.0419 + (1.87 - 1.50) / 0.50 x (0.066 - 0.0419) = 0.059734.
        # PTC = 11,464.16 - 0.059734 x 50,000 = 8,477.46.
        aca_ptc: 8_477.46
        premium_tax_credit: 8_477.46

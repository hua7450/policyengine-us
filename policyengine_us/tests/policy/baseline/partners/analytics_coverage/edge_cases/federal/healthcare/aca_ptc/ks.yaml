# Kansas is a non-expansion state: adults from ~100% FPL up are PTC-eligible
# rather than Medicaid-covered to 138% FPL as in expansion states (CO/NC).
# Benchmark (SLCSP) amounts are pinned for the Wichita (Sedgwick County) rating
# area. Only cases whose outputs differ from the federal.yaml (TX) baseline or
# that exercise KS non-expansion are included.
- name: aca_ptc_single_just_above_100pct_fpl (ks)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income: 16_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code_str: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        is_aca_ptc_eligible: true
    tax_units:
      tax_unit:
        aca_ptc: 7_408.92
        premium_tax_credit: 7_408.92

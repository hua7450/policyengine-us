# North Carolina variant (expansion state since Dec 2023) — differs from the
# federal.yaml TX baseline for state-policy reasons: the 5-year-old is NC
# Medicaid eligible at 183% of poverty (NC child limit 211% FPG), so with
# the head holding an affordable employer offer only the spouse remains in
# the marketplace SLCSP. Wake County is rating area 13 (2026 age-0 SLCSP
# $354.00/month).
- name: aca_ptc_family_employer_affordable_offer_head_ineligible (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 50_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: true
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        # ESHI offer makes the offer-holder ineligible; spouse stays eligible.
        is_aca_ptc_eligible: false
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # NC per-capita child Medicaid amount; Medicaid is disqualifying
        # coverage, so the child is excluded from the SLCSP.
        medicaid: 5_045.76
        is_medicaid_eligible: true
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        # Spouse-only SLCSP = 354.00 x 1.566 x 12 = 6,652.37. MAGI fraction
        # = floor(100 x 50,000 / 26,650) / 100 = 1.87; figure = 0.0419 +
        # (1.87 - 1.50) / 0.50 x (0.066 - 0.0419) = 0.059734.
        # PTC = 6,652.37 - 0.059734 x 50,000 = 3,665.67.
        aca_ptc: 3_665.67
        premium_tax_credit: 3_665.67

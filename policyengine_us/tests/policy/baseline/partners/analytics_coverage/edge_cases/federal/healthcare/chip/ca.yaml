# CA state divergence: no separate CHIP (child income limit = -inf); children up
# to the CA older-child Medicaid limit (2.66 FPL) are covered by Medicaid instead.
# At 60,000 / 27,320 = 2.196 FPL the TX baseline would deny both programs
# (above 2.06 CHIP limit); CA routes the child to Medicaid.
- name: chip_no_separate_chip_child_covered_by_medicaid (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 60_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # 2.196 FPL <= 2.66 CA older-child Medicaid limit -> Medicaid (current-model
        # calibration per-capita pin); CA CHIP limit is -inf -> chip 0.
        medicaid: 6_655.48
        is_medicaid_eligible: true
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 7_331.77
        premium_tax_credit: 7_331.77

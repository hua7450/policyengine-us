# CO state divergences from the TX baseline: separate-CHIP child limit 2.65 FPL
# (TX 2.06), a standard pregnant CHIP pathway at 2.65 FPL (TX has none, only
# FCEP), and CO per-capita separate CHIP = 255,227,121 / 112,249 = 2,273.76
# (calibration.gov.hhs.cms.chip spending / enrollment, 2024 entries).
- name: chip_pregnant_standard_and_child_above_tx_limit (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 70_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        # Pregnant spouse's Medicaid household counts the unborn child (size 4,
        # FPG = 15,960 + 3 x 5,680 = 33,000): 70,000 / 33,000 = 2.1212 FPL in
        # (2.00 CO pregnant Medicaid limit, 2.65 CO pregnant CHIP limit]
        # -> chip = CO per-capita 255,227,121 / 112,249 = 2,273.76.
        chip: 2_273.76
        chip_category: 1  # PREGNANT_STANDARD
        is_chip_eligible: true
        is_aca_ptc_eligible: false
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        # Child (size 3, FPG 27,320): 70,000 / 27,320 = 2.5622 FPL in
        # (1.47 CO older-child Medicaid limit, 2.65 CO CHIP limit] -> CHIP.
        # In TX the same income level would be above the 2.06 limit.
        # chip = 255,227,121 / 112,249 = 2,273.76.
        chip: 2_273.76
        chip_category: 0  # CHILD
        is_chip_eligible: true
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0
# CO upper income boundary: 80,000 / 27,320 = 2.9283 FPL > 2.65 -> chip 0
# (income route), while MA (3.05) and WA (3.17) pay CHIP at this income level.

# CHIP federal contract cases, pinned to TX (separate-CHIP state, 206% FPL child
# limit, FCEP unborn-child option at 207% FPL).
# Key parameter math (2026, contiguous-US FPG for 3 = 15,960 + 2 x 5,680 = 27,320):
#   TX CHIP child window: (1.38 older-child Medicaid limit, 2.06] x FPG
#   TX per-capita separate CHIP = 522,954,572 / 359,047 = 1,456.51
#     (calibration.gov.hhs.cms.chip spending / enrollment, 2024 entries)
- name: chip_eligible_child_age_18_at_183_pct_fpl (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 50_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 18
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        # 50,000 / 27,320 = 1.830 FPL: above TX older-child Medicaid limit (1.38),
        # below TX CHIP limit (2.06), age 18 < 19 -> CHIP-eligible child.
        # chip = TX per-capita separate CHIP = 522,954,572 / 359,047 = 1,456.51.
        chip: 1_456.51
        chip_category: 0  # CHILD
        is_chip_eligible: true
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 12_729.07
        premium_tax_credit: 12_729.07

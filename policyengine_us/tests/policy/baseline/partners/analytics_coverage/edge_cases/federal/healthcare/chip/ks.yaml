# KS state divergences from the TX baseline: young-child (1-5) Medicaid limit
# 1.54 FPL (TX 1.49), separate-CHIP cutoff 2.55 FPL (TX 2.06), and KS per-capita
# separate CHIP = 136,581,734 / 72,018 = 1,896.49
# (calibration.gov.hhs.cms.chip spending / enrollment, 2024 entries).
# Cases bracket the KS young-child Medicaid limit and the KS CHIP cutoff.
- name: chip_child_age_5_below_ks_young_child_medicaid_limit (ks)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 41_500
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # 41,500 / 27,320 = 1.5190 FPL <= 1.54 KS young-child Medicaid limit
        # -> Medicaid (current-model calibration per-capita pin), not CHIP.
        # In TX (limit 1.49) the same child would be on CHIP instead.
        medicaid: 9_147.26
        is_medicaid_eligible: true
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 13_990.79
        premium_tax_credit: 13_990.79

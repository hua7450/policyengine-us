# NC state divergence: separate CHIP folded into Medicaid 2023-04 (child income
# limit = -inf) and the NC older-child Medicaid limit rose to 2.16 FPL in
# 2023-12. At 50,000 / 27,320 = 1.830 FPL the TX baseline pays CHIP
# (1,456.51); NC covers the same child through Medicaid instead.
- name: chip_folded_into_medicaid_child_covered_by_medicaid (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 50_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # 1.830 FPL <= 2.16 NC older-child Medicaid limit -> Medicaid (current-model
        # calibration per-capita pin); NC CHIP limit is -inf post fold-in -> chip 0.
        medicaid: 5_045.76
        is_medicaid_eligible: true
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 10_451.42
        premium_tax_credit: 10_451.42

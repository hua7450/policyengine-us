# WA state divergence: separate-CHIP child limit 3.17 FPL (TX 2.06, CO 2.65) and
# WA per-capita separate CHIP = 176,312,854 / 82,068 = 2,148.38
# (calibration.gov.hhs.cms.chip spending / enrollment, 2024 entries).
# 80,000 / 27,320 = 2.9283 FPL: ineligible in TX and CO, eligible in WA.
- name: chip_eligible_child_at_293_pct_fpl_within_wa_limit (wa)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 80_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      spouse:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        chip_category: 3  # NONE
        is_chip_eligible: false
        is_aca_ptc_eligible: true
      child1:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        # 2.9283 FPL in (2.15 WA older-child Medicaid limit, 3.17 WA CHIP limit]
        # -> chip = WA per-capita 176,312,854 / 82,068 = 2,148.38.
        chip: 2_148.38
        chip_category: 0  # CHILD
        is_chip_eligible: true
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 5_584.01
        premium_tax_credit: 5_584.01

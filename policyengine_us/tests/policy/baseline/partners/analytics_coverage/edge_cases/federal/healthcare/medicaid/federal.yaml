        msp: 0.0
        msp_eligible: false
        # Age 1 is past the infant bound and inside the 1-5 young child span.
        medicaid: 11_482.12
        is_medicaid_eligible: true
        medicaid_category: 1  # YOUNG_CHILD
        chip: 0.0
        is_aca_ptc_eligible: false
      child3:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # Age 5 is the last young child age.
        medicaid: 11_482.12
        is_medicaid_eligible: true
        medicaid_category: 1  # YOUNG_CHILD
        chip: 0.0
        is_aca_ptc_eligible: false
      child4:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # Age 6 is the first older child age (6-18 span).
        medicaid: 11_482.12
        is_medicaid_eligible: true
        medicaid_category: 2  # OLDER_CHILD
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

# Federal Medicaid edge cases, run in TX (non-expansion baseline state).
# Dollar pins derive from the calibration per-capita model:
#   medicaid_person = (state spending / state enrollment)
#                     x (person SLCSP age index / household average index)
# TX per capita: $57,284,033,548 / 4,178,724 enrolled = $13,708.50.
# 2026 contiguous-US FPG: 1p $15,960; 2p $21,640; 3p $27,320 (gov/hhs/fpg.yaml).
- name: medicaid_pregnant_adult (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 28
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # Pregnancy adds the unborn child to the Medicaid household:
        # 20,000 / 21,640 (2p FPG) = 0.92 FPL < TX pregnant limit 2.03 -> eligible.
        # Single enrollee, so index ratio = 1: medicaid = TX per capita 13,708.50.
        medicaid: 13_708.5
        is_medicaid_eligible: true
        medicaid_category: 6  # PREGNANT
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

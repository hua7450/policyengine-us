# Kansas has not adopted the ACA Medicaid expansion (adult income limit = -inf),
# has one of the lowest parent/caretaker limits in the country (38% FPL), and
# requires child deprivation for parent Medicaid (two-parent households are
# generally ineligible). Only cases whose outputs differ from the federal.yaml
# (TX) baseline or that exercise a KS-specific parameter are included.
- name: medicaid_adult_at_138pct_fpl_coverage_gap (ks)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income: 22_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code_str: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        medicaid: 0.0
        is_medicaid_eligible: false
        chip: 0.0
        is_aca_ptc_eligible: true
    tax_units:
      tax_unit:
        aca_ptc: 6_959.0
        premium_tax_credit: 6_959.0

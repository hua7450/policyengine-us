# North Carolina Medicaid expansion case (output differs from the
# federal.yaml TX non-expansion baseline; NC adopted the expansion on
# 2023-12-01, so this also pins the newest expansion state in the suite).
# NC Medicaid per capita: $19,443,040,982 / 2,776,584 enrolled = $7,002.50.
- name: medicaid_adult_below_138pct_fpl_expansion (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 22_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # Expansion state: 22,000 / 15,960 = 1.378 FPL < 1.38 -> ADULT.
        # Single enrollee: medicaid = NC per capita 7,002.50.
        medicaid: 7_002.5
        is_medicaid_eligible: true
        medicaid_category: 4  # ADULT
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

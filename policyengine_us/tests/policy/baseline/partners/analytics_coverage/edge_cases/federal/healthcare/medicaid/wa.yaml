# Washington Medicaid expansion case with a negative-income robustness pin
# (output differs from the federal.yaml TX non-expansion baseline: the
# identical household is ineligible in TX at any of these income levels).
# WA Medicaid per capita: $29,197,626,447 / 1,837,170 enrolled = $15,892.72.
- name: medicaid_adult_negative_self_employment_income_magi (wa)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
        self_employment_income_before_lsr: -12_000
        is_medicare_eligible: false
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        ssi: 0.0
        is_ssi_eligible: false
        is_ssi_aged: false
        msp: 0.0
        msp_eligible: false
        # Negative self-employment income nets against wages in MAGI:
        # (30,000 - 12,000) / 15,960 = 1.128 FPL < 1.38 -> ADULT (wages
        # alone would be 1.88 FPL and ineligible). The benefit stays at the
        # flat per-capita amount - the loss does not inflate it.
        # Single enrollee: medicaid = WA per capita 15,892.72.
        medicaid: 15_892.72
        is_medicaid_eligible: true
        medicaid_category: 4  # ADULT
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

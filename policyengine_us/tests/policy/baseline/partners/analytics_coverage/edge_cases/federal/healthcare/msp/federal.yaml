# MSP shared parameters (2026, contiguous US):
#   FPG single = 15_960/yr (1_330/mo); FPG couple = 15_960 + 5_680 = 21_640/yr (1_803.33/mo)
#   Income limits (share of FPG, monthly): QMB <= 1_330; SLMB < 1_596 (120%); QI < 1_795.50 (135%)
#   Countable income uses SSI methodology: unearned - $20/mo; earned - $65/mo (+$20 leftover), then 50% excluded
#   Part B premium = 202.90/mo (2_434.80/yr); Part A full = 565/mo (6_780/yr), reduced (30-39 quarters) = 311/mo (3_732/yr), free at 40+ quarters
#   Asset limits (TX applies test): individual 9_950; couple 14_910
#   msp_category is an Enum; the YAML runner compares raw indices: NONE=0, QMB=1, SLMB=2, QI=3
- name: msp_qmb_at_100pct_fpl_earned_income_boundary (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 32_940
        is_medicare_eligible: true
        medicare_quarters_of_coverage: 0
        ssi_countable_resources: 0
        is_aca_eshi_eligible: false
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Countable income: (32_940 / 12 - 85) x 0.5 = 1_330/mo = exactly 100% FPL -> QMB (<=)
        # QMB with 0 quarters pays full Part A + Part B: (565 + 202.90) x 12 = 9_214.80
        msp: 9_214.8
        msp_eligible: true
        msp_category: 1  # QMB
        # SSI countable 15_960 > FBR 11_928 -> no SSI cash payment
        ssi: 0.0
        chip: 0.0
        is_aca_ptc_eligible: false
    tax_units:
      tax_unit:
        aca_ptc: 0.0
        premium_tax_credit: 0.0

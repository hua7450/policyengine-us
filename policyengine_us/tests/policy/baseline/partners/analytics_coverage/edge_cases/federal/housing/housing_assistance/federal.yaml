# HUD housing assistance (Section 8 / HCV HAP) partner edge cases.
# Geography: Dallas County, TX (county_fips 48113, ZIP 75201).
# ZIP 75201 is in the Dallas SAFMR-mandated metro, so the payment standard is
# the Small Area FMR (2026 schedule: 0bd $2,380 / 1bd $2,470 / 2bd $2,900 /
# 3bd $3,650 per month). Dallas County FY2025 Section 8 income limits
# (section8_income_limits.csv, used for 2025 and 2026): size 1 = 24,650 EL /
# 41,100 VL / 65,700 low; size 3 = 31,700 EL; size 4 low = 93,850.
# HAP = min(payment_standard - TTP, gross_rent - TTP), floored at 0, where
# TTP = max(10% annual income, 30% adjusted income, minimum rent 25).
- name: housing_assistance_zero_income_near_max_subsidy (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        employment_income_before_lsr: 0
        pre_subsidy_rent: 18_000
    households:
      household:
        members:
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
        county_fips: '48113'
        bedrooms: 1
    spm_units:
      spm_unit:
        members:
        - head
    tax_units:
      tax_unit:
        members:
        - head
        tax_unit_is_joint: false
    families:
      family:
        members:
        - head
    marital_units:
      mu_head:
        members:
        - head
  output:
    spm_units:
      spm_unit:
        # Income 0 <= 24,650 extremely-low limit -> eligible renter.
        # TTP = max(0, 0, 25 minimum rent) = 25.
        # Payment standard = 1bd SAFMR 2,470 x 12 = 29,640 -> max subsidy 29,615.
        # Gross rent 18,000 - TTP 25 = 17,975 (rent side binds).
        housing_assistance: 17_975.0

# CSFP federal-route edge cases. Households are placed in CO (partner-traffic
# state with no CSFP-specific state rules) so the federal fpg_limit branch of
# commodity_supplemental_food_program_eligible is actually executed; TX-specific
# (130% FPG) and MA-specific (county gating) rules are pinned in tx.yaml/ma.yaml.
# NOTE: school_meal_countable_income (the CSFP income base) includes computed
# ssi. Income-boundary singles therefore use age 62 (CSFP-age-eligible but
# below the SSI aged threshold of 65) so the pinned boundary is the CSFP FPG
# cutoff itself; the 65+ cases document the SSI interaction explicitly.
- name: csfp_age_59_ineligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 59
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Demographic ineligibility boundary: age 59 < min_age 60
        # (gov/usda/csfp/min_age.yaml) -> $0 despite $0 income.
        commodity_supplemental_food_program: 0.0

        # carried into 2026 (no uprating metadata).
        commodity_supplemental_food_program: 601.0
- name: csfp_income_between_130_and_150_fpg (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 62
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 23_900
    households:
      household:
        members: &id003
        - head
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Federal 150% route, just-below-boundary and inside the 130-150% band
        # that distinguishes the federal rule from the TX 130% rule:
        # 2026 size-1 FPG (contiguous) = 15,960; ratio 23,900 / 15,960 = 1.4975
        # <= 1.5 federal fpg_limit -> eligible -> 601. Age 62 keeps ssi = 0
        # (below SSI aged threshold 65) so earnings alone set the ratio.
        commodity_supplemental_food_program: 601.0

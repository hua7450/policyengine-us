- name: csfp_elderly_couple_both_eligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 67
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      spouse:
        age: 65
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        - spouse
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id005
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: true
    families:
      family:
        members: *id005
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    people:
      head:
        # Benefit is per eligible person, not per household: both spouses are
        # 60+ with $0 earnings. The zero-income aged couple picks up SSI
        # (couple FBR 1,491/mo x 12 = 17,892), which counts in the school-meal
        # income base: ratio 17,892 / 21,640 size-2 FPG = 0.8268 <= 1.5 ->
        # each receives the flat 601 (household total 1,202).
        commodity_supplemental_food_program: 601.0
      spouse:
        commodity_supplemental_food_program: 601.0
- name: csfp_elderly_parent_in_family_of_4 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      grandparent:
        age: 70
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id006
        - head
        - spouse
        - grandparent
        - child1
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id006
    tax_units:
      tax_unit:
        members: *id006
        tax_unit_is_joint: true
    families:
      family:
        members: *id006
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_grandparent:
        members:
        - grandparent
      mu_child1:
        members:
        - child1
  output:
    people:
      # Age is person-level, income is SPM-unit-level against size-scaled FPG:
      # 2026 size-4 FPG = 15,960 + 3 x 5,680 = 33,000. The zero-income
      # 70-year-old draws full SSI (FBR 994/mo x 12 = 11,928), which counts in
      # the school-meal income base: (30,000 + 11,928) / 33,000 = 1.2705
      # <= 1.5 -> income-eligible; only the 70-year-old passes the age gate ->
      # grandparent 601, under-60 members 0.
      grandparent:
        commodity_supplemental_food_program: 601.0
      head:
        commodity_supplemental_food_program: 0.0
      spouse:
        commodity_supplemental_food_program: 0.0
      child1:
        commodity_supplemental_food_program: 0.0

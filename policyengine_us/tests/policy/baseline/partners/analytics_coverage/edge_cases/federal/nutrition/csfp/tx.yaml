# TX state variant: Texas applies its own 130% FPG income limit
# (gov/states/tx/dta/csfp/fpg_limit.yaml, via tx_dta_csfp_income_eligible)
# instead of the federal 150% limit, so incomes in the 130-150% FPG band are
# eligible federally but ineligible in TX. Age 62 is used (CSFP-age-eligible
# but below the SSI aged threshold of 65) so computed ssi stays out of the
# school-meal income base and earnings alone set the FPG ratio.
- name: csfp_tx_income_just_below_130_fpg (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 62
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_700
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Just below the binding TX cutoff: 2026 size-1 FPG = 15,960; TX 130%
        # cutoff = 20,748; ratio 20,700 / 15,960 = 1.2970 <= 1.3 -> eligible
        # -> flat 601 (gov/usda/csfp/amount.yaml, 2025 value carried to 2026).
        commodity_supplemental_food_program: 601.0
- name: csfp_tx_income_between_130_and_150_fpg_ineligible (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 62
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 22_000
    households:
      household:
        members: &id002
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id002
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # State-policy differentiator: ratio 22,000 / 15,960 = 1.3784 is above
        # the TX 130% limit but below the federal 150% limit -> $0 in TX
        # (the same person in a federal-rule state gets 601; see
        # csfp_income_between_130_and_150_fpg in federal.yaml).
        commodity_supplemental_food_program: 0.0

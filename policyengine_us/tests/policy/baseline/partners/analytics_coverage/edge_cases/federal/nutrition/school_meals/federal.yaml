# School meals (NSLP + SBP) federal edge cases.
# Tier thresholds (gov/usda/school_meals/income/limit): FREE <= 130% FPG,
# REDUCED <= 185% FPG, else PAID; categorical routes (7 CFR 245.2) and state
# universal-meals policies force FREE.
# 2026 FPG (3-person, contiguous US) = 15,960 + 2 x 5,680 = 27,320.
#   130% = 35,516; 185% = 50,542.
# 2026 daily subsidies (CONTIGUOUS_US, 2025-01-01 published rates CPI-uprated
# by ~1.0134): FREE = (4.60 + 2.46) x 1.0134 = 7.15;
# REDUCED = (4.20 + 2.16) x 1.0134 = 6.45; PAID = (0.46 + 0.40) x 1.0134 = 0.87.
- name: school_meals_free_tier_just_below_130pct (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 35_500
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: [head, spouse, child1]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    spm_units:
      spm_unit:
        # 35,500 / 27,320 = 129.9% <= 130% -> FREE on the income route
        # (SNAP also fires here via TX BBCE, so FREE is dual-caused; the
        # income-only boundary is pinned by the MO SNAP-blocked cases below).
        # FREE = (NSLP 4.60 + SBP 2.46) uprated = 7.15.
        school_meal_daily_subsidy: 7.15
        school_meal_tier: 0  # FREE
- name: school_meals_free_tier_exactly_at_130pct_snap_blocked (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 35_516
        # Over the SNAP liquid-asset limit (3,000 standard) so SNAP cannot
        # spill into the FREE tier via categorical eligibility; MO is
        # non-BBCE, so the asset test binds.
        bank_account_assets: 10_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: [head, spouse, child1]
        state_code: MO
        zip_code: '64106'
        county_str: JACKSON_COUNTY_MO
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    spm_units:
      spm_unit:
        # 35,516 / 27,320 = exactly 1.30; the tier formula uses <=, so
        # at-threshold resolves to FREE. SNAP = 0 (assets over limit,
        # no BBCE in MO), so this pins the pure income route inclusively.
        # FREE = (NSLP 4.60 + SBP 2.46) uprated = 7.15.
        school_meal_daily_subsidy: 7.15
        school_meal_tier: 0  # FREE
- name: school_meals_reduced_tier_onset_just_above_130pct_snap_blocked (federal)
  period: 2026

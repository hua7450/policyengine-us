# Massachusetts universal free school meals (Ch. 28 of the Acts of 2023,
# effective 2023-07-01): all students receive the FREE tier regardless of
# household income. Same household is PAID (0.87) under federal-only rules
# (see federal.yaml paid-tier case).
- name: school_meals_universal_free_meals_above_185pct (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 50_700
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: [head, spouse, child1]
        state_code: MA
        zip_code: '02118'
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    spm_units:
      spm_unit:
        # 50,700 / 27,320 = 185.6% FPG (> 185%, PAID on income), but MA's
        # universal-meals policy forces FREE.
        # FREE = (NSLP 4.60 + SBP 2.46) uprated to 2026 = 7.15.
        school_meal_daily_subsidy: 7.15
        school_meal_tier: 0  # FREE

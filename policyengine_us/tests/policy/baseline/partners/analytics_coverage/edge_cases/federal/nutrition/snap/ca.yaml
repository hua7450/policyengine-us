        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Deliberate ineligible-side pin of CA's net-test route: net =
        # 38,000/12 x 0.8 - 209 = 2,324.33 exceeds the net limit in every
        # month (Jan-Sep 2,220.83; Oct-Dec: 2,319.65 > 2,276.67), and the
        # federal 130% gross test also fails (ratio 1.43), so the unit is
        # ineligible all year. In a no-net-test 200% state this income would
        # be eligible.
        snap: 0.0
        is_snap_eligible: false
- name: snap_ca_head_immigration_refugee_cfap_transition (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: REFUGEE
        employment_income_before_lsr: 20_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id004
        - head
        - spouse
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id004
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: true
    families:
      family:
        members: *id004
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # CA delays the OBBB refugee exclusion to 2026-04-01 (ACL 25-92), and
        # CalWORKs ($7,700/year here) counts as unearned income ($641.67/mo):
        # Jan-Mar (refugee still in unit, size 3): net = 1,333.33 (earned after
        # 20% deduction) + 641.67 - 209 = 1,766.00 -> EC = floor(1,766) x 0.3 =
        # 529.50 -> 785 - 529.50 = 255.50/month. Apr-Sep (head excluded, size 2): 546 - 529.50
        # = 16.50 < minimum allotment 23.84 -> 23.84/month. Oct-Dec: 558.24 -
        # 528.30 = 29.94/month. Annual = 3 x 255.50 + 6 x 23.84 + 3 x 29.94 =
        # 999.36.
        snap: 999.36
        is_snap_eligible: true

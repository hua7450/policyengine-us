        members: &id004
        - head
        - spouse
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id004
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: true
    families:
      family:
        members: *id004
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # CA delays the OBBB refugee exclusion to 2026-04-01 (ACL 25-92), and
        # CalWORKs counts as unearned income at the unit level (in full).
        # Jan-Mar the refugee is still in the unit (size 3) with earnings
        # fully counted; from April the head is excluded (size 2) and their
        # earnings count at the 2/3 prorated share under 7 CFR
        # 273.11(c)(2)-(3), raising the benefit relative to full counting.
        snap: 2186.94
        is_snap_eligible: true

# California (CalFresh) cases that differ from the federal.yaml (TX) baseline
# for state-policy reasons:
# - CA applies the BBCE NET income test (net_applies CA = true), so the binding
#   eligibility boundary is net income at 100% of the poverty guideline, not
#   the 200% BBCE gross limit.
# - CA is an always-SUA state (SUA $663 in FY2026, applied without utility
#   expense inputs).
# - CA extends CalFresh to additional immigration statuses (CFAP) and delays
#   the OBBB refugee exclusion to 2026-04-01 (ACL 25-92).
# SNAP compares income to the poverty guideline in effect at the preceding
# Oct 1: Jan-Sep 2026 use the 2025 FPG (3-person $26,650, i.e. a monthly net
# limit of $2,220.83); Oct-Dec 2026 use the 2026 FPG ($27,320 -> $2,276.67).
- name: snap_ca_net_income_just_below_fy2026_net_limit (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 36_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Gross ratio 36,000/26,650 = 1.35 fails the federal 130% test, but CA
        # BBCE (200% gross + net test) rescues: net = 36,000/12 x 0.8 - 209 =
        # 2,191.00 (SUA 663 < half of pre-shelter net, so no shelter deduction)
        # <= 2,220.83 Jan-Sep limit -> eligible all year. EC = floor(2,191) x
        # 0.3 = 657.30 -> 785 - 657.30 = 127.70/month Jan-Sep; Oct-Dec: net
        # 2,183.62 -> EC 654.90 -> 812.72 - 654.90 = 157.82.
        # Annual = 9 x 127.70 + 3 x 157.82 = 1,622.76.
        snap: 1622.76
        is_snap_eligible: true

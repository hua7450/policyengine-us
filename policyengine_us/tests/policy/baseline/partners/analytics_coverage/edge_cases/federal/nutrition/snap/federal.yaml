# Federal SNAP edge cases, anchored to TX (BBCE state, 165% FPG gross limit, no
# BBCE net test, $5,000 BBCE asset limit, not an always-SUA state).
# Key FY2026 parameters (Oct 2025 - Sep 2026): max allotment $298/$546/$785/$994
# (sizes 1-4), standard deduction $209 (sizes 1-3) / $223 (size 4), shelter cap
# $744, TX SUA $445, TX LUA $400, earned income deduction 20%, expected food
# contribution 30% of floored net income, minimum allotment 8% of the 1-person
# maximum. Oct-Dec 2026 use uprated FY2027 values: max $308.52/$565.28/$812.72/
# $1,029.10, standard deduction $216.38/$230.88, shelter cap $770.27 (SUA is not
# uprated; LUA is, to $414.13).
# SNAP compares income to the poverty guideline in effect at the preceding
# Oct 1 (snap_fpg): Jan-Sep 2026 use the 2025 FPG (1p $15,650 / 2p $21,150 /
# 3p $26,650), Oct-Dec 2026 use the 2026 FPG (1p $15,960 / 2p $21,640 /
# 3p $27,320). Boundary incomes below are chosen so eligibility does not flip
# mid-year.
- name: snap_income_just_below_fy2026_bbce_gross_limit_43972 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 43_872
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
        housing_cost: 18_000
        heating_cooling_expense: 2_400
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # TX BBCE gross limit (3 people), Jan-Sep 2026: 1.65 x 26,650 = 43,972.50;
        # monthly income 43,872/12 = 3,656.00 <= 3,664.38 -> eligible; also below
        # the Oct-Dec limit (1.65 x 27,320 / 12 = 3,756.55). Fails the federal 130%
        # gross test (ratio 1.65 > 1.3), so BBCE is the binding route.
        # Jan-Sep benefit: net income pre-shelter = 3,656.00 x 0.8 - 209 = 2,715.80;
        # shelter expense = 1,500 housing + 445 SUA (heating/cooling expense present)
        # = 1,945 - 0.5 x 2,715.80 = 587.10 (< 744 cap); net = 2,128.70 ->
        # contribution = floor(2,128) x 0.3 = 638.40 -> 785 - 638.40 = 146.60/month.
        # Oct-Dec: std ded 216.38 -> net 2,117.63 -> EC 635.10 -> 812.72 - 635.10
        # = 177.62/month. Annual = 9 x 146.60 + 3 x 177.62 = 1,852.26.
        snap: 1852.26
        is_snap_eligible: true

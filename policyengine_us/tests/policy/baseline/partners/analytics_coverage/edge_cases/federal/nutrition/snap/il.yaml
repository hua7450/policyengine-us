# Illinois shares TX's 165% BBCE gross limit (already pinned in federal.yaml),
# so this file keeps only the case that differs from the baseline for a
# state-policy reason: Illinois's own SUA ($546 FY2026 vs TX $445), pinned via
# an uncapped shelter deduction so the state value is visible in the benefit.
- name: snap_il_sua_shelter_deduction_20k (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
        housing_cost: 7_200
        heating_cooling_expense: 2_400
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # IL is not an always-SUA state; the heating/cooling expense input
        # selects the $546 IL SUA. Jan-Sep: pre-shelter net = 20,000/12 x 0.8
        # - 209 = 1,124.33; shelter expense = 600 housing + 546 = 1,146 -
        # 562.17 = 583.83 (below the 744 cap, so the IL SUA value is fully
        # visible) -> net = 540.50 -> EC 162.00 -> 785 - 162.00 = 623.00/month;
        # Oct-Dec: 812.72 - 158.70 = 654.02.
        # Annual = 9 x 623.00 + 3 x 654.02 = 7,569.06.
        snap: 7569.06
        is_snap_eligible: true

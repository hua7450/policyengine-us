# Kansas has not adopted broad-based categorical eligibility (BBCE): the
# federal 130%-FPG gross income test and the federal asset test both bind
# (unlike the TX federal.yaml baseline, where BBCE raises the gross limit to
# 165% and the asset limit to $5,000). Childless couples are used so that TANF
# categorical eligibility cannot mask the KS non-BBCE tests. KS is not an
# always-SUA state, so with no utility expense inputs the shelter deduction is
# zero here. SNAP compares income to the poverty guideline in effect at the
# preceding Oct 1: Jan-Sep 2026 use the 2025 FPG (2-person $21,150 -> 130%
# limit $27,495), Oct-Dec 2026 use the 2026 FPG ($21,640 -> $28,132).
# Boundary incomes are chosen so eligibility does not flip mid-year.
- name: snap_couple_income_just_below_fy2026_gross_limit_27495 (ks)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 27_395
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        state_code: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    spm_units:
      spm_unit:
        # Monthly gross 27,395/12 = 2,282.92 vs Jan-Sep limit 1.3 x 21,150/12
        # = 2,291.25 -> passes the federal gross test all year (Oct-Dec limit
        # 2,344.33). Net = 2,282.92 x 0.8 - 209 = 1,617.33 -> EC 485.10 ->
        # 546 - 485.10 = 60.90/month Jan-Sep; Oct-Dec: net 1,609.95 -> EC
        # 482.70 -> 565.28 - 482.70 = 82.58.
        # Annual = 9 x 60.90 + 3 x 82.58 = 795.84.
        snap: 795.84
        is_snap_eligible: true

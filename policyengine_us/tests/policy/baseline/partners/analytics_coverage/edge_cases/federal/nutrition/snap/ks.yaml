        - spouse
        snap_assets: 4_000
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: true
    families:
      family:
        members: *id004
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    spm_units:
      spm_unit:
        # Deliberate ineligible-side resource pin for the non-BBCE route:

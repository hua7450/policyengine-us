        age: 60
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        - spouse
        state_code: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members:
        - head
        - spouse
        snap_assets: 4_000
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: true
    families:
      family:
        members: *id005
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    spm_units:
      spm_unit:
        # Same unit as the previous case but the head is 60 (elderly): the
        # higher elderly/disabled asset limit ($4,500) applies, so $4,000
        # passes and the age-59/60 asset distinction is observable (0 vs
        # positive). Net = 20,000/12 x 0.8 - 209 = 1,124.33 -> EC 337.20 ->
        # 546 - 337.20 = 208.80/month Jan-Sep; Oct-Dec: 565.28 - 334.80 =
        # 230.48. Annual = 9 x 208.80 + 3 x 230.48 = 2,570.64.
        snap: 2570.64
        is_snap_eligible: true

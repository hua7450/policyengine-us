# Kansas has not adopted broad-based categorical eligibility (BBCE): the federal
# 130%-FPL gross income test and the federal asset test both bind (unlike the TX
# federal.yaml baseline, where BBCE raises the gross limit to 165% and waives
# the asset test). Childless couples are used so that TANF categorical
# eligibility (KS TANF is implemented in the model) cannot mask the KS non-BBCE
# tests. Only cases whose outputs differ from the federal.yaml baseline or that
# exercise the KS non-BBCE treatment are included.
- name: snap_couple_income_just_below_binding_gross_limit_28132 (ks)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income: 28_032
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        state_code_str: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    spm_units:
      spm_unit:
        snap: 185.22
        is_snap_eligible: true

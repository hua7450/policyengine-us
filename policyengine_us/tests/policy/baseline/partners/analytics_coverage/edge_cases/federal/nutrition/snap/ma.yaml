        # ineligible all year.
        snap: 0.0
        is_snap_eligible: false

# MA is one of the nine 7 CFR 273.11(c)(3)(i) count-all states: the
# undocumented head is excluded from the unit size but their income counts
# in full rather than at the prorated share used in the TX baseline.
- name: snap_ma_head_immigration_undocumented_count_all_state (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: UNDOCUMENTED
        employment_income_before_lsr: 20_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id801
        - head
        - spouse
        - child1
        state_code: MA
        zip_code: '02118'
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id801
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id801
        tax_unit_is_joint: true
    families:
      family:
        members: *id801
    marital_units:
      mu_couple:
        members:
        - head
        - spouse

# North Carolina cases that differ from the federal.yaml (TX) baseline for
# state-policy reasons: NC elected a 200%-FPG BBCE gross limit (TX uses 165%)
# with no BBCE net test, and NC uses a household-size-dependent SUA ($768 for
# a 3-person unit in FY2026) rather than a flat state SUA.
- name: snap_income_46000_eligible_under_200_pct_bbce_limit (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 46_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
        housing_cost: 18_000
        heating_cooling_expense: 2_400
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # $46,000 exceeds the TX/IL 165% BBCE limit (FY2026: $43,972.50) but
        # stays under NC's 200% limit all year (Jan-Sep: 2 x 26,650 = 53,300).
        # NC is not an always-SUA state, so the heating/cooling expense input
        # selects the SUA (NC 3-person: $768). Jan-Sep: pre-shelter net =
        # 2,857.67; shelter expense = 1,500 + 768 = 2,268 - 1,428.83 = 839.17
        # -> capped at 744 -> net = 2,113.67 -> EC 633.90 -> 785 - 633.90 =
        # 151.10/month; Oct-Dec (cap 770.27): 812.72 - 624.00 = 188.72.
        # Annual = 9 x 151.10 + 3 x 188.72 = 1,926.06.
        snap: 1926.06
        is_snap_eligible: true

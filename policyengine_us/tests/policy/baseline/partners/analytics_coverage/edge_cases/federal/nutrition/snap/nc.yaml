        is_snap_eligible: false

# NC is one of the four 7 CFR 273.11(c)(3)(i) hybrid states: an undocumented
# member's income counts in full under the gross income test (and the BBCE
# gross screen) while counting at the prorated share on the net side.
- name: snap_nc_head_immigration_undocumented_gross_test_full_count_denies (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: UNDOCUMENTED
        employment_income_before_lsr: 48_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id901
        - head
        - spouse
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id901
        snap_assets: 500
    tax_units:
      tax_unit:
        members: *id901
        tax_unit_is_joint: true
    families:
      family:
        members: *id901
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # The full $4,000/month exceeds both the 130% gross limit and NC's
        # 200% BBCE screen for the 2-person unit, though the prorated
        # $2,666.67 would have passed the BBCE screen.
        snap: 0
        is_snap_eligible: false


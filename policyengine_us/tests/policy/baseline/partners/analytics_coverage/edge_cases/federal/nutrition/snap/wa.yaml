# Washington cases that differ from the federal.yaml (TX) baseline for
# state-policy reasons: WA elected a 200%-FPG BBCE gross limit (TX uses 165%)
# with NO BBCE net test (net_applies WA = false), and a $515 SUA (FY2026).
# The eligible case below fails the regular SNAP net income test in Jan-Sep
# yet remains eligible via BBCE, pinning WA's no-net-test election.
- name: snap_income_46000_eligible_under_200_pct_bbce_limit (wa)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 46_000
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
        snap_assets: 500
        housing_cost: 18_000
        heating_cooling_expense: 2_400
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # $46,000 exceeds the TX/IL 165% BBCE limit (FY2026: $43,972.50) but
        # stays under WA's 200% limit all year (Jan-Sep: 2 x 26,650 = 53,300).
        # Jan-Sep: pre-shelter net = 2,857.67; shelter expense = 1,500 + 515
        # WA SUA = 2,015 - 1,428.83 = 586.17 -> net = 2,271.50, which is ABOVE
        # the regular 100%-FPG net limit (2,220.83) - WA's BBCE has no net
        # test, so the unit is still eligible. EC 681.30 -> 785 - 681.30 =
        # 103.70/month; Oct-Dec: 812.72 - 678.00 = 134.72.
        # Annual = 9 x 103.70 + 3 x 134.72 = 1,337.46.
        snap: 1337.46
        is_snap_eligible: true
- name: snap_income_above_200_pct_bbce_limit_54740 (wa)

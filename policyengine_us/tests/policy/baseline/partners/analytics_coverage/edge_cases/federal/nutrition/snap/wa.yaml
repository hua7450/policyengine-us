        # 54,740 exceeds 200% of the FPG in every month (Jan-Sep: 53,300;
        # Oct-Dec: 54,640) and the federal 130% gross test, so the unit is
        # ineligible all year.
        snap: 0.0
        is_snap_eligible: false

    wic_category: [NONE, CHILD]
    # 60,000 > size-2 limit 39,128, so the direct income test fails...
    spm_units:
      spm_unit:
        meets_wic_income_test: false
    people:
      head:
        wic: 0.0
        is_wic_eligible: false
      child1:
        # ...but SNAP receipt in the SPM unit satisfies
        # meets_wic_categorical_eligibility, so the child gets the full
        # CHILD_24_59_MONTHS package: (33.65 - 8) x ~16.05 + 26 x 12
        # = 723.73.
        wic: 723.73
        is_wic_eligible: true

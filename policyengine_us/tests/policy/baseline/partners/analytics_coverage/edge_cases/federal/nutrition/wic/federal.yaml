# WIC federal edge cases. WIC has no state-specific policy in the model except
# the AK/HI federal poverty guideline groups inside wic_income_limit, so all
# cases live in this single federal file (TX households, plus one AK case for
# the state-group branch).
# Benefit math (wic.py): annual wic = sum over months of
#   (2018 package base - 2018 embedded CVB) x monthly CPI-U uprating
#   + current CVB (gov/usda/wic/cvb/current, $48 pregnant/postpartum,
#     $52 breastfeeding, $26 child from 2025-10-01; infants $0).
# The 2026 CPI-U uprating factors sum to ~16.05 across the 12 months
# (avg ~1.336x the 2018-01 base).
# Income test (meets_wic_income_test): annual countable income <=
# ceil(FPG x 1.85), where FPG uses the July-switchover guideline year
# (Jan-Jun months -> prior-year guidelines, Jul-Dec -> current-year), and
# family size is increased by current_pregnancies (number of expected
# children). The test is monthly, so over a whole-year period the limit
# steps up in July.
# Income boundary cases use a CHILD rather than a pregnant woman because TX
# Medicaid for pregnant women reaches past 185% FPG (203% FPL), which would
# satisfy the WIC adjunct (categorical) route and mask the income boundary;
# TX Medicaid for children ages 1-5 tops out at 149% FPL, keeping the
# boundary sharp.
# wic_category is asserted flat with enum NAME strings in person declaration
# order (head first, then children): the runner only decodes enums for
# whole-population assertions, so the nested per-person form would force raw
# indices.
- name: wic_pregnant_adult (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 28
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    wic_category: PREGNANT
    people:
      head:
        # PREGNANT_SINGLETON package: (39.12 base - 11 embedded CVB) x ~16.05
        # 2026 uprating sum + $48/mo current CVB x 12 = ~451.38 + 576
        # = 1,027.38. Income 20,000 <= size-1 limit ceil(15,650 x 1.85)
        # = 28,953 (2025 guidelines apply in January 2026).
        wic: 1027.38
        is_wic_eligible: true

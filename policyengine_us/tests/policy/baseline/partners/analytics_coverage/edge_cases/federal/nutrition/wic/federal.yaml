- name: wic_child_income_at_185pct_limit (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 39_128
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
    households:
      household:
        members: &id003
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    wic_category: [NONE, CHILD]
    # Size-2 limit: ceil((15,650 + 5,500) x 1.85) = ceil(39,127.5) = 39,128
    # (2025 guidelines, binding Jan-Jun 2026; the Jul-Dec limit is higher).
    # Income 39,128 <= 39,128 -> passes every month. TX child Medicaid
    # (ages 1-5, 149% FPL) and SNAP both cut off below 185% FPG, so
    # eligibility here rides on the WIC income test alone.
    spm_units:
      spm_unit:
        meets_wic_income_test: true
    people:
      head:
        wic: 0.0
        is_wic_eligible: false
      child1:
        # CHILD_24_59_MONTHS package: (33.65 - 8) x ~16.05 + 26 x 12 = 723.73.
        wic: 723.73
        is_wic_eligible: true
- name: wic_child_income_above_limit_ineligible (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: false
        is_breastfeeding: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 40_035
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
    households:
      household:
        members: &id004
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    wic_category: [NONE, CHILD]
    # Income-route ineligibility pin. The limit steps up at the July
    # guideline switchover, so a whole-year case must clear BOTH limits:
    # Jan-Jun ceil((15,650 + 5,500) x 1.85) = 39,128 (2025 guidelines) and
    # Jul-Dec ceil((15,960 + 5,680) x 1.85) = 40,034 (2026 guidelines).
    # 40,035 > 40,034 fails every month (an income of e.g. 39,129 would
    # regain eligibility in July). No SNAP/TANF/Medicaid at this income in
    # TX, so the adjunct route also fails. Note wic_category stays CHILD
    # while is_wic_eligible is false: category and eligibility are
    # decoupled outputs.
    spm_units:
      spm_unit:
        meets_wic_income_test: false
    people:
      head:
        wic: 0.0
        is_wic_eligible: false
      child1:
        wic: 0.0
        is_wic_eligible: false

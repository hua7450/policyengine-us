# Same separate-filing parent, but living apart (is_separated) while
# maintaining a home for the qualifying child: IRC 21(e)(4) treats them as
# unmarried, restoring eligibility. AGI 30_000 -> first phase-out removes
# ceil(15_000 / 2_000) x 0.01 = 0.08, so rate = 0.5 - 0.08 = 0.42 (also pins
# an intermediate first-phase-out rate between the 0.5 max and 0.35 floor):
# cdcc = 3_000 x 0.42 = 1_260, within the 1_420 liability limit.
- name: cdcc_separated_parent_treated_as_unmarried (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
        is_full_time_student: false
        is_separated: true
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: [head, child1]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, child1]
        spm_unit_pre_subsidy_childcare_expenses: 3_000
        childcare_expenses: 3_000
    tax_units:
      tax_unit:
        members: [head, child1]
        filing_status: SEPARATE
        tax_unit_childcare_expenses: 3_000
    families:
      family:
        members: [head, child1]
    marital_units:
      mu_head:
        members: [head]
      mu_child1:
        members: [child1]
  output:
    tax_units:
      tax_unit:
        eitc: 3_450.62
        eitc_eligible: true
        ctc: 2_200.0
        ctc_value: 2_200.0
        refundable_ctc: 1_700.0
        # 3_000 x (0.5 - ceil(15_000 / 2_000) x 0.01) = 1_260.
        cdcc_potential: 1_260.0
        cdcc: 1_260.0
        adjusted_gross_income: 30_000.0
        income_tax: -5_150.62

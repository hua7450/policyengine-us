# Income is high enough in both cases that cdcc_credit_limit (tax liability)
# isn't the binding constraint, so cdcc itself is sensitive to care_expenses:
# 2_100 with the 4_000 adult-care expense vs 4_000 x 0.35 = 1_400 without it
# (childcare alone). Without this pairing, a regression that stops reading
# care_expenses (the PR #8746/#8704 pathway) wouldn't be caught by the test
# above alone.
- name: cdcc_disabled_spouse_no_care_expenses (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 90_000
        is_full_time_student: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
        is_incapable_of_self_care: true
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: [head, spouse, child1]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
        spm_unit_pre_subsidy_childcare_expenses: 4_000
        childcare_expenses: 4_000
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
        tax_unit_childcare_expenses: 4_000
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    tax_units:
      tax_unit:
        eitc: 0.0
        eitc_eligible: true
        ctc: 2_200.0
        ctc_value: 2_200.0
        refundable_ctc: 0.0
        cdcc_potential: 1_400.0
        cdcc: 1_400.0
        adjusted_gross_income: 90_000.0
        income_tax: 2_840.0
# Disabled ADULT DEPENDENT route (IRC 21(b)(1)(B)): an over-13 dependent who
# is incapable of self-care, with person-level care_expenses and NO childcare
# expenses - the other half of the PR #8746/#8704 pathway (the pair above
# covers only the spouse route, 21(b)(1)(C)). One qualifying individual:
# expenses = min(5_000 care, 3_000 one-QI cap) = 3_000; AGI 70_000 is below
# the head-of-household 75_000 amended second start, so the rate is the 0.35
# first-phase-out floor and cdcc = 3_000 x 0.35 = 1_050. The 500 ctc is the
# other-dependent credit.
- name: cdcc_disabled_adult_dependent_care_expenses (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 45
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 70_000
        is_full_time_student: false
      adult_dependent:
        age: 22
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
        is_incapable_of_self_care: true
        care_expenses: 5_000
    households:
      household:
        members: [head, adult_dependent]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, adult_dependent]
        spm_unit_pre_subsidy_childcare_expenses: 0
        childcare_expenses: 0
    tax_units:
      tax_unit:
        members: [head, adult_dependent]
        tax_unit_childcare_expenses: 0
    families:
      family:
        members: [head, adult_dependent]
    marital_units:
      mu_head:
        members: [head]
      mu_adult_dependent:
        members: [adult_dependent]
  output:
    tax_units:
      tax_unit:
        eitc: 0.0
        eitc_eligible: true
        ctc: 500.0
        ctc_value: 500.0
        refundable_ctc: 0.0
        # min(5_000 care_expenses, 3_000 one-QI cap) x 0.35 = 1_050.
        cdcc_potential: 1_050.0
        cdcc: 1_050.0
        adjusted_gross_income: 70_000.0
        income_tax: 3_598.0

# Federal CDCC (IRC section 21) partner edge cases.
# 2026 amended (OBBBA) rate structure: max rate 0.5; first phase-out starts at
# AGI 15_000, -0.01 per (partial) 2_000 increment, floored at 0.35; amended
# second phase-out starts at 150_000 (joint) / 75_000 (other statuses),
# -0.01 per 4_000 (joint) / 2_000 (other) increment, floored at 0.2.
# Expense limit: 3_000 per qualifying individual, capped at 2 (6_000), further
# capped at the lesser of head/spouse earnings (with the IRC 21(d)(2) deemed
# floor of 3_000/6_000 for a student or incapable-of-self-care spouse).
# The credit is nonrefundable: cdcc = min(cdcc_potential, cdcc_credit_limit).
#
# AGI 15_000 joint, two earners: rate = 0.5 (first phase-out not started).
# Expenses = min(3_000 childcare, 3_000 one-QI cap, 7_000 spouse earnings)
# = 3_000, so cdcc_potential = 3_000 x 0.5 = 1_500. The standard deduction
# wipes out taxable income, so cdcc_credit_limit = 0 and cdcc = 0 - this pins
# the nonrefundability seam (state credits consume the pre-cap
# cdcc_potential, which stays positive).
- name: cdcc_max_rate_50pct_liability_limited (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 8_000
        is_full_time_student: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 7_000
        is_full_time_student: false
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: [head, spouse, child1]
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: [head, spouse, child1]
        spm_unit_pre_subsidy_childcare_expenses: 3_000
        childcare_expenses: 3_000
    tax_units:
      tax_unit:
        members: [head, spouse, child1]
        tax_unit_is_joint: true
        tax_unit_childcare_expenses: 3_000
    families:
      family:
        members: [head, spouse, child1]
    marital_units:
      mu_couple:
        members: [head, spouse]
      mu_child1:
        members: [child1]
  output:
    tax_units:
      tax_unit:
        eitc: 4_427.0
        eitc_eligible: true
        ctc: 2_200.0
        ctc_value: 1_875.0
        refundable_ctc: 1_700.0
        # 3_000 x 0.5 = 1_500 pre-cap; liability cap 0 binds.
        cdcc_potential: 1_500.0
        cdcc_credit_limit: 0.0
        cdcc: 0.0
        adjusted_gross_income: 15_000.0
        income_tax: -6_127.0

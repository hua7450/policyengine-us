# Federal CTC partner edge-case contract tests.
# Parameters (gov/irs/credits/ctc, 2025-2026): base $2,200/child under 17;
# ODC $500 (adult_dependent); refundable individual_max $1,700/child;
# phase-in 15% of earnings above $2,500; phase-out $50 per $1,000 increment
# (ceil) above $400,000 JOINT / $200,000 HEAD_OF_HOUSEHOLD.
- name: ctc_child_age_16_qualifying (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 80_000
        is_full_time_student: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
      child1:
        age: 16
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    tax_units:
      tax_unit:
        eitc: 0.0
        eitc_eligible: true
        # Age 16 < 17 limit -> full base amount: $2,200 (amount/base.yaml 2025+).
        ctc: 2_200.0
        # ctc_value: tax liability at 80,000 covers the nonrefundable CTC in
        # full, so the whole 2,200 is delivered.
        ctc_value: 2_200.0
        # Liability (5,240) fully absorbs the CTC, so no refundable portion.
        refundable_ctc: 0.0
        cdcc: 0.0
        adjusted_gross_income: 80_000.0
        # Taxable = 80,000 - 32,200 std (JOINT 2026) = 47,800.
        # Tax = 10% x 24,800 + 12% x 23,000 = 5,240; minus CTC 2,200 = 3,040.
        income_tax: 3_040.0

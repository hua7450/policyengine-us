- name: ctc_refundable_cap_binds_hoh_two_children (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
        is_full_time_student: false
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
      child2:
        age: 10
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: &id009
        - head
        - child1
        - child2
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id009
    tax_units:
      tax_unit:
        members: *id009
    families:
      family:
        members: *id009
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    tax_units:
      tax_unit:
        # EITC (2 children, 2026): 7,316 - 21.06% x (30,000 - 23,890)
        # = 7,316 - 1,286.77 = 6,029.23.
        eitc: 6_029.23
        eitc_eligible: true
        # Two qualifying children -> 2 x 2,200 = 4,400.
        ctc: 4_400.0
        # ctc_value = min(ctc, liability + refundable) = min(4,400, 585 + 3,400)
        # = 3,985.
        ctc_value: 3_985.0
        # Refundable cap binds: phase-in headroom is 3,815 (= min(4,400,
        # 585 + 4,125) - 585 of liability already used), but the per-child
        # refundable maximum is 2 x 1,700 = 3,400 < 3,815.
        refundable_ctc: 3_400.0
        cdcc: 0.0
        adjusted_gross_income: 30_000.0
        # Taxable = 30,000 - 24,150 std (HOH) = 5,850 -> tax 585, fully
        # offset by nonrefundable CTC; minus EITC 6,029.23 and refundable
        # CTC 3,400 -> income_tax = -9,429.23.
        income_tax: -9_429.23

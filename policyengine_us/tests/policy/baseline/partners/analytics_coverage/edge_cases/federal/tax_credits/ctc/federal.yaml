        # OBBBA (2025-): adult_ssn_requirement_applies - no filer with a
        # valid SSN means the $2,200 child credit is denied even though the
        # child is a citizen; the ITIN filer keeps the $500 ODC.
        ctc: 500.0
        ctc_value: 500.0
        # Child-portion refundable maximum is zeroed, ODC is nonrefundable.
        refundable_ctc: 0.0
        cdcc: 0.0
        adjusted_gross_income: 30_000.0
        # Taxable = 30,000 - 24,150 std (HOH) = 5,850 -> tax 585; minus
        # nonrefundable ODC 500 = 85.
        income_tax: 85.0

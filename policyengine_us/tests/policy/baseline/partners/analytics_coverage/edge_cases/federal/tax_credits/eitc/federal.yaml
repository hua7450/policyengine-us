# Federal EITC edge cases (26 USC § 32).
# 2026 parameters (gov/irs/credits/eitc):
#   max: 0 kids 664 / 1 kid 4_427 / 2 kids 7_316 / 3+ kids 8_231
#   phase-in: 0.0765 / 0.34 / 0.40 / 0.45
#   phase-out rate: 0.0765 / 0.1598 / 0.2106 / 0.2106
#   phase-out start: 0 kids 10_860 (+7_280 joint) / with kids 23_890 (+7_270 joint)
#   max investment income: 12_200; childless age window 25-64.
- name: eitc_joint_1_child_at_phase_out_start_31_160 (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 35
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 31_160
        is_full_time_student: false
      spouse:
        age: 33
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        is_full_time_student: false
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    tax_units:
      tax_unit:
        # Earnings 31_160 = phase-out start for 1 child MFJ (23_890 + 7_270
        # joint bonus); reduction = 0.1598 x max(0, 31_160 - 31_160) = 0,
        # so full plateau credit: eitc = 4_427.
        # income_tax = -(4_427 eitc + 1_700 refundable_ctc) = -6_127
        # (taxable income 0: AGI 31_160 < 32_200 MFJ standard deduction).
        eitc: 4_427.0
        eitc_eligible: true
        ctc: 2_200.0
        ctc_value: 2_200.0
        refundable_ctc: 1_700.0
        cdcc: 0.0
        adjusted_gross_income: 31_160.0
        income_tax: -6_127.0

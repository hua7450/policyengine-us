# Lifeline (47 CFR 54.400-54.409) federal edge cases.
# 2026 FPG (contiguous, size 1) = 15_960; federal income limit = 135% -> 21_546.
# Federal benefit = min(phone_cost + broadband_cost, 9.25/mo * 12 = 111/yr).
# TN is used for boundary cases because it has no Medicaid expansion and no
# SNAP BBCE, so categorical eligibility (medicaid_enrolled/snap/ssi) cannot
# mask the federal 135% income cutoff.
- name: lifeline_max_amount_income_just_below_135pct_fpg (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # 21_500 / 15_960 = 1.347 < 1.35 -> income-eligible.
        employment_income_before_lsr: 21_500
    households:
      household:
        members: [head]
        state_code: TN
        zip_code: '37201'
        county_str: DAVIDSON_COUNTY_TN
    spm_units:
      spm_unit:
        members: [head]
        # Expenses above the cap so the federal maximum binds.
        phone_cost: 480
        broadband_cost: 600
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # min(480 + 600, 9.25 * 12 = 111) = 111.
        lifeline: 111
        is_lifeline_eligible: true
- name: lifeline_income_ineligible_just_above_135pct_fpg (federal)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # 21_600 / 15_960 = 1.353 > 1.35 -> income-ineligible.
        # TN: no Medicaid expansion (childless adult ineligible), no SNAP
        # BBCE, and 135.3% FPG fails the 130% SNAP gross test -> no
        # categorical route either.
        employment_income_before_lsr: 21_600
    households:
      household:
        members: [head]
        state_code: TN
        zip_code: '37201'
        county_str: DAVIDSON_COUNTY_TN
    spm_units:
      spm_unit:
        members: [head]
        phone_cost: 480
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # Deliberate ineligible-side boundary pin (income route):
        # phone expense is set, so the zero comes only from ineligibility.
        lifeline: 0
        is_lifeline_eligible: false

      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 12_000
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        ca_calworks_child_care_provider_category: CHILD_CARE_CENTER
        ca_calworks_child_care_time_category: MONTHLY
        ca_calworks_child_care_full_time: false
        pre_subsidy_childcare_expenses: 6_000
    households:
      household:
        members: &id002
        - head
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id002
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Payment: min($793.85 part-time ceiling, $6,000 / 12 = $500 expenses)

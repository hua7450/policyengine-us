        ca_calworks_child_care_eligible: true
        ca_calworks_child_care: 6_000.0
- name: ca_calworks_cc_not_on_cash_aid_ineligible (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        ca_calworks_child_care_provider_category: CHILD_CARE_CENTER
        ca_calworks_child_care_time_category: MONTHLY
        ca_calworks_child_care_full_time: true
        pre_subsidy_childcare_expenses: 24_000
    households:
      household:
        members: &id003
        - head
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # $2,500/mo earned -> applicant countable (2,500 - 450) = 2,050 > 1,526
        # MBSAC size 2 -> no CalWORKs cash aid -> Stage 1 ineligible even though
        # child care expenses exist (categorical route: must be on cash aid).
        ca_calworks_child_care_eligible: false
        ca_calworks_child_care: 0.0

# California CARE electricity discount (gov/states/ca/cpuc/care).
# 32.5% discount on electricity for households with income <= 200% of the
# CARE poverty line, which treats one-person households as two-person:
# 2026 PL(2) = 15,960 + 5,680 = 21,640, so the limit is 43,280.
- name: ca_care_just_below_income_limit_discount (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        # $42,000 <= 43,280 limit; pins the single-person -> two-person
        # poverty-line floor (the one-person limit would be 2 x 15,960 =
        # 31,920, which this income exceeds).
        employment_income_before_lsr: 42_000
    households:
      household:
        members: &id001
        - head
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_la: true
    spm_units:
      spm_unit:
        members: *id001
        pre_subsidy_electricity_expense: 1_800
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    households:
      household:
        # 0.325 x 1,800 = 585.
        ca_care: 585
        ca_care_eligible: true
- name: ca_care_just_above_income_limit (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        # $44,000 > 43,280 limit and no categorical program participation.
        employment_income_before_lsr: 44_000
    households:
      household:
        members: &id002
        - head
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_la: true
    spm_units:
      spm_unit:
        members: *id002
        pre_subsidy_electricity_expense: 1_800
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
  output:
    households:
      household:
        ca_care: 0
        ca_care_eligible: false

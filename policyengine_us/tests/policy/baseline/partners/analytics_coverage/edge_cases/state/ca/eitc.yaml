- name: ca_eitc_head_age_18_mid_phase_out (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 18
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 15_000
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id003
        - head
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        # Age 18 passes the minimum-age boundary (contrast with the age-17 case).
        # 0-kid final phase-out: credit = 257 x (32,901 - 15,000) /
        # (32,901 - 5,580.94) = 257 x 0.65521 = 168.39.
        ca_eitc: 168.39
        ca_eitc_eligible: true
        adjusted_gross_income: 15_000.0
- name: ca_eitc_investment_income_at_limit_4923_eligible (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 15_000
        long_term_capital_gains_before_response: 4_923
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id004
        - head
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        # Investment income $4,923 is at/below the 2026 uprated limit
        # ($4,923.10), so eligibility holds; the credit still uses earned
        # income only: 257 x (32,901 - 15,000) / 27,320.06 = 168.39.
        ca_eitc: 168.39
        ca_eitc_eligible: true
        adjusted_gross_income: 19_923.0

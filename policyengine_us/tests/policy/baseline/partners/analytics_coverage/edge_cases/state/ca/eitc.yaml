# CalEITC (R&TC 17052) edge cases, 2026 parameters:
# adjustment factor 0.85; phase-in/phase-out rates 0.0765/0.34/0.40 by child count;
# phase-in ends (= phase-out starts) at $4,766.63 (0 kids) / $7,156.60 (1) / $10,045.62 (2+);
# final phase-out runs linearly to $0 at earnings/AGI $32,901;
# investment income limit $4,923.10; min age 18 for childless filers.
- name: ca_eitc_max_credit_two_children_at_phase_in_end (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 10_045
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      child2:
        age: 4
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id001
        - head
        - child1
        - child2
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    tax_units:
      tax_unit:
        # Earnings $10,045 sit just below the 2-child phase-in end ($10,045.62),
        # so the credit is at (essentially) its maximum:
        # 10,045 x 0.40 x 0.85 = 3,415.30; phase-out excess = $0.
        ca_eitc: 3_415.3
        ca_eitc_eligible: true
        adjusted_gross_income: 10_045.0

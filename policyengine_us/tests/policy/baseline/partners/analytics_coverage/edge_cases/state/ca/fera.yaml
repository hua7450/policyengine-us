# California FERA electricity discount (gov/states/ca/cpuc/fera).
# 18% discount for households of 3+ with income above the CARE limit (200% of
# the CARE poverty line) but at or below 250%. 2026 PL(3) = 15,960 + 2 x
# 5,680 = 27,320, so the 3-person FERA band is (54,640, 68,300].
# The third member is a working adult dependent: every member needs own or
# tax-unit MAGI above 138% FPL, because a Medicaid (Medi-Cal) eligible member
# would make the household CARE-categorically eligible and therefore
# FERA-ineligible.
- name: ca_fera_3_person_in_200_250pct_band (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        # Household total 36,000 + 24,000 = 60,000: 54,640 < 60,000 <= 68,300
        # -> in the FERA band.
        employment_income_before_lsr: 36_000
      spouse:
        age: 28
        is_tax_unit_spouse: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      adult_dependent:
        age: 20
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        # Own earnings 24,000 > 138% x FPG(1) = 22,025, so the dependent is
        # not Medi-Cal eligible.
        employment_income_before_lsr: 24_000
    households:
      household:
        members: &id001
        - head
        - spouse
        - adult_dependent
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_la: true
    spm_units:
      spm_unit:
        members: *id001
        pre_subsidy_electricity_expense: 2_400
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_dependent:
        members:
        - adult_dependent
  output:
    households:
      household:
        # 0.18 x 2,400 = 432.
        ca_fera: 432
        ca_fera_eligible: true
- name: ca_fera_2_person_fails_size_minimum (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        # 2-person band would be (43,280, 54,100]; 50,000 is inside it, so
        # ONLY the 3-person minimum makes this household ineligible.
        employment_income_before_lsr: 50_000
      spouse:
        age: 28
        is_tax_unit_spouse: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id002
        - head
        - spouse
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_la: true
    spm_units:
      spm_unit:
        members: *id002
        pre_subsidy_electricity_expense: 2_400
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: true
    families:
      family:
        members: *id002
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    households:
      household:
        ca_fera: 0
        ca_fera_eligible: false
- name: ca_fera_3_person_above_250pct_limit (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        # Household total 46,000 + 24,000 = 70,000 > 68,300 = 2.5 x PL(3),
        # so only the income route fails (size still passes).
        employment_income_before_lsr: 46_000
      spouse:
        age: 28
        is_tax_unit_spouse: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      adult_dependent:
        age: 20
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        # Keeps the dependent above the Medi-Cal MAGI limit (no categorical
        # CARE eligibility).
        employment_income_before_lsr: 24_000
    households:
      household:
        members: &id003
        - head
        - spouse
        - adult_dependent
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
        in_la: true
    spm_units:
      spm_unit:
        members: *id003
        pre_subsidy_electricity_expense: 2_400
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: true
    families:
      family:
        members: *id003
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_dependent:
        members:
        - adult_dependent
  output:
    households:
      household:
        ca_fera: 0
        ca_fera_eligible: false

- name: ca_renter_credit_limited_by_liability_single_12000 (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 12_000
        long_term_capital_gains_before_response: 0
        rent: 6_000
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id005
        - head
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id005
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: false
    families:
      family:
        members: *id005
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        # The credit itself is $60 (single, income under the cap, rent paid) ...
        ca_renter_credit: 60.0
        # ... but CA taxable = 12,000 - 5,835.31 std deduction = 6,164.69;
        # tax = 1% x 6,164.69 = 61.65.
        ca_income_tax_before_credits: 61.65
        # Personal exemption 156.47 + renter 60 = 216.47 > 62.94 liability.
        ca_non_refundable_credits: 216.47
        # Nonrefundable credits are capped at liability -> 0 (credit partially
        # wasted; liability-limited side of the renter credit).
        ca_income_tax_before_refundable_credits: 0.0

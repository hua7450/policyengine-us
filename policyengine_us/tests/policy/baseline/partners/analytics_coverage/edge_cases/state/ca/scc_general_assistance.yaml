# Santa Clara County General Assistance (gov/local/ca/scc/ga).
# Grant = base amount (single $343/month, unshared housing) minus countable
# income, for CalWORKs-ineligible adults meeting property and immigration
# rules. Amplifi expansion county (in_scc).
- name: ca_scc_single_no_income_max_grant (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        state_code: CA
        zip_code: '95110'
        county_str: SANTA_CLARA_COUNTY_CA
        in_scc: true
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    spm_units:
      spm_unit:
        # Single unshared-housing rate $343/month with zero countable income:
        # 343 x 12 = 4,116.
        ca_scc_general_assistance: 4_116
        ca_scc_general_assistance_eligible: true

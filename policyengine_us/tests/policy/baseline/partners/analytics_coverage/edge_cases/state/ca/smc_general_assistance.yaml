# San Mateo County General Assistance (gov/local/ca/smc/general_assistance).
# Payment standard $732/month (independent living) minus per-person countable
# income (after a 20% earned income deduction), for adults without minor
# children who meet the $1,464 property limit. Amplifi expansion county
# (in_smc).
- name: ca_smc_single_no_income_max_grant (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        state_code: CA
        zip_code: '94401'
        county_str: SAN_MATEO_COUNTY_CA
        in_smc: true
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    spm_units:
      spm_unit:
        # Independent-living standard $732/month with zero countable income:
        # 732 x 12 = 8,784.
        ca_smc_general_assistance: 8_784
        ca_smc_general_assistance_eligible: true

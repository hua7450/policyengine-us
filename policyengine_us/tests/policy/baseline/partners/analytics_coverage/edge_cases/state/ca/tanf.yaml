# CalWORKs (CA TANF) partner edge cases.
# Parameter basis (2026): Region 1 non-exempt MAP (ACL 24-55, 2024-10-01):
#   size 2 = $930/mo, size 3 = $1,175/mo. Region 2 non-exempt size 3 = $1,115/mo.
# MBSAC (income limit, 2025-07-01): Region 1 size 3 = $1,892/mo.
# Applicant earned income disregard: $450/mo per earner; recipient disregard:
#   $600/mo flat + 50% of remainder.
- name: tanf_max_benefit_region1_size3_no_income (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - child1
        - child2
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    spm_units:
      spm_unit:
        # No income -> full MAP: $1,175/mo (Region 1 non-exempt, size 3) x 12 = $14,100.
        ca_tanf: 14_100.0
        tanf: 14_100.0

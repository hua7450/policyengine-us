# California credit-stacking composition cases (2026). These pin how CA's
# refundable credits (CalEITC + YCTC + FYTC) and nonrefundable credits
# (exemptions + renter + CDCC) combine in ca_income_tax:
# nonrefundable credits cap at liability; refundable credits can push
# ca_income_tax negative.
- name: ca_credits_refundable_stack_foster_parent (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 24
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: true
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      child1:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id001
        - head
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    tax_units:
      tax_unit:
        # 1 child, earnings 20,000: 649 x (32,901 - 20,000) / 20,833.48
        # = 401.89.
        ca_eitc: 401.89
        # Child age 3, earnings below 28,046.53 -> full 1,215.95.
        ca_yctc: 1_215.95
        # Former foster youth head age 24 -> full 1,215.95.
        ca_foster_youth_tax_credit: 1_215.95
        # Refundable stack: 401.89 + 1,215.95 + 1,215.95 = 2,833.78.
        ca_refundable_credits: 2_833.78
        # HOH taxable = 20,000 - 11,670.63 = 8,329.37 -> tax 83.29; exemption
        # credits 642.23 cap it to 0.
        ca_income_tax_before_refundable_credits: 0.0
        # Refundable credits push CA income tax negative: 0 - 2,833.78.
        ca_income_tax: -2_833.78
- name: ca_credits_nonrefundable_capped_renter_family (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 18_000
        long_term_capital_gains_before_response: 0
        rent: 12_000
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 12_000
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      child1:
        age: 4
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id002
        - head
        - spouse
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id002
        childcare_expenses: 3_000
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: true
    families:
      family:
        members: *id002
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    tax_units:
      tax_unit:
        # 1 child, joint earnings 30,000: 649 x (32,901 - 30,000) / 20,833.48
        # = 90.37.
        ca_eitc: 90.37
        # Child age 4: 1,215.95 - (30,000 - 28,046.53) / 100 x 21.71 = 791.85.
        ca_yctc: 791.85
        # Joint AGI 30,000 under the 110,434.30 cap with rent -> 120.
        ca_renter_credit: 120.0
        # Federal CDCC is 0 (federal taxable income is 0 -> liability cap),
        # so the CA match is 0 despite $3,000 of childcare expenses.
        ca_cdcc: 0.0
        # Exemptions (2 x 156.47 + 485.76 = 469.4... = 798.70) + renter 120
        # = 918.70.
        ca_non_refundable_credits: 918.7
        # Joint taxable = 30,000 - 11,670.63 = 18,329.37 -> tax 183.29; the
        # 918.70 nonrefundable stack caps it at 0 (renter credit partially
        # wasted).
        ca_income_tax_before_refundable_credits: 0.0
        # Refundable stack still pays out: 90.37 + 791.85 = 882.22.
        ca_refundable_credits: 882.22
        ca_income_tax: -882.22

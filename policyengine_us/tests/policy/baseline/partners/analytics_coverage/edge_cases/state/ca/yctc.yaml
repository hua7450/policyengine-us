- name: ca_yctc_mid_phase_out_earnings_30000 (ca)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
      child1:
        age: 4
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id003
        - head
        - child1
        state_code: CA
        zip_code: '90001'
        county_str: LOS_ANGELES_COUNTY_CA
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    tax_units:
      tax_unit:
        # Mid-phase-out: reduction = (30,000 - 28,046.53) / 100 x 21.71
        # = 19.5347 x 21.71 = 424.10; credit = 1,215.95 - 424.10 = 791.85.
        # (CalEITC at $30,000 with 1 child is still positive: $92.23.)
        ca_yctc: 791.85
        adjusted_gross_income: 30_000.0

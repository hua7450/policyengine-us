# Colorado Care Worker Tax Credit (CRS 39-22-566), 2026 parameters:
# amount: joint with 2 eligible care workers = $2,400; otherwise $1,200.
# AGI limit (agi <= limit): joint = $100,000; non-joint = $75,000.
- name: co_care_worker_joint_2_workers_agi_at_100k_limit (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 90_000
        # MyFriendBen sends long_term_capital_gains; gains must count toward the AGI limit.
        long_term_capital_gains_before_response: 10_000
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: true
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: true
    households:
      household:
        members: &id001
        - head
        - spouse
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
  output:
    tax_units:
      tax_unit:
        co_eitc: 0.0
        co_ctc: 0.0
        # AGI = 90,000 wages + 10,000 LTCG = 100,000 = joint limit (inclusive);
        # joint with 2 eligible care workers -> $2,400 bonus amount.
        co_care_worker_credit: 2_400.0
        adjusted_gross_income: 100_000.0
    people:
      head:
        co_family_affordability_credit: 0.0
        co_state_supplement: 0.0
        co_oap: 0.0
      spouse:
        co_family_affordability_credit: 0.0
        co_state_supplement: 0.0
        co_oap: 0.0

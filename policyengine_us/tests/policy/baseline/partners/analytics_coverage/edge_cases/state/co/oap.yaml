# YAML regression-test fixture (policyengine-us partner edge cases).
# CO Old Age Pension (9 CCR 2503-5), 2026 parameters: age 60+, resource limit
# 2,000 single / 3,000 couple; benefit = 1,005/month grant standard minus
# (SSI received + SSI-countable income), annualized.
- name: co_oap_age_60_resources_at_2000_limit_full_grant (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 60
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        # Exactly at the single resource limit (<= 2,000 passes).
        ssi_countable_resources: 2_000
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id001
        - head
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        co_eitc: 0.0
        co_ctc: 0.0
        co_care_worker_credit: 0.0
        adjusted_gross_income: 0.0
    people:
      head:
        co_family_affordability_credit: 0.0
        co_state_supplement: 0.0
        # Age 60 (below SSI aged threshold 65, not disabled -> no SSI) and no
        # income -> full grant standard: 1,005 x 12 = 12,060.
        co_oap: 12_060.0
# Note: for non-SSI-eligible people (e.g. ages 60-64, non-disabled),
# ssi_countable_income is zeroed by the model, so their earnings do not
# reduce OAP; the income offset is only exercised through SSI-eligible
# recipients (aged 65+ or disabled).
- name: co_oap_age_65_earnings_reduce_grant_partial (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 24_960
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 0
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id002
        - head
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id002
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        # Age 65 exceeds the federal childless EITC maximum age (64) -> 0.
        co_eitc: 0.0
        co_ctc: 0.0
        co_care_worker_credit: 0.0
        adjusted_gross_income: 24_960.0
    people:
      head:
        co_family_affordability_credit: 0.0
        co_state_supplement: 0.0
        # SSI-countable earned income: (2,080/mo - 20 general - 65 earned
        # disregard) / 2 = 997.50/mo = 11,970/yr; that exceeds the 994/mo
        # SSI FBR, so SSI = 0, but it is below the 1,005/mo OAP standard.
        # OAP = 12,060 - 11,970 = 90.
        co_oap: 90.0
- name: co_oap_age_60_resources_above_2000_limit_ineligible (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 60
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        long_term_capital_gains_before_response: 0
        rent: 0
        was_in_foster_care: false
        is_full_time_student: false
        ssi_countable_resources: 2_001
        co_care_worker_credit_eligible_care_worker: false
    households:
      household:
        members: &id003
        - head
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    tax_units:
      tax_unit:
        co_eitc: 0.0
        co_ctc: 0.0
        co_care_worker_credit: 0.0
        adjusted_gross_income: 0.0
    people:
      head:
        co_family_affordability_credit: 0.0
        co_state_supplement: 0.0
        # Resource-route zero pin: 2,001 > 2,000 single limit -> ineligible.
        co_oap: 0.0

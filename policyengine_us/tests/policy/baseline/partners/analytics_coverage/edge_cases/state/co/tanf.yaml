- name: tanf_single_parent_2_children_with_earnings (co)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 6_000
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        - child1
        - child2
        state_code: CO
        zip_code: '80014'
        county_str: ARAPAHOE_COUNTY_CO
    spm_units:
      spm_unit:
        members: *id005
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: false
    families:
      family:
        members: *id005
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    spm_units:
      spm_unit:
        # Need test: 6,000 - 1,080 = 4,920 < 5,052 (1 adult + 2 children)
        # -> eligible. Grant: 7,440 - 6,000 x (1 - 0.67)
        # = 7,440 - 1,980 = 5,460 (pins the 1-caretaker grant table row).
        co_tanf: 5_460.0
        tanf: 5_460.0

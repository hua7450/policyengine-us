# IL AABD (Aid to the Aged, Blind or Disabled) — DHS cash supplement.
# AABD pays need standard minus countable income; SSI received counts as
# unearned income, so positive amounts arise where the need standard
# (grant + personal + shelter + utility allowances) exceeds SSI.
- name: il_aabd_ssi_couple_supplement (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 68
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 0
      spouse:
        age: 67
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        employment_income_before_lsr: 0
    households:
      household:
        members: [head, spouse]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head, spouse]
    tax_units:
      tax_unit:
        members: [head, spouse]
        tax_unit_is_joint: true
    families:
      family:
        members: [head, spouse]
    marital_units:
      mu_couple:
        members: [head, spouse]
  output:
    spm_units:
      spm_unit:
        # 2026 SSI couple FBR = $1,491/mo -> $745.50 each; AABD countable
        # unearned = 745.50 - 25 flat exemption = $720.50/person.
        # Need standard/person = 788.90 grant + 57.25 personal allowance
        # (size 2) = $846.15. Benefit = (846.15 - 720.50) x 2 x 12 = 3,015.60.
        il_aabd: 3_015.6
- name: il_aabd_single_renter_need_standard_boundary (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 70
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 0
        rent: 7_200
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
        electricity_expense: 1_200
        metered_gas_expense: 900
        water_expense: 480
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # Need standard = 788.90 grant + 62.43 personal allowance + 97 rent
        # allowance cap + 21.25 utilities (Cook County = Area 1: 5.55
        # electricity + 11.90 metered gas + 3.80 water) = $969.58/mo.
        # Countable income = 2026 SSI FBR 994 - 25 flat exemption = $969.00.
        # The need standard barely exceeds SSI: benefit = 0.58/mo x 12 = 6.96.
        il_aabd: 6.96
- name: il_aabd_ssi_income_exceeds_need_standard (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 70
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 0
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # Income-route ineligible: with no shelter or utility allowances the
        # need standard is 788.90 + 62.43 = $851.33/mo, below countable SSI
        # income of $969.00/mo (994 FBR - 25 flat exemption).
        il_aabd: 0.0
- name: il_aabd_not_aged_blind_disabled_ineligible (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_blind: false
        employment_income_before_lsr: 0
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Categorical-route ineligible: a 30-year-old who is neither aged
        # (65+), blind, nor disabled fails the SSI-status gate (PM 11-01-00).
        il_aabd_person: 0.0
    spm_units:
      spm_unit:
        il_aabd: 0.0

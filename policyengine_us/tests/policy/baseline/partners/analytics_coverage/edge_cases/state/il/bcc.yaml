# IL Health Benefits for Persons with Breast or Cervical Cancer (BCC) —
# eligibility gate: female, under 65, uninsured (no Medicaid or qualifying
# coverage). Boolean-only outputs, so no error margin.
- name: il_bcc_age_64_uninsured_eligible (il)
  period: 2026
  input:
    people:
      head:
        age: 64
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_female: true
        has_bcc_qualifying_coverage: false
        employment_income_before_lsr: 15_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Age 64 < 65 limit (305 ILCS 5/5-2(12)); female; uninsured -> eligible.
        il_bcc_eligible: true
- name: il_bcc_age_65_age_out (il)
  period: 2026
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_female: true
        has_bcc_qualifying_coverage: false
        employment_income_before_lsr: 15_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Age-route ineligible: 65 is not under the age-65 limit (binding
        # boundary against il_bcc_age_64_uninsured_eligible).
        il_bcc_eligible: false
- name: il_bcc_qualifying_coverage_ineligible (il)
  period: 2026
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_female: true
        has_bcc_qualifying_coverage: true
        employment_income_before_lsr: 15_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Insurance-route ineligible: health coverage that would pay for
        # cancer treatment disqualifies (PM 06-20-02 "uninsured" test).
        il_bcc_eligible: false

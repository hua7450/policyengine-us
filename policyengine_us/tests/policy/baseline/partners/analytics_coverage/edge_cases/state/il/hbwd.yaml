# IL Health Benefits for Workers with Disabilities (HBWD) — Medicaid buy-in
# for disabled workers age 16-64 with earnings; il_hbwd_person is the
# negative monthly premium (89 Ill. Admin. Code 120.510(n)).
- name: il_hbwd_age_16_minimum_age_eligible (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 16
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: true
        employment_income_before_lsr: 10_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Age 16 meets the lower age bound (16-64). Premium: gross earned
        # $833.33/mo minus employment-expense exemptions (OASDI $51.67 + IL
        # withholding ~$29) minus $25 flat and $50 earned exemptions ~ $677
        # -> earned bracket $500-750 -> $13/mo premium -> -156/yr.
        il_hbwd_eligible: true
        il_hbwd_person: -156.0
- name: il_hbwd_age_65_age_out (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: true
        employment_income_before_lsr: 10_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Age-route ineligible: 65 is outside the 16-64 window (binding
        # boundary against the age-16 case).
        il_hbwd_eligible: false
        il_hbwd_person: 0.0
- name: il_hbwd_mid_premium_bracket (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: true
        employment_income_before_lsr: 30_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    people:
      head:
        # Mid-scale premium: gross $2,500/mo minus expense exemptions
        # (OASDI $155 + IL withholding ~$112) minus $25 flat and $50 earned
        # exemptions ~ $2,158 -> earned bracket $2,000-2,250 -> $50/mo
        # premium -> -600/yr. Income still under 350% FPG.
        il_hbwd_eligible: true
        il_hbwd_person: -600.0

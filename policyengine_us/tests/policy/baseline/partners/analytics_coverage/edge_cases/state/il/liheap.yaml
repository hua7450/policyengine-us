# IL LIHEAP — income limit is the HIGHER of 60% state median income or
# 200% FPG; benefit comes from the DCEO payment matrix (heating type x
# income bracket x household size), capped at heating expenses.
- name: il_liheap_low_income_expense_capped (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 12_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
        heating_cooling_expense: 600
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        il_liheap_income_eligible: true
        # 12,000 / 15,960 FPG = 75% FPL -> bracket 2; all-electric matrix
        # (size 1, FY2026) = $910, capped at the $600 heating expense.
        il_liheap: 600.0
- name: il_liheap_above_200pct_fpg_below_smi_limit (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 38_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
        heating_cooling_expense: 1_500
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # State-specific max-of-two-limits pin: $38,000 exceeds 200% FPG
        # (2 x 15,960 = 31,920) but stays under 60% SMI (0.6 x 66,633 =
        # 39,980), which is the binding IL limit -> still eligible.
        il_liheap_income_eligible: true
        # 38,000 / 15,960 = 238% FPL -> bracket 4; all-electric matrix
        # (size 1, FY2026) = $325 < $1,500 heating expense.
        il_liheap: 325.0
- name: il_liheap_above_60pct_smi_ineligible (il)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        employment_income_before_lsr: 41_000
    households:
      household:
        members: [head]
        state_code: IL
        zip_code: '60601'
        county_str: COOK_COUNTY_IL
    spm_units:
      spm_unit:
        members: [head]
        heating_cooling_expense: 1_500
    tax_units:
      tax_unit:
        members: [head]
        tax_unit_is_joint: false
    families:
      family:
        members: [head]
    marital_units:
      mu_head:
        members: [head]
  output:
    spm_units:
      spm_unit:
        # Income-route ineligible: $41,000 exceeds the binding 60% SMI limit
        # of ~$39,980 (boundary-adjacent to the $38,000 eligible case).
        il_liheap_income_eligible: false
        il_liheap: 0.0

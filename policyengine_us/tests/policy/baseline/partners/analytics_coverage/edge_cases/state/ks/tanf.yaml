# Kansas TANF (ks_tanf) partner edge-case contract tests.
# Pins the ks_tanf decision boundaries MyFriendBen-style partners rely on.
#
# Parameter facts used (2026, gov/states/ks/dcf/tanf):
# - Payment standard, non-shared, size 3: Group I $386, Group II $391,
#   Group III $403, Group IV $429 per month; size 2 Group IV $352
#   (payment_standard/non_shared.yaml). Group IV is the default for
#   counties not listed in county_group/group_{1,2,3}.yaml (e.g. Johnson).
# - Earned income disregard: $90 flat per employed person, then 60% of the
#   remainder disregarded, i.e. countable = (gross - 90) * 0.4
#   (income/earned_income_disregard/flat.yaml, rate.yaml).
# - Gross income limit: gross income < 30% of the monthly FPG
#   (income/gross_income_limit.yaml). 2026 contiguous-US FPG: 3 people
#   = $27,320/yr -> 30% = $683.00/mo; 2 people = $21,640/yr -> $541.00/mo.
# - Resource limit: cash assets <= $3,000 (resource_limit/amount.yaml).
# - Assigned child support counts for the income eligibility tests but is
#   excluded from the payment amount (KEESM 6220; ks_tanf formula).
#
# Earnings are set via employment_income_before_lsr /
# self_employment_income_before_lsr, matching the SNAP partner edge-case
# files: TANF earned income sources
# (gov/hhs/tanf/cash/income/sources/earned.yaml) read the before-LSR
# variables, and the YAML harness does not fan employment_income out to
# its before-LSR component the way the Simulation situation path does.
- name: Case 1, eligible 3-person family with 2 earners in a Group III county gets payment standard minus countable income.
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # $400/month gross earned.
        employment_income_before_lsr: 4_800
      person2:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # $200/month gross earned.
        employment_income_before_lsr: 2_400
      person3:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
          - person1
          - person2
          - person3
        state_code_str: KS
        zip_code: '67202'
        # Sedgwick County (Wichita) is a Group III county.
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id001
        # Exactly at the $3,000 resource limit (inclusive, still eligible).
        spm_unit_cash_assets: 3_000
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
          - person1
          - person2
      mu_person3:
        members:
          - person3
  output:
    spm_units:
      spm_unit:
        # Earned income disregard per earner: ($400 - $90) * 0.4 = $124;
        # ($200 - $90) * 0.4 = $44. Countable income = $168/mo = $2,016/yr.
        ks_tanf_countable_income: 2_016
        # Group III non-shared size 3 standard: $403/mo = $4,836/yr.
        ks_tanf_maximum_benefit: 4_836
        ks_tanf_assistance_unit_size: 3
        # Gross test: $600/mo < $683 (30% FPG, 3 people); net: $168 < $403;
        # resources: $3,000 <= $3,000. Benefit = $403 - $168 = $235/mo.
        ks_tanf: 2_820
        tanf: 2_820

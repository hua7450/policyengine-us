- name: Case 4, gross income just below 30 percent of the poverty guideline stays eligible.
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # $473/month gross earned.
        employment_income_before_lsr: 5_676
      person2:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # $200/month gross earned; unit total $673/mo, $10 below the
        # $683.00 gross income limit (30% of the 3-person monthly FPG).
        employment_income_before_lsr: 2_400
      person3:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id004
          - person1
          - person2
          - person3
        state_code_str: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id004
        spm_unit_cash_assets: 1_000
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: true
    families:
      family:
        members: *id004
    marital_units:
      mu_couple:
        members:
          - person1
          - person2
      mu_person3:
        members:
          - person3
  output:
    spm_units:
      spm_unit:
        # Countable: ($473 - $90) * 0.4 + ($200 - $90) * 0.4 = $197.20/mo
        # = $2,366.40/yr.
        ks_tanf_countable_income: 2_366.4
        # Benefit = $403 - $197.20 = $205.80/mo = $2,469.60/yr.
        ks_tanf: 2_469.6
        tanf: 2_469.6

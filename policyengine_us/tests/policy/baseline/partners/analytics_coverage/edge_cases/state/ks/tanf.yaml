- name: Case 7, assigned child support counts for income eligibility but is excluded from the payment amount.
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        # $200/month child support: below the $541 gross limit (30% FPG,
        # 2 people) and the $352 Group IV size-2 net standard, so the unit
        # stays eligible.
        child_support_received: 2_400
      person2:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id007
          - person1
          - person2
        state_code_str: KS
        zip_code: '66212'
        # Johnson County (Overland Park) is unlisted, so it falls to the
        # default Group IV tier.
        county_str: JOHNSON_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id007
        spm_unit_cash_assets: 500
    tax_units:
      tax_unit:
        members: *id007
        tax_unit_is_joint: false
    families:
      family:
        members: *id007
    marital_units:
      mu_person1:
        members:
          - person1
      mu_person2:
        members:
          - person2
  output:
    spm_units:
      spm_unit:
        # Child support is counted in the eligibility tests...
        ks_tanf_countable_income: 2_400
        # Group IV non-shared size 2 standard: $352/mo = $4,224/yr.
        ks_tanf_maximum_benefit: 4_224
        # ...but assigned support is retained by CSS (KEESM 6220), so the
        # payment is the full standard: $352 - ($200 - $200) = $352/mo.
        ks_tanf: 4_224
        tanf: 4_224

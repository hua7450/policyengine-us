- name: Case 9, negative self-employment income does not inflate the benefit above the payment standard.
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      person1:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 4_800
        # Business loss of $800/month swamps the $400/month wages: this
        # earner's gross earned income is -$400/mo.
        self_employment_income_before_lsr: -9_600
      person2:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 2_400
      person3:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id009
          - person1
          - person2
          - person3
        state_code_str: KS
        zip_code: '67202'
        county_str: SEDGWICK_COUNTY_KS
    spm_units:
      spm_unit:
        members: *id009
        spm_unit_cash_assets: 1_000
    tax_units:
      tax_unit:
        members: *id009
        tax_unit_is_joint: true
    families:
      family:
        members: *id009
    marital_units:
      mu_couple:
        members:
          - person1
          - person2
      mu_person3:
        members:
          - person3
  output:
    spm_units:
      spm_unit:
        # Person1's negative earnings floor at $0 after the per-person
        # disregards and do not offset person2's countable $44/mo:
        # countable income = $44/mo = $528/yr.
        ks_tanf_countable_income: 528
        ks_tanf_maximum_benefit: 4_836
        # Benefit = $403 - $44 = $359/mo = $4,308/yr, below the $403/mo
        # standard ($4,836/yr) despite the large reported loss.
        ks_tanf: 4_308
        tanf: 4_308

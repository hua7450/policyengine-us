# MA SSI State Supplement (SSP), full-cost-of-living arrangement (default),
# single claims (gov/states/ma/dta/ssp/amount.yaml):
# AGED 128.82/month, DISABLED 114.39/month. The supplement is reduced by any
# amount by which countable income exceeds the federal SSI rate (994/month in 2026).
- name: ma_state_supplement_aged_full (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        ssi_countable_resources: 0
    households:
      household:
        members: &id001
        - head
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Aged, no income, passes resource test: full AGED single rate
        # 128.82 x 12 = 1,545.84.
        ma_state_supplement: 1_545.84

- name: ma_state_supplement_aged_partial_ss_income (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        social_security_retirement: 13_000
        ssi_countable_resources: 0
    households:
      household:
        members: &id003
        - head
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Social Security 1,083.33/month - 20 general exclusion = 1,063.33
        # countable, which exceeds the 994 federal SSI rate by 69.33.
        # Supplement: 128.82 - 69.33 = 59.49/month -> 713.84/year
        # (income too high for federal SSI but still receives a partial SSP).
        ma_state_supplement: 713.84
- name: ma_state_supplement_resources_over_limit_ineligible (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        ssi_countable_resources: 5_000
    households:
      household:
        members: &id004
        - head
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Resources 5,000 > 2,000 SSI limit -> fails the resource test -> no SSP.
        ma_state_supplement: 0.0

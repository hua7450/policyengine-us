    households:
      household:
        members: &id003
        - head
        - child1
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false

- name: tanf_only_child_age_18_ineligible (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 18
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id004
        - head
        - child1
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Child at 18 fails the under-18 dependent age limit and nobody is
        # pregnant -> no eligible dependent -> categorically ineligible.
        ma_tafdc: 0.0
        tanf: 0.0
- name: tanf_pregnant_adult_no_children (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_pregnant: true
        # Partner-sent input: pregnancy-based TAFDC eligibility flag.
        ma_tafdc_pregnancy_eligible: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id005
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: false
    families:
      family:
        members: *id005
    marital_units:
      mu_head:
        members:
        - head
  output:
    spm_units:
      spm_unit:
        # Pregnant adult with no children qualifies via the pregnancy route:
        # size-1 payment standard 604 x 12 = 7,248 (no clothing allowance,
        # since no dependent child under 18 is present).
        ma_tafdc: 7_248.0
        tanf: 7_248.0

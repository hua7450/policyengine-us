# MA-specific credit stacking: the refundable EITC and the child and family
# credit both flow into ma_refundable_credits and can drive ma_income_tax
# negative (net refund) for a low-income family.
- name: ma_credits_stack_single_parent_2_children (ma)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - child1
        - child2
        state_code: MA
        zip_code: "02118"
        county_str: SUFFOLK_COUNTY_MA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    tax_units:
      tax_unit:
        adjusted_gross_income: 20_000.0
        # 2-child plateau: federal EITC max 7,316 x 0.4 = 2,926.40.
        ma_eitc: 2_926.4
        # Two children under 13 x 440 = 880.
        ma_child_and_family_credit: 880.0
        # Refundable stack: 2,926.40 (EITC) + 880 (child and family credit,
        # via ma_child_and_family_credit_or_dependent_care_credit) = 3,806.40.
        ma_refundable_credits: 3_806.4
        # Before credits: 5% x (20,000 - 1,530 FICA deduction - 6,800 HOH
        # personal exemption - 2 x 1,000 dependent exemptions) = 483.50, then
        # the limited income credit caps tax at 10% x (AGI - 16,400 no-tax
        # threshold) = 360. Net: 360 - 3,806.40 refundable stack = -3,446.40.
        ma_income_tax: -3_446.4

# NC Subsidized Child Care Assistance (nc_scca) — Wake County 4-star center market rates
# (childcare_market_rates.yaml, WAKE_COUNTY_NC): infant (group 1) $1,525/mo, toddler
# (group 2, age 2) $1,343/mo, preschool (group 3, ages 3-5) $1,256/mo, school age
# (group 4, ages 6+) $455/mo. Parent fee = round(10% of gross monthly income)
# (parent_fee_rate.yaml). Entry income limits (entry/fpg_limit): monthly income must be
# strictly below 200% FPG if any preschool/disabled child, 133% FPG if school-age-only.
# 2026 FPG size 2 = 15_960 + 5_680 = 21_640/yr = 1_803.33/mo.
# nc_scca = min(childcare expenses - parent fee, market rate - parent fee).
- name: nc_scca_infant_max_payment_binds (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 20_000
      child1:
        age: 0
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
        spm_unit_pre_subsidy_childcare_expenses: 24_000
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Income 20_000/12 = 1_666.67/mo < 200% FPG (3_606.67/mo) -> eligible.
        # Parent fee = round(0.10 x 1_666.67) = 167. Infant market rate 1_525.
        # Max payment = (1_525 - 167) x 12 = 1_358 x 12 = 16_296.
        nc_scca_maximum_payment: 16_296
        # Expenses 24_000/12 = 2_000/mo; uncapped 2_000 - 167 = 1_833 > 1_358,
        # so the market-rate cap binds: nc_scca = 16_296.
        nc_scca: 16_296

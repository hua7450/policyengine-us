# NC TANF (Work First, nc_tanf) — need standard (need_standard/main.yaml, monthly):
# size 2 = 472, size 3 = 544, size 4 = 594. Benefit = 50% of (need standard -
# countable earned + unearned income) (benefit/payment_percentage.yaml).
# Income-eligible only if reduced need standard per person >= 25/mo = 300/yr
# (eligibility/average_reduced_need_standard_threshold.yaml). Demographic
# eligibility requires a child under 18 (eligibility/age_limit.yaml).
- name: tanf_max_benefit_youngest_child_age_17 (nc)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      spouse:
        age: 38
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 17
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: NC
        zip_code: '27601'
        county_str: WAKE_COUNTY_NC
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Child age 17 < 18 limit -> demographically eligible. No income, so
        # reduced need standard = full size-3 standard = 544 x 12 = 6_528
        # (per person 2_176 >= 300 -> income-eligible).
        # nc_tanf = 6_528 x 0.5 = 3_264.
        nc_tanf: 3_264
        tanf: 3_264

- name: tx_ccs_child_age_13_over_age_limit (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_full_time_student: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
      child1:
        # Non-disabled children must be under 13.
        age: 13
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        tx_ccs_payment_rate: 7_200
    households:
      household:
        members: &id004
        - head
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
        spm_unit_pre_subsidy_childcare_expenses: 12_000
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Demographic route: no age-eligible child (13 >= 13 limit) -> 0.
        tx_ccs: 0.0

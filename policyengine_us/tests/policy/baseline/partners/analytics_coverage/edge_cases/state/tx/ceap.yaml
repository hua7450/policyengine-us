# YAML regression-test fixture (policyengine-us partner edge cases).
# TX Comprehensive Energy Assistance Program (10 TAC 6.307/6.309; LIHEAP
# state plan), 2026 parameters: eligible if countable income <= 150% of FPG
# (size-3 FPG 2026 = 27,320 -> limit 40,980) OR categorically eligible
# (TANF-enrolled / SNAP-eligible / SSI-eligible; TX BBCE keeps SNAP
# eligibility to 165% FPG = 45,078, so the income route only closes above
# both limits). Utility assistance = min(bracket maximum, electricity + gas
# expenses); 2026 bracket maximums: 1,800 (0-50% FPG), 1,500 (51-75%),
# 1,200 (76-150%).
- name: tx_ceap_income_just_below_50pct_fpg_max_1800 (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # 13,600 / 27,320 = 49.8% FPG, just below the 50% bracket edge.
        employment_income_before_lsr: 13_600
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - child1
        - child2
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
        electricity_expense: 1_500
        gas_expense: 600
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    spm_units:
      spm_unit:
        # Only the adult's income counts (income of members under 18 is
        # excluded); no TANF received -> countable income = 13,600.
        tx_ceap_countable_income: 13_600.0
        # Low bracket (<= 50% FPG) maximum 1,800 binds below the 2,100
        # of energy expenses.
        tx_ceap: 1_800.0

- name: tx_ceap_low_energy_expenses_cap_benefit (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 13_600
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id004
        - head
        - child1
        - child2
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
        # Energy expenses total 600, below the 1,800 bracket maximum.
        electricity_expense: 400
        gas_expense: 200
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    spm_units:
      spm_unit:
        # Benefit is capped by actual energy expenses:
        # min(1,800, 400 + 200) = 600.
        tx_ceap: 600.0
- name: tx_ceap_income_above_150pct_fpg_and_snap_limit_ineligible (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # 45,200 / 27,320 = 165.4% FPG: above the 150% CEAP limit (40,980)
        # and above the TX SNAP BBCE gross limit (165% FPG = 45,078),
        # which would otherwise confer categorical eligibility.
        employment_income_before_lsr: 45_200
      child1:
        age: 8
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child2:
        age: 3
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id005
        - head
        - child1
        - child2
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id005
        electricity_expense: 1_500
        gas_expense: 600
    tax_units:
      tax_unit:
        members: *id005
        tax_unit_is_joint: false
    families:
      family:
        members: *id005
    marital_units:
      mu_head:
        members:
        - head
      mu_child1:
        members:
        - child1
      mu_child2:
        members:
        - child2
  output:
    spm_units:
      spm_unit:
        # Income route: no income or categorical pathway remains.
        tx_ceap_eligible: false
        tx_ceap: 0.0

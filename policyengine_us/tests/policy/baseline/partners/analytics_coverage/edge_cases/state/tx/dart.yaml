- name: tx_dart_snap_enrollment_discount_gopass_route (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # Age 30 has no age route; zero income makes the household
        # SNAP-eligible, which qualifies for the Discount GoPass.
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_full_time_student: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id006
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id006
    tax_units:
      tax_unit:
        members: *id006
        tax_unit_is_joint: false
    families:
      family:
        members: *id006
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Program-enrollment route: reduced fare (126 - 63) x 12 = 756.
        tx_dart_benefit_person: 756.0

# YAML regression-test fixture (policyengine-us partner edge cases).
# TX Family Planning Program (Healthy Texas Women / FPP), 2026 parameters:
# age <= 64, SPM-unit net income <= 250% of FPG (size-1 FPG 2026 = 15,960 ->
# limit 39,900). Benefit is the average annual value per participant, 266.84.
# The boundary cases use Social Security as the only income so net income
# equals the input exactly (untaxed at these levels, no offsetting benefits);
# they also report qualifying non-marketplace health coverage so the modeled
# ACA marketplace premium (an SPM expense) does not reduce net income.
- name: tx_fpp_age_30_low_income_female (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_female: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 30_000
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Net income (30,000 earnings less taxes) is well below the 39,900
        # limit -> flat average benefit 266.84.
        tx_fpp_benefit: 266.84
- name: tx_fpp_age_64_income_just_below_250pct_fpg (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # Last eligible age (limit is <= 64).
        age: 64
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_female: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        # Untaxed at this level, so net income = 39,800, just below the
        # 2.5 x 15,960 = 39,900 limit.
        social_security_retirement: 39_800
        # Has other coverage -> no modeled marketplace premium deducted
        # from SPM net income.
        has_qualifying_non_marketplace_health_coverage_at_interview: true
    households:
      household:
        members: &id002
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id002
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Age and income boundaries both on the eligible side -> 266.84.
        tx_fpp_benefit: 266.84
- name: tx_fpp_income_just_above_250pct_fpg (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 64
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_female: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        # Net income 40,100 > 39,900 limit.
        social_security_retirement: 40_100
        # Has other coverage -> no modeled marketplace premium deducted
        # from SPM net income.
        has_qualifying_non_marketplace_health_coverage_at_interview: true
    households:
      household:
        members: &id003
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Income route: net income exceeds 250% FPG -> ineligible.
        tx_fpp_benefit: 0.0
- name: tx_fpp_age_65_age_out (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # One year above the 64 age limit.
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        is_female: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        social_security_retirement: 30_000
    households:
      household:
        members: &id004
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Age route: 65 > 64 -> ineligible despite qualifying income.
        tx_fpp_benefit: 0.0

# YAML regression-test fixture (policyengine-us partner edge cases).
# Harris County RIDES, 2026 parameters: Harris County residents aged 65+ or
# with a disability; subsidy covers 60% of transportation costs (customer
# pays 40%).
- name: tx_harris_rides_age_65_subsidy (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        pre_subsidy_transportation_expense: 1_200
    households:
      household:
        members: &id001
        - head
        state_code: TX
        zip_code: '77002'
        county_str: HARRIS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: false
    families:
      family:
        members: *id001
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        tx_harris_rides_eligible: true
        # Subsidy = 1,200 x (1 - 0.4) = 720.
        tx_harris_rides_subsidy: 720.0
- name: tx_harris_rides_age_64_not_disabled_ineligible (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # One year below the 65 age threshold, no disability.
        age: 64
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        pre_subsidy_transportation_expense: 1_200
    households:
      household:
        members: &id002
        - head
        state_code: TX
        zip_code: '77002'
        county_str: HARRIS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id002
    tax_units:
      tax_unit:
        members: *id002
        tax_unit_is_joint: false
    families:
      family:
        members: *id002
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Age route boundary: 64 < 65 and not disabled -> ineligible.
        tx_harris_rides_eligible: false
        tx_harris_rides_subsidy: 0.0
- name: tx_harris_rides_disabled_adult_subsidy (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # Under 65 but disabled -> eligible through the disability route.
        age: 40
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: true
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        pre_subsidy_transportation_expense: 1_000
    households:
      household:
        members: &id003
        - head
        state_code: TX
        zip_code: '77002'
        county_str: HARRIS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: false
    families:
      family:
        members: *id003
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        tx_harris_rides_eligible: true
        # Subsidy = 1,000 x (1 - 0.4) = 600.
        tx_harris_rides_subsidy: 600.0
- name: tx_harris_rides_outside_harris_county_ineligible (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        # Meets the age requirement but lives in Dallas County.
        age: 65
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
        pre_subsidy_transportation_expense: 1_200
    households:
      household:
        members: &id004
        - head
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: false
    families:
      family:
        members: *id004
    marital_units:
      mu_head:
        members:
        - head
  output:
    people:
      head:
        # Geography route: program is limited to Harris County residents.
        tx_harris_rides_eligible: false
        tx_harris_rides_subsidy: 0.0

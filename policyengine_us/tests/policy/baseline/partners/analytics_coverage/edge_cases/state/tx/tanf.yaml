# YAML regression-test fixture (policyengine-us partner edge cases).
# TX TANF (1 TAC 372; Texas Works Handbook A-1340/C-110), 2026 parameters
# (effective 2025-10-01): payment standard 418/month for caretaker-with-second-
# parent size 3, 331/month for caretaker-without-second-parent size 2.
# Applicants (is_tanf_enrolled defaults false) must pass BOTH the budgetary
# needs test (income after 120 work expense < budgetary needs) and the
# recognizable needs test (countable income < 25% of budgetary needs).
# Countable earned income = (gross - 120 work expense) x (1 - 1/3 disregard).
- name: tx_tanf_max_couple_child_age_17_boundary (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        # Age 17 non-student is one year below the minor-child limit (18).
        age: 17
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        is_full_time_student: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Two eligible parents + one eligible child -> caretaker with second
        # parent, unit size 3. Zero income -> full payment standard:
        # 418/month x 12 = 5,016.
        tx_tanf: 5_016.0
        tanf: 5_016.0

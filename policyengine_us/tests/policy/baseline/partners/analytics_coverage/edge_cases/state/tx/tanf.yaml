- name: tx_tanf_earnings_just_below_recognizable_needs_cliff (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # Recognizable needs (size-3 caretaker with second parent) =
        # 824 x 0.25 = 206/month. Countable income flips at
        # (206 / 0.67 + 120) x 12 = 5,129.55/year of gross earnings.
        employment_income_before_lsr: 5_125
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id003
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id003
    tax_units:
      tax_unit:
        members: *id003
        tax_unit_is_joint: true
    families:
      family:
        members: *id003
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Monthly gross 5,125 / 12 = 427.0833; minus 120 work expense =
        # 307.0833; minus 1/3 applicant disregard -> countable
        # 307.0833 x 0.67 = 205.7458 < 206 -> passes. Benefit =
        # (418 - 205.7458) x 12 = 2,547.05.
        tx_tanf: 2_547.05
        tanf: 2_547.05
- name: tx_tanf_earnings_just_above_recognizable_needs_cliff (tx)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        # (5,135 / 12 - 120) x 0.67 = 206.30/month countable, just above the
        # 206 recognizable needs limit -> income-ineligible.
        employment_income_before_lsr: 5_135
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id004
        - head
        - spouse
        - child1
        state_code: TX
        zip_code: '75201'
        county_str: DALLAS_COUNTY_TX
    spm_units:
      spm_unit:
        members: *id004
    tax_units:
      tax_unit:
        members: *id004
        tax_unit_is_joint: true
    families:
      family:
        members: *id004
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Income route: fails the recognizable needs test -> ineligible.
        tx_tanf: 0.0
        tanf: 0.0

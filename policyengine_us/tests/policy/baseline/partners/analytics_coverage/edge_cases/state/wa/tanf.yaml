# WA TANF (WAC 388-478-0020 payment standards; WAC 388-450-0170 earned income
# deductions; WAC 388-478-0035 gross earned income limits; WAC 388-470-0005
# resource limit). 2026 monthly parameters: payment standard $570 (size 2),
# $706 (size 3); gross earned income limit $1,640 (size 2); earned income
# disregard = first $500 then 50% of remainder; resource limit $12,000.
- name: tanf_size_3_zero_income_max_benefit (wa)
  period: 2026
  absolute_error_margin: 0.1
  input:
    people:
      head:
        age: 30
        is_tax_unit_head: true
        is_tax_unit_spouse: false
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      spouse:
        age: 28
        is_tax_unit_head: false
        is_tax_unit_spouse: true
        is_tax_unit_dependent: false
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
      child1:
        age: 5
        is_tax_unit_head: false
        is_tax_unit_spouse: false
        is_tax_unit_dependent: true
        is_disabled: false
        immigration_status_str: CITIZEN
        employment_income_before_lsr: 0
    households:
      household:
        members: &id001
        - head
        - spouse
        - child1
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id001
    tax_units:
      tax_unit:
        members: *id001
        tax_unit_is_joint: true
    families:
      family:
        members: *id001
    marital_units:
      mu_couple:
        members:
        - head
        - spouse
      mu_child1:
        members:
        - child1
  output:
    spm_units:
      spm_unit:
        # Size-3 payment standard $706/month, zero countable income:
        # 706 x 12 = 8,472/year.
        wa_tanf: 8_472.0
        tanf: 8_472.0

        - head
        - child1
        state_code: WA
        zip_code: '98101'
        county_str: KING_COUNTY_WA
    spm_units:
      spm_unit:
        members: *id006
    tax_units:
      tax_unit:
        members: *id006
        tax_unit_is_joint: false

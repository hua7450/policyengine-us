        # 1-kid single ceiling = 20,130 + 3,733/0.1598 = 43,490.45; income
        # 43,490 sits $0.45 below it; rate = (674.96 - 50)/5,000 = 0.12499;
        # 674.96 - 4,999.55 x 0.12499 = 50.06 (the $50 statutory minimum
        # region, RCW 82.08.0206(3)(c)).
        wa_working_families_tax_credit: 50.06
        adjusted_gross_income: 43_490.0

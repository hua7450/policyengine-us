# Signature-fidelity fix (2026-07-04): state_code added on each household per
# analytics (every MFB state-output request sends the state_code enum);
# employment_income / self_employment_income / capital_gains converted to the
# *_before_lsr / *_before_response input keys that production's Simulation
# wrapper backfills (issue #8802). Outputs re-pinned to current model values
# under the corrected inputs.
# Sanity check (signature_30) - tx_ccs = $3,335.28/yr = TX Child Care Services
# subsidy: min($6,000 pre-subsidy childcare expense, TX max reimbursement rate)
# minus the income-based parent copay; tx_ccs_eligible = 1. The TX DART reduced-
# fare benefit also activates ($756/adult). Genuine TX state amounts (tx_tanf and
# federal tanf remain $0). Federal programs additionally re-benchmark to TX:
# child1 (age 8) shifts from Medicaid to CHIP ($1,456.51) as the family's 145.5%
# FPL exceeds TX's ~133% FPL age-6-18 Medicaid limit (CA's is ~266%); child2 keeps
# Medicaid at the TX per-capita amount $10,619.75; aca_ptc and Head Start move to
# TX benchmarks. All previously pinned under the incorrect California default.

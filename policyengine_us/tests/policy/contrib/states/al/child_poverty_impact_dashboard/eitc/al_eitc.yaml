- name: AL EITC with 10% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.al.eitc.al_eitc
  input:
    gov.contrib.states.al.child_poverty_impact_dashboard.eitc.in_effect: true
    gov.contrib.states.al.child_poverty_impact_dashboard.eitc.match: 0.1
    state_code: AL
    eitc: 1000
  output:
    al_eitc: 100
    al_refundable_credits: 100


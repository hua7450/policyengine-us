- name: AL HB527 - Deduction reduces AL AGI
  absolute_error_margin: 1
  period: 2025
  reforms: policyengine_us.reforms.states.al.hb527.al_hb527_overtime_deduction.al_hb527_overtime_deduction
  input:
    gov.contrib.states.al.hb527.in_effect: true
    gov.contrib.states.al.hb527.cap: 1_000
    people:
      person:
        age: 35
        employment_income: 52_000
        hours_worked_last_week: 50
    tax_units:
      tax_unit:
        members: [person]
        filing_status: SINGLE
    households:
      household:
        members: [person]
        state_name: AL
  output:
    al_hb527_overtime_deduction: 1_000
    # AL AGI should be reduced by the $1,000 overtime deduction
    # Base AGI from employment = $52,000, minus $1,000 deduction = $51,000
    al_agi: 51_000

- name: AZ EITC with 10% match
  period: 2024
  reforms: policyengine_us.reforms.states.az.eitc.az_eitc
  input:
    gov.contrib.states.az.child_poverty_impact_dashboard.eitc.match: 0.1
    state_code: AZ
    eitc: 1_000
  output:
    az_eitc: 100

- name: AZ EITC with 20% match
  period: 2024
  reforms: policyengine_us.reforms.states.az.eitc.az_eitc
  input:
    gov.contrib.states.az.child_poverty_impact_dashboard.eitc.match: 0.2
    state_code: AZ
    eitc: 2_500
  output:
    az_eitc: 500

- name: AZ EITC is 0 when match is 0
  period: 2024
  reforms: policyengine_us.reforms.states.az.eitc.az_eitc
  input:
    gov.contrib.states.az.child_poverty_impact_dashboard.eitc.match: 0
    state_code: AZ
    eitc: 1_000
  output:
    az_eitc: 0

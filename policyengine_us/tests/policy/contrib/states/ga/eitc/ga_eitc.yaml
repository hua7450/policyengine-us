- name: GA EITC with 10% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.ga.eitc.ga_eitc
  input:
    gov.contrib.states.ga.eitc.in_effect: true
    gov.contrib.states.ga.eitc.match: 0.1
    state_code: GA
    eitc: 1000
  output:
    ga_eitc: 100
    ga_refundable_credits: 100


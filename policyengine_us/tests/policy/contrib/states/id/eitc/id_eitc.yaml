- name: ID EITC with 10% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.id.eitc.id_eitc
  input:
    gov.contrib.states.id.eitc.in_effect: true
    gov.contrib.states.id.eitc.match: 0.1
    state_code: ID
    eitc: 1000
  output:
    id_eitc: 100

- name: ID EITC with 20% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.id.eitc.id_eitc
  input:
    gov.contrib.states.id.eitc.in_effect: true
    gov.contrib.states.id.eitc.match: 0.2
    state_code: ID
    eitc: 2500
  output:
    id_eitc: 500

- name: ID EITC is 0 when not in effect
  period: 2024
  reforms: policyengine_us.reforms.states.id.eitc.id_eitc
  input:
    gov.contrib.states.id.eitc.in_effect: false
    gov.contrib.states.id.eitc.match: 0.1
    state_code: ID
    eitc: 1000
  output:
    id_eitc: 0

- name: ID EITC is 0 when match is 0
  period: 2024
  reforms: policyengine_us.reforms.states.id.eitc.id_eitc
  input:
    gov.contrib.states.id.eitc.in_effect: true
    gov.contrib.states.id.eitc.match: 0
    state_code: ID
    eitc: 1000
  output:
    id_eitc: 0

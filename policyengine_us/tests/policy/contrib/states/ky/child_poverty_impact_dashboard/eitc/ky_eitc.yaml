- name: KY EITC with 10% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.ky.eitc.ky_eitc
  input:
    gov.contrib.states.ky.child_poverty_impact_dashboard.eitc.in_effect: true
    gov.contrib.states.ky.child_poverty_impact_dashboard.eitc.match: 0.1
    state_code: KY
    eitc: 1000
  output:
    ky_eitc: 100
    ky_refundable_credits: 100


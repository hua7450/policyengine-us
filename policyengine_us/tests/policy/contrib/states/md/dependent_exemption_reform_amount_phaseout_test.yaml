- name: MD dependent exemption reform - positive flat per-dependent amount
  period: 2025
  reforms: policyengine_us.reforms.states.md.dependent_exemption.md_dependent_exemption_reform.md_dependent_exemption_reform
  input:
    gov.contrib.states.md.dependent_exemption.in_effect: true
    gov.contrib.states.md.dependent_exemption.amount: 1_000
    people:
      parent: {age: 40, employment_income: 40_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: MD}}
  # Personal portion: 1 personal unit * 3,200 (single, AGI 40,000) = 3,200.
  # Dependent portion (flat): 2 deps * 1,000 = 2,000; phaseout rate defaults to 0.
  # Total = 3,200 + 2,000 = 5,200.
  output: {md_total_personal_exemptions: 5_200}

- name: MD dependent exemption reform - phaseout reduces dependent portion
  period: 2025
  reforms: policyengine_us.reforms.states.md.dependent_exemption.md_dependent_exemption_reform.md_dependent_exemption_reform
  input:
    gov.contrib.states.md.dependent_exemption.in_effect: true
    gov.contrib.states.md.dependent_exemption.amount: 2_000
    gov.contrib.states.md.dependent_exemption.phaseout.threshold.SINGLE: 40_000
    gov.contrib.states.md.dependent_exemption.phaseout.rate: 0.1
    people:
      parent: {age: 40, employment_income: 50_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: MD}}
  # Personal portion: 1 personal unit * 3,200 (single, AGI 50,000) = 3,200.
  # Dependent maximum (flat): 2 deps * 2,000 = 4,000.
  # Phaseout: (50,000 - 40,000) * 0.1 = 1,000; max_(4,000 - 1,000, 0) = 3,000.
  # Total = 3,200 + 3,000 = 6,200.
  output: {md_total_personal_exemptions: 6_200}

- name: MD dependent exemption reform - schedule per-dependent amount is adjustable
  period: 2025
  reforms: policyengine_us.reforms.states.md.dependent_exemption.md_dependent_exemption_reform.md_dependent_exemption_reform
  input:
    gov.contrib.states.md.dependent_exemption.in_effect: true
    gov.contrib.states.md.dependent_exemption.schedule.single[0].amount: 5_000
    people:
      parent: {age: 40, employment_income: 40_000}
      child1: {age: 10, is_tax_unit_dependent: true}
      child2: {age: 12, is_tax_unit_dependent: true}
    tax_units: {tax_unit: {members: [parent, child1, child2], filing_status: SINGLE}}
    households: {household: {members: [parent, child1, child2], state_name: MD}}
  # Raising the single first-bracket schedule amount to 5,000 drives the
  # dependent portion only: 2 deps * 5,000 = 10,000. The personal portion keeps
  # the baseline per-person amount (1 * 3,200). Total = 3,200 + 10,000 = 13,200.
  output: {md_total_personal_exemptions: 13_200}

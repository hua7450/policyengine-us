- name: MO WFTC is refundable when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.mo.eitc.mo_refundable_eitc
  input:
    gov.contrib.states.mo.child_poverty_impact_dashboard.eitc.in_effect: true
    state_code: MO
    mo_wftc: 500
  output:
    mo_refundable_wftc: 500
    mo_non_refundable_wftc: 0

- name: MO WFTC is nonrefundable when not in effect
  period: 2024
  reforms: policyengine_us.reforms.states.mo.eitc.mo_refundable_eitc
  input:
    gov.contrib.states.mo.child_poverty_impact_dashboard.eitc.in_effect: false
    state_code: MO
    mo_wftc: 500
  output:
    mo_refundable_wftc: 0
    mo_non_refundable_wftc: 500

# Tests for flexible Montana Child Tax Credit reform

# Age bracket tests
- name: Child age 0-5 gets $1,200
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
  output:
    mt_ctc: 1_200

- name: Child age 6-12 gets $1,000
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 8
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
  output:
    mt_ctc: 1_000

- name: Child age 13-17 gets $800
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 40
      child:
        age: 15
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
  output:
    mt_ctc: 800

- name: Child age 18+ gets $0
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 40
      child:
        age: 18
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
  output:
    mt_ctc: 0

- name: Multiple children different age brackets
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 40
      child1:
        age: 3
      child2:
        age: 10
      child3:
        age: 16
    tax_units:
      tax_unit:
        members: [head, child1, child2, child3]
        mt_ctc_eligible: true
        adjusted_gross_income: 40_000
  output:
    mt_ctc: 3_000
    # 1200 + 1000 + 800

# Earned income requirement tests
- name: Earned income required - eligible with $1 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: true
    tax_unit_earned_income: 1
    adjusted_gross_income: 1
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: true

- name: Earned income required - ineligible with $0 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: true
    tax_unit_earned_income: 0
    adjusted_gross_income: 50_000
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: false

- name: Earned income NOT required - eligible with $0 income
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    gov.contrib.states.mt.ctc.earned_income_requirement.in_effect: false
    tax_unit_earned_income: 0
    adjusted_gross_income: 50_000
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: true

# AGI phase-out tests
- name: AGI at reduction threshold - no reduction
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 50_000
  output:
    mt_ctc: 1_200

- name: AGI $1k above threshold - first reduction
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 51_000
  output:
    mt_ctc: 1_110
    # 1200 - 1*90 = 1110

- name: AGI $5k above threshold - 5 reductions
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
      child:
        age: 3
    tax_units:
      tax_unit:
        members: [head, child]
        mt_ctc_eligible: true
        adjusted_gross_income: 55_000
  output:
    mt_ctc: 750
    # 1200 - 5*90 = 750

- name: AGI ineligible - above limit
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    tax_unit_earned_income: 60_000
    adjusted_gross_income: 56_001
    ctc_qualifying_children: 1
    state_code: MT
  output:
    mt_ctc_eligible: false

# No qualifying children test
- name: No CTC qualifying children - ineligible
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    tax_unit_earned_income: 50_000
    adjusted_gross_income: 50_000
    ctc_qualifying_children: 0
    state_code: MT
  output:
    mt_ctc_eligible: false

# End-to-end test
- name: End-to-end eligible with credit
  period: 2023
  reforms: policyengine_us.reforms.states.mt.ctc.mt_ctc.mt_ctc
  input:
    gov.contrib.states.mt.ctc.in_effect: true
    people:
      head:
        age: 30
        employment_income: 40_000
        is_tax_unit_dependent: false
      child:
        age: 3
        is_tax_unit_dependent: true
    tax_units:
      tax_unit:
        members: [head, child]
    households:
      household:
        members: [head, child]
        state_code: MT
  output:
    mt_ctc_eligible: true
    mt_ctc: 1_200

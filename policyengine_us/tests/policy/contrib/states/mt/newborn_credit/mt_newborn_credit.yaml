        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child]
        state_code: MT
  output:
    # AGI $60,500 exceeds $60,000 by $500
    # Ceiling($500 / $1,000) = 1 increment (fraction triggers full increment)
    # Reduction = $50 * 1 = $50
    # Credit = $1,000 - $50 = $950
    mt_newborn_credit: 950


# Phase-out Tests

- name: Case 20 (single at exactly threshold - full credit)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      parent:
        age: 30
        is_tax_unit_head: true
        employment_income: 60_000
        ssn_card_type: CITIZEN
      child:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child]
        state_code: MT
  output:
    # AGI $60k = threshold, no reduction
    mt_newborn_credit: 1_000

- name: Case 21 (single $1 above threshold - one increment reduction)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      parent:
        age: 30
        is_tax_unit_head: true
        employment_income: 60_001
        ssn_card_type: CITIZEN
      child:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child]
        state_code: MT
  output:
    # AGI $60,001 exceeds $60,000 by $1
    # Ceiling($1 / $1,000) = 1 increment
    # Reduction = $50 * 1 = $50
    # Credit = $1,000 - $50 = $950
    mt_newborn_credit: 950

- name: Case 22 (single $500 above threshold - one increment)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit

# Montana Newborn Credit Tests

# Basic Eligibility Tests

- name: Case 1 (single filer with newborn under income threshold)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      parent:
        age: 30
        is_tax_unit_head: true
        employment_income: 40_000
        ssn_card_type: CITIZEN
      child:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent, child]
        filing_status: SINGLE
    households:
      household:
        members: [parent, child]
        state_code: MT
  output:
    mt_newborn_credit: 1_000

- name: Case 2 (MFJ with newborn under income threshold)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit
  input:
    gov.contrib.states.mt.newborn_credit.in_effect: true
    people:
      parent1:
        age: 35
        is_tax_unit_head: true
        employment_income: 60_000
        ssn_card_type: CITIZEN
      parent2:
        age: 33
        is_tax_unit_spouse: true
        employment_income: 40_000
        ssn_card_type: CITIZEN
      child:
        age: 0
        is_tax_unit_dependent: true
        ssn_card_type: CITIZEN
    tax_units:
      tax_unit:
        members: [parent1, parent2, child]
        filing_status: JOINT
    households:
      household:
        members: [parent1, parent2, child]
        state_code: MT
  output:
    # AGI $100k < $120k threshold for MFJ
    mt_newborn_credit: 1_000

- name: Case 3 (two newborns - double credit)
  period: 2027
  reforms: policyengine_us.reforms.states.mt.newborn_credit.mt_newborn_credit.mt_newborn_credit

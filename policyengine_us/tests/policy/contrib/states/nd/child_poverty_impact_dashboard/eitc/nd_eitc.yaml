- name: ND EITC with 10% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.nd.eitc.nd_eitc
  input:
    gov.contrib.states.nd.child_poverty_impact_dashboard.eitc.in_effect: true
    gov.contrib.states.nd.child_poverty_impact_dashboard.eitc.match: 0.1
    state_code: ND
    eitc: 1000
  output:
    nd_eitc: 100
    nd_refundable_credits: 100

- name: ND EITC with 20% match when in effect
  period: 2024
  reforms: policyengine_us.reforms.states.nd.eitc.nd_eitc
  input:
    gov.contrib.states.nd.child_poverty_impact_dashboard.eitc.in_effect: true
    gov.contrib.states.nd.child_poverty_impact_dashboard.eitc.match: 0.2
    state_code: ND

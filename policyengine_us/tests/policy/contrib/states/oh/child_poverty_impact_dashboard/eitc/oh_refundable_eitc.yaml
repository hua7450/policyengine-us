- name: OH EITC is refundable when reform active
  period: 2024
  reforms: policyengine_us.reforms.states.oh.eitc.oh_refundable_eitc
  input:
    state_code: OH
    oh_eitc: 500
  output:
    oh_refundable_eitc: 500
